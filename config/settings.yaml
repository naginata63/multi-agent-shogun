# multi-agent-shogun 設定ファイル

# 言語設定
# ja: 日本語（戦国風日本語のみ、併記なし）
# en: 英語（戦国風日本語 + 英訳併記）
# その他の言語コード（es, zh, ko, fr, de 等）も対応
language: ja

# シェル設定
# bash: bash用プロンプト（デフォルト）
# zsh: zsh用プロンプト
shell: bash

# スキル設定
skill:
  # スキル保存先（スキル名に shogun- プレフィックスを付けて保存）
  save_path: "~/.claude/skills/"

  # ローカルスキル保存先（このプロジェクト専用）
  local_path: "/home/murakami/multi-agent-shogun/skills/"

# CLI モデル設定（type未指定=claudeフォールバック。明示するにはtype: claudeを追加）
cli:
  default: claude
  agents:
    shogun: { type: claude, model: "opus[1m]" }
    karo: { type: claude, model: sonnet }  # 家老=Sonnet（/advisor opus呼出対応）
    gunshi: { type: claude, model: "opus[1m]" }
    ashigaru1: { type: glm, model: glm }
    ashigaru2: { type: glm, model: glm }
    ashigaru3: { type: glm, model: glm }
    ashigaru4: { type: glm, model: glm }
    ashigaru5: { type: glm, model: glm }
    ashigaru6: { type: glm, model: glm }
    ashigaru7: { type: glm, model: glm }

# ============================================================
# Bloom-based Dynamic Model Routing (殿判断 cmd_1441 D10 Option β / 2026-04-24)
# A1-a 復活 — L1-L4=GLM (Z.AI GLM-5.1) / L5-L6=Opus[1m] (Claude)。Sonnet除外。
# 家老 step 6.5 + lib/cli_adapter.sh get_recommended_model が参照する。
# capability_tiers のキーは cli.agents.*.model の値と一致させること。
# ============================================================
bloom_routing: auto

available_cost_groups:
  - glm
  - claude_max

capability_tiers:
  glm:                    # cli.agents.ashigaru{1-7}.model == "glm"
    max_bloom: 4          # L1-L4: Z.AI GLM-5.1
    cost_group: glm
  "opus[1m]":             # Claude Opus 4.7 (1M context)
    max_bloom: 6          # L5-L6: 分析・創造・戦略
    cost_group: claude_max

bloom_model_preference:
  L1-L4: [glm]
  L5-L6: ["opus[1m]"]

# ntfy通知設定
ntfy_topic: "shogun-962f817f20fadb36"
ntfy_image_dir: "screenshots/ntfy"
screenshot:
  path: "screenshots/ntfy"

# VOICEVOX音声通知設定（ずんだもん）
voicevox_enabled: false  # 殿指示 2026-04-25 07:12 停止

# ログ設定
logging:
  level: info  # debug | info | warn | error
  path: "/home/murakami/multi-agent-shogun/logs/"
