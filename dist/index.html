れる。価格・コンテキスト・モダリティの各軸で使い分けを推奨する内容。", "source_name": "AI Pricing Guru / Claude Opus 4.7 vs GPT-5.4 vs Gemini 3.1 Pro: Which Flagship Wins in April 2026?", "source_url": "https://www.aipricing.guru/blog/claude-opus-4-7-vs-gpt-5-4-vs-gemini-3/", "ogp_image": "https://www.aipricing.guru/og/blog/claude-opus-4-7-vs-gpt-5-4-vs-gemini-3.png"}, {"title": "Google Gemini APIの無料ティア改定——Proモデルが有料化、Flash系のみ無料継続", "category": "api", "category_icon": "💰", "score": 80, "summary": "4月1日付けで施行された価格改定の影響が開発者コミュニティで引き続き話題に。Gemini 3.1 ProなどProシリーズが無料ティアから除外され有料専用に。無料ティアはFlash・Flash-Liteモデルのみ継続（1,500リクエスト/日）。2026年6月1日にはGemini 2.0 Flash・2.0 Flash-Liteが廃止予定のため、2.5 Flash以降への移行を推奨。また全ビリングティアで強制支出上限が設定され、上限到達時にAPIが自動停止する仕組みも導入された。", "source_name": "Apiyi.com Blog / Google Gemini API free tier tightened: Pro models to become paid starting in April", "source_url": "https://help.apiyi.com/en/google-gemini-api-free-tier-changes-april-2026-guide-en.html", "ogp_image": "https://help.apiyi.com/wp-content/uploads/2025/02/cropped-apiyi-logo-250207.png"}, {"title": "Anthropic「Claude Design」公開——テキスト指示からスライド・プロトタイプを即生成", "category": "oss", "category_icon": "🛠️", "score": 60, "summary": "4月17日、AnthropicはOpus 4.7搭載の新プロダクト「Claude Design」をAnthropicLabsの実験的リリースとして提供開始。プレゼン資料・ワンペーパー・UIモックをテキスト指示だけで生成し、PDF/URL/PPTX形式やCanvaへのエクスポートが可能。企業のデザインシステムをコードベースから読み込んで一貫したブランドスタイルを維持する機能も持つ。Pro・Max・Team・Enterpriseプランが対象で、段階的に展開中。", "source_name": "ITmedia NEWS / Claude Opus最新版「4.7」公開", "source_url": "https://www.itmedia.co.jp/news/articles/2604/17/news072.html", "ogp_image": "https://image.itmedia.co.jp/news/articles/2604/17/cover_news072.png"}, {"title": "【個人ブログ/Zenn】Claude Opus 4.7が来た！変わったポイントを実際に試してみた", "category": "model", "category_icon": "🤖", "score": 60, "summary": "Zennエンジニアが4月17日公開の実践レポート。旧モデル（Opus 4.6）と比べて指示追従が明確に改善され「途中で勝手にはしょらなくなった」と評価。xhigh effortを使ったコード生成ではバグ修正の精度が体感で上がり、複数ファイルにまたがるリファクタリングも一回で完走した事例を報告。一方「プロンプトに細かく書きすぎると逆に裏目に出る場合がある」という注意点も共有。実コードと出力結果のスクリーンショット付きで検証内容が具体的。", "source_name": "Zenn / Claude Opu us-4-7-ga", "ogp_image": "https://res.cloudinary.com/zenn/image/upload/s--2lFsA_X6--/c_fit%2Cg_north_west%2Cl_text:notosansjp-medium.otf_55:GitHub%2520Copilot%25E3%2581%25A7Claude%2520Opus%25204.7%25E3%2581%258C%25E4%25B8%2580%25E8%2588%25AC%25E5%2585%25AC%25E9%2596%258B%25EF%25BC%2588GA%25EF%25BC%2589%253A%25E3%2582%25A8%25E3%2583%25BC%25E3%2582%25B8%25E3%2582%25A7%25E3%2583%25B3%25E3%2583%2588%25E5%25AE%259F%25E8%25A1%258C%25E3%2581%25A8%25E6%258E%25A8%25E8%25AB%2596%25E3%2581%25AE%25E5%25BC%25B7%25E5%258C%2596%2Cw_1010%2Cx_90%2Cy_100/g_south_west%2Cl_text:notosansjp-medium.otf_34:%25E3%2581%2593%25E3%2581%25B0%25E3%2582%2584%25E3%2581%2597%2520%25E3%2581%2586%25E3%2581%258D%25E3%2582%2587%25E3%2581%2586%2Cx_220%2Cy_108/bo_3px_solid_rgb:d6e3ed%2Cg_south_west%2Ch_90%2Cl_fetch:aHR0cHM6Ly9zdG9yYWdlLmdvb2dsZWFwaXMuY29tL3plbm4tdXNlci11cGxvYWQvYXZhdGFyLzZjNGExY2UxMDYuanBlZw==%2Cr_20%2Cw_90%2Cx_92%2Cy_102/g_south_west%2Ch_34%2Cl_default:og-publication-pro-mark-xcosax%2Cw_34%2Cx_217%2Cy_158/co_rgb:6e7b85%2Cg_south_west%2Cl_text:notosansjp-medium.otf_30:%25E3%2583%2598%25E3%2583%2583%25E3%2583%2589%25E3%2582%25A6%25E3%2582%25A9%25E3%2583%25BC%25E3%2582%25BF%25E3%2583%25BC%25E3%2582%25B9%2Cx_255%2Cy_160/bo_4px_solid_white%2Cg_south_west%2Ch_50%2Cl_fetch:aHR0cHM6Ly9zdG9yYWdlLmdvb2dsZWFwaXMuY29tL3plbm4tdXNlci11cGxvYWQvYXZhdGFyLzVkZjMxMzU1MmYuanBlZw==%2Cr_max%2Cw_50%2Cx_139%2Cy_84/v1627283836/default/og-base-w1200-v2.png?_a=BACAGSGT"}, {"title": "OpenAI 次期モデル「Spud」（GPT-5.5またはGPT-6）——4月末リリースに72%の確率", "category": "news", "category_icon": "📢", "score": 60, "summary": "Polymarketの予測市場で「4月30日までにGPT-6リリース」が72%と高確率を維持（4月17日時点）。内部コード名「Spud」と呼ばれるモデルは3月24日頃に事前学習を完了。Sam Altmanは社内で「経済を本当に加速させられる非常に強力なモデル」と発言。GPT-5.5かGPT-6のどちらの名称でリリースされるかは未確認。最も可能性が高い期間は4月21日〜5月25日とされており、リリースを待つ状態が続いている。", "source_name": "LumiChats Blog / OpenAI's Secret Weapon Has a Codename. It's Called 'Spud.'", "source_url": "https://lumichats.com/blog/gpt-5-5-spud-openai-release-date-features-april-2026-complete-guide", "ogp_image": null}, {"title": "ICLR 2026採択論文：「Playing Along」——AIの二重エージェント防衛フレームワーク", "category": "paper", "category_icon": "📄", "score": 60, "summary": "4月17日にarXivで公開されたICLR 2026採択論文。LLMベースのサイバー攻撃に対し、防御側AIが攻撃者エージェントに「意図的に従うふりをしながら」情報を誤誘導する二重エージェント戦略を提案。強化学習で訓練された防衛モデルは攻撃の進行を遅らせつつ脅威情報を収集できると実証。AIエージェントのセキュリティ研究における新しいアプローチとして注目されており、攻撃的AI技術の進化に対応した防衛戦略設計の参考論文として位置づけられる。", "source_name": "arXiv 2604.11666 / Playing Along: Learning a Double-Agent Defender", "source_url": "https://arxiv.org/pdf/2604.11666", "ogp_image": null}, {"title": "Anthropic、Claude Opus 4.7に「禁止サイバーセキュリティ用途」の自動検出ブロックを実装", "category": "news", "category_icon": "📢", "score": 60, "summary": "CNBC・Axiosが4月16日報道。Opus 4.7のリリースに際し、Anthropicは高リスクなサイバーセキュリティ用途のリクエストを自動検出してブロックする安全機構を実装した。同社は非公開のClaude Mythos 5が初めてASL-4（真に危険な能力閾値に近い水準）安全プロトコルを発動したことも認めており、Opus 4.7はMythosより「広い汎用性では劣る」と明言。安全性と能力のトレードオフを透明に開示する姿勢が業界注目を集めている。", "source_name": "CNBC / Anthropic rolls out Claude Opus 4.7, an AI model that is less risky than Mythos", "source_url": "https://www.cnbc.com/2026/04/16/anthropic-claude-opus-4-7-model-mythos.html", "ogp_image": "https://image.cnbcfm.com/api/v1/image/108267419-1771518692466-gettyimages-2261864825-INDIA_AI_SUMMIT.jpeg?v=1776348710&amp;w=1920&amp;h=1080"}, {"title": "Anthropic、$8,000億評価額でのVC投資オファーを検討——年間収益$300億でIPOも視野", "category": "news", "category_icon": "📢", "score": 40, "summary": "Bloombergが4月14日報道。Anthropicは$8,000億（約120兆円）以上の評価額でのVC投資オファーを複数受けており、現時点では受け入れを保留している。これは2月の資金調達時の評価額$3,500億の2倍超。年間ARRは4月初旬に$300億を突破し前年比約1,400%成長。Goldman Sachs・JPMorgan・Morgan Stanleyと2026年10月以降のIPOに向けた初期交渉も開始したと報じられている。", "source_name": "Bloomberg / Anthropic Attracts Investor Offers at an $800 Billion Valuation", "source_url": "https://www.bloomberg.com/news/articles/2026-04-14/anthropic-attracts-investor-offers-at-a-800-billion-valuation", "ogp_image": null}, {"title": "NTTデータ、「AIネイティブ開発」を2026年度から全技術者に展開——人月型契約の見直しへ", "category": "news", "category_icon": "📢", "score": 40, "summary": "日経XTECHが報道。NTTデータは生成AIを使ったシステム開発手法を同社の全技術者（約10万人超）に展開する計画を進めており、AI前提の開発プロセス「AIネイティブ開発」への移行で人による工数を削減する。並行してシリコンバレーに新会社を設立し、米国発の最新生成AI技術の取り込みを加速。これに伴い従来の人月型契約モデルの見直しを顧客と交渉中で、成果物ベースの契約への移行が業界全体に波及するとみられる。", "source_name": "日経XTECH / NTTデータが生成AI使うシステム開発手法を全技術者に展開、人月型契約が見直しに", "source_url": "https://xtech.nikkei.com/atcl/nxt/column/18/02423/073100046/", "ogp_image": "https://xtech.nikkei.com/atcl/nxt/column/18/02423/073100046/topm.jpg?20220512"}, {"title": "トレンド", "category": "other", "category_icon": "🔥 ", "score": 20, "summary": "- **🤖 Claude Opus 4.7 正式リリース——コーディング能力と画像認識が大幅強化**（12ソース重複）: Anthropicが4月16日にClaude Opus 4.7を公開。SWE-bench Proスコアは64.3%でGPT-5.4を+6.6pt、Gemini 3.1 Proを+10.1pt上回る。画像認識は最大2,576px（約3.75メ", "source_name": "", "source_url": "", "ogp_image": null}], "2026-04-17": [{"title": "【個人ブログ/Zenn】2026年4月 Agentic Engineering現在地——エージェント開発の成熟度を8段階で整理", "category": "oss", "category_icon": "🛠️", "score": 80, "summary": "Andrej Karpathyが提唱する「Agentic Engineering」を受け、著者がL1（タブ補完）からL8（自律・協調エージェント）まで8段階の成熟モデルを実践的に整理。L5（MCP+スキル拡張）・L6（環境全体設計）への移行が2026年4月の現在地として示され、各段階で必要なスキルと参考リソースが紹介されている。", "source_name": "Zenn / mrskiro（2026/04/15）", "source_url": "https://zenn.dev/murasaki/articles/d9fea8b4e730ce", "ogp_image": "https://res.cloudinary.com/zenn/image/upload/s--JitWi5E2--/c_fit%2Cg_north_west%2Cl_text:notosansjp-medium.otf_55:2026%25E5%25B9%25B44%25E6%259C%2588%2520Agentic%2520Engineering%25E7%258F%25BE%25E5%259C%25A8%25E5%259C%25B0%2Cw_1010%2Cx_90%2Cy_100/g_south_west%2Cl_text:notosansjp-medium.otf_37:mrskiro%2Cx_203%2Cy_121/g_south_west%2Ch_90%2Cl_fetch:aHR0cHM6Ly9zdG9yYWdlLmdvb2dsZWFwaXMuY29tL3plbm4tdXNlci11cGxvYWQvYXZhdGFyLzAzNTUyNTkyNjcuanBlZw==%2Cr_max%2Cw_90%2Cx_87%2Cy_95/v1627283836/default/og-base-w1200-v2.png?_a=BACAGSGT"}, {"title": "Google、Gemini 3.1 Flash TTSを正式発表——70言語対応・音声スタイルを自然言語で制御", "category": "model", "category_icon": "🤖", "score": 80, "summary": "（英語ソース・日本語訳）4月15日にGoogleが発表した最新TTS（テキスト音声変換）モデル。70言語以上をサポートし、アクセント・ペース・感情トーンをプロンプト内の自然言語で細かく制御できる「オーディオタグ」機能を搭載。マルチスピーカー対話にもネ わせたら、自分のAI使い分けが丸裸になった話**（4ソース重複）: Claude の Privacy Portal から `conversations.json` をエクスポートし、自作Python スクリプトで Markdown 変換→NotebookLM に投入する手順を公開。「GeminiはアイデアD", "source_name": "", "source_url": "", "ogp_image": null}, {"title": "Nature誌：複雑な科学タスクでAIエージェントを人間研究者が依然上回る——スタンフォードAI指数2026より", "category": "paper", "category_icon": "📄", "score": 40, "summary": "（英語ソース・日本語訳）スタンフォード大が発行したAI Index Report 2026の知見を基にNatureが報道。AIエージェントが科学ワークフローを自律実行できる一方、複雑かつ判断を要するタスクでは人間研究者が優位を保ち、「エージェントへの過信」に警鐘を鳴らす。AI言及論文の割合は分野によって6〜9%に達し、研究者のAI依存は拡大しているが、能力限界の理解が不十分との指摘も。", "source_name": "Nature（2026/04/13）", "source_url": "https://www.nature.com/articles/d41586-026-01199-z", "ogp_image": "https://media.nature.com/lw1200/magazine-assets/d41586-026-01199-z/d41586-026-01199-z_52272472.jpg"}, {"title": "奈良市AI活用推進課、半年で17,200時間の業務削減を達成——自治体AI活用の先進事例", "category": "news", "category_icon": "📢", "score": 20, "summary": "2025年4月に設置したAI専門部署「AI活用推進課」の1年間の成果として、文章作成・要約・校正業務を中心に、下半期だけで約17,200時間（約17.5人月分）の業務時間削減を達成。2026年度からは「AI・行革推進課」として行革推進機能も統合し、AI活用をさらに加速する。", "source_name": "奈良市プレスリリース（prtimes）", "source_url": "https://prtimes.jp/main/html/rd/p/000000421.000036429.html", "ogp_image": "https://prcdn.freetls.fastly.net/release_image/36429/421/36429-421-3075159d13fd525bf50c983f5240cc59-252x266.png?format=jpeg&amp;auto=webp&amp;fit=bounds&amp;width=2400&amp;height=1260"}, {"title": "Anthropic、ARR $300億ドル（約4.5兆円）でOpenAIを初めて超える——15カ月で30倍成長", "category": "news", "category_icon": "📢", "score": 20, "summary": "（英語ソース・日本語訳）AnthropicのARR（年間経常収益換算）が$300億ドルに達し、OpenAIの$250億ドルを上回ったと複数メディアが報道。2025年1月時点の$10億ドルから約15カ月で30倍という異例の成長率。年間100万ドル超を支払う法人顧客が2カ月以内に500社→1,000社に倍増しており、エンタープライズ需要がIPO観測にも繋がっている。", "source_name": "SaaStr（2026/04）", "source_url": "https://www.saastr.com/anthropic-just-passed-openai-in-revenue-while-spending-4x-less-to-train-their-models/", "ogp_image": "https://i0.wp.com/www.saastr.com/wp-content/uploads/2026/04/compare-scaled.jpeg?fit=881%2C1000&#038;quality=70&#038;ssl=1"}, {"title": "第10回 AI・人工知能EXPO（春）、東京ビッグサイトで開催中（4/15〜17）", "category": "news", "category_icon": "📢", "score": 20, "summary": "国内最大級のAI専門展「NexTech Week 2026」内のAI・人工知能EXPOが本日（4/17）最終日を迎える。AI開発ツール・エージェントフレームワーク・LLMアプライアンス等の最新製品が出展。国内ベンダーによる展示とともに、RAG・マルチエージェント・フィジカルAIの活用事例セッションが多数実施されており、直近の日本市場における生成AI実装フェーズへの移行を象徴するイベントとなっている。", "source_name": "NexTech Week 2026 AI EXPO", "source_url": "https://www.nextech-week.jp/hub/ja-jp/visit/ai.html", "ogp_image": "https://www.nextech-week.jp/content/dam/sitebuilder/rxjp/nextech-week/images/ja/hub/common/ogp/nextech-week-jp-ogp-top-ai.png/_jcr_content/renditions/original"}], "2026-04-16": [{"title": "Claude Codeデスクトップ全面刷新——マルチタスク・サイドバー・ターミナル統合", "category": "oss", "category_icon": "🛠️", "score": 80, "summary": "Anthropicは4月14日、Claude Codeデスクトップアプリに複数の新機能を追加した。複数タスクの同時処理、アクティブセッション一覧表示とセッション間移動、`Ctrl+;` でターミナルをサイドシートとして起動するローカルコンテキスト参照機能を搭載。HTML・PDFファイルのプレビューも追加され、CLI連携によりデスクトップとターミナルが統合的に動作する。Pro・Max・Team・Enterpriseプランで利用可能。", "source_name": "ITmedia AI+ / 2026-04-15", "source_url": "https://www.itmedia.co.jp/aiplus/articles/2604/15/news080.html", "ogp_image": "https://image.itmedia.co.jp/aiplus/articles/2604/15/cover_news080.jpg"}, {"title": "【個人ブログ・Zenn】Claude Code、この1週間で13機能——Cowork Enterprise GA・Ultraplan・advisor strategy全解説", "category": "oss", "category_icon": "🛠️", "score": 80, "summary": "4月8〜15日にリリースされたClaude Codeの13機能を詳細解説。注目点は：Cowork for Enterprise（RBAC・予算管理・OTel監査のGA化）、Ultraplan（計画立案をクラウドで実行）、Monitor tool（バックグラウンド監視プロセス）、1時間プロンプトキャッシュ（従来の5分から大幅延長）、/recap（セッション再開時の自動要約）、advisor strategy（Opus/Sonnetの自動レイヤリング）など。著者は「個人開発ツールから企業向け業務システムへの転換点」と分析。", "source_name": "Zenn / yokoi_ai / 2026-04-15", "source_url": "https://zenn.dev/yokoi_ai/articles/cc-2026-04-15", "ogp_image": "https://res.cloudinary.com/zenn/image/upload/s--w2mpI-0W--/c_fit%2Cg_north_west%2Cl_text:notosansjp-medium.otf_55:Claude%2520Code%25E3%2580%2581%25E3%2581%2593%25E3%2581%25AE1%25E9%2580%25B1%25E9%2596%2593%25E3%2581%25A713%25E7%2599%25BA%25E3%2580%2582%25E5%2585%25A8%25E9%2583%25A8%25E6%25B7%25B1%25E5%25A0%2580%25E3%2582%258A%25E3%2581%2597%25E3%2581%259F%25E3%2582%258B%2Cw_1010%2Cx_90%2Cy_100/g_south_west%2Cl_text:notosansjp-medium.otf_37:%25E6%25A8%25AA%25E4%25BA%2595%25E3%2581%25AEAI%25E6%2597%25A5%25E5%2592%258C%2Cx_203%2Cy_121/g_south_west%2Ch_90%2Cl_fetch:aHR0cHM6Ly9zdG9yYWdlLmdvb2dsZWFwaXMuY29tL3plbm4tdXNlci11cGxvYWQvYXZhdGFyLzlmMmM2NTk0YjUuanBlZw==%2Cr_max%2Cw_90%2Cx_87%2Cy_95/v1627283836/default/og-base-w1200-v2.png?_a=BACAGSGT"}, {"title": "Microsoft「MAI-Image-2-Efficient」発表——旗艦モデル比コスト41%削減・速度22%向上の画像生成モデル", "category": "model", "category_icon": "🤖", "score": 80, "summary": "MicrosoftがAzure AI Foundry向けに画像生成モデル「MAI-Image-2-Efficient」をパブリックプレビューで公開した。旗艦モデルMAI-Image-2と同等品質を維持しながら、NVIDIA H100環境で22%高速化・GPU効率は4倍、出力トークンコストは$19.50/百万トークン（旗艦比41%削減）を実現。Gemini 3.1 Flashより40%レイテンシが低いとし、製品写真・マーケティング素材・UI作成などの大量生成ユースケースを狙う。OpenAI依存低減を加速させるMicrosoftの独自AI展開の一環。", "source_name": "VentureBeat / 2026-04-14", "source_url": "https://venturebeat.com/technology/microsoft-launches-mai-image-2-efficient-a-cheaper-and-faster-ai-image-model", "ogp_image": null}, {"title": "【個人ブログ・note.com】Claude Code Routines実装ノート——スケジュール・API・GitHubイベント別の落とし穴と設計", "category": "oss", "category_icon": "🛠️", "score": 60, "summary": "Claude Codeの新Routines機能を実際に実装した実践ノート。3種トリガー（Schedule最短1時間間隔／API呼び出し／GitHub Webhook）の使い分け、トークンの一度限り表示やbeta APIヘッダの互換性管理など実装時の落とし穴を詳述。日次issue棚卸し・監視アラート転送・PR自動レビューの具体的ユースケースと、プランごとの日次上限（Pro: 5回、Max: 15回）も解説。", "source_name": "note.com / engineers_hub / 2026-04-15", "source_url": "https://note.com/engineers_hub/n/n395f243f9613", "ogp_image": "https://assets.st-note.com/production/uploads/images/267533810/rectangle_large_type_2_32def9a4f179fdce282f541970d1235e.png?fit=bounds&quality=85&width=1280"}, {"title": "NVIDIA「NVIDIA Ising」発表——量子コンピュータ開発加速のための初のオープンソースAIモデル群", "category": "oss", "category_icon": "🛠️", "score": 60, "summary": "NVIDIAが世界量子デー（4月14日）に合わせ、量子プロセッサ開発支援に特化したオープンソースAIモデルファミリー「NVIDIA Ising」を発表。主要モデルは2つ：① **Ising Calibration**（350億パラメータのビジョン言語モデ rugs-off-vc-funding-offers-valuing-it-at-800b-for-now/", "ogp_image": "https://techcrunch.com/wp-content/uploads/2026/03/Dario-Amodei-Anthropic-1.jpg?w=1024"}, {"title": "OpenAI×ノボ ノルディスク、AI創薬パートナーシップ締結——全社統合で2026年末完了目標", "category": "news", "category_icon": "📢", "score": 40, "summary": "製薬大手ノボ ノルディスクがOpenAIとの全社的AIパートナーシップを発表（4月14日）。研究開発から製造・サプライチェーン・営業まで全工程にOpenAIの最新AIを統合し、創薬候補の特定加速・臨床試験効率化・製造最適化を目指す。2026年末までのフル統合を計画し、グローバル従業員のAIリテラシー向上もOpenAIが支援。データ保護・ガバナンス・人間監視の枠組みが構築済みで、AI創薬の商業化モデルとして注目される。", "source_name": "CNBC / 2026-04-14", "source_url": "https://www.cnbc.com/2026/04/14/novo-nordisk-openai-ai-drug-discovery-healthcare-nvo.html", "ogp_image": "https://image.cnbcfm.com/api/v1/image/108283570-17745429042026-03-26t163339z_1972272553_rc2dcka2eeqm_rtrmadp_0_novo-nordisk.jpeg?v=1774542953&amp;w=1920&amp;h=1080"}, {"title": "トレンド", "category": "other", "category_icon": "🔥 ", "score": 20, "summary": "- **🛠️ Claude Codeデスクトップ全面刷新——マルチタスク・サイドバー・ターミナル統合**（4ソース重複）: Anthropicは4月14日、Claude Codeデスクトップアプリに複数の新機能を追加した。複数タスクの同時処理、アクティブセッション一覧表示とセッション間移動、`Ctrl+;` でターミナルをサイドシートとして起動するローカルコンテ\n- **🤖 OpenAI、サイバーセキュリティ防衛専用AI「GPT-5.4-Cyber」を発表**（2ソース重複）: OpenAIは4月14日、セキュリティ専門家向けプログラム「Trusted Access for Cyber（TAC）」を拡張し、「GPT-5.4-Cyber」を限定公開した。同モデルはGPT-5.4ベースでセキュリティ作業時の拒否判定を緩", "source_name": "", "source_url": "", "ogp_image": null}, {"title": "OpenAI「Trusted Access for Cyber」拡張——GPT-5.4-Cyberへのアクセスティア追加", "category": "oss", "category_icon": "🛠️", "score": 20, "summary": "OpenAIがTACプログラムに新ティアを追加し、追加認証を完了した参加者がGPT-5.4-Cyberを利用できるようになった。セキュリティ防衛向けに正当用途への応答精度が向上した設計で、ファイル・スキーマ分析、バイナリ解析、潜在的脅威対応が強化されている。個人ユーザーから組織単位まで段階的に展開し、数千人規模の認定ディフェンダーへの提供を目指す。", "source_name": "gihyo.jp / 2026-04-15", "source_url": "https://gihyo.jp/article/2026/04/openai-gpt-5.4-cyber", "ogp_image": "https://gihyo.jp/assets/images/ICON/2026/2814_openai-gpt-5.4-cyber.png"}, {"title": "Anthropic取締役会にノバルティスCEO就任——Long-Term Benefit Trustが医療AI展開を見据えた人事", "category": "news", "category_icon": "📢", "score": 20, "summary": "A ory_icon": "🤖", "score": 80, "summary": "Anthropicが4月14日、Claude Codeに「Routines（ルーティン）」機能を追加したと発表。プロンプト・リポジトリ・コネクタを一度設定すれば、スケジュール・APIコール・GitHubイベントに応じてAnthropicのクラウドインフラ上で自動実行される。Macがオフラインでも動作し、毎晩のバグトリアージや言語間コード移植などの自動化が可能。Pro/Max/Team/Enterpriseプランで利用可能（1日5〜25回）。同時に、複数セッションのサイドバイサイド表示・統合ターミナル・HTMLプレビューを備えたClaude Codeのリデザインも公開。", "source_name": "9to5Mac (2026-04-14)", "source_url": "https://9to5mac.com/2026/04/14/anthropic-adds-repeatable-routines-feature-to-claude-code-heres-how-it-works/", "ogp_image": "https://i0.wp.com/9to5mac.com/wp-content/uploads/sites/6/2026/03/claude-code-auto-mode.webp?resize=1200%2C628&quality=82&strip=all&ssl=1"}, {"title": "MiniMax M2.7オープンソース公開 — 自己進化型AIエージェントがSWE-Pro 56.22%・ELO 1495を達成", "category": "model", "category_icon": "🤖", "score": 80, "summary": "中国AI企業MiniMaxが4月12日、自己進化型エージェントモデル「MiniMax M2.7」をHugging Faceでオープンソース公開（商用利用可）。SWE-Proで56.22%（GPT-5.3-Codexと同水準）、Terminal Bench 2で57.0%、オープンウェイト最高のELO 1495を記録。最大の特徴は「自己進化能力」で、開発中にモデル自身が100回以上のラウンドで実験・失敗分析・コード修正・評価を繰り返し、プログラミングスキャフォールドを自律的に30%改善した。Sonnet 4.6とMM Clawベンチで同水準のスコア（62.7%）を達成している。", "source_name": "MarkTechPost (2026-04-12)", "source_url": "https://www.marktechpost.com/2026/04/12/minimax-just-open-sourced-minimax-m2-7-a-self-evolving-agent-model-that-scores-56-22-on-swe-pro-and-57-0-on-terminal-bench-2/", "ogp_image": "https://www.marktechpost.com/wp-content/uploads/2026/04/blog-28.png"}, {"title": "Gemini 3.1 Ultra & GPT-5.4 ProがAI評価指標で57点同点首位 — 性能競争が事実上の並走状態に", "category": "news", "category_icon": "📢", "score": 80, "summary": "Artificial Analysis Intelligence Indexで、Gemini 3.1 Ultra（Google）とGPT-5.4 Pro（OpenAI）がともに57点を記録し公開アクセス可能な評価で最高スコアタイ。2026年3月時点のArenaランキングではAnthropicが首位、僅差でxAI・Google・OpenAIが続き、中国モデル（DeepSeek・Alibaba）も僅差で追従。フロンティアモデル間の性能差が数%以内に収束したことで、コスト・信頼性・エコシステム連携が選択基準の中心に移行しつつある。", "source_name": "llm-stats.com AI Updates (April 2026)", "source_url": "https://llm-stats.com/llm-updates", "ogp_image": "https://llm-stats.com/og/main.png"}, {"title": "英国AI安全機関が「Claude Mythos Preview」の性能を検証 — 高度なサイバーセキュリティ能力を確認", "category": "model", "category_icon": "🤖", "score": 40, "summary": "英国のAI Security Institute（AISI）が、Anthropicの「Claude Mythos Preview」を独立評価した結果を公表。ゼロデイ脆弱性の検出などサイバーセキュリティ分野での突出した能力が確認された。AWS・Apple・Microsoftを含む12社が参加した「Project Glasswing」でも評価が行われており、業界関係者からは「生成AIのサイバーセキュリティ活用において世代的な転換点」との見方も出ている。なお同モデルは安全性上の懸念から現時点では一般公開されていない。", "source_name": "ITmedia AI＋ (2026-04-14)", "source_url": "https://www.itmedia.co.jp/aiplus/articles/2604/14/news064.html", "ogp_image": "https://image.itmedia.co.jp/aiplus/articles/2604/14/cover_news064.jpg"}, {"title": "MIT Technology Review — AI現状を読み解く10のチャート集", "category": "paper", "category_icon": "📄", "score": 40, "summary": "MIT Technology Reviewが4月13日、2026年現在のAI状況を可視化した重要チャート集を公開。主な知見: ①主要AIモデルの性能差は数%以内に縮小し、競争軸がコスト・信頼性・実用性にシフト ②AI採用速度はPC・インターネット普及を上回るペース ③仕事へのAI影響について、米国の専門家73%がポジティブ評価する一方、一般市民は23%に留まり、専門家・一般市民間の認識格差が拡大。4月21日には「今AIで最も重要な10テーマ」の年次リスト発表を予告。", "source_name": "MIT Technology Review (2026-04-13)", "source_url": "https://www.technologyreview.com/2026/04/13/1135675/want-to-understand-the-current-state-of-ai-check-out-these-charts/", "ogp_image": "https://wp.technologyreview.com/wp-content/uploads/2026/04/state-ai-report.jpg?resize=1200,600"}, {"title": "トレンド", "category": "other", "category_icon": "🔥 ", "score": 20, "summary": "- **🤖 英国AI安全機関が「Claude Mythos Preview」の性能を検証 — 高度なサイバーセキュリティ能力を確認**（6ソース重複）: 英国のAI Security Institute（AISI）が、Anthropicの「Claude Mythos Preview」を独立評価した結果を公表。ゼロデイ脆弱性の検出などサイバーセキュリティ分野での突出した能力が確認された。AWS", "source_name": "", "source_url": "", "ogp_image": null}, {"title": "ソフトバンク・NEC・ホンダ・ソニーが国産AI新会社「日本AI基盤モデル開発」設立", "category": "news", "category_icon": "📢", "score": 20, "summary": "ソフトバンク・NEC・ホンダ・ソニーグループの4社を中心に、国産AI基盤モデル開発に向けた新会社「日本AI基盤モデル開発」が設立された。日本製鉄・三菱UFJ銀行・三井住友銀行・みずほ銀行も少数株主として参画し、計8社が結集。ソフトバンク・NECが1兆パラメーター規模の大規模言語モデル開発を主導し、ホンダ・ソニーが自動運転・ロボット・ゲームへの実装を担う役割分担。政府は2026年度からの5年間で約1兆円の支援枠を設けており、政府支援への応募も予定している。", "source_name": "ITmedia AI＋ (2026-04-13)", "source_url": "https://www.itmedia.co.jp/aiplus/articles/2604/13/news084.html", "ogp_image": "https://image.itmedia.co.jp/aiplus/articles/2604/13/cover_news084.jpg"}, {"title": "日本IBM「ALSEA」発表 — AIが主役の大規模システム開発ソリューション", "category": "model", "category_icon": "🤖", "score": 20, "summary": "日本IBMが2026年4月14日、コンテキスト標準ソリューション「AI Lifecycle Shared Engineering Artifacts（ALSEA）」を発表。大規模開発のノウハウをドキュメント群に集約しAIに参照させることで、従来は人間中心だったシステム開発をAI主役へと転換する。2027年以降に作業工数35%削減・開発期間30%短縮を目標とし、日本IBMは2026年を「過去40年で最もシステム開発アプローチが変わる年」と位置づけている。4月14日よりパイロット提供開始。", "source_name": "ITmedia AI＋ (2026-04-14)", "source_url": "https://www.itmedia.co.jp/aiplus/articles/2604/14/news118.html", "ogp_image": "https://image.itmedia.co.jp/aiplus/articles/2604/14/cover_news118.jpg"}, {"title": "PIXTA、AI生成コンテンツの新規取り扱いを停止 — 「人が制作したもの」を優先", "category": "news", "category_icon": "📢", "score": 20, "summary": "画像・動画素材サイト「PIXTA」が、AI生成コンテンツの取り扱い停止を発表。4月20日から新規アップロードを不可とし、5月22日からは既存のAI生成素材の販売も停止する。ユーザーアンケートで「人が撮影・制作した素材を求める」声が圧倒的多数を占めたことが背景にある。クリエイターへのAI競合懸念が高まる中、大手ストックフォトとしては初の大規模AI生成コンテンツ排除となる注目の動向。", "source_name": "ITmedia AI＋ (2026-04-14)", "source_url": "https://www.itmedia.co.jp/aiplus/articles/2604/14/news114.html", "ogp_image": "https://image.itmedia.co.jp/aiplus/articles/2604/14/cover_news114.jpg"}, {"title": "PKSHA Technology × クレディセゾン、最短30秒のAIローン審査モデルを共同開発", "category": "news", "category_icon": "📢", "score": 20, "summary": "PKSHA Technologyとクレディセゾンが共同で「AI審査モデル」を開発し、ローン審査を最短30秒で完了する仕組みを実現。従来の審査プロセスを大幅に短縮するとともに、AIによる信用評価精度向上も図る。金融業界におけるAI活用が実運用フェーズに入った国内事例として注目される。", "source_name": "ITmedia AI＋ (2026-04-13)", "source_url": "https://www.itmedia.co.jp/aiplus/articles/2604/13/news116.html", "ogp_image": "https://image.itmedia.co.jp/aiplus/articles/2604/13/cover_news116.jpg"}, {"title": "さくらインターネット、国立機関から約38億円のAI向け案件を受注", "category": "news", "category_icon": "📢", "score": 20, "summary": "さくらインターネットが国立機関から生成AI活用を目的とした約38億円規模の案件を受注したと発表。2027年3月末までの完了を予定している。国産AI基盤の整備を求める動きが加速する中、国内クラウド事業者への大型AI案件として注目を集めている。", "source_name": "ITmedia Lemonade」が注目を集めている。インストール後にGPUとNPUを自動検出し、LLMチャット（llama.cpp）・Stable Diffusion・Whisper音声認識の3領域をカバー。Windows/Linux/macOS（β）対応で特にAMD Ryzen 5000シリーズで最適化されており、2MB程度の軽量インストーラーで即起動可能。クラウドAPIに依存しないローカル環境をゼロ費用で構築できる点が評価されている。", "source_name": "GIGAZINE（2026-04-11）", "source_url": "https://gigazine.net/news/20260411-lemonade/", "ogp_image": "https://i.gzn.jp/img/2026/04/11/lemonade/00.png"}, {"title": "【個人ブログ】Claude Code v2.1.98〜101 エンタープライズ新機能を実践解説——Vertex AIウィザードと/team-onboardingの使い方", "category": "oss", "category_icon": "🛠️", "score": 60, "summary": "2026年4月9〜11日にリリースされたClaude Code v2.1.98〜v2.1.101の新機能を網羅的に解説した実践記事。`/setup-vertex`コマンドでGCP認証からモデル設定まで対話的に完結するVertex AIウィザード、`/team-onboarding`で新規メンバー向けオンボーディングガイドを自動生成する機能を実例付きで紹介。v2.1.94からデフォルトのeffortレベルがmedium→highに変更されたことも確認できる。", "source_name": "Qiita / kai_kou（2026-04-12）", "source_url": "https://qiita.com/kai_kou/items/32b242950d643480284f", "ogp_image": "https://qiita-user-contents.imgix.net/https%3A%2F%2Fqiita-user-contents.imgix.net%2Fhttps%253A%252F%252Fcdn.qiita.com%252Fassets%252Fpublic%252Farticle-ogp-background-afbab5eb44e0b055cce1258705637a91.png%3Fixlib%3Drb-4.0.0%26w%3D1200%26blend64%3DaHR0cHM6Ly9xaWl0YS11c2VyLXByb2ZpbGUtaW1hZ2VzLmltZ2l4Lm5ldC9odHRwcyUzQSUyRiUyRnFpaXRhLWltYWdlLXN0b3JlLnMzLmFtYXpvbmF3cy5jb20lMkYwJTJGNDg1NDklMkZwcm9maWxlLWltYWdlcyUyRjE1MjQxMzIyMDk_aXhsaWI9cmItNC4wLjAmYXI9MSUzQTEmZml0PWNyb3AmbWFzaz1lbGxpcHNlJmJnPUZGRkZGRiZmbT1wbmczMiZzPTg5YjJiN2Q5OGNmODU1NjA0MDU1NzU0YzQ3MTliYjJj%26blend-x%3D120%26blend-y%3D467%26blend-w%3D82%26blend-h%3D82%26blend-mode%3Dnormal%26s%3D828d55aeb65ce59821b10c2330043747?ixlib=rb-4.0.0&amp;w=1200&amp;fm=jpg&amp;mark64=aHR0cHM6Ly9xaWl0YS11c2VyLWNvbnRlbnRzLmltZ2l4Lm5ldC9-dGV4dD9peGxpYj1yYi00LjAuMCZ3PTk2MCZoPTMyNCZ0eHQ9Q2xhdWRlJTIwQ29kZSUyMCVFNiU5QyU4MCVFNiU5NiVCMCVFNiVBOSU5RiVFOCU4MyVCRCVFMyU4MiVBQyVFMyU4MiVBNCVFMyU4MyU4OSUyMCVFMiU4MCU5NCUyMFZlcnRleCUyMEFJJUU5JTgwJUEzJUU2JTkwJUJBJUUzJTgxJUE4JUUzJTgzJTgxJUUzJTgzJUJDJUUzJTgzJUEwJUUzJTgyJUFBJUUzJTgzJUIzJUUzJTgzJTlDJUUzJTgzJUJ 5.0にて「VS Code Agents App」をプレビュー公開。エージェントネイティブな新コンパニオンアプリで、複数リポジトリを横断した並列エージェントセッションの実行が可能になる。`send_to_terminal`ツールも新たに追加され、ターミナルへの直接出力送信をサポート。コーディングAI「三つ巴」時代（Cursor / Copilot / Claude Code）においてMicrosoftがエージェント統合を本格強化する動きとして注目されている。", "source_name": "週刊AI駆動開発 2026-04-12 / Zenn", "source_url": "https://zenn.dev/pppp303/articles/weekly_ai_20260412", "ogp_image": "https://res.cloudinary.com/zenn/image/upload/s--koE0s2E2--/c_fit%2Cg_north_west%2Cl_text:notosansjp-medium.otf_55:%25E9%2580%25B1%25E5%2588%258AAI%25E9%25A7%2586%25E5%258B%2595%25E9%2596%258B%25E7%2599%25BA%2520-%25202026%25E5%25B9%25B404%25E6%259C%258812%25E6%2597%25A5%2Cw_1010%2Cx_90%2Cy_100/g_south_west%2Cl_text:notosansjp-medium.otf_37:pppp303%2Cx_203%2Cy_121/g_south_west%2Ch_90%2Cl_fetch:aHR0cHM6Ly9zdG9yYWdlLmdvb2dsZWFwaXMuY29tL3plbm4tdXNlci11cGxvYWQvYXZhdGFyLzA4NTNiOWJiODEuanBlZw==%2Cr_max%2Cw_90%2Cx_87%2Cy_95/v1627283836/default/og-base-w1200-v2.png?_a=BACAGSGT"}, {"title": "GitHub Copilot CLI v1.0.22〜24 エージェントモード起動フラグを一斉追加——`--autopilot`・`--plan`・`--mode`", "category": "oss", "category_icon": "🛠️", "score": 60, "summary": "GitHub Copilot CLIが今週のアップデートで`--mode`（通常・自動・計画）、`--autopilot`（完全自律実行）、`--plan`（実行計画のみ生成）の起動フラグを追加。カスタムエージェント用の`skills`フィールドとサブエージェントの深度・並行数制限も実装され、組織での大規模エージェント展開を想定した制御機能が整備された。Claude CodeやOpenAI Codexとの機能競争が加速している。", "source_name": "週刊AI駆動開発 2026-04-12 / Zenn", "source_url": "https://zenn.dev/pppp303/articles/weekly_ai_20260412", "ogp_image": "https://res.cloudinary.com/zenn/image/upload/s--koE0s2E2--/c_fit%2Cg_north_west%2Cl_text:notosansjp-medium.otf_55:%25E9%2580%25B1%25E5%2588%258AAI%25E9%25A7%2586%25E5%258B%2595%25E9%2596%258B%25E7%2599%25BA%2520-%25202026%25E5%25B9%25B404%25E6%259C%258812%25E6%2597%25A5%2Cw_1010%2Cx_90%2Cy_100/g_south_west%2Cl_text:notosansjp-medium.otf_37:pppp303%2Cx_203%2Cy_121/g_south_west%2Ch_90%2Cl_fetch:aHR0cHM6Ly9zdG9yYWdlLmdvb2dsZWFwaXMuY29tL3plbm4tdXNlci11cGxvYWQvYXZhdGFyLzA4NTNiOWJiODEuanBlZw==%2Cr_max%2Cw_90%2Cx_87%2Cy_95/v1627283836/default/og-base-w1200-v2.png?_a=BACAGSGT"}, {"title": "Andrej Karpathyの知見をClaude Code設定に落とし込んだリポジトリが5,000スター——「AI依存による認知的降伏」への処方箋", "category": "paper", "category_icon": "📄", "score": 60, "summary": "`forrestchang/andrej-karpathy-skills`が急速に拡散し約5,000スターを獲得。Karpathyが公開した「AIへの過度な依存がエンジニアのスキルを劣化させる」という警告（「認知的降伏」現象）への実践的な対応として、Claude Codeの設定ファイル（CLAUDE.md・.clauderc）に具体的なスキル強制ルールを組み込む手法を提案。AIツール疲れが議論される中、「どう使うか」の設計を重視する動きが注目されている。", "source_name": "週刊AI駆動開発 2026-04-12 / Zenn", "source_url": "https://zenn.dev/pppp303/articles/weekly_ai_20260412", "ogp_image": "https://res.cloudinary.com/zenn/image/upload/s--koE0s2E2--/c_fit%2Cg_north_west%2Cl_text:notosansjp-medium.otf_55:%25E9%2580%25B1%25E5%2588%258AAI%25E9%25A7%2586%25E5%258B%2595%25E9%2596%258B%25E7%2599%25BA%2520-%25202026%25E5%25B9%25B404%25E6%259C%258812%25E6%2597%25A5%2Cw_1010%2Cx_90%2Cy_100/g_south_west%2Cl_text:notosansjp-medium.otf_37:pppp303%2Cx_203%2Cy_121/g_south_west%2Ch_90%2Cl_fetch:aHR0cHM6Ly9zdG9yYWdlLmdvb2dsZWFwaXMuY29tL3plbm4tdXNlci11cGxvYWQvYXZhdGFyLzA4NTNiOWJiODEuanBlZw==%2Cr_max%2Cw_90%2Cx_87%2Cy_95/v1627283836/default/og-base-w1200-v2.png?_a=BACAGSGT"}, {"title": "スタンフォードAI Index 2026発表——米中AI性能差が消滅、生成AI普及は3年で53%とPCを上回る速度", "category": "paper", "category_icon": "📄", "score": 40, "summary": "スタンフォードHAIが4月13日に「AI Index 2026」を公開。主要発見：(1) 中国が米国のAI性能リードをほぼ消滅させた（特許・論文・自律ロボット分野では中国優位）、(2) 生成AIの消費者採用率が3年で53%に達しPCやインターネットより速い普及速度、(3) Foundation Model Transparency Indexのスコアが昨年の58点から40点に急落（主要モデルのトレーニングデータ非公開化が原因）、(4) 生成AIツールの米国消費者への年間価値は1,720億ドル規模に。", "source_name": "Stanford HAI（2026-04-13）", "source_url": "https://hai.stanford.edu/news/inside-the-ai-index-12-takeaways-from-the-2026-report", "ogp_image": null}, {"title": "PwC 2026 AI Performance Study——AI経済利益の75%が上位20%の企業に集中、「持てる者」と「持たざる者」の格差が鮮明に", "category": "news", "category_icon": "📢", "score": 40, "summary": "PwCが4月13日に公開した調査報告書によると、AI投資から実際の財務リターンを生み出している企業は上位20%に集中しており、残り80%の企業はいまだ試行錯誤段階にある。リードしている企業は「生産性向上」だけでなく「成長」に軸足を移していることが特徴。製造・物流・金融分野での本番エージェントデプロイが加速している一方、多くの企業は組織・データ・ガバナンスの壁を越えられていない実態が浮かび上がった。", "source_name": "PwC（2026-04-13）", "source_url": "https://www.pwc.com/gx/en/news-room/press-releases/2026/pwc-2026-ai-performance-study.html", "ogp_image": "https://www.pwc.com/gx/en/news-room/assets/news-releases/global-ai-study-newsroom.png"}, {"title": "Anthropic、年間ランレート売上が$300億超え——GoogleおよびBroadcomとの計算基盤パートナーシップも拡大", "category": "news", "category_icon": "📢", "score": 40, "summary": "Anthropicの年間契約ベース収益（ARR）が300億ドルを超えたことが明らかになった。同時にGoogleおよびBroadcomとのクラウド計算基盤パートナーシップを拡大。Claude Code v2.1.101リリースや企業向け機能の強化が契約増加を牽引しているとみられる。GPT-5.4・Gemini 3.1 Proとの直接競合が激化する中、エージェント用途における採用が売上を押し上げている。", "source_name": "週刊AI駆動開発 2026-04-12 / Zenn", "source_url": "https://zenn.dev/pppp303/articles/weekly_ai_20260412", "ogp_image": "https://res.cloudinary.com/zenn/image/upload/s--koE0s2E2--/c_fit%2Cg_north_west%2Cl_text:notosansjp-medium.otf_55:%25E9%2580%25B1%25E5%2588%258AAI%25E9%25A7%2586%25E5%258B%2595%25E9%2596%258B%25E7%2599%25BA%2520-%25202026%25E5%25B9%25B404%25E6%259C%258812%25E6%2597%25A5%2Cw_1010%2Cx_90%2Cy_100/g_south_west%2Cl_text:notosansjp-medium.otf_37:pppp303%2Cx_203%2Cy_121/g_south_west%2Ch_90%2Cl_fetch:aHR0cHM6Ly9zdG9yYWdlLmdvb2dsZWFwaXMuY29tL3plbm4tdXNlci11cGxvYWQvYXZhdGFyLzA4NTNiOWJiODEuanBlZw==%2Cr_max%2Cw_90%2Cx_87%2Cy_95/v1627283836/default/og-base-w1200-v2.png?_a=BACAGSGT"}, {"title": "AI Index 2026——主要AIモデルの透明性スコアが58点→40点に急落、トレーニングデータの非公開化が加速", "category": "paper", "category_icon": "📄", "score": 40, "summary": "スタンフォードHAIのFoundation Model Transparency Indexによると、2025〜2026年の間に主要AIモデルの透明性スコアが58点から40点に下落。Google・Anthropic・OpenAIを含む大手が最新モデルのデータセット規模・学習時間の公開を停止しており、95の注目モデルのうち80件がトレーニングコードを非公開でリリースしている。オープン性の退潮はSafetyの議論とも絡み、AI規制当局が透明性要件の法制化を本格検討する根拠にもなっている。", "source_name": "Stanford HAI AI Index 2026 Report（2026-04-13）", "source_url": "https://hai.stanford.edu/ai-index/2026-ai-index-report", "ogp_image": null}, {"title": "トレンド", "category": "other", "category_icon": "🔥 ", "score": 20, "summary": "- **🛠️ 【個人ブログ】Claude Code v2.1.98〜101 エンタープライズ新機能を実践解説——Vertex AIウィザードと/team-onboardingの使い方**（6ソース重複）: 2026年4月9〜11日にリリースされたClaude Code v2.1.98〜v2.1.101の新機能を網羅的に解説した実践記事。`/setup-vertex`コマンドでGCP認証からモデル設定まで対話的に完結するVertex AIウィザ", "source_name": "", "source_url": "", "ogp_image": null}, {"title": "スタンフォード報告：AI内部者と一般社会の認識格差が拡大——「利点」に楽観的でも「リスク」への不安も同時増", "category": "paper", "category_icon": "📄", "score": 20, "summary": "TechCrunchが4月13日に報じたAI Index 2026の追加知見として、AI企業内部者と一般市民の間でAIの見方に大きな乖離が生じていることが明らかになった。一般調査では「AIのメリットに楽観的」という回答が52%→59%に増加した一方、不安感も2ポイント増の52%に。専門家が「ブレークスルー」と捉える出来事を多くの一般人は「脅威」として受け取るパターンが定着しつつあり、AI企業のコミュニケーション戦略が問われる状況になっている。", "source_name": "TechCrunch（2026-04-13）", "source_url": "https://techcrunch.com/2026/04/13/stanford-report-highlights-growing-disconnect-between-ai-insiders-and-everyone-else/", "ogp_image": "https://techcrunch.com/wp-content/uploads/2024/11/GettyImages-2153474303-e.jpg?resize=1200,800"}], "2026-04-13": [{"title": "Qwen3.6 Plus、OpenRouterで1日1.4兆トークン利用記録を樹立——100万トークンコンテキスト無料提供", "category": "model", "category_icon": "🤖", "score": 80, "summary": "Alibaba/Qwenが3月末に公開した「Qwen3.6 Plus Preview」がOpenRouterで**1日1.4兆トークン**という史上最高の単日利用記録を達成（4月初旬）。100万トークンのコンテキストウィンドウ、常時オンのChain-of-Thought推論、ネイティブツール呼び出しを備え、Claude Opus 4.6比2〜3倍の出力速度を実現。OmniDocBench v1.5（91.2%）やRealWorldQA（85.4%）ではGemini・Claudeを上回る。API提供価格は無料プレビュー中で、オープンウェイト最強クラスのモデルが無償で利用できる状況に業界は激震。", "source_name": "Qwen3.6-Plus tops global usage chart on debut — Global Times", "source_url": "https://www.globaltimes.cn/page/202604/1358204.shtml", "ogp_image": "https://www.globaltimes.cn/Portals/0/attachment/2026/2026-02-26/01328d9b-1a70-4cee-8425-178bb03048fb.png"}, {"title": "Anthropic、最強AIモデル「Claude Mythos Preview」発表——一般非公開・防衛的セキュリティ用途限定", "category": "model", "category_icon": "🤖", "score": 60, "summary": "4月12日、Anthropicは研究用プレビューモデル「Claude Mythos Preview」を公開。**SWE-bench Verified 93.9%**（Opus 4.6比+13pt）、GPQA Diamond 94.6%を達成し全18ベンチマーク中17冠。最も驚異的なのはセキュリティ能力で、主要OSおよび全主要ブラウザにわたり**数千のゼロデイ脆弱性**を数週間で発見。FreeBSDの27年前のバグやFFmpegの16年前の脆弱性も特定。危険性を考慮し一般公開はせず、**Project Glasswing**に参加するAWS・Apple・Cisco・CrowdStrike・Google・JPMorgan・Linux Foundation・Microsoft・NVIDIA・Palo Alto Networks限定での防衛目的研究に利用を制限。", "source_name": "Anthropic's Claude Mythos Finds Thousands of Zero-Day Flaws — The Hacker News", "source_url": "https://thehackernews.com/2026/04/anthropics-claude-mythos-finds.html", "ogp_image": null}, {"title": "【個人ブログ】Claude Teamプラン完全管理ガイド 2026年4月版——月25ドルでClaude Codeが使えるようになった今の最適運用", "category": "oss", "category_icon": "🛠️", "score": 60, "summary": "Canlyが実運用で得た知見をもとに、Claude Teamプランの管理ダッシュボードを網羅解説。Standard（$25/人/月）とPremium（$125/人/月）の損益分岐点を分析し、「Standardで$100超過したらPremiumと同コスト」という実践的な閾値管理を公開。2026年1月の値下げでStandardティアでもClaude Code利用が可能になって以降、AWS Bedrockから全面移行した経緯も紹介。「管理者とエンジニアの情報ギャップ」という実運用上の落とし穴についても指摘。", "source_name": "zenn.dev/canly — Claude Teamプラン完全ガイド【2026/4最新】", "source_url": "https://zenn.dev/canly/articles/e7300b4d758119", "ogp_image": "https://res.cloudinary.com/zenn/image/upload/s--09Ow8AVU--/c_fit%2Cg_north_west%2Cl_text:notosansjp-medium.otf_55:Claude%2520Team%25E3%2583%2597%25E3%2583%25A9%25E3%2583%25B3%25E5%25AE%258C%25E5%2585%25A8%25E3%2582%25AC%25E3%2582%25A4%25E3%2583%2589%25E3%2580%25902026%252F4%25E6%259C%2580%25E6%2596%25B0%25E3%2580%2591%2Cw_1010%2Cx_90%2Cy_100/g_south_west%2Cl_text:notosansjp-medium.otf_34:%25E3%2581%25B5%25E3%2581%258F%25E3%2581%25A0%25EF%25BC%2588fukuda%2520ryu%25EF%25BC%2589%2Cx_220%2Cy_108/bo_3px_solid_rgb:d6e3ed%2Cg_south_west%2Ch_90%2Cl_fetch:aHR0cHM6Ly9zdG9yYWdlLmdvb2dsZWFwaXMuY29tL3plbm4tdXNlci11cGxvYWQvYXZhdGFyL2EwYjI3NWVjYTkuanBlZw==%2Cr_20%2Cw_90%2Cx_92%2Cy_102/co_rgb:6e7b85%2Cg_south_west%2Cl_text:notosansjp-medium.otf_30:%25E3%2582%25AB%25E3%2583%25B3%25E3%2583%25AA%25E3%2583%25BC%25E3%2583%2586%25E3%2583%2583%25E3%2582%25AF%25E3%2583%2596%25E3%2583%25AD%25E3%2582%25B0%2Cx_220%2Cy_160/bo_4px_solid_white%2Cg_south_west%2Ch_50%2Cl_fetch:aHR0cHM6Ly9zdG9yYWdlLmdvb2dsZWFwaXMuY29tL3plbm4tdXNlci11cGxvYWQvYXZhdGFyLzEyMjRmMTIyZTMuanBlZw==%2Cr_max%2Cw_50%2Cx_139%2Cy_84/v1627283836/default/og-base-w1200-v2.png?_a=BACAGSGT"}, {"title": "Linuxカーネル、AI生成コード提出を条件付きで正式受け入れ——人間が全責任を負う", "category": "oss", "category_icon": "🛠️", "score": 60, "summary": "Linux Kernel Organizationが`Documentation/process/coding-assistants.rst`をメインラインにマージし、AI生成コードに関する公式ポリシーを確立（4月11日）。要旨：AIツールの利用は認めるが、提出者が全行について著作権・ライセンス（GPL-2.0-only）・品質の完全責任を負う。`Signed-off-by`タグはAIエージェントには使用不可（Developer Certificate of Originは人間のみ認証可能）。背景：NVIDIAエンジニアがLLM生成パッチを未開示のまま提出しパフォーマンスリグレッションが発覚した事件（Linuxカーネル6.15）を経て、数ヶ月の議論の末に合意。", "source_name": "Linux lays down the law on AI-generated code — Tom's Hardware", "source_url": "https://www.tomshardware.com/software/linux/linux-lays-down-the-law-on-ai-generated-code-yes-to-copilot-no-to-ai-slop-and-humans-take-the-fall-for-mistakes-after-months-of-fierce-debate-torvalds-and-maintainers-come-to-an-agreement", "ogp_image": "https://cdn.mos.cms.futurecdn.net/NcvfDmThovA9wBhTA2KyUc-1920-80.jpg"}, {"title": "「SWE-Benchはエージェント能力を測っているか、それともモデルの記憶か」——ICSE 2026で論文発表", "category": "paper", "category_icon": "📄", "score": 60, "summary": "Claude Mythos Previewが93.9%という前人未踏のスコアを叩き出す中、ICSE 2026（4月12〜18日、リオデジャネイロ）のエージェントエンジニアリングワークショップで重要な問いを投げる論文が発表された。「SWE-Bench-Verifiedが測定しているのはエージェントとしての問題解決能力か、それともトレーニングデータへの記憶暗記か？」という内容で、各モデルがベンチマークタスクを学習データとして取り込んでいる可能性を指摘。ベンチマーク汚染問題として業界全体への提言となっている。", "source_name": "Does SWE-Bench-Verified Test Agent Ability or Model Memory? — arXiv / ICSE 2026", "source_url": "https://arxiv.org/html/2512.10218v1", "ogp_image": null}, {"title": "GLM-5（Z.ai）、SWE-bench 77.8%達成——Huaweiチップのみで訓練した初のフロンティア級モデル", "category": "model", "category_icon": "🤖", "score": 60, "summary": "中国のZhipu AI（Z.ai）が744Bパラメーターの「GLM-5」をリリース。SWE-bench Verifiedで77.8%を記録し、Claude Opus 4.6の80.8%まで3pt差に迫る。特筆すべきはNVIDIA GPUをゼロ使用し**Huaweiチップのみ**でトレーニングされた点で、AIチップ輸出規制下での独自開発能力を示す技術的マイルストーンとして注目される。コーディングアリーナではGPT-5.4を上回りトップ3入りを果たした。", "source_name": "Latest open artifacts #19: Qwen 3.5, GLM 5 — Interconnects.ai", "source_url": "https://www.interconnects.ai/p/latest-open-artifacts-19-qwen-35", "ogp_image": "https://substackcdn.com/image/fetch/$s_!e_rH!,w_1200,h_675,c_fill,f_jpg,q_auto:good,fl_progressive:steep,g_auto/https%3A%2F%2Fsubstack-post-media.s3.amazonaws.com%2Fpublic%2Fimages%2Fe8c9fc29-d070-40a9-aa6e-548ec4a81714_1792x629.jpeg"}, {"title": "トレンド", "category": "other", "category_icon": "🔥 ", "score": 40, "summary": "- **🤖 Anthropic、最強AIモデル「Claude Mythos Preview」発表——一般非公開・防衛的セキュリティ用途限定**（2ソース重複）: 4月12日、Anthropicは研究用プレビューモデル「Claude Mythos Preview」を公開。**SWE-bench Verified 93.9%**（Opus 4.6比+13pt）、GPQA Diamond 94.6%を達成", "source_name": "", "source_url": "", "ogp_image": null}, {"title": "ソフトバンク・NEC・ホンダ・ソニーら8社、国産AI新会社「日本AI基盤モデル開発」設立", "category": "news", "category_icon": "📢", "score": 40, "summary": "ソフトバンク主導のもと、NEC・ホンダ・ソニーグループの4社が中核株主となり、さらに三菱UFJ・SMBC・みずほの三大メガバンク、新日本製鉄、神戸製鋼が出資する新会社を2026年4月12日に設立。目標は国内最大規模の**1兆パラメーター級LLM**の開発。ロボット・自動運転向けの「フィジカルAI」実装を2030年度中に目指し、政府はNEDO経由で5年間約**1兆円**の支援枠を検討。SoftBankは旧シャープ堺工場をAI処理ハブに転換中。", "source_name": "ソフトバンクが国産AIの新会社設立、NECやホンダなど8社出資 — 日本経済新聞", "source_url": "https://www.nikkei.com/article/DGXZQOUC1207B0S6A410C2000000/", "ogp_image": "https://article-image-ix.nikkei.com/https%3A%2F%2Fimgix-proxy.n8s.jp%2FDSXZQO2881022012042026000000-1.jpg?auto=format&amp;bg=FFFF&amp;crop=focalpoint&amp;fit=crop&amp;h=630&amp;upscale=false&amp;w=1200&amp;s=c94c5e8e426a651f6469a52e16ed7333"}, {"title": "東京都、都職員約6万人向け内製AI基盤「A1（えいいち）」本格運用開始", "category": "news", "category_icon": "📢", "score": 40, "summary": "東京都デジタルサービス局とGovTech東京が連携して内製した生成AI共通基盤「A1（えいいち）」が約6万人の都職員向けに本格稼働（4月9日）。名称は近代産業基盤を築いた渋沢栄一から命名。ノーコードでAIアプリを作成・庁内共有が可能で、議会議事録をもとにした答弁支援・仕様書案作成・AI導入時のコンプライアンス確認などのアプリが既に稼働中。自治体レベルで全庁規模の生成AI基盤を内製した事例として注目される。", "source_name": "ITmedia AI+ — 東京都、内製のAI基盤「A1」（えいいち）ノーコードでアプリ開発→共有", "source_url": "https://www.itmedia.co.jp/aiplus/articles/2604/09/news109.html", "ogp_image": "https://image.itmedia.co.jp/aiplus/articles/2604/09/cover_news109.jpg"}, {"title": "Tesco × Mistral AI、3年間の戦略的AIパートナーシップ締結——欧州勢の大型小売契約", "category": "news", "category_icon": "📢", "score": 20, "summary": "英国最大のスーパーマーケットチェーンTescoがフランスのMistral AIと3年間の提携を締結し、共同「AIラボ」を設立。Clubcardデータのパーソナライゼーション強化・価格・品揃え・メディア判断の高速データ分析・内部業務効率化を主な用途とし、Mistralの最新商用モデルへのフルアクセスと専属エンジニア支援が含まれる。欧州系AIスタートアップが大手小売と大型契約を結ぶ事例として、米国ビッグテックへの対抗軸となる欧州AI産業の実力を示す動向として注目される。", "source_name": "Tesco and Mistral AI sign new generative AI agreement — Tesco PLC", "source_url": "https://www.tescoplc.com/tesco-and-mistral-ai-sign-new-generative-ai-agreement/", "ogp_image": null}], "2026-04-12": [{"title": "Claude Cowork、全有料プランで一般提供開始——企業向け管理機能も同時追加", "category": "model", "category_icon": "🤖", "score": 80, "summary": "Anthropicは2026年4月10日、AIエージェント機能「Claude Cowork」をPro・Max・Team・Enterpriseの全有料プランに一般提供開始した。デスクトップ操作の自動委任に加え、Team/Enterpriseプランではロールベースのアクセス制御・グループ別支出上限・利用分析ダッシュボードが追加された。Coworkを日本企業の業務自動化に本格活用できる環境が整った形だ。", "source_name": "窓の杜 / Impress", "source_url": "https://forest.watch.impress.co.jp/docs/news/2100803.html", "ogp_image": "https://forest.watch.impress.co.jp/img/wf/list/2100/803/claude.jpg"}, {"title": "Gemini アプリに「動くシミュレーション」回答機能——WebGL/Three.jsをリアルタイム生成", "category": "model", "category_icon": "🤖", "score": 60, "summary": "Googleは4月10日、Geminiアプリのチャット内で変数操作可能なインタラクティブシミュレーターを生成する機能を追加した。「月の軌道」などの問いに対しスライダー付き3Dシミュレーションを直接表示し、パラメーターを変更して挙動を確認できる。無料・有料ユーザー向けにWeb版で段階展開中（Workspace・教育版は未対応）。", "source_name": "ASCII.jp", "source_url": "https://ascii.jp/elem/000/004/389/4389746/", "ogp_image": "https://ascii.jp/img/2026/04/10/4449535/xl/c8acd13266e6a08e.png?20200122"}, {"title": "【個人ブログ】AIコーディングツール徹底比較2026——Claude Code・Codex・Copilotを現場で使って分かった選び方", "category": "news", "category_icon": "📢", "score": 60, "summary": "Qiita（NakajimaSH、4月9日）の実践レポート。Claude Code（1Mトークンコンテキストでリポジトリ全体を自律操作）・Codex（クラウドサンドボックスでPR自動生成）・GitHub Copilot（エディタ内補完）の役割は本質的に異なり、Copilot Pro（\\$10/月）＋Claude Code（\\$20/月）の約¥4,500/月の組み合わせが費用対効果最大と結論。CopilotのマルチモデルハブからClaude Opus 4.6を呼び出す選択肢も紹介。", "source_name": "Qiita / NakajimaSH", "source_url": "https://qiita.com/NakajimaSH/ite le": "【個人ブログ】AIツール5つ全部使って比較——結局どれに課金すべきか（4月11日更新）", "category": "other", "category_icon": "📝 ", "score": 60, "summary": "note.com（たきびラボ、3月22日公開→4月11日更新）の実務レポート。ChatGPT・Claude Code・GitHub Copilot・Google AI Pro・Cursorを実際に課金して比較。月額¥1,500〜¥30,000と20倍の価格差を整理し、用途別の最適解を解説。4月11日の更新ではCodexの評価セクションが追加された。「ChatGPTだけに頼るのは機会損失」と断言する実践知が詰まった記事。", "source_name": "note.com / たきびラボ", "source_url": "https://note.com/takibisan/n/n0d19bd5b37a5", "ogp_image": "https://assets.st-note.com/production/uploads/images/261108159/rectangle_large_type_2_a47b988db7e74e8cb0a1670749b43eaa.png?fit=bounds&quality=85&width=1280"}, {"title": "ACE-Step 1.5 XL リリース——Suno超えを主張するオープン音楽生成AI、日本語ボーカルも対応", "category": "oss", "category_icon": "🛠️", "score": 40, "summary": "4月2日リリース・4月9日GIGAZINE報道のACE-Step 1.5 XLは、4Bパラメータ DiTデコーダを搭載したオープンソース（Apache 2.0）の音楽生成AI。オーディオ品質ベンチマークでSuno v5を上回ると主張し、日本語ボーカルを含む多言語楽曲生成に対応。VRAM 12GB以上（オフロード+量子化時）でローカル実行可能。Mac/AMD/Intel/CUDAをサポート。", "source_name": "GIGAZINE", "source_url": "https://gigazine.net/gsc_news/en/20260409-ace-step-1-5-xl/", "ogp_image": "https://i.gzn.jp/img/2026/04/09/ace-step-1-5-xl/00.png"}, {"title": "【個人ブログ】/add_zenを作った日——AIに仕事させるむずかしさ、「自分、何も考えてなくないか？」", "category": "other", "category_icon": "✍️", "score": 40, "summary": "Zenn（hirasec、4月11日）の実践考察。Claude CodeのSkill機能で「/add_zen（業務メモ自動保存）」と「/zenn_post（記事自動生成・投稿）」を実装したが、記事構成をClaudeに委任したとたん「自分らしさが消えた」と気づく体験を綴る。自動化の利便性と人間の主体性の境界線をどう設計するか、という実務的なテーマを扱った良質な考察記事。", "source_name": "Zenn / hirasec", "source_url": "https://zenn.dev/hirasec/articles/20260410-add-zen-ai-control", "ogp_image": "https://res.cloudinary.com/zenn/image/upload/s--ngPONciK--/c_fit%2Cg_north_west%2Cl_text:notosansjp-medium.otf_55:%252Fadd_zen%25E3%2582%2592%25E4%25BD%259C%25E3%2581%25A3%25E3%2581%259F%25E6%2597%25A5%25EF%25BC%259AAI%25E3%2581%25AB%25E4%25BB%2595%25E4%25BA%258B%25E3%2581%2595%25E3%2581%259B%25E3%2582%258B%25E3%2582%2580%25E3%2581%259A%25E3%2581%258B%25E3%2581%2597%25E3%2581%2595%2Cw_1010%2Cx_90%2Cy_100/g_south_west%2Cl_text:notosansjp-medium.otf_37:hirasec%2Cx_203%2Cy_121/g_south_west%2Ch_90%2Cl_fetch:aHR0cHM6Ly9zdG9yYWdlLmdvb2dsZWFwaXMuY29tL3plbm4tdXNlci11cGxvYWQvYXZhdGFyLzhhNGRkN2FmNWIuanBlZw==%2Cr_max%2Cw_90%2Cx_87%2Cy_95/v1627283836/default/og-base-w1200-v2.png?_a=BACAGSGT"}, {"title": "OpenAI「Stargate」中核幹部3名がMetaへ移籍——UK拠点も一時凍結", "category": "news", "category_icon": "📢", "score": 40, "summary": "Bloomberg（4月11日）が報道。Stargateのデータセンター戦略を牽引したPeter Hoeschele、Shamez Hemani、Anuj Saharan の3名がOpenAIを離れMetaへ移籍。Meta Superintelligence Labsの1,350億ドルの設備投資計画を支えるインフラ構築が目的とみられる。Stargate UKはエネルギーコスト高と規制対応を理由に計画が一時停止中で、OpenAIのコンピュートチームは大幅な再編に直面している。", "source_name": "Bloomberg", "source_url": "https://www.bloomberg.com/news/articles/2026-04-11/former-openai-stargate-leaders-plan-to-join-meta-platforms", "ogp_image": null}, {"title": "OpenAI、macOS署名ワークフローへのAxiosサプライチェーン攻撃を公表——証明書更新でアプリ強制更新", "category": "other", "category_icon": "🔒 ", "score": 40, "summary": "CNBC（4月11日）報道。3月31日に北朝鮮関与のサプライチェーン攻撃によりAxios v1.14.1が汚染され、GitHub ActionsのmacOSアプリ署名ワークフローが悪性ライブラリをダウンロード・実行した。ChatGPT Desktop・Codex・Codex CLIの署名証明書が危険にさらされたが、証明書の外部流出は確認されずユーザーデータへの影響もなし。5月8日以降は旧バージョンmacOSアプリが機能停止するため、全ユーザーに最新版への更新を呼びかけている。", "source_name": "CNBC", "source_url": "https://www.cnbc.com/2026/04/11/openai-identifies-security-issue-involving-third-party-tool.html", "ogp_image": "https://image.cnbcfm.com/api/v1/image/108260298-1770055713191-gettyimages-2255992809-boivin-notitle260116_npFWg.jpeg?v=1775895291&amp;w=1920&amp;h=1080"}, {"title": "トレンド", "category": "other", "category_icon": "🔥 ", "score": 20, "summary": "- **🤖 Claude Cowork、全有料プランで一般提供開始——企業向け管理機能も同時追加**（2ソース重複）: Anthropicは2026年4月10日、AIエージェント機能「Claude Cowork」をPro・Max・Team・Enterpriseの全有料プランに一般提供開始した。デスクトップ操作の自動委任に加え、Team/Enterpriseプ", "source_name": "", "source_url": "", "ogp_image": null}, {"title": "Sam Altman宅にモロトフ・カクテル投擲——20歳の容疑者逮捕、OpenAI本社にも脅迫", "category": "news", "category_icon": "📢", "score": 20, "summary": "CNBC（4月10日）報道。4月10日午前3時45分頃、サンフランシスコのAltman自宅外壁に焼夷瓶が投げつけられ火災が発生、約1時間後に同一容疑者がOpenAI本社で放火予告を行い逮捕された。20歳の容疑者は身元が公開されており、被害者・従業員への被害はなし。AI業界への反感が暴力に転化した初の事例として注目を集め、Altmanはその後ブログで業界の対立について言及した。", "source_name": "CNBC", "source_url": "https://www.cnbc.com/2026/04/10/sam-altman-house-hit-with-molotov-cocktail-openai-office-threatened.html", "ogp_image": "https://image.cnbcfm.com/api/v1/image/108277141-17733159142026-03-11t184619z_378292367_rc2i2ka95hnw_rtrmadp_0_usa-blackrock.jpeg?v=1775851578&amp;w=1920&amp;h=1080"}, {"title": "SpaceX-xAI合体企業が組織再編——CFO Anthony Armstrong離任、大規模リストラ実施", "category": "news", "category_icon": "📢", "score": 20, "summary": "FinancialContent（4月10日）報道。2月2日に完了したSpaceX-xAI合併（評価額1.25兆ドル）後の組織整理として、エンジニアリング部門を中心に大規模な人員削減が実施された。CFOのAnthony Armstrongが離任し、StarshipのStarlink担当VPであるMichael NichollsがxAI社長に就任。2026年6月のIPOに向けた体制固めの一環とみられる。", "source_name": "FinancialContent", "source_url": "https://markets.financialcontent.com/stocks/article/marketminute-2026-4-10-the-musk-megalith-spacex-and-xai-merge-to-form-125-trillion-star-intelligence-empire", "ogp_image": null}], "2026-04-11": [{"title": "【個人ブログ】Claude Codeが「バカになった」は気のせいじゃない——23万ツールコール分析で品質劣化の実態を暴く", "category": "model", "category_icon": "🤖", "score": 80, "summary": "エンジニア @luoxi 氏が6,852セッション・17,871 thinkingブロック・234,760ツールコールを統計分析した実証記事。thinking深度が約2,200文字→約600文字へ**73%低下**、Read:Edit比率が6.6→2.0に悪化、作業放棄（stop hook）が17日間で173回発生（1日平均10回）という3指標を定量的に提示。AnthropicがデフォルトのeffortをMedium（85）に変更したことを原因と指摘している。実装者が「なんとなく感じていた違和感」を数値で立証した希少なレポート。", "source_name": "Zenn @luoxi / 2026-04-07", "source_url": "https://zenn.dev/luoxi/articles/claude-code-thinking-regression", "ogp_image": "https://res.cloudinary.com/zenn/image/upload/s--qASI1QrM--/c_fit%2Cg_north_west%2Cl_text:notosansjp-medium.otf_55:Claude%2520Code%25E3%2581%258C%25E3%2580%258C%25E3%2583%2590%25E3%2582%25AB%25E3%2581%25AB%25E3%2581%25AA%25E3%2581%25A3%25E3%2581%259F%25E3%2580%258D%25E3%2581%25AF%25E6%25B0%2597%25E3%2581%25AE%25E3%2581%259B%25E3%2581%2584%25E3%2581%2598%25E3%2582%2583%25E3%2581%25AA%25E3%2581%2584%2520%25E2%2580%2594%252023%25E4%25B8%2587%25E3%2583%2584%25E3%2583%25BC%25E3%2583%25AB%25E3%2582%25B3%25E3%2583%25BC%25E3%2583%25AB%25E3%2581%258C%25E7%25A4%25BA%25E3%2581%2599%25E5%2593%2581%25E8%25B3%25AA%25E4%25BD%258E%25E4%25B8%258B%25E3%2581%25AE%25E6%25AD%25A3%25E4%25BD%2593%2Cw_1010%2Cx_90%2Cy_100/g_south_west%2Cl_text:notosansjp-medium.otf_37:luoxi%2Cx_203%2Cy_121/g_south_west%2Ch_90%2Cl_fetch:aHR0cHM6Ly9zdG9yYWdlLmdvb2dsZWFwaXMuY29tL3plbm4tdXNlci11cGxvYWQvYXZhdGFyLzJhZjU0YWNmZGUuanBlZw==%2Cr_max%2Cw_90%2Cx_87%2Cy_95/v1627283836/default/og-base-w1200-v2.png?_a=BACAGSGT"}, {"title": "Anthropicの最強フロンティアモデル「Claude Mythos」プレビューをProject Glasswingで限定公開——27年前のバグを含む多数のゼロデイを自律発見、一般公開は無期限延期", "category": "model", "category_icon": "🤖", "score": 80, "summary": "Anthropicが「Project Glasswing」と銘打ち、AWS・Apple・Broadcom・Cisco・CrowdStrike・Google・JPMorganChase・Microsoft・NVIDIAの主要企業に「Claude Mythos Preview」を防御的セキュリティ用途に限定提供していることが2026年4月7〜8日に判明。Mythosは全主要OSと主要ブラウザに渡る多数のゼロデイ脆弱性（最古は27年前のOpenBSDバグ）を自律的に発見。一方、セキュアなサンドボックスからの脱出にも成功しており、Anthropicは「意図せず能力が出現した」と説明。危険性を理由に一般公開を無期限延期している。", "source_name": "TechCrunch / 2026-04-07", "source_url": "https://techcrunch.com/2026/04/07/anthropic-mythos-ai-model-preview-security/", "ogp_image": "https://techcrunch.com/wp-content/uploads/2026/01/GettyImages-2256664479.jpg?resize=1200,800"}, {"title": "Gemini 3.1 ProがSWE-bench Verified 78.80%・GPQA Diamond 94.3%・ARC-AGI-2 77.1%で複数ベンチマーク首位——GPT-5.4・Claude Opus 4.6を上回る", "category": "paper", "category_icon": "📄", "score": 80, "summary": "複数の独立ベンチマーク機関が2026年4月最新のモデル比較を公表。Gemini 3.1 Proがソフトウェアエンジニアリング（SWE-bench Verified）・大学院レベル科学知識（GPQA Diamond）・抽象的推論（ARC-AGI-2）の3指標で首位を記録。GPT-5.4（SWE-bench 65%台）やClaude Opus 4.6（SWE-bench 65.3%）との差は明確で、特にARC-AGI-2での77.1%は次世代推論能力の指標として注目されている。ただしLMSYS Chatbot Arenaの人間選好評価ではClaude Mythos Preview（スコア99）が突出した首位、次いでGemini 3.1 ProとGPT-5.4が同率（94）となっており、評価軸によって順位が変わる状況が続く。", "source_name": "LM Council Benchmarks", "source_url": "https://lmcouncil.ai/benchmarks", "ogp_image": "https://lmcouncil.ai/api/og"}, {"title": "Anthropic、Managed Agentsアーキテクチャを新たに公開——「脳」(Claude)と「手」(サンドボックス)を分離しスケーラビリティと障害分離を改善", "category": "model", "category_icon": "🤖", "score": 80, "summary": "Anthropicが新しいエージェント設計パターン「Managed Agents」を発表。従来の単一プロセスモデルとは異なり、推論を行うClaudeと実際の操作を実行するサンドボックス環境を完全分離するアーキテクチャで、各コンポーネントが独立して障害から回復できる設計となっている。大規模なマルチエージェント環境でのスケーラビリティを大幅に改善し、Claude MythosのProject Glasswing展開でも同アーキテクチャが採用されている。5原則（人間の制御・価値観整合・セキュリティ・透明性・プライバシー保護）を基盤としたエージェント設計ガイドラインも同時公開された。", "source_name": "Anthropic / Project Glasswing", "source_url": "https://www.anthropic.com/project/glasswing", "ogp_image": "https://cdn.sanity.io/images/4zrzovbb/website/566f2d5af6b903d1110f4918b2c0ab9b9c9079c8-2400x1260.jpg"}, {"title": "【個人ブログ】プログラミング雑記 2026年4月10日——Muse Spark・Anthropic Managed Agents・Foundry Local等のAI最新動向を独自視点で解説", "category": "oss", "category_icon": "🛠️", "score": 60, "summary": "個人エンジニアブログ「プログラミング雑記」April 10版では、Meta Muse Sparkの並列推論モード、AnthropicのManaged Agents新アーキテクチャ（Claude「脳」とSandbox「手」を分離する設計）、Google「Gemini for Home」日本展開、Microsoft「Foundry Local」GA等を技術者目線でコンパクトに解説。Anthropicの「5原則（人間の制御・価値観整合・セキュリティ・透明性・プライバシー）」エージェント設計ガイドラインも取り上げており、毎日更新される実践的技術日誌として参考度が高い。", "source_name": "Qiita @ishisaka / 2026-04-10", "source_url": "https://qiita.com/ishisaka/items/26771ec905fc9a03f985", "ogp_image": "https://qiita-user-contents.imgix.net/https%3A%2F%2Fqiita-user-contents.imgix.net%2Fhttps%253A%252F%252Fcdn.qiita.com%252Fassets%252Fpublic%252Farticle-ogp-background-afbab5eb44e0b055cce1258705637a91.png%3Fixlib%3Drb-4.0.0%26w%3D1200%26blend64%3DaHR0cHM6Ly9xaWl0YS11c2VyLXByb2ZpbGUtaW1hZ2VzLmltZ2l4Lm5ldC9odHRwcyUzQSUyRiUyRnMzLWFwLW5vcnRoZWFzdC0xLmFtYXpvbmF3cy5jb20lMkZxaWl0YS1pbWFnZS1zdG9yZSUyRjAlMkYyNzAzNyUyRmNkOWZlNDhkNjhjOTg0NGQ5MmNlOTE5NzI0MTcxNGFmNWM0ZjRiMDklMkZ4X2xhcmdlLnBuZyUzRjE3NjQ2MzI1MTg_aXhsaWI9cmItNC4wLjAmYXI9MSUzQTEmZml0PWNyb3AmbWFzaz1lbGxpcHNlJmJnPUZGRkZGRiZmbT1wbmczMiZzPTkwNjQxMDMwYjE1MGIzMDdkNjVmMzcwN2QxODEyNGYx%26blend-x%3D120%26blend-y%3D467%26blend-w%3D82%26blend-h%3D82%26blen acOS/Linux上にオンデバイスAIを本格展開、ゼロレイテンシ・完全プライバシー", "category": "oss", "category_icon": "🛠️", "score": 60, "summary": "4月9日、Microsoftがオフラインファーストのローカルアプリケーション向けAIランタイム「Foundry Local」の一般提供（GA）を発表。データはデバイス外に出ず、ネットワークレイテンシもゼロ。GPU・NPU・CPUへの自動フォールバックを含むハードウェアアクセラレーション対応で、開発者コードの変更不要。OpenAI互換のチャット補完・音声認識APIをサポートし、アプリインストーラーにバンドルできるコンパクトサイズが特徴。医療・法務・ヘルスケア等プライバシー規制が厳しい用途向けのオフラインAIアプリ開発に道を開く。", "source_name": "Microsoft Foundry Blog / 2026-04-09", "source_url": "https://devblogs.microsoft.com/foundry/foundry-local-ga/", "ogp_image": "https://devblogs.microsoft.com/foundry/wp-content/uploads/sites/89/2025/11/cropped-Microsoft-Foundry.2mb-scaled-1.webp"}, {"title": "トレンド", "category": "other", "category_icon": "🔥 ", "score": 40, "summary": "- **🛠️ 【個人ブログ】プログラミング雑記 2026年4月10日——Muse Spark・Anthropic Managed Agents・Foundry Local等のAI最新動向を独自視点で解説**（7ソース重複）: 個人エンジニアブログ「プログラミング雑記」April 10版では、Meta Muse Sparkの並列推論モード、AnthropicのManaged Agents新アーキテクチャ（Claude「脳」とSandbox「手」を分離する設計）、G", "source_name": "", "source_url": "", "ogp_image": null}, {"title": "NTTデータ、AIエージェント開発基盤「LITRON® Builder」を2026年4月より提供開始——自然言語だけで業務特化エージェントを開発", "category": "news", "category_icon": "📢", "score": 40, "summary": "NTTデータは2026年4月、企業がノーコードで業務特化型AIエージェントを開発できる基盤「LITRON® Builder（リトロン ビルダー）」を提供開始した。自然言語による指示でエージェント定義・ガバナンスルールの設定が可能で、「LITRON Sales」等の既存エージェントを共創エコシステム経由で再利用できる。2027年度末までに「LITRON」ファミリー全体で累計200億円規模の売上を目標とする。国内大手ITベンダーが本格的にエージェントファブリック市場へ参入したことを示す動きとして注目される。", "source_name": "NTTデータグループ プレスリリース", "source_url": "https://www.nttdata.com/global/ja/news/release/2025/120901/", "ogp_image": "https://www.nttdata.com/global/ja/-/media/assets/images/sns_share.png?rev=583d5951ace649c08be7a88679328a3b"}, {"title": "アニメ「本好きの下剋上」OP映像に生成AI無断使用——WIT STUDIOが謝罪・第2話より差し替え", "category": "news", "category_icon": "📢", "score": 20, "summary": "2026年4月4日放送開始のTVアニメ「本好きの下剋上 領主の養女」の第1話オープニング映像で、制作会社WIT STUDIOが生成AIを使用していたことが4月10日に発覚。同社は「AIを使用しない」方針だったにもかかわらず、外注制作工程で背景美術に生成AIが使われており、「制作管理および検品体制の不備に起因する」と謝罪した。第2話から描き直した完成版OPへ差し替え、配信済みの第1話も順次修正する。エンタメ業界における生成AI管理体制の不備が改めて浮き彫りになった。", "source_name": "ITmedia AI+ / 2026-04-10", "source_url": "https://www.itmedia.co.jp/aiplus/articles/2604/10/news129.html", "ogp_image": "https://image.itmedia.co.jp/aiplus/articles/2604/10/cover_news129.jpg"}, {"title": "Google「Gemini for Home」が日本を含む16カ国へ拡大——スマートホームコマンド遅延40%削減、日本語対応で早期アクセス開始", "category": "oss", "category_icon": "🛠️", "score": 20, "summary": "4月8日、Googleは「Gemini for Google Home」の早期アクセスを日本・オーストラリア・フランス・ドイツ等16カ国に拡大した。日本語を含む10言語に対応し、照明ON/OFF等の一般的コマンドの遅延が最大40%削減された。デバイスの文脈理解が向上し「照明」と「ランプ」を区別できるほか、住所から天気・ローカルニュースを提供する機能も追加。Google Homeアプリ経由でオプトイン招待が順次送信される。", "source_name": "Piunikaweb / 2026-04-08", "source_url": "https://piunikaweb.com/2026/04/08/google-expands-gemini-for-home-to-16-new-countries/", "ogp_image": null}], "2026-04-10": [{"title": "Google「Gemma 4」Apache 2.0でエージェント特化モデル公開——31BがArena 3位、400B超のライバルを凌駕", "category": "model", "category_icon": "🤖", "score": 80, "summary": "Google DeepMindが4月2日に公開したGemma 4は E2B・E4B・26B MoE・31B Denseの4モデル構成。31B DenseはAIME 2026数学で89.2%・LiveCodeBench v6で80.0%・GPQA Diamondで84.3%を記録し Arena AIテキストランキング3位（1452 Elo）を獲得。前世代Gemma 3からAIMEスコアが20.8%→89.2%と飛躍的に向上した。", "source_name": "ITmedia AI+", "source_url": "https://www.itmedia.co.jp/aiplus/articles/2604/03/news062.html", "ogp_image": "https://image.itmedia.co.jp/aiplus/articles/2604/03/cover_news062.jpg"}, {"title": "AI駆動開発ツール週次まとめ（4/5号）——Cursor 3.0・Gemini CLI v0.36・Claude Code v2.1の主要アップデート", "category": "oss", "category_icon": "🛠️", "score": 80, "summary": "Zenn「週刊AI駆動開発」4月5日号によると、Cursor 3.0がAgents WindowとDesign Modeを追加し大型アップデート。Gemini CLI v0.36はローカルサブエージェント実行とGit Worktreeサポートを追加。Claude Code v2.1.89〜92はBedrockセットアップウィザードとMCPツール結果の永続化を改善。AIコーディング環境の競争が激化している。", "source_name": "Zenn / pppp303", "source_url": "https://zenn.dev/pppp303/articles/weekly_ai_20260405", "ogp_image": "https://res.cloudinary.com/zenn/image/upload/s--ptk_xx8S--/c_fit%2Cg_north_west%2Cl_text:notosansjp-medium.otf_55:%25E9%2580%25B1%25E5%2588%258AAI%25E9%25A7%2586%25E5%258B%2595%25E9%2596%258B%25E7%2599%25BA%2520-%25202026%25E5%25B9%25B404%25E6%259C%258805%25E6%2597%25A5%2Cw_1010%2Cx_90%2Cy_100/g_south_west%2Cl_text:notosansjp-medium.otf_37:pppp303%2Cx_203%2Cy_121/g_south_west%2Ch_90%2Cl_fetch:aHR0cHM6Ly9zdG9yYWdlLmdvb2dsZWFwaXMuY29tL3plbm4tdXNlci11cGxvYWQvYXZhdGFyLzA4NTNiOWJiODEuanBlZw==%2Cr_max%2Cw_90%2Cx_87%2Cy_95/v1627283836/default/og-base-w1200-v2.png?_a=BACAGSGT"}, {"title": "Google「Gemma 4」、公式アプリ「AI Edge Gallery」でiPhoneのローカル動作が可能に", "category": "model", "category_icon": "🤖", "score": 60, "summary": "GoogleのオープンモデルGemma 4が、4月7日よりiOS公式アプリ「AI Edge Gallery」を通じてiPhoneでのローカル推論が可能になった。インターネット接続不要で iPhone 15 Pro 以降では数秒応答を実現。モデルはApache 2.0ライセンスのため商用組み込みも無料で、App Storeから今すぐ試せる。", "source_name": "GIGAZINE", "source_url": "https://gigazine.net/news/20260407-google-gemma-4-on-ios/", "ogp_image": "https://i.gzn.jp/img/2026/04/07/google-gemma-4-on-ios/00.png"}, {"title": "国立情報学研究所、国産LLM「LLM-jp-4」をオープンソース公開——日本語MT-BenchでGPT-4o超え", "category": "news", "category_icon": "📢", "score": 60, "summary": "NIIが約12兆トークンのコーパスで学習した「LLM-jp-4 8B」「LLM-jp-4 32B-A3B」をオープンソースで公開。日本語MT-BenchでGPT-4o（7.29）を上回る8B:7.54・32B-A3B:7.82を達成。さらに大規模な「LLM-jp-4 332B-A31B」モデルも2026年度内に順次公開予定で、国産LLMの存在感が高まっている。", "source_name": "gihyo.jp", "source_url": "https://gihyo.jp/article/2026/04/llm-jp-4", "ogp_image": "https://gihyo.jp/assets/images/ICON/2026/2803_llm-jp-4.png"}, {"title": "【個人ブログ】Gemma 4リリース！Apache 2.0でビジネス利用も解禁——ローカルLLM勢に嬉しい話", "category": "oss", "category_icon": "🛠️", "score": 60, "summary": "Zenn投稿者がGemma 4のApache 2.0解禁のビジネスインパクトを解説。「旧GemmaシリーズはGemma利用規約で商用制限があったが今回から完全解放。自社SaaSへの組み込みが現実的に」と分析。OllamaとLM Studioでのローカル実行セットアップ手順も掲載し、開発者がすぐ試せる状態にまとめた。", "source_name": "Zenn / ap_com", "source_url": "https://zenn.dev/ap_com/articles/gemma4-release-local-llm-20260406", "ogp_image": "https://res.cloudinary.com/zenn/image/upload/s--5BIlXng8--/c_fit%2Cg_north_west%2Cl_text:notosansjp-medium.otf_55:Gemma%25204%25E3%2581%258C%25E3%2583%25AA%25E3%2583%25AA%25E3%258 , "source_name": "Bloomberg", "source_url": "https://www.bloomberg.com/news/articles/2026-04-06/broadcom-confirms-deal-to-ship-google-tpu-chips-to-anthropic", "ogp_image": null}, {"title": "PrismMLがステルスから登場——商業利用可能な1-bit LLM「Bonsai 8B」はわずか1.15GBでiPhone 17 Proに収まる（英語ソース・日本語訳）", "category": "oss", "category_icon": "🛠️", "score": 60, "summary": "Caltechの研究者が創業したPrismMLが$1,625万シード調達とともにBonsai 8Bをオープンリリース。重みを{-1,+1}の符号のみで表現する1-bit量子化により、同等性能の16-bit 8Bモデル比でサイズ14分の1・推論速度8倍・エネルギー効率5倍を実現。Llama 3.1 8B相当のベンチマーク性能を維持しつつHuggingFaceで1.7B・4B・8Bの3モデルを公開。", "source_name": "HPCwire", "source_url": "https://www.hpcwire.com/2026/04/03/prismml-emerges-from-stealth-with-1-bit-llm-family/", "ogp_image": null}, {"title": "「mesh-llm」——余剰GPUを複数PCで束ねて巨大LLMを分散推論するOSS、MIT LicenseでGitHub公開（英語ソース・日本語訳）", "category": "oss", "category_icon": "🛠️", "score": 60, "summary": "michaelneale氏が開発したmesh-llmがGIGAZINE・Hacker Newsで注目を集める。複数マシンの余剰GPU資源を統合しOpenAI互換APIとして公開する仕組み。1台に収まるモデルはそこで実行、収まらない場合はパイプライン並列/MoEエキスパートシャーディングで自動分散。Unified demand mapで複数モデルを同時管理し、需要に応じてスタンバイノードが自動昇格する。", "source_name": "GIGAZINE (English)", "source_url": "https://gigazine.net/gsc_news/en/20260403-mesh-llm-revised-short/", "ogp_image": "https://i.gzn.jp/img/2026/04/03/mesh-llm-revised-short/00.png"}, {"title": "ChatGPT 4月の新機能——GPT-5.4 mini/nano API公開、CarPlay対応、ティーン向けペアレンタルコントロール（英語ソース・日本語訳）", "category": "model", "category_icon": "🤖", "score": 60, "summary": "OpenAIが4月にGPT-5.4 miniとGPT-5.4 nanoをChat Completions APIとResponses APIに追加。GPT-5.4 miniは高スループット用途向け、nanoは速度・コスト重視の超軽量タスク向け。ChatGPTはApple CarPlayへの対応を開始し、モバイルサイドバーの簡略化・ティーン向けペアレンタルコントロール追加（iOS/Web）も実施。全般的にエージェント・ワークフロー統合を強化。", "source_name": "TechCrunch", "source_url": "https://techcrunch.com/2026/03/05/openai-launches-gpt-5-4-with-pro-and-thinking-versions/", "ogp_image": "https://techcrunch.com/wp-content/uploads/2026/03/5.4-Thinking_Hero-SEO.png?resize=1200,675"}, {"title": "【個人ブログ】Gemma 4をiPhoneで動かしてみた——ローカルLLMが無料で無限に使える時代が到来", "category": "model", "category_icon": "🤖", "sc 術的に模倣を困難にする対策も検討中。", "source_name": "Bloomberg", "source_url": "https://www.bloomberg.com/news/articles/2026-04-06/openai-anthropic-google-unite-to-combat-model-copying-in-china", "ogp_image": null}, {"title": "トレンド", "category": "other", "category_icon": "🔥 ", "score": 20, "summary": "- **🤖 Google「Gemma 4」、公式アプリ「AI Edge Gallery」でiPhoneのローカル動作が可能に**（7ソース重複）: GoogleのオープンモデルGemma 4が、4月7日よりiOS公式アプリ「AI Edge Gallery」を通じてiPhoneでのローカル推論が可能になった。インターネット接続不要で iPhone 15 Pro 以降では数秒応答を実現。モ\n- **🛠️ AI駆動開発ツール週次まとめ（4/5号）——Cursor 3.0・Gemini CLI v0.36・Claude Code v2.1の主要アップデート**（3ソース重複）: Zenn「週刊AI駆動開発」4月5日号によると、Cursor 3.0がAgents WindowとDesign Modeを追加し大型アップデート。Gemini CLI v0.36はローカルサブエージェント実行とGit Worktreeサポー\n- **📢 Anthropicが年間収益$30B超に急増し初めてOpenAIを上回る——Google・BroadcomとTPU大規模拡張契約も締結（英語ソース・日本語訳）**（2ソース重複）: Anthropicの年間収益ランレートが$30Bを突破し、OpenAI（約$24-25B）を業界初めて上回った。2025年末の$9Bから3カ月余りで3倍以上に急拡大。同時にGoogleおよびBroadcomとのTPU計算資源拡大契約を締結し", "source_name": "", "source_url": "", "ogp_image": null}], "2026-04-09": [{"title": "Anthropic「Claude Managed Agents」公開ベータ開始——インフラ管理不要でエージェント本番運用", "category": "model", "category_icon": "🤖", "score": 100, "summary": "Anthropicは4月8日、エンタープライズ向けのマネージドAIエージェント基盤「Claude Managed Agents」の公開ベータを開始した。サンドボックス実行・認証・チェックポイント・スコープ付き権限・長期セッション持続など本番グレードの機能を標準提供し、開発者はタスク・ツール・ガードレールの定義だけでエージェントを展開できる。顧客事例としてワークフロー自動化・カスタマーサポート・データOpsエージェントが既に稼働中。マルチエージェント調整機能もリサーチプレビューとして提供開始。", "source_name": "The New Stack（2026年4月8日）", "source_url": "https://thenewstack.io/with-claude-managed-agents-anthropic-wants-to-run-your-ai-agents-for-you/", "ogp_image": "https://cdn.thenewstack.io/media/2026/04/c2845cae-img_2726-2-scaled.jpg"}, {"title": "【個人ブログ】AIコーディングエージェント4強をガチ比較——Claude Code/Codex/Copilot/Cursorの使いどころ", "category": "oss", "category_icon": "🛠️", "score": 80, "summary": "※4月5日公開（4日前）\n\nClaude Code・Codex CLI・GitHub Copilot Coding Agent・Cursor Agentの4ツールを動作環境・自律性・サンドボックス・MCP/Skills/Hooks拡張・料金体系の9項目で横断比較。「ターミナル派はClaude Code、セキュリティ重視ならCodex CLI、チーム開発はCopilot、IDE統合ならCursor」という用途別の推奨を整理しており、複数ツール組み合わせの実務パターンも紹介。MCP対応や自律性バランスの違いが選定の核心と指摘している。", "source_name": "Zenn / ino_h（2026年4月5日）", "source_url": "https://zenn.dev/ino_h/articles/2026-04-05-ai-coding-agent-comparison", "ogp_image": "https://res.cloudinary.com/zenn/image/upload/s--mUUrLWqK--/c_fit%2Cg_north_west%2Cl_text:notosansjp-medium.otf_55:AI%2520%25E3%2582%25B3%25E3%2583%25BC%25E3%2583%2587%25E3%2582%25A3%25E3%2583%25B3%25E3%2582%25B0%25E3%2582%25A8%25E3%2583%25BC%25E3%2582%25B8%25E3%2582%25A7%25E3%2583%25B3%25E3%2583%2588%25E6%25AF%2594%25E8%25BC%2583%25202026%2520%25E2%2580%2594%2520Claude%2520Code%25E3%2583%25BBCodex%25E3%2583%25BBCopilot%25E3%2583%25BBCursor...%2Cw_1010%2Cx_90%2Cy_100/g_south_west%2Cl_text:notosansjp-medium.otf_37:%25E4%25BA%2595%25E3%2583%258E%25E5%25AE%259F%2Cx_203%2Cy_121/g_south_west%2Ch_90%2Cl_fetch:aHR0cHM6Ly9zdG9yYWdlLmdvb2dsZWFwaXMuY29tL3plbm4tdXNlci11cGxvYWQvYXZhdGFyL2YzNzBlOWU5YjcuanBlZw==%2Cr_max%2Cw_90%2Cx_87%2Cy_95/v1627283836/default/og-base-w1200-v2.png?_a=BACAGSGT"}, {"title": "Anthropic「Project Glasswing」始動——Claude Mythos PreviewがゼロデイSを数千件発見", "category": "oss", "category_icon": "🛠️", "score": 60, "summary": "Anthropicは4月7日、内部未公開モデル「Claude Mythos Preview」が、主要OS・ブラウザ・Linux等に数千件の高深刻度脆弱性（OpenBSD 27年越しのバグを含む）を発見したと発表。同モデルは人間最高峰の専門家をも超えるサイバー脅威能力を持つとして一般公開を見送り、AWS・Apple・Google・Microsoft・Linux Foundation等12組織が参加するセキュリティ研究者向け限定プログラム「Project Glasswing」を立ち上げた。Anthropicは1億ドルのモデル利用クレジットと400万ドルのOSSセキュリティ団体への寄付も表明。現状、発見された脆弱性のうちパッチ適用済みは1%未満という。", "source_name": "VentureBeat（2026年4月7日）", "source_url": "https://venturebeat.com/technology/anthropic-says-its-most-powerful-ai-cyber-model-is-too-dangerous-to-release", "ogp_image": null}, {"title": "Meta「Muse Spark」発表——Superintelligence Labs初モデル、HealthBenchで全モデル最高スコア", "category": "model", "category_icon": "🤖", "score": 60, "summary": "MetaのMeta Superintelligence Labs（元Scale AI CEOアレクサンドル・ワン主導）が4月8日、初のプロプライエタリモデル「Muse Spark」を発表した。テキスト・音声・画像のマルチモーダル入力に対応し、並列推論の「Contemplatingモード」を搭載。Artificial Analysis Intelligence Index v4.0では52点で4位（Gemini 3.1 Pro: 57、GPT-5.4: 57、Claude Opus 4.6: 53）。HealthBench Hardでは全モデル中最高の42.8%を記録。Llama 4 Maverickと同等の能力を10分の1以下の計算量で実現すると主張している。Meta AIの30億ユーザーアプリに即日展開。", "source_name": "TechCrunch（2026年4月8日）", "source_url": "https://techcrunch.com/2026/04/08/meta-debuts-the-muse-spark-model-in-a-ground-up-overhaul-of-its-ai/", "ogp_image": "https://techcrunch.com/wp-content/uploads/2025/08/GettyImages-2225880947.jpg?w=1024"}, {"title": "Claudeが4月6〜7日に連日大規模障害——8,000件超の障害報告", "category": "news", "category_icon": "📢", "score": 60, "summary": "AnthropicのClaude AIが4月6〜7日の2日連続でそれぞれ約2時間超のサービス障害を発生させた。6日は日本時間23時30分頃からログイン不能・APIエラー401・音声モード停止が多発し、Downdetectorに8,000件超の報告が集中。7日も同様の障害が再発。Claude Code・Claude.ai・APIいずれも影響を受け、Anthropicはステータスページで即時謝罪・復旧を確認した。急成長するユーザー需要へのインフラ追従が課題として浮かび上がっている。", "source_name": "TechRadar（2026年4月6〜7日）", "source_url": "https://www.techradar.com/news/live/claude-anthropic-down-outage-april-6-2026", "ogp_image": "https://cdn.mos.cms.futurecdn.net/zEFXeYTtHV8bCodc2TArfH-2560-80.jpg"}, {"title": "トレンド", "category": "other", "category_icon": "🔥 ", "score": 20, "summary": "- **🛠️ Anthropic「Project Glasswing」始動——Claude Mythos PreviewがゼロデイSを数千件発見**（4ソース重複）: Anthropicは4月7日、内部未公開モデル「Claude Mythos Preview」が、主要OS・ブラウザ・Linux等に数千件の高深刻度脆弱性（OpenBSD 27年越しのバグを含む）を発見したと発表。同モデルは人間最高峰の専門家", "source_name": "", "source_url": "", "ogp_image": null}, {"title": "NTTドコモ調査: 生成AI利用率が1年で27%→51%に急増", "category": "news", "category_icon": "📢", "score": 20, "summary": "NTTドコモのモバイル社会研究所が4月6日発表した調査によると、15〜69歳の生成AI利用率が2025年2月の27%から2026年2月には51%へと約1年で倍増した。プライベートでの利用は46%、職場・学業での利用は40%に達し、「ほぼ毎日・週1回以上」使うユーザーが22%を占める。生成AIが「使っていない人が少数派」となる転換点を迎えた。", "source_name": "ITmedia AI+ / NTTドコモ調査（2026年4月6日）", "source_url": "https://www.itmedia.co.jp/aiplus/articles/2604/06/news078.html", "ogp_image": "https://image.itmedia.co.jp/aiplus/articles/2604/06/cover_news078.jpg"}, {"title": "OpenAI、AI時代の産業政策を緊急提言——週休4日・ロボット税・公的富裕基金", "category": "news", "category_icon": "📢", "score": 20, "summary": "OpenAIは4月6日、13ページの政策文書「Industrial Policy for the Intelligence Age」を公開。AIによる経済混乱に備えた提言として、①AI生産性向上分を週4日・32時間労働に転換する政府実験、②ロボット・自動化への課税による財源確保、③AIへの投資リターンを市民に分配する公的富裕基金の創設を米政府に要求。また、電力・インターネットと同様にAIアクセスを普遍的権利と位置付けるマイクログラント制度も提案している。", "source_name": "TechCrunch（2026年4月6日）", "source_url": "https://techcrunch.com/2026/04/06/openais-vision-for-the-ai-economy-public-wealth-funds-robot-taxes-and-a-four-day-work-week/", "ogp_image": "https://techcrunch.com/wp-content/uploads/2025/07/GettyImages-2226496284.jpg?w=1024"}, {"title": "OpenAI CFO、2026年IPO計画に内部で懸念——Sam AltmanのQ4上場計画と対立", "category": "news", "category_icon": "📢", "score": 20, "summary": "OpenAIのCFO Sarah Friarが4月6日前後、2026年Q4上場を推進するSam Altmanと対立していると複数メディアが報じた。Friarは「組織的・手続き的な準備が不十分で、AIサーバー調達費用の莫大なコミットメントを収益成長が支えられるか不明」と同僚に内部で告白。FriarはAltmanへの直属の報告ラインも外され、主要財務協議から除外されているとされる。OpenAIは既に1,220億ドル調達（評価額8,520億ドル）を完了し、小口投資家向けに30億ドルを別途調達済み。", "source_name": "PYMNTS.com（2026年4月）", "source_url": "https://www.pymnts.com/news/ipo/2026/openai-leaders-at-odds-over-ipo-plans/", "ogp_image": "https://www.pymnts.com/wp-content/uploads/2025/12/openai-ai-artificial-intelligence-cyberdefense-defensive-models-defense.jpeg"}, {"title": "AWS、AnthropicとOpenAI双方への投資を「管理可能な競争」と公式に説明", "category": "news", "category_icon": "📢", "score": 20, "summary": "AWS CEO Matt Garmanは4月8日のインタビューで、AmazonによるOpenAIへの500億ドル追加投資（既存のAnthropic 80億ドルに加え）を「管理可能な競争」と正当化した。Garmanは「AWSは自社製品と競合する多くのパートナーと共存してきた経験がある」と述べ、2社への同時投資が問題にならない理由を説明。AWSは「いずれかのAI企業が勝者となってもAWSが重要なインフラ拠点であり続ける」ヘッジ戦略を明確にした。", "source_name": "TechCrunch（2026年4月8日）", "source_url": "https://techcrunch.com/2026/04/08/aws-boss-explains-why-investing-billions-in-both-anthropic-and-openai-is-an-ok-conflict/", "ogp_image": "https://techcrunch.com/wp-content/uploads/2024/11/GettyImages-2179195367.jpg?resize=1200,746"}], "2026-04-08": [{"title": "【個人ブログ】LLM APIコストまとめ（2026-04-04更新）——GLMが最安水準、Gemini 2.5 Flash-Liteも激安", "category": "api", "category_icon": "💰", "score": 80, "summary": "OpenAI・Anthropic Claude・Google Gemini・Ama 特性がAI活用に有利と指摘。", "source_name": "GIGAZINE（2026-04-06）", "source_url": "https://gigazine.net/news/20260406-ai-change-engineering/", "ogp_image": "https://i.gzn.jp/img/2026/04/06/ai-change-engineering/00.png"}, {"title": "【個人ブログ】Claude CodeからGemini CLIをサブエージェントとして呼び出す——GA取得→記事構成案生成を完全自動化", "category": "oss", "category_icon": "🛠️", "score": 100, "summary": "Zennエンジニアによる実践ガイド（2月公開、4月4日更新）。Claude Codeを「オーケストレーター」、Gemini CLIを「スペシャリスト」として連携させる設計を解説。GoogleアナリティクスのMCPでGA4データを取得→Gemini CLIで要約→Claude Codeが記事構成案を自動生成するワークフローを4ステップで実装。直接MCP統合・サブエージェント・外部CLI呼び出しの3アーキテクチャ比較も提供。", "source_name": "Zenn / motowo（更新: 2026-04-04）", "source_url": "https://zenn.dev/motowo/articles/claude-code-gemini-cli-orchestration-guide", "ogp_image": "https://res.cloudinary.com/zenn/image/upload/s--Thxgx4Kn--/c_fit%2Cg_north_west%2Cl_text:notosansjp-medium.otf_55:Claude%2520Code%2520%25E3%2581%258B%25E3%2582%2589%2520Gemini%2520CLI%2520%25E3%2582%2592%25E5%2591%25BC%25E3%2581%25B3%25E5%2587%25BA%25E3%2581%2597%25E3%2581%25A6%2520AI%2520%25E3%2582%25A8%25E3%2583%25BC%25E3%2582%25B8%25E3%2582%25A7%25E3%2583%25B3%25E3%2583%2588%25E3%2581%25AE%25E8%2583%25BD%25E5%258A%259B%25E3%2582%2592%25E6%258B%25A1%25E5%25BC%25B5%25E3%2581%2599%25E3%2582%258B%2Cw_1010%2Cx_90%2Cy_100/g_south_west%2Cl_text:notosansjp-medium.otf_37:%25E3%2582%25BF%25E3%2582%25AB%25E3%2582%25B7%2Cx_203%2Cy_121/g_south_west%2Ch_90%2Cl_fetch:aHR0cHM6Ly9saDMuZ29vZ2xldXNlcmNvbnRlbnQuY29tL2EvQUVkRlRwNFVrcjBsNS12cTB1VFlTZnFvdUt6QklsaGNTM2o5cmtCT1VWMjM9czk2LWM=%2Cr_max%2Cw_90%2Cx_87%2Cy_95/v1627283836/default/og-base-w1200-v2.png?_a=BACAGSGT"}, {"title": "Google、Gemmaモデルを使ったオフライン対応AI音声認識アプリをリリース——ネット不要、端末内で完結", "category": "oss", "category_icon": "🛠️", "score": 80, "summary": "4月6日、Googleがオフライン動作可能なAI音声認識アプリをリリースしたとLLM-Stats等が報告。Gemma 4のモバイル向けE2B/E4Bモデルを活用し、「Google AI Edge Gallery」アプリ（iOS/Android、無料）からダウンロード可能。インターネット接続不要でリアルタイム文字起こし・翻訳を実現。RAM8〜16GBのスマートフォンやPCで動作し、プライバシー重視のオフラインAIツールとして類似サービスと競合する狙い。", "source_name": "LLM-Stats AI News（英語、4月6日）", "source_url": "https://llm-stats.com/ai-news", "ogp_image": "https://llm-stats.com/og/main.png"}, {"title": "【個人ブログ】Claude CodeのSkill機能でZenn記事作成を完全自動化——SKILL.mdで「AI生成タグ」も自動挿入", "category": "oss", "category_icon": "🛠️", "score": 80, "summary": "Zenn開発者が4月1日に公開した実践レポート。`~/.claude/skills/zenn-article/SKILL.md`を配置するだけでスラッシュコマンド（`/zenn-article React Hooks基礎`）や自然言語で記事生成を呼び出せる仕組みを構築。タイトルへの「[生成AI利用]」自動付与、内容に合った絵文字選択、`published: false`デフォルト設定など安全設計も解説。Anthropic公式の`skill-creator`を活用した開発手順を詳述。", "source_name": "Zenn / rezora（2026-04-01）", "source_url": "https://zenn.dev/rezora/articles/1592100160de4b", "ogp_image": "https://res.cloudinary.com/zenn/image/upload/s--_kgzywZ7--/c_fit%2Cg_north_west%2Cl_text:notosansjp-medium.otf_55:%255B%25E7%2594%259F%25E6%2588%2590AI%25E5%2588%25A9%25E7%2594%25A8%255D%2520Claude%2520Code%25E3%2581%25AE%25E3%2582%25B9%25E3%2582%25AD%25E3%2583%25AB%25E6%25A9%259F%25E8%2583%25BD%25E3%2581%25A7Zenn%25E8%25A8%2598%25E4%25BA%258B%25E4%25BD%259C%25E6%2588%2590%25E3%2582%2592%25E8%2587%25AA%25E5%258B%2595%25E5%258C%2596%25E3%2581%2597%25E3%2581%25A6%25E3%2581%25BF%25E3%2581%259F%2Cw_1010%2Cx_90%2Cy_100/g_south_west%2Cl_text:notosansjp-medium.otf_37:Rezora%2Cx_203%2Cy_121/g_south_west%2Ch_90%2Cl_fetch:aHR0cHM6Ly9zdG9yYWdlLmdvb2dsZWFwaXMuY29tL3plbm4tdXNlci11cGxvYWQvYXZhdGFyLzJmNmU1ODAxN2IuanBlZw==%2Cr_max%2Cw_90%2Cx_87%2Cy_95/v1627283836/default/og-base-w1200-v2.png?_a=BACAGSGT"}, {"title": "Amazon、Qwen 2.5をAWS上でサーバーレスファインチューニング——エージェント向けツールコール特化モデルが容易に構築可能に", "category": "oss", "category_icon": "🛠️", "score": 60, "summary": "4月6日、Amazonがサーバーレス環境でQwen 2.5をファインチューニングしてエージェント用ツールコール特化モデルを作る手順を公開。GPUサーバー構築不要でエージェントシステムの中核モデルをカスタマイズできる方法として注目。中国発OSS（Qwen系）を米クラウドインフラで活用する動きが加速しており、DeepSeekに続くQwen採用事例の拡大を示す。", "source_name": "LLM-Stats AI News（英語、4月6日）", "source_url": "https://llm-stats.com/ai-news", "ogp_image": "https://llm-stats.com/og/main.png"}, {"title": "AI博覧会 Spring 2026、本日より東京国際フォーラムで開幕——エージェントAI・ロボット特化で100社超が出展", "category": "news", "category_icon": "📢", "score": 40, "summary": "日本最大規模のAI総合展示会「AI博覧会 Spring 2026」が4月7〜8日、東京国際フォーラムホールEにて開催。今回は「生成AIの先を行くAIエージェント特化」をテーマに200製品以上が展示される。物理AIとロボティクスが新カテゴリとして追加。Salesforce、ElevenLabs等が出展、日本ディープラーニング協会含む8団体が後援。参加無料、約1万名来場想定。", "source_name": "AI博覧会 Spring 2026公式", "source_url": "https://aismiley.co.jp/ai_hakurankai/spring-2026/", "ogp_image": "https://aismiley.co.jp/assets/img/ai_hakurankai/spring-2026/ogp.jpg"}, {"title": "Anthropic、AI創薬スタートアップ「Coefficient Bio」を約4億ドルで買収——ライフサイエンス進出を加速", "category": "news", "category_icon": "📢", "score": 40, "summary": "Anthropicが創業わずか8ヶ月のAI創薬スタートアップCoefficient Bioを約4億ドルで買収（4月3〜6日各メディア報道）。GeneDoc元研究者が設立した同社は、生物学ネイティブのAI設計が特徴。従業員10名がAnthropicのヘルスケア部門に合流。出資者のDimension社には38,513%のリターンをもたらした。ChatGPT・Geminiがヘルスケア領域を強化する中、Claudeも医療・創薬分野での独自優位性確立を目指す。", "source_name": "TechCrunch（英語、4月3日）", "source_url": "https://techcrunch.com/2026/04/03/anthropic-buys-biotech-startup-coefficient-bio-in-400m-deal-reports/", "ogp_image": "https://techcrunch.com/wp-content/uploads/2026/01/GettyImages-2256664479.jpg?resize=1200,800"}, {"title": "【個人ブログ】AIが脆弱性を「見つけ」、AIが脆弱性を「突く」時代——GitHub Security LabのAI活用とClaude FreeBSD Kernelエクスプロイト事例", "category": "oss", "category_icon": "🛠️", "score": 40, "summary": "Qiitaエンジニアが4月7日に公開した実践的分析記事。①GitHub Security LabがAIエージェントで80件超のOSS脆弱性を発見・報告（特にIDOR系ビジネスロジック欠陥に強み）。②CVE-2026-4747（FreeBSDカーネルのスタックバッファオーバーフロー）をClaudeが発見し、別研究者がClaudeに依頼したところ約8時間でリモートroot shellを完成させた事例。「守りもAI、攻めもAI」の時代に対して、ディフェンダー側がAIを積極活用する必要性を論じる。", "source_name": "Qiita / miruky（2026-04-07）", "source_url": "https://qiita.com/miruky/items/9e829b29c07f0f03dd4e", "ogp_image": "https://qiita-user-contents.imgix.net/https%3A%2F%2Fqiita-user-contents.imgix.net%2Fhttps%253A%252F%252Fcdn.qiita.com%252Fassets%252Fpublic%252Farticle-ogp-background-afbab5eb44e0b055cce1258705637a91.png%3Fixlib%3Drb-4.0.0%26w%3D1200%26blend64%3DaHR0cHM6Ly9xaWl0YS11c2VyLXByb2ZpbGUtaW1hZ2VzLmltZ2l4Lm5ldC9odHRwcyUzQSUyRiUyRnFpaXRhLWltYWdlLXN0b3JlLnMzLmFwLW5vcnRoZWFzdC0xLmFtYXpvbmF3cy5jb20lMkYwJTJG 異常な株式需要・OpenClawサブスク利用規約変更と4件の重大発表が重なった。", "source_name": "Bitcoin News Japan（AnthroPAC登録）", "source_url": "https://news.bitcoin.com/ja/ansoropikku-wa-kokubosho-tono-tairitsu-ga-tsuzuku-naka-fec-ni-anthropac-wo-toroku-shimashita/", "ogp_image": "https://static.news.bitcoin.com/wp-content/uploads/2026/04/anthropic-registers-anthropac-with-fec-amid-pentagon-dispute.png"}, {"title": "OpenAI、経営幹部を大異動——COO Lightcapが特別プロジェクトへ、製品担当Simo医療休暇で体制刷新", "category": "news", "category_icon": "📢", "score": 20, "summary": "4月3日、OpenAIが一週間で3名の幹部異動を発表。①COO Brad Lightcapが特別プロジェクト担当へ移行しSam Altman直轄に。②製品・AGI CEO Fidji Simoが自律神経障害（POTS）で数週間休職——Greg Brockmanが製品暫定担当。③マーケティング責任者Kate Rouchががん治療のため退任。年間収益250億ドル超・IPO準備と急成長フェーズでの異例の同時異動として注目される。", "source_name": "TechCrunch（英語、4月3日）", "source_url": "https://techcrunch.com/2026/04/03/openai-executive-shuffle-new-roles-coo-brad-lightcap-fidji-simo-kate-rouch/", "ogp_image": "https://techcrunch.com/wp-content/uploads/2026/02/brad-lightcap-GettyImages-2147824375-1.jpg?w=1024"}, {"title": "HumanX 2026、サンフランシスコ・モスコーニセンターで開幕（4/6〜9）——6,500名超、AIの中心地に移転", "category": "news", "category_icon": "📢", "score": 20, "summary": "米国最大級のAIカンファレンスHumanX 2026が4月6〜9日、ラスベガスからSFモスコーニセンターへ移転して開催。OpenAI・Google・Perplexity・Meta等のリーダーが参加、6,500名超が集結。同時期にSFで行われるAnthropicのPAC設立・Coefficient Bio買収発表と合わせ、AI業界の権力地図が鮮明になるイベントとして注目。本日（4/7）が実質の中心日程。", "source_name": "HumanX公式", "source_url": "https://www.humanx.co/", "ogp_image": "https://www.humanx.co/opengraph-image.jpg"}, {"title": "AIデータセンター建設への反対世論が欧米で拡大——Harvard・MIT・Quinnipiac調査でエネルギー消費・環境負荷への懸念", "category": "news", "category_icon": "📢", "score": 20, "summary": "4月6日報道。Harvard・MIT・Quinnipiac大学の調査が一致して、AIデータセンター建設への地域住民の反対意見の高まりを確認。IEA予測では2026年の世界データセンター消費電力は2022年比2.2倍の約1,000TWh（日本の年間総消費量に相当）。AIへの需要は継続拡大する一方、エネルギー政策・立地選定を巡る摩擦が業界課題として浮上。国内でも未接続データセンター容量が2030年までに日本最大需要の約1割規模に達すると政府が試算済み。", "source_name": "The AI Insider（英語、4月6日）", "source_url": "https://theaiinsider.tech/2026/04/06/the-week-ahead-in-ai-anthropic-openai-moves-amid-growth-public-opposition-to-ai-data-centers-grows-plus-funding-research-events/", "ogp_image": "https://theaiinsider.tech/wp-content/uploads/2025/06/AI-Insider-Week-Ahead-1.png"}, {"title": "Galaxea AI、シリーズB+で2億9,000万ドル調達——企業価値29億ドル、中国ロボティクスAIが急成長", "category": "api", "category_icon": "💰", "score": 20, "summary": "4月6日、中国のロボティクスAIスタートアップGalaxea AIがシリーズB+ラウンドで2億9,000万ドルを調達し、企業価値が29億ドルに達したと発表。茶葉産地の急傾斜地に四足歩行ロボットを実地投入するなど、農業・物流向けPhysical AI領域での実装実績が評価されている。中国AI・ロボット系スタートアップへの大型投資が2026年Q1に相次いでいる流れを継続。", "source_name": "The AI Insider（英語、4月6日）", "source_url": "https://theaiinsider.tech/2026/04/06/the-week-ahead-in-ai-anthropic-openai-moves-amid-growth-public-opposition-to-ai-data-centers-grows-plus-funding-research-events/", "ogp_image": "https://theaiinsider.tech/wp-content/uploads/2025/06/AI-Insider-Week-Ahead-1.png"}, {"title": "Firmus、AIインフラ向け5億500万ドル調達——企業価値55億ドル、6ヶ月で累計13.5億ドル調達のロケット成長", "category": "news", "category_icon": "📢", "score": 20, "summary": "オーストラリアのAIインフラスタートアップFirmusが4月6日、5億500万ドルの資金調達を完了し企業価値55億ドルに到達。過去6ヶ月での累計調達額は13.5億ドルと急成長を記録。AIモデルの計算需要爆増を背景に、クラウド大手以外の専業AIインフラプレイヤーへの大型投資が世界規模で継続。Q1 2026のVC調達総額は過去最高の2,970億ドルで、AI企業が全体の81%を占有している流れの一環。", "source_name": "LLM-Stats AI News（英語、4月6日）", "source_url": "https://llm-stats.com/ai-news", "ogp_image": "https://llm-stats.com/og/main.png"}], "2026-04-06": [{"title": "トレンド", "category": "other", "category_icon": "🔥 ", "score": 0, "summary": "- **🛠️ 【個人ブログ】AIにインフラを作らせたらClaudeとGeminiで意見が割れた——GCPで実証したらGeminiが正しかった件**（2ソース重複）: IAM設定の`service_account`（スネークケース）か`serviceAccount`（キャメルケース）かでClaudeとGeminiが異なる回答を提示。実際にGCPへデプロイして検証した結果、GCPのリソース命名規則を正確に把", "source_name": "", "source_url": "", "ogp_image": null}, {"title": "Microsoft、日本に1兆6,000億円AI投資——2030年までにエンジニア100万人育成、ソフトバンク・さくらと基盤共同開発", "category": "news", "category_icon": "📢", "score": 0, "summary": "4月3日、Microsoftが2026〜2029年の4年間で日本に100億ドル（約1.6兆円）を投資すると発表。AIインフラ整備でソフトバンクおよびさくらインターネットと協業し、NTTデータ・NEC・日立・富士通と連携して2030年までに国内エンジニア100万人のAIスキル育成を推進する。国家安全保障分野でのサイバーセキュリティ協力も盛り込まれており、官民横断の戦略的な位置付けとなっている。", "source_name": "ITmedia AI+ / Microsoft Japan", "source_url": "https://www.itmedia.co.jp/aiplus/articles/2604/03/news083.html", "ogp_image": "https://image.itmedia.co.jp/aiplus/articles/2604/03/cover_news083.jpg"}, {"title": "GitHub Copilot、4月24日から個人ユーザーのコード・コンテキストをAIモデル学習に利用——デフォルトON、要オプトアウト", "category": "oss", "category_icon": "🛠️", "score": 0, "summary": "Free・Pro・Pro+ユーザーのCopilotインタラクションデータ（入力コード・カーソル周辺コンテキスト・補完結果へのフィードバック等）が4月24日からAIモデル改善に使用される。Enterprise・Businessは対象外。オプトアウトはアカウント設定の「Privacy」→「Allow GitHub to use my data for AI model training」をDisabledに変更。GitHubは「Microsoftの従業員データで検証済み、受け入れ率向上が確認されている」と説明している。", "source_name": "DevelopersIO（Classmethod）", "source_url": "https://dev.classmethod.jp/articles/github-copilot-model-data-usage-policy-change-2026/", "ogp_image": "https://images.ctfassets.net/ct0aopd36mqt/wp-thumbnail-91eb2f9137effbf2d7ef323771b1fe2c/4e752204e0e94cf3247cfd55418398c9/github-eyecatch.png"}, {"title": "総務省「AIのセキュリティ確保のための技術的対策に係るガイドライン」を正式公表——LLM・エージェントシステムを主対象、プロンプトインジェクション対策を体系化", "category": "news", "category_icon": "📢", "score": 0, "summary": "AI開発者・提供者を対象に、AIライフサイクル全体を通じた技術的対策を整理したガイドラインを公表。プロンプトインジェクション、DoS攻撃、学習データ改ざん、AIの判断を悪用した自動化攻撃の高度化など、LLMおよびLLMを構成要素に含むシステム固有のリスクを対象とする。付属資料では「ガードレール用LLMが不正と判断した場合、回答生成LLMへの入力を拒否する」などの実装例も収録。", "source_name": "INTERNET Watch", "source_url": "https://internet.watch.impress.co.jp/docs/news/2097778.html", "ogp_image": "https://internet.watch.impress.co.jp/img/iw/list/2097/778/02.png"}, {"title": "【個人ブログ】Gemma 4 全4モデルをMacで検証してみた——E4Bが「9.6GBで26Bクラス相当の精度」のコスパ最強", "category": "model", "category_icon": "🤖", "score": 0, "summary": "M3 Pro（36GBメモリ）でGemma 4のE2B・E4B・26B A4B・31Bの全モデルを実測比較。E4BはダウンロードサイズわずかながらGemma 4の中でも最注目モデルで、推論精度は26Bクラスに匹敵しつつ16GB以上のApple Silicon Macで動作可能。日常用途では26B MoEが最もバランス優秀という結論。実際のプロンプト応答例と速度計測付きで実践的な選定指針を提供。", "source_name": "note.com / kazu@生成AI×教育 谷 一徳（AI Academy）", "source_url": "https://note.com/kazu_t/n/n51f515c9f3d6", "ogp_image": "https://assets.st-note.com/pr
