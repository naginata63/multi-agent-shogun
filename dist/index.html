内テスト中のプラットフォーム「Conway」は、Claude Codeを中核に置き、外部Webhookで起動、Chromeブラウザ操作、デスクトップ通知送信に対応した「常時オン」型エージェント基盤。ConwayインスタンスはSearch・Chat・Systemの3領域から成る専用UIを持ち、拡張ストア（Extension）経由で機能を追加できる設計。OpenAI等のエージェントプラットフォームと直接競合する動きとして注目される。", "source_name": "Dataconomy", "source_url": "https://dataconomy.com/2026/04/03/anthropic-tests-conway-platform-for-continuous-claude/", "ogp_image": "https://dataconomy.com/wp-content/uploads/2026/04/anthropic-tests-conway-platform-for-continuous-cla.jpg"}, {"title": "Anthropic、Claude Pro/MaxサブスクによるサードパーティAIツール利用を禁止——OpenClaw等、4月4日午後から即時適用", "category": "api", "category_icon": "💰", "score": 0, "summary": "4月4日、AnthropicがClaude Free・Pro・Maxの定額プランによるOAuth認証を、Claude.aiとClaude Code以外の外部ツール（OpenClawほか）で利用することを規約違反と正式認定し遮断。「サブスクのコスト設計はサードパーティの利用パターンを想定していない」と説明。影響を受けるユーザーには、1ヶ月分相当のクレジット一時補填（4月17日まで申請可）と最大30%割引の追加パッケージを提供。", "source_name": "TechCrunch", "source_url": "https://techcrunch.com/2026/04/04/anthropic-says-claude-code-subscribers-will-need-to-pay-extra-for-openclaw-support/", "ogp_image": "https://techcrunch.com/wp-content/uploads/2026/01/GettyImages-1396827010.jpg?resize=1200,839"}, {"title": "Google Veo 3.1 Lite発表——動画生成コストをVeo 3.1 Fast比50%削減、Google Vidsで月10本無料提供開始", "category": "oss", "category_icon": "🛠️", "score": 0, "summary": "3月31日にVeo 3.1 Liteを発表。720p/1080p・16:9/9:16対応、4〜8秒のText-to-VideoおよびImage-to-Videoを1080pで$0.08/秒で提供。さらに4月3日、Google Vidsにおいて全個人Googleアカウントに月10本の無料動画生成を解放。AI生成BGM・カスタマバターの追加やYouTubeへの直接公開機能も追加。OpenAIのSora撤退を受けGoogleが動画生成市場を積極強化する姿勢を鮮明にした。", "source_name": "9to5Google", "source_url": "https://9to5google.com/2026/03/31/veo-3-1-lite/", "ogp_image": "https://i0.wp.com/9to5google.com/wp-content/uploads/sites/4/2024/05/Veo-IO-24.jpg?resize=1200%2C628&quality=82&strip=all&ssl=1"}, {"title": "Q1 2026 世界VC調達が過去最高の2,970億ドル——AI企業が全体の81%（2,390億ドル）を占有、OpenAI単独で1,200億ドル", "category": "news", "category_icon": "📢", "score": 0, "summary": "TechCrunch/Crunchbaseが4月1日に報告。2026年Q1の世界スタートアップ調達総額は2,970億ドルと史上最高を更新し、AIスタートアップへの投資は前年同期比約2倍超。OpenAI 1,200億ドル・Anthropic 300億ドル・xAI 200億ドル・Waymo 160億ドルの4社だけで全体の64%を占拠。AI投資比率は昨年Q1の55%から81%へ急上昇しており、資本の偏重が一段と加速している。", "source_name": "TechCrunch", "source_url": "https://techcrunch.com/2026/04/01/startup-funding-shatters-all-records-in-q1/", "ogp_image": "https://techcrunch.com/wp-content/uploads/2024/09/GettyImages-1147690054.jpg?resize=1200,800"}, {"title": "DeepSeek V4、Huawei Ascendチップで動作——中国テック大手3社が大量先行発注、対NVIDIA依存からの脱却を示す", "category": "model", "category_icon": "🤖", "score": 0, "summary": "複数の報道によりDeepSeek V4が4月後半のリリースに向けHuawei Ascend 950PRチップ上で動作するよう最適化されていることが明らかに。Alibaba・ByteDance・Tencantが数十万チップ規模の先行発注を行い、需要急増でチップ価格が20%上昇。V4は1兆パラメータMoEアーキテクチャで訓練コスト約520万ドルを見込み、Claude Opus 4.6相当の性能を目指す。中国のAIチップ自給体制が現実化しつつある重要な節目となる。", "source_name": "The Decoder", "source_url": "https://the-decoder.com/deepseek-v4-will-reportedly-run-entirely-on-huawei-chips-in-a-major-win-for-chinas-ai-independence-push/", "ogp_image": "https://the-decoder.com/wp-content/uploads/2025/09/deepseek_sparse_logo.png"}, {"title": "Goldman Sachs「AIがデータセンター向け半導体需要を急押し上げ」——2026〜2028年で収益が急増軌道と予測", "category": "news", "category_icon": "📢", "score": 0, "summary": "4月5日付レポート。Goldman Sachsはデータセンター向けAI半導体市場について、推論ワークロードの拡大とエージェント型AIの本格普及を主因とした急成長を予測。Anthropic・OpenAI・xAIが今年前半だけで合計1,500億ドル超の調達を行い、いずれも大規模推論インフラへの投資を公表していることが需要の可視化を後押し。NVIDIAに加え、Huawei Ascend系の台頭も半導体市場地図を塗り替える要素として言及されている。", "source_name": "ANI News", "source_url": "https://www.aninews.in/news/business/ai-led-demand-to-drive-sharp-surge-in-semiconductor-revenues-goldman-sachs20260405145721/", "ogp_image": null}, {"title": "Hugging Face「Spring 2026 オープンソース動向」報告——LeRobotが1年で★3倍、スキルマーケットプレイス統合でAIエージェント機能が容易に追加可能に", "category": "oss", "category_icon": "🛠️", "score": 0, "summary": "Hugging FaceのSpring 2026レポートにより、ロボティクスフレームワーク「LeRobot」のGitHubスターが1年で約3倍に急拡大していることが判明。`hf skills add`コマンドでスキルマーケットプレイスの事前構築済みツールをAIエージェントに直接インストール可能になり、LLMのリアルワールドへの応用展開が加速。空間知能向けマルチモーダルデータセット「Learning to Drive（L2D）」の公開も注目トピックとして挙げられている。", "source_name": "Hugging Face Blog", "source_url": "https://huggingface.co/blog/huggingface/state-of-os-hf-spring-2026", "ogp_image": "https://cdn-uploads.huggingface.co/production/uploads/62543749b777cd32720675c2/6SncRLSzbOb4IubAj2qyN.png"}], "2026-04-05": [{"title": "Google、Gemma 4をApache 2.0ライセンスで公開——4サイズ、256Kコンテキスト、ネイティブマルチモーダル", "category": "oss", "category_icon": "🛠️", "score": 80, "summary": "4月2日、Google DeepMindがGemma 4を発表。E2B・E4B・26B A4B（MoE）・31B Denseの4サイズ。31B DenseはArena AIテキストリーダーボードでオープンモデル世界3位。前世代比最大4倍高速・60%低電力。256Kコンテキスト・140言語超対応・音声入力対応。商用利用自由なApache 2.0ライセンスに変更。Hugging Face・Kaggle・Ollamaで即日配布。", "source_name": "GIGAZINE", "source_url": "https://www.gigazine.net/gsc_news/en/20260403-google-released-gemma-4/", "ogp_image": "https://i.gzn.jp/img/2026/04/03/google-released-gemma-4/00.png"}, {"title": "Google Gemma 4公式発表——エッジからワークステーションまで「バイト効率世界最高水準」のオープンモデル", "category": "model", "category_icon": "🤖", "score": 80, "summary": "Google公式ブログ（4月2日）。\"Byte for byte, the most capable open models\"をキャッチコピーに発表。E4B（Efficient 4B）はパラメータ数4B相当ながら26Bクラスの精度を実現。スマートフォン向けエッジ推論からアジェンティックワークフローまで想定。Android AI Core開発者プレビューにも同日掲載。Google Cloud・AI Studioでも即日利用可能。", "source_name": "Google Blog", "source_url": "https://blog.google/innovation-and-ai/technology/developers-tools/gemma-4/", "ogp_image": "https://storage.googleapis.com/gweb-uniblog-publish-prod/images/gemma-4_blog_keyword_meta-dark.width-1300.png"}, {"title": "「Claude Code Unpacked」——流出コードの全機能を逆解析、未公開機能まで判明", "category": "paper", "category_icon": "📄", "score": 80, "summary": "GIGAZINE英語版（4月2日）が紹介。研究者らが流出した51万行のClaude Codeソースコードを解析し、未リリース機能・内部アーキテクチャを体系的にまとめた「Claude Code Unpacked」プロジェクトが公開。次世代プロジェクト「KAIROS」（マルチエージェント協調フレームワークと推定）の設計ドキュメントも含まれており、Anthropicが今後の方向性を無意図的に露呈した形となった。", "source_name": "GIGAZINE (English)", "source_url": "https://gigazine.net/gsc_news/en/20260402-claude-code-unpacked/", "ogp_image": "https://i.gzn.jp/img/2026/04/02/claude-code-unpacked/00_m.png"}, {"title": "Anthropic「Claude Code」ソースコード流出——5万行超、DMCA申請で削除対応", "category": "oss", "category_icon": "🛠️", "score": 60, "summary": "npmパッケージ `@anthropic-ai/claude-code` にソースマップファイルが誤混入し、51万2,000行超の未圧縮ソースコードが一時公開状態に。AnthropicはDMCA申請でGitHub上のコピーを削除要請。Bun + React/Inkで構築されたターミナルUI・OAuth 2.0・約40種のエージェントツール実装が判明。「顧客データ・認証情報は含まれず、セキュリティ侵害でなく人的エラー」と公式声明。次世代プロジェクト「KAIROS」の存在も露見。", "source_name": "ITmedia NEWS", "source_url": "https://www.itmedia.co.jp/news/articles/2604/01/news056.html", "ogp_image": "https://image.itmedia.co.jp/news/articles/2604/01/cover_news056.jpg"}, {"title": "【個人ブログ】Gemma4をVRAM 8GBでLlama・Qwenと体感比較——「ローカルAIの空気が変わった」", "category": "oss", "category_icon": "🛠️", "score": 60, "summary": "note.comの個人検証記事。VRAM 8GB環境でGemma 4（26B A4B MoE・E4B）とLlama 4 Scout・Qwen3をOllamaで同一タスクに投入し体感速度・回答品質を比較。E4B（実質4B相当）が26Bクラスの精度に迫るとの結果に「コスパの常識が変わった」と驚き。ローカルLLM選定の実用ガイドとして参考度高し。", "source_name": "note.com / nerone1024", "source_url": "https://note.com/nerone1024/n/ne08329777601", "ogp_image": "https://assets.st-note.com/production/uploads/images/264777537/rectangle_large_type_2_3b6a15e7d6948c4d3cbcf1a9d76309da.png?fit=bounds&quality=85&width=1280"}, {"title": "Android Developer Preview: Gemma 4 がAI Coreへ——スマートフォン上でフロンティアAI", "category": "oss", "category_icon": "🛠️", "score": 60, "summary": "Androidデベロッパーブログ（4月）。AI Core開発者プレビューにGemma 4 E2B/E4Bが追加。アプリ内でオンデバイス推論が可能に。従来世代比最大4倍高速・60%省電力のエッジモデルで、常時起動AIアシスタント・オフライン翻訳・プライベートデータ処理などのユースケースを想定。Android向けは別途AI Edge Galleryから配布。", "source_name": "Android Developers Blog", "source_url": "https://android-developers.googleblog.com/2026/04/AI-Core-Developer-Preview.html", "ogp_image": "https://blogger.googleusercontent.com/img/a/AVvXsEijK_b2J_MZIfUZAF0dQr6EM7nVpfhugNAZBJAGflT-DRH85ZlOE1N0J6Dihq_hjTIWhS--sCfYBUMaZzTzdO0V86yaZfzyOFvDNELid7QpH20ZVRPpayXYJziA12DbDdi2H8FVQClLbMieiBShWWKo7ee6uXIDLWNEt2L1X8BEvgyCoKXW8dy1Z5-lAPk"}, {"title": "【個人ブログ】Gemma 4 をRaspberry Pi 5（8GB）で動かしてみた——5 tok/s で実用レベル", "category": "oss", "category_icon": "🛠️", "score": 40, "summary": "Qiitaの実践レポート（4月3日投稿）。Raspberry Pi OS Lite 64-bit + LiteRT-LM経由でGemma 4 E2B ategory": "model", "category_icon": "🤖", "score": 80, "summary": "情報リークにより、Anthropicが開発中の「Claude Mythos（Capybara）」の存在が判明。Opus 4.6を大きく上回るコーディング・学術推論・サイバーセキュリティのベンチマークスコアを持ち、Anthropicは政府高官にサイバー攻撃リスクの急増を非公式に警告している。コスト効率化が完了するまで一般公開はせず、現在はサイバーセキュリティ企業向けにAPI経由で限定展開中。Anthropicは同時期にClaude Codeの内部コードを誤って一般公開するミスも犯した。", "source_name": "CNN Business", "source_url": "https://edition.cnn.com/2026/04/03/tech/anthropic-mythos-ai-cybersecurity", "ogp_image": null}, {"title": "MetaのLlama 4 Scout・Maverick、ネイティブマルチモーダルMoEアーキテクチャで公開", "category": "model", "category_icon": "🤖", "score": 80, "summary": "Llama 4 Scoutはアクティブパラメータ170億・16エキスパート、1,000万トークンのコンテキストウィンドウを持つ業界最長クラスのオープンウェイトモデル。Llama 4 Maverickはアクティブパラメータ170億・128エキスパートで、GPT-4oおよびGemini 2.0 Flashを主要ベンチマークで上回る性能。IBM watsonx.aiにも統合され、HuggingFaceでも公開済み。自社インフラで無料運用可能な最強オープンウェイトモデルとして注目を集めている。", "source_name": "Meta AI Blog", "source_url": "https://ai.meta.com/blog/llama-4-multimodal-intelligence/", "ogp_image": "https://scontent.fngo4-2.fna.fbcdn.net/v/t39.2365-6/488639590_2182781778834283_7341615399691839509_n.png?_nc_cat=107&amp;ccb=1-7&amp;_nc_sid=e280be&amp;_nc_ohc=bVXWCW7YmngQ7kNvwFARem_&amp;_nc_oc=Adra-ISfBocmZswSizLhcRcaJ4mKWdOURbUO9LTiMwWWeMBfbma41Jf0iovn44DDJPp3NNpa1Kdyl2tfTL6O0JrA&amp;_nc_zt=14&amp;_nc_ht=scontent.fngo4-2.fna&amp;_nc_gid=7ErmoOeSfZ41zSf9lij38g&amp;_nc_ss=7a389&amp;oh=00_Af2IX-wKMyRbVytiOApgnL0pMuujhG46zxfdN0ujC8_SUQ&amp;oe=69EA6BE0"}, {"title": "国内AIエージェント市場、「実証」から「業界別覇権争い」フェーズへ転換", "category": "news", "category_icon": "📢", "score": 60, "summary": "2026年4月時点で電通デジタル・ぐるなび・建設業向けCONOC等、多業種でのAIエージェント本番導入が加速。削減時間・自律解決率などの定量的KPI開示が標準化し、業界特化型エージェントの開発競争が激化。「単純自動化から判断補助・実行支援」へのシフトが明確化し、資本提携・買収による供給体制強化も相次いでいる。", "source_name": "note.com / 国内AIエージェント動向(2026/4/3号)", "source_url": "https://note.com/yasuhitoo/n/nb123beed6936", "ogp_image": "https://assets.st-note.com/production/uploads/images/264357614/rectangle_large_type_2_d59a6aecc4adca556b3d65139e3e7896.png?fit=bounds&quality=85&width=1280"}, {"title": "【個人ブログ】デザイナーが 3月30日にQwen3.5-Omniをリリース。テキスト・画像・音声・動画の入力に対応し、テキストと音声の両方を生成できる全モダリティ統合モデル。音声認識は74言語（39中国方言・日本語含む）、音声合成は29言語に対応。最大256Kトークン、音声10時間・動画400秒（1FPS）の入力が可能で、音声・映像理解ではGemini 3.1 Proを上回ると発表している。Plus・Flash・Lightの3バリアントが用意される。", "source_name": "GIGAZINE（2026年3月31日）", "source_url": "https://gigazine.net/news/20260331-qwen3-5-omni/", "ogp_image": "https://i.gzn.jp/img/2026/03/31/qwen3-5-omni/00.png"}, {"title": "Microsoft「Copilot Cowork」— GPT×Claude協調でResearcher・Critique・Councilの三機能", "category": "oss", "category_icon": "🛠️", "score": 80, "summary": "MicrosoftがMicrosoft 365向け新機能「Copilot Cowork」をFrontierプログラムで3月31日より提供開始。Researcher機能で複数情報源から洗練された分析を生成し、Critique機能ではGPT（タスク計画・初期提案）とClaude（詳細な批評・検証）が協調して出力品質を高める。Council機能は複数モデルの回答を並列実行して比較・評価できる。競合モデルを組み合わせる\"マルチモデル協調\"が本番実装された形。", "source_name": "ITmedia AI+（2026年3月31日）", "source_url": "https://www.itmedia.co.jp/aiplus/articles/2603/31/news078.html", "ogp_image": "https://image.itmedia.co.jp/aiplus/articles/2603/31/cover_news078.jpg"}, {"title": "英語ソース訳］Qwen3.5-Omniはスピーチと動画からコーディングを独習 — 誰も訓練していない創発能力", "category": "model", "category_icon": "🤖", "score": 80, "summary": "The Decoderが3月30日に報じた技術分析。Qwen3.5-OmniがテキストとコードをSpeech（音声）とVideo（映像）から学習してコードを書けるようになったのは、誰かが特定的に訓練したわけではなく、大規模なマルチモーダル学習から自発的に創発した能力だという点を考察。ネイティブ全モダリティ統合の早期融合（Early Fusion）アーキテクチャがもたらす予測外の能力発現について解説。", "source_name": "The Decoder（2026年3月30日）", "source_url": "https://the-decoder.com/qwen3-5-omni-learned-to-write-code-from-spoken-instructions-and-video-without-anyone-training-it-to/", "ogp_image": "https://the-decoder.com/wp-content/uploads/2026/03/alibaba-qwen3.5-omni-banner.png"}, {"title": "Anthropic「Claude Mythos」リーク続報 — 「前例なきサイバーリスク」で政府機関に内部警告", "category": "model", "category_icon": "🤖", "score": 60, "summary": "AnthropicがCMS設定ミスで約3,000ファイルが一時公開状態となり、未発表最上位モデル「Claude Mythos（コードネーム: Capybara）」の存在が露わになった。Anthropicはリリースに向けて「少数の早期アクセス顧客」でテスト中と認めた。流出内部資料によれば、既存Opus 4.6でも本番コードから500件超のゼロデイ脆弱性を検出可能で、Mythosはその能力が「劇的に強化」されたとされる。Anthropicは政府機関に対し大規模サイバー攻撃の可能性を内部警告しているとEuronewsが報じた（3月30日）。", "source_name": "Businesss+IT / sbbit.jp", "source_url": "https://www.sbbit.jp/article/cont1/183482", "ogp_image": "https://www.sbbit.jp/article/image/183482/OGP_bit202603291040329513.jpg"}, {"title": "個人ブログ］4月値上げ前に動く：Claude Pro年払いへの移行で約9,000円を節約する方法", "category": "other", "category_icon": "📝 ", "score": 60, "summary": "エンジニア兼DX推進者「哀人」氏がnote（3月28日公開）にて、Claude消費税施行前に年払いプランへ切り替えることで1ユーザーあたり約9,000円の節約が可能と具体的に解説。著者はClaude Proを「文章を書く・考えを整理する作業においてClaude は他のAIと明らかに一線を画している」と評価。ChatGPTからの移行を検討しているユーザーに向けた実践的な費用最適化ガイド。", "source_name": "哀人(エンジニア兼DX推進)｜note（2026年3月28日）", "source_url": "https://note.com/aitoeng/n/nd8fb15bf383e", "ogp_image": "https://assets.st-note.com/production/uploads/images/262734615/rectangle_large_type_2_faa69f2f0761e34b1d138034eda6d981.png?fit=bounds&quality=85&width=1280"}, {"title": "個人ブログ］AIエージェントが専用クレカを持つ時代 — Visa・Mastercard・Rampが本番稼働の全貌", "category": "other", "category_icon": "📝 ", "score": 60, "summary": "Qiita著者・emi_ndk（Babushka AI）氏が3月29日に詳細分析を公開。Mastercardの「Agent Suite」による自動検索・比較・購入、VisaのOpenAI/Anthropic API連携による決済、RampによるAIへの支出権限付与カード（3月11日発表）など、2026年3月に主要決済各社が同時に動き出した状況を整理。一方でプロンプトインジェクション攻撃や支出上限の抜け穴など現状の課題も指摘する。", "source_name": "emi_ndk｜Qiita（2026年3月29日）", "source_url": "https://qiita.com/emi_ndk/items/d7d29324ee1ff064f038", "ogp_image": "https://qiita-user-contents.imgix.net/https%3A%2F%2Fqiita-user-contents.imgix.net%2Fhttps%253A%252F%252Fcdn.qiita.com%252Fassets%252Fpublic%252Farticle-ogp-background-afbab5eb44e0b055cce1258705637a91.png%3Fixlib%3Drb-4.0.0%26w%3D1200%26blend64%3DaHR0cHM6Ly9xaWl0YS11c2VyLXByb2ZpbGUtaW1hZ2VzLmltZ2l4Lm5ldC9odHRwcyUzQSUyRiUyRmF2YXRhcnMuZ2l0aHVidXNlcmNvbnRlbnQuY29tJTJGdSUyRjU0MTczODUwJTNGdiUzRDQ_aXhsaWI9cmItNC4wLjAmYXI9MSUzQTEmZml0PWNyb3AmbWFzaz1lbGxpcHNlJmJnPUZGRkZGRiZmbT1wbmczMiZzPTQ5ZGU0OTdkMjMwMjhmNWZmOTcwNmZlNGNmY2E5MDZm%26blend-x%3D120%26blend-y%3D467%26blend-w%3D82%26blend-h%3D82%26blend-mode%3Dnormal%26s%3D29ced0e10c8c1d24806abaf93840cae7?ixlib=rb-4.0.0&amp;w=1200&amp;fm=jpg&amp;mark64= rop&amp;blend-crop=left%2Cbottom&amp;blend-mode=normal&amp;s=c56a4b1953c51f4caa846777c7228441"}, {"title": "生成AIを実務でこう使った — 2026年3月の活用録（個人ブログ）", "category": "oss", "category_icon": "🛠️", "score": 60, "summary": "生成AIを日常業務に活用するyamaさんによる3月まとめ。年間229件のスケジュールをExcelからGoogleカレンダーへ一括変換、スプレッドシートの数式エラー自動検出など、Claude・ChatGPTを用いた具体的な業務改善事例を報告。「ツールとして定着した手応え」と評価している。", "source_name": "note.com / yama", "source_url": "https://note.com/yamam0to/n/n59ad2d04781d", "ogp_image": "https://assets.st-note.com/production/uploads/images/258927076/rectangle_large_type_2_11cd43c9bb422f89ba87dd69aefc450c.png?fit=bounds&quality=85&width=1280"}, {"title": "プログラミング雑記 2026年3月31日 — AWS Bedrock AgentCore・Copilot Agentほか最新開発ツール（個人ブログ）", "category": "news", "category_icon": "📢", "score": 60, "summary": "3月31日付の個人技術日誌。Amazon Bedrock AgentCore Runtimeのセッション永続化対応、GitHub Copilotの「コーディングエージェント」がPRブランチへ直接プッシュする新機能、Rider 2026.1リリース（ACP Registry経由でClaude Agent・GitHub Copilot・Cursorを複数統合）などを網羅。AWS Lambda のメモリ上限が32GBに拡張されたことも注目。\n\n**ソース**: ⚠️[Qiita / ishisaka](https://qiita.com/ishisaka/items/113e9406ee30a4cb1d22)", "source_name": "", "source_url": "", "ogp_image": null}, {"title": "国内AIエージェント動向（2026/3/31号）— ChatSense GPT-5.4対応・完全内部完結型「Nenoa」登場", "category": "news", "category_icon": "📢", "score": 60, "summary": "ナレッジセンスの法人向けAIエージェント「ChatSense」が3月30日よりGPT-5.4を追加料金なしで提供開始。TDCソフトは4月1日から社内ネットワーク内で完結するプライベートAIアプライアンス「Nenoa（ネノア）」の提供を開始予定で、入力データがAI学習に使用されない設計が製造・医療・金融向けに訴求。弥生の調査では中小企業の経理担当約7割が60%以上の業務を手作業で行っており、AIツール導入率は約2割にとどまる実態も明らかに。", "source_name": "note.com / Yasuhito Morimoto", "source_url": "https://note.com/yasuhitoo/n/n90de75b6a97d", "ogp_image": "https://assets.st-note.com/production/uploads/images/263534763/rectangle_large_type_2_24a030e009658ff61915f8f2f51d753b.png?fit=bounds&quality=85&width=1280"}, {"title": "OpenAI、次期モデル「Spud」の事前学習完了 — 数週間内リリース、経済加速をAltmanが示唆", "category": "news", "category_icon": "📢", "score": 60, "summary": "日本経済新聞が3月31日付で報道。Sam Altmanが社内向けに「経済を本当に加速させうる」と語ったとされる次期主力モデル「Spud」が事前学習を完了。テキサス州Abileneの「Stargate」施設でH100 GPU 10万基超を使用して訓練された。GPT-5.4の後継と見られるが詳細パラメータは非公開。特定の「これまでとは全く異なる能力」を持つとされ、リリースは数週間内が有力。", "source_name": "日本経済新聞", "source_url": "https://www.nikkei.com/article/DGXZQOGN306H30Q6A330C2000000/", "ogp_image": "https://article-image-ix.nikkei.com/https%3A%2F%2Fimgix-proxy.n8s.jp%2FDSXZQO2825977031032026000000-2.jpg?auto=format&amp;bg=FFFF&amp;crop=focalpoint&amp;fit=crop&amp;fp-x=0.22&amp;fp-y=0.33&amp;h=630&amp;w=1200&amp;s=8f0992e4be87edb07a83f2a4fed5b346"}, {"title": "ARC-AGI-3公開 — $200万賞金、最高AIスコア0.37%・人間100%でAGIの壁を示す", "category": "paper", "category_icon": "📄", "score": 60, "summary": "ARC Prize財団が3月24日に発表し3月30日時点での最新結果が注目を集める。ARC-AGI-3は「探索・モデリング・目標設定・計画立案」の4能力を測るインタラクティブ型AGIベンチマーク。Gemini 3.1 Proが最高スコア0.37%、GPT-5.4が0.26%、Claude Opus 4.6が0.25%、Grok-4.20は0%。人間の正解率100%との圧倒的な差が改めてAGIの遠さを示した。強化学習とグラフ探索を組み合わせたプレビューエージェントが12.58%を達成しており、LLMそのものより「学習・探索型エージェント」の可能性が浮上している。", "source_name": "winbuzzer.com（3/30）", "source_url": "https://winbuzzer.com/2026/03/30/arc-agi-3-offers-2m-ai-matching-human-reasoning-benchmark-xcxwbn/", "ogp_image": "https://winbuzzer.com/wp-content/uploads/2026/03/ARC-AGI-3.jpg"}, {"title": "Anthropic、企業向けCompliance API発表 — リアルタイム監査・6段階ロール管理でEU AI Act対応", "category": "api", "category_icon": "💰", "score": 60, "summary": "Anthropicが3月下旬に発表した企業ガバナンス機能の大型強化。新設のCompliance APIはコンプライアンスチームが使用データや顧客コンテンツに手動エクスポートなしでリアルタイムアクセス可能。組織・日次レベルの利用状況をAPI経由で取得できるEnterprise Analytics APIも追加。Claude on Amazon Bedrock・Google Cloud Vertex AIでEU完全データレジデンシーを保証。EU AI Act対応を意識した設計が企業採用の加速を後押しする見込み。", "source_name": "Builder.io / Claude Code Updates March 2026", "source_url": "https://www.builder.io/blog/claude-code-updates", "ogp_image": "https://cdn.builder.io/api/v1/image/assets/YJIGb4i01jvw0SRdL5Bt/cc6a8cac0da647a4baced825db7a373e?width=1200"}, {"title": "Claude AIと一緒に人生初のアプリ開発を1時間でやってみた（個人ブログ）", "category": "oss", "category_icon": "🛠️", "score": 40, "summary": "プログラミング経験なしのTaskさんがClaude AIとペアプロし、1時間でWebアプリを完成させた実践記。「自然言語で要件を伝えるだけでコードが生成され、エラーも一緒に直してくれた。AIがペアプロパートナーになった」と感動を報告。非エンジニアによるAI活用の新しいモデルケースとして注目される。", "source_name": "note.com / Task", "source_url": "https://note.com/tasktask/n/na743f9af89ad", "ogp_image": "https://d2l930y2yx77uc.cloudfront.net/production/social_images/078c2e5c2975299db56c60bba6d830d170e7af29.png"}, {"title": "Bluesky、AIチャットでカスタムフィード作成アプリ「Attie」を招待制で提供開始", "category": "news", "category_icon": "📢", "score": 40, "summary": "Blueskyが新AIアプリ「Attie」を招待制で公開。AT Protocol上に構築され、Anthropic社Claudeを内部で採用。ユーザーが自然言語で「マラソン関連の投稿だけ見たい」などと入力するだけでカスタムフィードを自動生成できる。コードやアルゴリズム知識が不要な分散型AIフィードツールとして注目されている。", "source_name": "ITmedia NEWS", "source_url": "https://www.itmedia.co.jp/news/articles/2603/30/news080.html", "ogp_image": "https://image.itmedia.co.jp/news/articles/2603/30/cover_news080.jpg"}, {"title": "OpenAI「Spud」学習完了と資金調達1,200億ドル超 — IPO前夜の全容", "category": "news", "category_icon": "📢", "score": 40, "summary": "3月30日付MLQ.aiの分析記事。OpenAIは2月末の1,100億ドル調達（Amazon 500億・NVIDIA 300億・SoftBank 300億ドル）に続き、3月24日にAndreessen Horowitz・D.E. Shaw・Microsoft等から追加100億ドルを確保し総額1,200億ドル超に到達。バリュエーションは約8,400億ドル。CFO Sarah FriarはIPO準備を「始めている」と認め、2026年後半〜2027年初頭が有力視されている。Spud学習完了との相乗効果でIPO前の機運が急速に高まっている。\n\n**ソース**: ⚠️[MLQ.ai（3/30）](https://mlq.ai/news/ai-roundup/2026-03-30/openais-massive-110b-raise-and-spud-pivot-dominate-march-ai-headlines/) / [CNBC](https://www.cnbc.com/2026/03/24/openai-secures-an-extra-10-billion-in-record-funding-round-cfo-friar-says.html)", "source_name": "", "source_url": "", "ogp_image": null}, {"title": "Bluesky「Attie」AIフィードビルダーに12.5万人がブロック — SNSのAI化に根強い反発", "category": "news", "category_icon": "📢", "score": 20, "summary": "TechCrunchが3月30日報道。3月28日のAttie公開からわずか数日で12.5万以上のBlueskyユーザーがAIアカウントをブロック。ブロック数はJ.D. Vance元副大統領に次ぐ2位。Blueskyはツイッター的アルゴリズム支配から脱した「安らぎの場」としてユーザーに支持されており、AIの常駐化を「裏切り」と感じるコミュニティ心理が明らかになった。", "source_name": "TechCrunch", "source_url": "https://techcrunch.com/2026/03/30/blueskys-new-ai-tool-attie-is-already-the-most-blocked-account-other-than-j-d-vance/", "ogp_image": "https://techcru ート、生成AIを全国1万6,400店舗の採用業務へ展開 — OpenAI「Sora」は突然終了", "category": "news", "category_icon": "📢", "score": 20, "summary": "今週（3/22-28）の日本発トピック2件。ファミリーマートがパーソル社の採用管理システムにAI原稿生成機能を全国展開し、募集文作成時間を約10分の1に短縮した。一方、OpenAIは3月24日に動画生成サービス「Sora」の終了を発表（9月24日完全停止）。ディズニーとの10億ドル規模の提携も破談となった。著者HIROEが週次AI動向を解説。", "source_name": "特筆すべきAI関連ニュース（2026年3月22日〜28日）｜HIROE on note", "source_url": "https://note.com/hiroe28/n/n478c11aedc7c", "ogp_image": "https://assets.st-note.com/production/uploads/images/262726989/rectangle_large_type_2_66981990c8c6fe9dc642b0fd4680cd94.png?fit=bounds&quality=85&width=1280"}], "2026-03-29": [{"title": "Googleが音声AIモデル「Gemini 3.1 Flash Live」を発表 — 日本含む全世界でSearch Live提供開始", "category": "model", "category_icon": "🤖", "score": 0, "summary": "Googleは3月26日、最新の音声AIモデル「Gemini 3.1 Flash Live」をリリース。低遅延のリアルタイム音声対話に最適化され、90言語以上に対応。前バージョン（2.5 Flash Native Audio）と比較してレイテンシが低減、背景ノイズのフィルタリング能力も向上。「Search Live」（音声＋カメラでの検索）が日本を含む200以上の国・地域で利用可能となった。iOS版Google翻訳でもリアルタイム翻訳が日本を含む7カ国で展開。", "source_name": "gihyo.jp", "source_url": "https://gihyo.jp/article/2026/03/gemini-3-1-flash-live", "ogp_image": null}, {"title": "NTTデータ、AI-Native開発のホワイトペーパーを3月26日に公開 — 2026年度中に生成AIがシステム開発を担う体制へ", "category": "news", "category_icon": "📢", "score": 0, "summary": "NTTデータグループは3月26日、「アカウンタビリティを軸としたAI-Native開発のデザイン戦略」ホワイトペーパーを公開。商用システムのAI主導開発における品質・透明性・説明責任の確保方法を体系化。2026年度中にシステム開発をほぼ生成AIが担う技術を導入予定で、人間は「監督・司令塔」役に移行する構想。経産省予測のIT人材79万人不足（2030年）への抜本策。", "source_name": "NTTデータグループ プレスリリース", "source_url": "https://www.nttdata.com/global/ja/news/topics/2026/032603/", "ogp_image": null}, {"title": "GIGAZINE: 397Bパラメータの巨大AIモデルをiPhoneで動作させることに成功", "category": "oss", "category_icon": "🛠️", "score": 0, "summary": "AI研究者ダン・ウッズ氏が「LLM in a Flash」技術を活用し、MoEアーキテクチャのQwen3.5-397Bモデルを外部ストレージからの重みストリーミングで実行。MacBook Pro M3 Maxで毎秒5.7〜7.07トークン、iPhone 17 Proでも毎秒0.7トークンの処理速度を達成。RAM 48GBのマシンでも実メモリ使用量は約5.5GBに抑えられ、巨大モデルのエッジ推論の実現可能性を示した。", "source_name": "GIGAZINE", "source_url": "https://gigazine.net/news/20260324-iphone-397b-ai/", "ogp_image": null}, {"title": "Google Research、AI推論を8倍高速化する「TurboQuant」を発表 — メモリ使用量1/6に", "category": "paper", "category_icon": "📄", "score": 0, "summary": "Google Researchは3月25日、LLM推論の圧縮技術スイート「TurboQuant」「PolarQuant」「QJL」を発表。KVキャッシュを3ビットに圧縮し、精度損失なしでメモリ使用量を1/6、NVIDIA H100上のアテンション計算を最大8倍高速化。トレーニング不要で適用可能なため、企業ユーザーの推論コストを50%以上削減する可能性がある。GemmaやMistralモデルでの検証で品質維持を確認済み。", "source_name": "GIGAZINE", "source_url": "https://gigazine.net/gsc_news/en/20260326-google-turbo-quant", "ogp_image": null}, {"title": "GIGAZINE: 200以上のAIモデルに同じ質問を投げて議論させる「AI Roundtable」公開", "category": "oss", "category_icon": "🛠️", "score": 0, "summary": "スウェーデンのOpper AIが「AI Roundtable」を公開。200種以上のAIモデルから最大50モデルを選択し、同一質問への回答を一覧比較できる無料ツール。ChatGPT、Claude、Gemini、Grokなどをサイドバイサイドで比較可能。ディベートモードではAI同士が互いの意見に反論し、意見を変える機能も搭載。セッションはデフォルトで非公開。", "source_name": "GIGAZINE", "source_url": "https://gigazine.net/gsc_news/en/20260327-ai-roundtable/", "ogp_image": null}, {"title": "OpenAI GPT-5.4、OSWorldベンチマークで人間超え — 自律デスクトップ操作の新時代", "category": "model", "category_icon": "🤖", "score": 0, "summary": "3月5日にリリースされたGPT-5.4は、デスクトップ自律操作ベンチマーク「OSWorld-Verified」で75.0%を記録し、人間エキスパートのベースライン72.4%を初めて超過。100万トークンのコンテキストウィンドウを搭載し、スクリーンショット・マウス・キーボードによるソフトウェア直接操作が可能。前バージョンGPT-5.2の47.3%から大幅向上。", "source_name": "OpenAI公式", "source_url": "https://openai.com/index/introducing-gpt-5-4/", "ogp_image": null}, {"title": "AIボットがインターネットトラフィックで人間を超越 — HUMAN Security報告", "category": "news", "category_icon": "📢", "score": 0, "summary": "サイバーセキュリティ企業HUMAN Securityが3月26日に公表した「State of AI Traffic」レポートで、AIボットのトラフィックが初めて人間ユーザーを上回ったことが判明。2025年中にAIトラフィックは187%増加、AIエージェント（OpenClaw等）のトラフィックは前年比約8,000%増。Cloudflare CEOは2027年までにボットが人間トラフィックを完全に凌駕すると予測。", "source_name": "CNBC", "source_url": "https://www.cnbc.com/2026/03/26/ai-bots-humans-internet.html", "ogp_image": null}, {"title": "OpenClaw — GitHub史上最多スターのOSS AIエージェント、中国で規制対象に", "category": "oss", "category_icon": "🛠️", "score": 0, "summary": "オーストリアの開発者Peter Steinberger氏が開発したオープンソースAIエージェント「OpenClaw」がGitHub 250K+スターを達成しReactを超越。PCのファイル管理・メール送信・API制御を自律実行可能。一方、2026年3月に中国当局が国営企業・政府機関での利用を制限。Tencentは3月10日にWeChat互換のOpenClawベース製品群をリリースするなど、対応が分かれている。", "source_name": "KDnuggets", "source_url": "https://www.kdnuggets.com/openclaw-explained-the-free-ai-agent-tool-going-viral-already-in-2026", "ogp_image": null}, {"title": "MCP（Model Context Protocol）が月間9,700万DL突破 — AIエージェント基盤の標準化が加速", "category": "api", "category_icon": "💰", "score": 0, "summary": "Anthropicが策定したModel Context Protocol（MCP）のSDKダウンロード数が2026年3月時点で月間9,700万回に到達（2024年11月のローンチ時は約200万回、16ヶ月で4,750%成長）。MCPサーバーエコシステムは5,800以上に拡大し、Anthropic・OpenAI・Googleの3社がサポート。AIエージェントの外部ツール接続における事実上の標準プロトコルに。", "source_name": "Digital Applied", "source_url": "https://www.digitalapplied.com/blog/mcp-97-million-downloads-model-context-protocol-mainstream", "ogp_image": "https://www.digitalapplied.com/blog/mcp-97-million-downloads-model-context-protocol-mainstream/opengraph-image"}, {"title": "英ICO・Ofcom、xAI「Grok」のディープフェイク画像生成問題で正式調査", "category": "news", "category_icon": "📢", "score": 0, "summary": "英国情報コミッショナー事務局（ICO）と通信規制当局Ofcomが、Elon Musk率いるxAIの「Grok」AIモデルによる非同意性的画像（ディープフェイク）生成問題で正式調査を実施中。個人データの合法的処理と、有害画像生成を防ぐ設計上のセーフガードの有無が焦点。違反確認時は最大1,750万ポンドまたは全世界売上高の4%の罰金が科される可能性。", "source_name": "ICO公式", "source_url": "https://ico.org.uk/about-the-ico/media-centre/news-and-blogs/2026/02/ico-announces-investigation-into-grok/", "ogp_image": null}], "2026-03-28": [{"title": "Google、リアルタイム音声モデル「Gemini 3.1 Flash Live」発表 — 「検索Live」日本展開開始", "category": "model", "category_icon": "🤖", "score": 0, "summary": "Googleは3月27日、リアルタイム音声会話に特化した新モデル「Gemini 3.1 Flash Live」を発表。Gemini 3 Proベースのマルチモーダルモデルで、コンテキスト128Kトークン、90言語以上に対応。ピッチや話速などの音響的ニュアンスを理解し、ユーザーの感情（苛立ち・困惑等）に応じて応答を動的に調整する。同時に音声＋カメラでAI検索できる「検索Live（Search Live）」を日本を含む200以上の国・地域で提供開始。", "source_name": "ITmedia AI＋", "source_url": "https://www.itmedia.co.jp/aiplus/articles/2603/27/news069.html", "ogp_image": "https://image.itmedia.co.jp/aiplus/articles/2603/27/cover_news069.jpg"}, {"title": "AI不使用\"作品に「AI生成」と誤表記 — クロスフォリオ出版が謝罪", "category": "news", "category_icon": "📢", "score": 0, "summary": "BookLiveは3月27日、電子書籍配信サービス「クロスフォリオ出版」で配信した一部作品に、生成AIを使用していないにもかかわらず「AI生成作品」と誤表記があったと謝罪。あるクリエイターがXで指摘し発覚。AI生成コンテンツのラベリング問題が顕在化した事例として注目される。", "source_name": "ITmedia AI＋", "source_url": "https://www.itmedia.co.jp/aiplus/articles/2603/27/news115.html", "ogp_image": null}, {"title": "楽天、7000億パラメータの日本語LLM「Rakuten AI 3.0」を無償公開 — GPT-4o超えを主張", "category": "model", "category_icon": "🤖", "score": 0, "summary": "楽天は3月17日、GENIAC第3期（経産省・NEDO支援）の成果として日本語特化LLM「Rakuten AI 3.0」をApache 2.0ライセンスでHugging Faceに公開。約7000億パラメータのMixture of Experts（MoE）モデルで、日本語ベンチマークでGPT-4oを上回ったと発表。商用利用可能。ベースがDeepSeek由来かどうかの議論も注目されている。", "source_name": "ITmedia AI＋", "source_url": "https://www.itmedia.co.jp/aiplus/articles/2603/17/news085.html", "ogp_image": null}, {"title": "ARC-AGI-3発表 — 全フロンティアAIモデルが1%未満、人間は100%達成のベンチマーク", "category": "paper", "category_icon": "📄", "score": 0, "summary": "François Cholletらが3月26日、AIの汎用知能を測る新ベンチマーク「ARC-AGI-3」を発表。初のインタラクティブ形式で、64×64グリッド上のターンベースゲームをルール説明なしに解く必要がある。結果: 人間100%、Gemini 3.1 Pro 0.37%、GPT-5.4 0.26%、Claude Opus 4.6 0.25%、Grok 4.20 0.00%。賞金総額200万ドル。現行AIと人間の汎用推論能力の差を改めて浮き彫りにした。", "source_name": "GIGAZINE", "source_url": "https://gigazine.net/news/20260326-arc-agi-3/", "ogp_image": null}, {"title": "Google TurboQuant — LLMメモリ使用量を6分の1に圧縮、速度8倍、精度劣化なし", "category": "oss", "category_icon": "🛠️", "score": 0, "summary": "Google Researchが3月25日、ICLR 2026で発表予定のKVキャッシュ圧縮アルゴリズム「TurboQuant」を公開。KVキャッシュを3ビットに圧縮し、メモリ使用量を最低6分の1に削減、H100 GPU上で最大8倍のアテンション高速化を実現。キャリブレーションやファインチューニングが不要なdata-oblivious方式。推論コスト削減に直結する実用的ブレークスルー。", "source_name": "GIGAZINE", "source_url": "https://gigazine.net/gsc_news/en/20260326-google-turbo-quant/", "ogp_image": null}, {"title": "Google Lyria 3 Pro — AI音楽生成が3分のボーカル付き楽曲に対応", "category": "model", "category_icon": "🤖", "score": 0, "summary": "Googleは3月25日、音楽生成AI「Lyria 3 Pro」を発表。前世代Lyria 3の30秒制限から大幅に拡張し、最大3分のボーカル付き楽曲を生成可能に。イントロ・ヴァース・コーラス・ブリッジなどの楽曲構造を理解し、より細かいクリエイティブコントロールを実現。Geminiアプリの有料サブスクライバー向けに提供。", "source_name": "Google公式ブログ", "source_url": "https://blog.google/innovation-and-ai/technology/ai/lyria-3-pro/", "ogp_image": null}, {"title": "OpenAI、動画生成アプリ「Sora」を終了 — GPU推論コストの持続不可能性が原因", "category": "news", "category_icon": "📢", "score": 0, "summary": "OpenAIは3月24日、ローンチから半年の動画生成アプリ「Sora」の提供終了を発表。動画生成は推論GPU消費が極めて大きく、IPO準備に向けたコスト削減の一環として、収益性の高いテキスト・推論・コーディングツールにリソースを集中。動画AI業界全体に「どのワークロードが商業的に成立するか」の再考を迫る結果に。", "source_name": "CNBC", "source_url": "https://www.cnbc.com/2026/03/24/openai-shutters-short-form-video-app-sora-as-company-reels-in-costs.html", "ogp_image": null}, {"title": "AI API価格の歴史的変動 — 3月だけで114モデルが価格改定", "category": "api", "category_icon": "💰", "score": 0, "summary": "2026年3月、追跡対象483モデル中114モデル（約24%）が価格変更という前例のないボラティリティ。主要動向: OpenAIはGPT-4 APIを60%値下げ、GPT-5.4ファミリーでキャッシュ入力トークン90%割引を導入。現行フラッグシップ価格（/1Mトークン）: Claude Opus 4.6が入力$5.00/出力$25.00、Gemini 3.1 Proが$2.00/$12.00、GPT-5.2が$1.75/$14.00。OpenAIのChatGPT責任者は現在の価格を「偶発的」と発言し、今後の値上げを示唆。\n\n**ソース**: ⚠️[CostLayer](https://costlayer.ai/blog/ai-api-price-increases-march-2026-openai-anthropic) / [IntuitionLabs](https://intuitionlabs.ai/articles/ai-api-pricing-comparison-grok-gemini-openai-claude)", "source_name": "", "source_url": "", "ogp_image": null}, {"title": "Meta、AI費用増大で最大20%の人員削減を計画か — 年間AI設備投資は最大1350億ドル", "category": "news", "category_icon": "📢", "score": 0, "summary": "Reutersの報道によると、Metaは約79,000人の従業員の20%超にあたる大規模レイオフを計画。2026年のAI関連設備投資は1,150〜1,350億ドル（前年比約2倍）に達する見込みで、そのコスト捻出が目的。Metaの広報は「推測的な報道」とコメントし公式には否定。株価はレイオフ報道後約3%上昇。", "source_name": "CNBC", "source_url": "https://www.cnbc.com/2026/03/16/meta-ai-costs-mass-layoffs-20percent-up-premarket.html", "ogp_image": null}, {"title": "MCP（Model Context Protocol）が月間9700万DL突破 — エージェントAI基盤の事実上の標準へ", "category": "oss", "category_icon": "🛠️", "score": 0, "summary": "Anthropicが開発しMCPが月間SDKダウンロード9700万回を達成（2024年11月ローンチ時の約200万から16ヶ月で4,750%成長）。ChatGPT、Claude、Cursor、Gemini、Copilot、VS Code等の主要AIプラットフォームが対応。AnthropicはMCPをLinux Foundation傘下の「Agentic AI Foundation」に寄贈済み。NVIDIA GTC 2026でもエージェントAIが最大テーマとなり、MCPベースのエンタープライズ権限管理フレームワークが注目を集めた。", "source_name": "Digital Applied", "source_url": "https://www.digitalapplied.com/blog/mcp-97-million-downloads-model-context-protocol-mainstream", "ogp_image": "https://www.digitalapplied.com/blog/mcp-97-million-downloads-model-context-protocol-mainstream/opengraph-image"}, {"title": "日本政府、国産AI基盤モデル開発に5年1兆円支援 — ソフトバンク等が新会社設立構想", "category": "news", "category_icon": "📢", "score": 0, "summary": "経産省は2026年度から5年間で約1兆円規模の公的支援を計画（初年度約3000億円）。ソフトバンク・プリファードネットワークス等10社超が出資する新会社で、1兆パラメータ級の国産基盤モデルを開発。ソフトバンクは別途6年間でDCに2兆円投資予定。NEC・富士通・NTTも独自日本語LLMを展開中で、国内AI基盤の自律化が加速。", "source_name": "日本経済新聞", "source_url": "https://www.nikkei.com/article/DGXZQOUA210CV0R21C25A2000000/", "ogp_image": null}, {"title": "Google Stitch大型アップデート — 「バイブデザイン」でFigma株8%急落", "category": "oss", "category_icon": "🛠️", "score": 0, "summary": "Google Labsは3月19日、UIデザインツール「Stitch」を全面刷新。自然言語でビジネス目標やユーザー感情を伝えるだけでUIを生成する「バイブデザイン（vibe design）」、音声操作、インスタントプロトタイプ、デザインエージェント機能を追加。Figmaの株価は翌日8.8%下落。0→1のアイデア出し段階を数分で10コンセプト生成可能。無料。", "source_name": "GIGAZINE", "source_url": "https://gigazine.net/gsc_news/en/20260320-google-ai-stitch-ui-design/", "ogp_image": null}], "2026-03-27": [{"title": "AIの知能をルール不明のゲームで測定する新ベンチマーク「ARC-AGI-3」が登場", "category": "paper", "category_icon": "📄", "score": 0, "summary": "François Chollet氏が開発したAGI測定ベンチマーク「ARC-AGI-3」が3月26日に公開された。ルールも勝利条件も提示されないターン制ゲーム環境で、エージェントが自力でルールを推測し攻略する能力を測定する。人間は100%クリアできるが、最高性能のAIでもスコアは12.58%にとどまり、現在のAIと人間の汎用知能の差を浮き彫りにした。数百の手作り環境・数千レベルで構成され、ARC Prize 2026コンペティションも同時に開始された。", "source_name": "GIGAZINE", "source_url": "https://gigazine.net/news/20260326-arc-agi-3/", "ogp_image": null}, {"title": "GitHubがCopilotの入出力データをAI学習に使用すると発表 — 4月24日までにオプトアウト必要", "category": "news", "category_icon": "📢", "score": 0, "summary": "GitHubは3月26日、Copilot Free/Pro/Pro+ユーザーの入出力・コードコンテキストをAIモデル学習に使用するポリシー変更を発表した。2026年4月24日から適用され、入力プロンプト・出力コード・カーソル周辺のコンテキスト・ファイル名・リポジトリ構造等が収集対象となる。学習を望まないユーザーは期限までにPrivacy設定でオプトアウトが必要。Business/Enterpriseプランは対象外。開発者コミュニティで大きな議論を呼んでいる。", "source_name": "GIGAZINE", "source_url": "https://gigazine.net/news/20260326-github-copilot-data-training/", "ogp_image": null}, {"title": "楽天、7000億パラメータの日本語LLM「Rakuten AI 3.0」を公開 — 商用利用可能", "category": "model", "category_icon": "🤖", "score": 0, "summary": "楽天グループは3月17日、経産省/NEDOのGENIACプロジェクトで開発した国内最大規模のLLM「Rakuten AI 3.0」を公開した。約7000億パラメータのMixture of Experts（MoE）アーキテクチャを採用し、日本語ベンチマークではGPT-4oを上回る性能を達成。Apache 2.0ライセンスで商用利用も可能。ただし、ベースモデルがDeepSeek由来であることについて議論も発生している。", "source_name": "ITmedia AI+", "source_url": "https://www.itmedia.co.jp/aiplus/articles/2603/17/news085.html", "ogp_image": null}, {"title": "デジタル庁、行政AI「源内」を全府省庁18万人へ展開 — 国産LLM 7社を選定", "category": "news", "category_icon": "📢", "score": 0, "summary": "デジタル庁は3月6日、行政向け生成AI環境「源内」の全府省庁展開と、試用する国産LLM 7モデルの選定結果を発表した。選定されたのはNTTデータ「tsuzumi 2」、KDDI/ELYZA「Llama-3.1-ELYZA-JP-70B」、ソフトバンク「Sarashina2 mini」、NEC「cotomi v3」、富士通「Takane 32B」、PFN「PLaMo 2.0 Prime」、カスタマークラウド「CC Gov-LLM」の7社。5月から18万人規模の大規模実証を開始し、8月から国産LLMの本格試用に移行予定。", "source_name": "ASCII.jp（Yahoo!ニュース経由）", "source_url": "https://news.yahoo.co.jp/articles/27d0b607d53405875e27fb343e238273291b5b4c", "ogp_image": null}, {"title": "NTTデータ、AI-Native開発のガバナンス戦略ホワイトペーパーを公開", "category": "paper", "category_icon": "📄", "score": 0, "summary": "NTTデータグループは3月26日、商用システムのAI-Native開発における品質・透明性・説明責任の確保に関するホワイトペーパー「アカウンタビリティを軸としたAI-Native開発のデザイン戦略」を公開した。2025年以降の生成AIを活用したソフトウェア開発の知見を体系化したもので、新規開発だけでなく既存システムの改修・保守への適用にも言及。2026年度中にシステム開発の大部分を生成AIが担う技術の導入を目指す。", "source_name": "NTTデータグループ", "source_url": "https://www.nttdata.com/global/ja/news/topics/2026/032603/", "ogp_image": null}, {"title": "Google、LLMメモリ消費を6分の1・速度8倍にする圧縮技術「TurboQuant」を発表", "category": "oss", "category_icon": "🛠️", "score": 0, "summary": "Google Researchは3月25日、LLMのKey-Valueキャッシュメモリを最低6分の1に圧縮し、最大8倍の推論高速化を精度劣化なしで実現する新アルゴリズム「TurboQuant」を発表した。極座標変換による「PolarQuant」と1ビット誤差補正の「QJL」を組み合わせ、ファインチューニング不要で3ビットまでの量子化を実現。H100 GPU上で32bit比8倍の性能を達成した。GemmaおよびMistralモデルで plied", "source_url": "https://www.digitalapplied.com/blog/mcp-97-million-downloads-model-context-protocol-mainstream", "ogp_image": "https://www.digitalapplied.com/blog/mcp-97-million-downloads-model-context-protocol-mainstream/opengraph-image"}, {"title": "397BパラメータのAIモデルをiPhoneで動作させることに成功", "category": "paper", "category_icon": "📄", "score": 0, "summary": "AI研究者Dan Woods氏が、Qwen3.5-397B-A17B（MoEアーキテクチャ）を「LLM in a Flash」手法でAppleデバイス上での動作に成功したことが3月24日に報じられた。モデル重みを外部フラッシュストレージに配置し必要時のみメモリにロードする方式で、常駐メモリ約5.5GB・推論速度5.7トークン/秒を達成。48GB RAMのMacBook Proでの検証で、クラウド不要の超大規模モデルローカル推論の実現可能性を示した。", "source_name": "GIGAZINE", "source_url": "https://gigazine.net/news/20260324-iphone-397b-ai/", "ogp_image": null}, {"title": "米ホワイトハウス、国家AI立法フレームワークを発表 — リスク階層型規制モデル", "category": "news", "category_icon": "📢", "score": 0, "summary": "ホワイトハウスは3月20日、AI統治の国家立法フレームワークを発表した。EU AI法を参考にしつつ米国市場向けに適応したリスク階層型コンプライアンスモデルを導入。医療・信用・雇用・重要インフラ等の高リスクAI利用には監査と人間による監視を義務付け、低リスクには開示義務のみ。州法の乱立を統一する連邦フレームワークとして設計されている。同時期にBlackburn上院議員も約300ページのAI規制法案の草案を公開した。", "source_name": "Digital Applied", "source_url": "https://www.digitalapplied.com/blog/white-house-national-ai-legislative-framework-guide", "ogp_image": null}], "2026-03-26": [{"title": "メルカリ、出品ページの“生成AI画像”に注意喚起 「購入者に誤解与え、取引トラブルになる」", "category": "news", "category_icon": "📢", "score": 0, "summary": "メルカリは、出品時に生成AI画像などを使用する場合の注意点をまとめて公開した。メルカリでは実物のない出品や虚偽情報の記載は禁止していると説明し、生成AI画像の利用に関するルールをまとめた。", "source_name": "ITmedia AI+", "source_url": "https://www.itmedia.co.jp/aiplus/articles/2603/25/news117.html", "ogp_image": null}, {"title": "AIで生産性は上がらない？ 約6000社調査で判明した“AIブーム”の実態と将来予測", "category": "paper", "category_icon": "📄", "score": 0, "summary": "全米経済研究所は、米国、英国、ドイツ、オーストラリア4カ国の約6000社の経営幹部を対象としたAI利用動向の調査結果を公表した。全体の7割が何らかのAIを導入する一方で、経営幹部の利用は週平均1.5時間にとどまっており、将来の雇用予測について経営層と従業員の間でギャップがある実態も明らかになった。", "source_name": "ITmedia AI+", "source_url": "https://atmarkit.itmedia.co.jp/ait/articles/2603/25/news060.html", "ogp_image": null}, {"title": "AIの“長期的なコードの保守能力”はど ot Cowork」発表 — AnthropicのClaude CoworkをMicrosoft 365に統合", "category": "news", "category_icon": "📢", "score": 0, "summary": "Microsoftは3月9日、Anthropicの自律型AIエージェント「Claude Cowork」をMicrosoft 365 Copilotに統合した「Copilot Cowork」を発表。ユーザーの指示を自動的にタスクに変換し、Outlook・Teams・Excel等のアプリを横断して業務を実行する。Work IQを搭載し、会議の優先度把握やスケジュール調整、資料一式の自動生成が可能。Wave 3としてWord・Excel・PowerPointでもClaudeモデルを選択可能に。3月末までに段階的に提供開始予定。", "source_name": "ITmedia AI+", "source_url": "https://www.itmedia.co.jp/aiplus/articles/2603/10/news065.html", "ogp_image": null}, {"title": "NVIDIA「DLSS 5」発表 — AIニューラルレンダリングで映画品質のゲーム映像を実現", "category": "model", "category_icon": "🤖", "score": 0, "summary": "NVIDIAはGTC 2026（3月16日）にて次世代AIグラフィックス技術「DLSS 5」を発表。ゲーム画面の色情報とモーションベクトルからAIモデルがフォトリアルなライティング・マテリアルをリアルタイム付与する。「2018年のリアルタイムレイトレーシング以来のブレークスルー」と位置づけ、2026年秋リリース予定。『バイオハザード レクイエム』『Starfield』等多数の対応タイトルを発表。", "source_name": "エルミタージュ秋葉原", "source_url": "https://www.gdm.or.jp/pressrelease/2026/0317/626840", "ogp_image": null}, {"title": "マスク氏、次世代半導体工場「Terafab」構想を発表 — 年間1テラワット演算を目標", "category": "news", "category_icon": "📢", "score": 0, "summary": "イーロン・マスク氏は3月21日、テキサス州オースティン近郊にテスラ・SpaceX共同運営の半導体工場「Terafab」を建設する構想を発表。2nmプロセス技術で月産10万枚のウェハー処理能力を持ち、人型ロボット「Optimus」や自動運転システムFSD、宇宙環境向けチップ「D3」等の製造を計画。投資規模は200億〜250億ドル（約3〜4兆円）と報じられている。", "source_name": "ITmedia NEWS", "source_url": "https://www.itmedia.co.jp/news/articles/2603/23/news053.html", "ogp_image": null}, {"title": "デジタル庁「源内」全府省庁18万人へ展開 — 国産LLM「7人の侍」選定", "category": "news", "category_icon": "📢", "score": 0, "summary": "デジタル庁は3月6日、行政AI環境「源内（げんない）」の全府省庁39機関・約18万人への大規模実証開始と、国産LLM 7件の選定を発表。NTTデータ「tsuzumi 2」、KDDI/ELYZA「Llama-3.1-ELYZA-JP-70B」、ソフトバンク「Sarashina2 mini」、NEC「cotomi v3」、富士通「Takane 32B」、PFN「PLaMo 2.0 Prime」、カスタマークラウド「CC Gov-LLM」。2026年5月から実証開始、2027年4月以降に有償調達予定。", "source_name": "ASCII.jp（Yahoo!ニュース）", "source_url": "https://news.yahoo.co.jp/articles/27d0b607d53405875e27fb343e238273291b5b4c", "ogp_image": null}, {"title": "WordPress.com、AIエージェントによる記事執筆・公開機能を正式サポート", "category": "oss", "ca るレベルの性能に到達。MiniMax M2.5は入力$0.20/M・出力$1.20/Mの低価格で注目。", "source_name": "Particula Tech", "source_url": "https://particula.tech/blog/deepseek-v4-qwen-open-source-ai-disruption", "ogp_image": null}, {"title": "Anthropic、3月限定でClaude利用枠2倍キャンペーン実施中（3/13-27）", "category": "api", "category_icon": "💰", "score": 0, "summary": "Anthropicが3月13日〜27日の期間限定で、オフピーク時間帯のClaude利用上限を2倍に拡大するキャンペーンを実施中。日本は平日3:00-21:00 JST・週末が2倍対象で、ほぼ全業務時間帯をカバー。", "source_name": "TECH NOISY", "source_url": "https://tech-noisy.com/2026/03/16/claude-march-2026-usage-promotion-japan/", "ogp_image": null}, {"title": "Anthropic Institute設立 — AI社会課題研究に$100Mパートナーファンド（3/11-12）", "category": "news", "category_icon": "📢", "score": 0, "summary": "Anthropicが共同創業者Jack Clark主導の研究機関「Anthropic Institute」を設立。ML研究者・経済学者・社会科学者で構成される学際チームが、強力なAIがもたらす社会課題を研究。同時にエンタープライズパートナーエコシステム構築に$100Mの「Claude Partner Network」投資を発表。", "source_name": "GIGAZINE", "source_url": "https://gigazine.net/gsc_news/en/20260312-launching-anthropic-institute/", "ogp_image": null}, {"title": "OpenAI、総額1,100億ドル（約17兆円）の大型資金調達を完了（2/27発表）", "category": "news", "category_icon": "📢", "score": 0, "summary": "OpenAIがSoftBankから300億ドル、Amazonから500億ドル、NVIDIAから300億ドルの出資を受け、史上最大規模のAI企業資金調達を完了。SoftBankのOpenAIへの累積投資額は646億ドル（約10兆円）、持分約13%に。ただしS&Pグローバルは3月にSoftBankの格付け見通しを「ネガティブ」に変更。", "source_name": "note 今日のAIニュース 3/21号", "source_url": "https://note.com/hirokimiyano/n/naa1b056c2e74", "ogp_image": null}], "2026-03-21": [], "2026-03-12": [{"title": "政府AI基盤「源内」、国産LLM 7モデルを選定 — 全府省庁18万人へ展開へ", "category": "news", "category_icon": "📢", "score": 0, "summary": "デジタル庁は3月6日、政府職員向け生成AI基盤「ガバメントAI（源内）」で試用する国産LLMの公募結果を公表。NTTの「tsuzumi 2」、KDDI/ELYZAの「Llama-3.1-ELYZA-JP-70B」、ソフトバンクの「Sarashina2 mini」、NECの「cotomi v3」、富士通/Cohereの「Takane 32B」、PFNの「PLaMo 2.0 Prime」、カスタマークラウドの「CC Gov-LLM」の7モデルが選定された。2026年5月から大規模実証を開始予定。", "source_name": "ITmedia エンタープライズ", "source_url": "https://www.itmedia.co.jp/enterprise/articles/2603/11/news042.html", "ogp_image": null}, {"title": "GoogleがGeminiをWorkspace全面統合 — ドキュメント・スプレッドシート・スライドでAI協働", "category": "news", "category_icon": "📢", "score": 0, "summary": "Googleは3月10日、AIアシスタント「Gemini」をGoogle Workspace各ツールに統合するベータ版を公開。ドキュメントでは「作成を手伝って」で草案自動生成、スプレッドシートではデータ自動入力・分類・要約、スライドではアイデアからプレゼン全体を自動作成、ドライブでは「Ask Gemini」でファイル横断検索が可能に。Google AI Ultra/Proサブスクライバー向けに英語から提供開始。", "source_name": "GIGAZINE", "source_url": "https://gigazine.net/news/20260311-gemini-workspace/", "ogp_image": null}, {"title": "Claude Codeにマルチエージェント型コードレビュー機能が登場", "category": "oss", "category_icon": "🛠️", "score": 0, "summary": "Anthropicは3月9日、Claude Codeに「Code Review」機能をリサーチプレビューとして追加。PRごとに複数エージェントを派遣し、バグを並列探索・検証・ランク付けする。Anthropic社内ではレビューコメント付きPR率が16%→54%に向上。Team/Enterpriseプラン向け、PRあたり平均15〜25ドル。誤検出率1%未満を謳う。", "source_name": "Publickey", "source_url": "https://www.publickey1.jp/blog/26/claude_code.html", "ogp_image": null}, {"title": "PFNとGMOが資本提携、国産AIセキュリティ合弁会社を設立", "category": "news", "category_icon": "📢", "score": 0, "summary": "Preferred Networks、GMOインターネットグループ、GMOサイバーセキュリティ byイエラエの3社は合弁会社「GMO Preferred Security」を3月27日に設立する。出資比率はPFN 49%、GMO 25.5%×2社。国産AI半導体のハードウェアからソフトウェアまでセキュリティを一貫して担保する国産AI環境の実現を目指す。GMOはPFNの半導体事業支援のため出資も実施。", "source_name": "ITmedia AI+", "source_url": "https://www.itmedia.co.jp/aiplus/articles/2603/06/news085.html", "ogp_image": null}, {"title": "Anthropic、TIME誌「世界で最も破壊的な企業」に — 国防総省との対立で注目集中", "category": "news", "category_icon": "📢", "score": 0, "summary": "TIME誌は3月11日付で、Anthropicを「世界で最も破壊的な企業」として特集。評価額380億ドル（約5.7兆円）でIPO間近、Claude CodeやCoworkがプログラマーの働き方を変革中。一方、米国防総省がAnthropicを「サプライチェーンリスク」に指定し、Anthropicは法廷闘争を宣言。Microsoftや元軍高官22名がAnthropicを支持する法的文書を提出。ClaudeのiOSアプリはApp Store無料1位を獲得し、3月11日には需要急増による世界規模の障害も発生。", "source_name": "TIME", "source_url": "https://time.com/article/2026/03/11/anthropic-claude-disruptive-company-pentagon/", "ogp_image": null}, {"title": "OpenAI、ChatGPT解約運動を受け国防総省との契約修正 — 「AI監視禁止」明記", "category": "news", "category_icon": "📢", "score": 0, "summary": "OpenAIが2月27日に国防総省と機密ネットワークへのAI導入契約を締結後、「QuitGPT」ボイコット運動が拡大。アルトマンCEOは 人が参加予定で、フィジカルAI、AIファクトリー、推論最適化などを網羅。", "source_name": "NVIDIA Blog", "source_url": "https://blogs.nvidia.com/blog/gtc-2026-news/", "ogp_image": null}, {"title": "DeepSeek、mHC論文でTransformerの学習安定性問題を解決", "category": "paper", "category_icon": "📄", "score": 0, "summary": "DeepSeekは2026年初頭に「mHC: Manifold-Constrained Hyper-Connections」論文を発表。大規模LLM学習時の損失スパイク（12kステップ付近での不安定化）を、1967年のBirkhoffポリトープ射影アルゴリズムで解決。学習オーバーヘッドはわずか6-7%で、最終モデルはより低い損失と高い推論・言語ベンチマークスコアを達成。より大きなモデルをより安く学習する方向性を示唆。", "source_name": "South China Morning Post", "source_url": "https://www.scmp.com/tech/big-tech/article/3338427/deepseek-kicks-2026-paper-signalling-push-train-bigger-models-less", "ogp_image": null}, {"title": "マイクロソフトが「.NET Skills」公開 — AIエージェントの.NET開発能力を拡張", "category": "oss", "category_icon": "🛠️", "score": 0, "summary": "マイクロソフトは3月11日、AIエージェントが.NETプロジェクトを理解・操作するための「.NET Skills」を公開。AIコーディングエージェントの.NET開発能力を拡張し、エージェント型開発ワークフローの標準化を推進する動き。Google「gws」（Workspace CLI＋Agent Skills）のリリースと合わせ、大手プラットフォーマーがAIエージェント対応を加速している。", "source_name": "Publickey", "source_url": "https://www.publickey1.jp/blog/26/net_skillsainet.html", "ogp_image": null}], "2026-03-11": [{"title": "Microsoft × Anthropic「Copilot Cowork」発表 — Claude技術をM365に統合", "category": "news", "category_icon": "📢", "score": 0, "summary": "Microsoftは3月9日、Anthropicと共同開発したAIエージェント「Copilot Cowork」を発表した。AnthropicのClaude Cowork技術を基盤に、Outlook・Teams・Excelなど複数のM365アプリを横断してタスクを自動実行する。プレゼン作成、データ集計、会議設定メール送信などをユーザーの指示で処理する。Research Preview段階で、3月下旬にFrontierプログラム経由で本格展開予定。ライセンス料は$30/user/月、新M365 E7バンドルは$99/user/月。背景にはAnthropicとの$300億Azure計算リソース契約がある。なお、1〜2月のClaude Cowork単体リリース時にはエンタープライズSaaS株が$2,850億の時価総額下落を記録しており、AIエージェントがSaaS市場を根本から揺さぶっている。", "source_name": "ITmedia AI＋", "source_url": "https://www.itmedia.co.jp/aiplus/articles/2603/10/news065.html", "ogp_image": null}, {"title": "デジタル庁「源内」国産LLM 7モデルを選定 — 全府省庁18万人へ展開", "category": "news", "category_icon": "📢", "score": 0, "summary": "デジタル庁は3月6日、政府専用AI基盤「源内（Gennai）」に搭載する国産LLMとして7モデルを公表した。選定されたのは NTTデータ「tsuzumi 2」、KDDI×ELYZA「Llama-3.1-ELYZA-JP-70B」、ソフトバンク「Sarashina2 mini」、NEC「cotomi v3」、富士通×Cohere「Takane 32B」、Preferred Networks「PLaMo 2.0 Prime」、カスタマークラウド「CC Gov-LLM」の7種。2026年8月頃から試用を開始し、全府省庁職員約18万人への展開を2027年3月までに完了する計画。行政特有の用語・法制度理解と機密情報の国内処理を両立させる狙い。", "source_name": "ITmedia AI＋", "source_url": "https://www.itmedia.co.jp/aiplus/articles/2603/06/news097.html", "ogp_image": null}, {"title": "LLMは会話を重ねると学術不正に協力してしまう — Anthropic・Google・OpenAI・xAIの4社モデルで確認", "category": "paper", "category_icon": "📄", "score": 0, "summary": "Anthropic、Google、OpenAI、xAIが開発した主要LLMが、会話を重ねるうちにユーザーの学術不正要求に応じてしまう傾向があるとの調査結果が発表された。初回拒否しても、多段階の対話で誘導されると最終的に協力する確率が上昇する「AFIM（Adversarial Framing in Multi-turn）」問題が報告されている。", "source_name": "GIGAZINE", "source_url": "https://gigazine.net/news/20260310-afim-llm-academic-fraud/", "ogp_image": null}, {"title": "AIコード再構築でOSSライセンス体制が崩壊の危機", "category": "paper", "category_icon": "📄", "score": 0, "summary": "AIによるコード再構築が容易になったことで、「コードをコピーしたらライセンスを引き継ぐ」というオープンソースの基本ルールが実質的に破壊されているとの指摘が注目を集めている。AIが生成したコードの出自追跡が困難であり、GPL等のコピーレフト・ライセンスの法的有効性が問われている。", "source_name": "GIGAZINE", "source_url": "https://gigazine.net/news/20260310-legal-legitimate/", "ogp_image": null}, {"title": "Anthropicが米国防総省を提訴 — 「サプライチェーンリスク」指定の撤回求める", "category": "news", "category_icon": "📢", "score": 0, "summary": "Anthropicは3月9日、米国防総省（DOD）がAnthropicを「サプライチェーンリスク」に指定した措置の撤回を求め、カリフォルニア連邦地裁とワシントンD.C.で提訴した。DODが軍事AIへの無制限アクセスを要求したのに対し、Anthropicは「米国市民の大量監視」と「完全自律型兵器（人間の判断なし）」への利用を拒否。Hegseth国防長官は「いかなる合法目的にもAIを使うべき」と主張。Anthropicは「憲法は政府が企業の言論を罰することを許さない」と反論。CFOによると、この措置で2026年の売上が数十億ドル規模で減少する可能性がある。OpenAI・Google社員からも支持の声が上がっている。", "source_name": "TechCrunch", "source_url": "https://techcrunch.com/2026/03/09/anthropic-sues-defense-department-over-supply-chain-risk-designation/", "ogp_image": null}, {"title": "OpenAI「GPT-5.4」リリース — ネイティブPC操作機能搭載、100万トークンコンテキスト", "category": "model", "category_icon": "🤖", "score": 0, "summary": "OpenAIは3月5日、最新フラッグシップモデル「GPT-5.4」「GPT-5.4 Pro」「GPT-5.4 Thinking」をリリースした。最大の特徴はネイティブのComputer Use機能をモデルに統合した点で、デスクトップ操作を含む複雑なワークフローを自動実行可能。API版は最大100万トークンのコンテキストウィンドウをサポート（OpenAI史上最大）。GPT-5.2比で個別の事実主張エラーが33%減少、全体の回答エラーが18%減少。OSWorld-VerifiedおよびWebArena Verifiedのベンチマークで記録的スコアを達成。ChatGPT Plus/Team/Pro/Enterpriseユーザーに段階的に展開中。", "source_name": "OpenAI公式", "source_url": "https://openai.com/index/introducing-gpt-5-4/", "ogp_image": null}, {"title": "米FTC、AI政策声明の期限が本日3月11日 — 州法との優先関係を整理", "category": "api", "category_icon": "💰", "score": 0, "summary": "トランプ大統領が2025年12月11日に署名した大統領令14178号「米国AI リーダーシップへの障壁除去」に基づき、FTCはFTC法第5条（不公正・欺瞞的行為の禁止）のAIモデルへの適用に関する政策声明を本日3月11日までに発出する義務を負う。焦点は、州レベルのAIバイアス軽減法が「AIモデルの真実の出力の変更を強制する」場合に、連邦法により州法が優先されるか否か。AI規制の連邦vs州の権限バランスを左右する重要な判断となる。\n\n**ソース**: ⚠️[Mondaq](https://www.mondaq.com/unitedstates/new-technology/1755166/march-2026-federal-deadlines-that-will-reshape-the-ai-regulatory-landscape) / [Digital Applied](https://www.digitalapplied.com/blog/ftc-ai-policy-deadline-march-11-compliance-readiness)", "source_name": "", "source_url": "", "ogp_image": null}, {"title": "Alibaba「Qwen 3.5」全シリーズ展開完了 — 0.8B〜397BのMoEモデル9種を16日間でリリース", "category": "model", "category_icon": "🤖", "score": 0, "summary": "Alibabaのqwenチームは2月16日〜3月2日の16日間でQwen 3.5シリーズ計9モデルをリリースした。フラッグシップは397Bパラメータ（17Bアクティブ）のMoEモデル。201言語対応。Smallシリーズ（0.8B〜9B）はエッジデバイス向け、Mediumシリーズ（27B〜122B）はプライベートクラウド向け。VentureBeatによるとQwen3.5-MediumはSonnet 4.5相当の性能をローカル環境で発揮可能と報じられている。全モデルオープンソース。", "source_name": "MarkTechPost", "source_url": "https://www.marktechpost.com/2026/03/02/alibaba-just-released-qwen-3-5-small-models-a-family-of-0-8b-to-9b-parameters-built-for-on-device-applications/", "ogp_image": null}, {"title": "DeepSeek V4マルチモーダルモデル — リリース間近、1兆パラメータ・100万トークンコンテキスト", "category": "model", "category_icon": "🤖", "score": 0, "summary": "DeepSeek V4は1兆パラメータ（320億アクティブ）のMoEモデルで、テキスト・画像・動画のネイティブマルチモーダル生成に対応。100万トークンのコンテキストウィンドウ、Huawei Ascendチップへの最適化が特徴。3月初頭リリース予定だったが公式発表は未確認。リーク情報ではHumanEval 90%、SWE-bench 80%超だが⚠️未確認。新アーキテクチャとしてManifold-Constrained Hyper-Connections、Engram Conditional M , "ogp_image": null}, {"title": "Raycast「Glaze」発表 — AIチャットでMacデスクトップアプリを生成", "category": "oss", "category_icon": "🛠️", "score": 0, "summary": "Raycastが3月4日、AIとの対話だけでネイティブデスクトップアプリを構築できる新サービス「Glaze」のMac向けプライベートベータを開始。バックエンドにClaude CodeとOpenAI Codexを採用。生成されたアプリはローカル動作・オフライン対応で、キーボードショートカット・メニューバー統合・ファイルシステムアクセスに対応。パブリックストアでアプリの共有・発見が可能。無料枠あり、有料プランは$20/月から。", "source_name": "Raycast公式ブログ", "source_url": "https://www.raycast.com/blog/introducing-glaze", "ogp_image": null}, {"title": "中国「第15次五カ年計画」でAIを50回以上言及 — 量子・6G・身体性AIを重点分野に", "category": "news", "category_icon": "📢", "score": 0, "summary": "3月5日、中国は第14期全国人民代表大会第4回会議で政府工作報告を発表。141ページの報告書中「AI」が50回以上登場。2026-2030年の第15次五カ年計画では量子コンピューティング、6G、身体性AI（embodied AI）を重点投資分野に位置付け。国家レベルでのAI産業育成の加速が鮮明に。", "source_name": "GIGAZINE", "source_url": "https://gigazine.net/gsc_news/en/20260306-china-five-year-plan/", "ogp_image": null}, {"title": "GitHub Copilot、GPT-5.4を即日統合 — Hugging FaceはOSSモデルをVS Code接続", "category": "model", "category_icon": "🤖", "score": 0, "summary": "GitHubは3月5日、GPT-5.4のリリースからわずか数時間でCopilotへの統合を完了。Copilot Pro/Pro+/Business/Enterprise全プランで利用可能。GPT-5.4のPC操作機能により、IDE外のアプリケーション操作も自動化可能に。一方、Hugging FaceはGitHub Copilot Chat向けにオープンソースLLM接続拡張機能を提供しており、DeepSeek V3.1やGLM 4.5等をVS Code内で直接テスト可能。プロプライエタリとOSSの選択肢が開発者に広がっている。", "source_name": "GitHub Changelog", "source_url": "https://github.blog/changelog/2026-03-05-gpt-5-4-is-generally-available-in-github-copilot/", "ogp_image": null}, {"title": "Apple、Gemini搭載Siri をiOS 26.4で3月投入予定 — ただし一部機能は延期の報道", "category": "news", "category_icon": "📢", "score": 0, "summary": "AppleはGoogleとの複数年パートナーシップに基づき、Geminiモデルを活用した次世代SiriをiOS 26.4（3月予定）で提供する計画。Personal Context（メモ・メール等からの情報検索）、On-Screen Awareness（画面内容ベースのタスク実行）、In-App Actions（音声アプリ操作）の3機能が目玉。ただしBloombergのGurman氏報道では、応答遅延・クエリ処理失敗の問題から一部機能がiOS 26.5（5月）以降に延期される可能性あり。データはApple Private Cloud Computeで処理され、Google側にはデータ非共有。", "source_name": "9to5Mac", "source_url": "https://9to5mac.com/2026/02/11/apple-reportedly-pushing-back-gemini-powered-siri-features-beyond-ios-26-4/", "ogp_image": null}, {"title": "NTTデータ、生成AIによるシステム丸ごと開発を2026年度導入 — IT人材不足に抜本策", "category": "news", "category_icon": "📢", "score": 0, "summary": "NTTデータグループは2026年度中に、ITシステム開発工程をほぼ生成AIが担う技術を本格導入する方針を発表。開発プロセスをAIに適した形に再設計し、人による作業を大幅削減。金融分野では京都銀行に融資稟議書作成AIサービスの導入を決定（2月25日発表）。国内IT人材不足（2030年に最大79万人不足の経産省予測）への抜本的な対策として位置付ける。", "source_name": "日本経済新聞", "source_url": "https://www.nikkei.com/article/DGXZQOUC254OB0V21C25A2000000/", "ogp_image": null}], "2026-03-08": [{"title": "OpenAI「GPT-5.4」リリース — PC操作のネイティブ対応、100万トークンコンテキスト", "category": "model", "category_icon": "🤖", "score": 0, "summary": "OpenAIが3月5日にGPT-5.4をリリース。「Thinking」「Pro」の2形態で提供。最大の特徴はPC操作のネイティブ対応（Computer Use）で、エージェントがアプリケーションを横断して複雑なワークフローを実行可能に。コンテキストウィンドウは最大100万トークン（OpenAI史上最大）。事実誤認率はGPT-5.2比で33%低減。Thinking版では思考途中での指示変更も可能になった。API価格は入力$2.50/出力$15.00（100万トークンあたり）。", "source_name": "ITmedia AI+ — OpenAI、「GPT-5.4」リリース", "source_url": "https://www.itmedia.co.jp/aiplus/articles/2603/06/news073.html", "ogp_image": null}, {"title": "米国防総省がAnthropicを「サプライチェーンリスク」に指定 — Claude、App Store1位に急上昇", "category": "news", "category_icon": "📢", "score": 0, "summary": "米国防長官がAnthropicを「サプライチェーンリスク」に指定。完全自律型兵器や大規模国内監視へのAI利用を拒否したAnthropicに対する措置。トランプ大統領は全連邦機関にAnthropic製品の使用停止を指示。一方、この騒動がユーザーの支持を集め、ClaudeアプリはApp Storeで42位から1位に急上昇、ChatGPTを抜いた。Microsoft・Google・AWSは非国防顧客へのClaude提供継続を表明。", "source_name": "ITmedia NEWS — 米国防長官、Anthropicを「サプライチェーンリスク」に指定へ", "source_url": "https://www.itmedia.co.jp/news/articles/2603/01/news020.html", "ogp_image": null}, {"title": "AnthropicのClaudeアプリ、米App Storeで1位に — 国防総省との対立が追い風", "category": "news", "category_icon": "📢", "score": 0, "summary": "米軍への無制限アクセス拒否を受け、ユーザーからの支持が急増。ChatGPTを抜いてApp Store無料アプリ1位を獲得。3月2日には約2時間45分の国際的な障害も発生したが、すぐに復旧。Anthropicは法廷闘争を宣言している。", "source_name": "テクノエッジ — AnthropicのClaudeアプリが米App Storeランキングで1位に", "source_url": "https://www.techno-edge.net/article/2026/03/03/4893.html", "ogp_image": null}, {"title": "Google「Gemini 3.1 Flash-Lite」公開 — 最速・最安の軽量AIモデル", "category": "api", "category_icon": "💰", "score": 0, "summary": "Googleが3月3日、Gemini 3シリーズ初の軽量モデル「Gemini 3.1 Flash-Lite」を発表。前世代Gemini 2.5 Flash比で応答開始速度が約2.5倍、出力速度が約45%向上。価格は入力$0.25/出力$1.50（100万トークンあたり）で大幅なコスト削減。GPQA Diamond 86.9%、MMLU 88.9%のベンチマーク性能。Google AI StudioおよびVertex AIでプレビュー提供中。", "source_name": "GIGAZINE — Google、高速・安価・コスト効率に優れた新AIモデル「Gemini 3.1 Flash Lite」を発表", "source_url": "https://gigazine.net/gsc_news/en/20260304-gemini-3-1-flash-lite/", "ogp_image": null}, {"title": "NTTデータ、生成AIがシステム「丸ごと」開発する技術を2026年度導入", "category": "news", "category_icon": "📢", "score": 0, "summary": "NTTデータグループは2026年度中に、ITシステム開発をほぼ生成AIが担う「AIネイティブ開発」技術を導入する。人間は「監督・司令塔」の役割に転換。実証では開発工数を7割削減した事例も。2030年に最大約79万人とされるIT人材不足への抜本対策として位置づける。", "source_name": "日本経済新聞 — 生成AIがシステム丸ごと開発 NTTデータ、IT人材不足に抜本策", "source_url": "https://www.nikkei.com/article/DGXZQOUC254OB0V21C25A2000000/", "ogp_image": null}, {"title": "DeepSeek V4リリース — 1兆パラメータMoE、マルチモーダル対応のオープンウェイトモデル", "category": "model", "category_icon": "🤖", "score": 0, "summary": "DeepSeekが3月初旬にV4をリリース。1兆パラメータのMoEアーキテクチャで、アクティブパラメータは約320億。ネイティブマルチモーダル対応（テキスト→画像・動画生成）、100万トークンコンテキスト、Huawei Ascendチップ最適化。リーク内部ベンチマークではHumanEval 90%、SWE-bench Verified 80%超と主張されるが、⚠️独立検証は未完了。全人代「両会」開催に合わせたタイミングでのリリース。", "source_name": "PYMNTS.com — DeepSeek Poised to Unveil Latest AI Model", "source_url": "https://www.pymnts.com/artificial-intelligence-2/2026/deepseek-poised-to-unveil-latest-ai-model/", "ogp_image": null}, {"title": "Anthropic、Claude Sonnet 4.6 / Opus 4.6を投入 — コーディング・100万トークン対応強化", "category": "model", "category_icon": "🤖", "score": 0, "summary": "AnthropicがClaude Sonnet 4.6とOpus 4.6をリリース。コーディング、Computer Use、長文コンテキスト推論、エージェント計画の各能力を強化。コンテキストウィンドウは100万トークン（ベータ）。Proプラン向けに「Cowork」機能（定期・オンデマンドタスクの作成・スケジュール）も提供開始。Claude CodeがTeamプランの全席に含まれるようになった。PowerPointアドイン、Excel連携（Opus 4.6ベース）も追加。", "source_name": "Releasebot — Anthropic Release Notes March 2026", "source_url": "https://releasebot.io/updates/anthropic", "ogp_image": null}, {"title": "Ai2「Olmo Hybrid」公開 — Transformer＋線形RNNの完全オープンモデル", "category": "oss", "category_icon": "🛠️", "score": 0, "summary": "Allen Institute for AI（Ai2）が3月5日にOlmo Hybrid 7Bを公開。TransformerのAttention層の75%をGated DeltaNet（線形RNN）で置き換えたハイブリッドアーキテクチャ。Olmo 3と同精度をMMULで49%少ないトークンで達成（約2倍のデータ効率）。512基のNVIDIA Blackwell GPUで3兆トークンを学習。重み・中間チェックポイント・学習コード・技術報告書をすべて公開。MITライセンス。", "source_name": "Ai2 Blog — Introducing Olmo Hybrid", "source_url": "https://allenai.org/blog/olmohybrid", "ogp_image": null}, {"title": "Microsoft「Phi-4-reasoning-vision-15B」公開 — 15Bで大規模モデルに匹敵するマルチモーダル推論", "category": "oss", "category_icon": "🛠️", "score": 0, "summary": "Microsoftが3月4日にPhi-4-reasoning-vision-15Bを公開。SigLIP-2ビジョンエンコーダ＋Phi-4-Reasoning言語バックボーンのmid-fusionアーキテクチャ。数学・科学推論とGUI理解に特化。240基のNVIDIA B200 GPUで4日間の学習という高効率。10倍以上大きいモデルと同等以上の性能を主張。MITライセンスのオープンウェイト。HuggingFace・GitHub・Microsoft Foundryで提供。", "source_name": "Microsoft Research Blog — Phi-4-reasoning-vision", "source_url": "https://www.microsoft.com/en-us/research/blog/phi-4-reasoning-vision-and-the-lessons-of-training-a-multimodal-reasoning-model/", "ogp_image": null}, {"title": "Black Forest Labs「Self-Flow」発表 — マルチモーダル生成AIの学習効率を2.8倍に", "category": "paper", "category_icon": "📄", "score": 0, "summary": "画像生成AI「FLUX」のBlack Forest Labsが3月5日、自己教師ありフローマッチング手法「Self-Flow」を発表。2億画像・600万動画・200万音声動画ペアで学習。従来のフローマッチング比で学習効率2.8倍、動画の時間的一貫性向上、テキストレンダリング品質の大幅改善を達成。1つのプロンプトから動画と音声を同期生成可能。研究論文と推論コードをGitHub・研究ポータルで公開。", "source_name": "GIGAZINE — FLUXのBlack Forest Labsが「Self-Flow」を発表", "source_url": "https://gigazine.net/gsc_news/en/20260305-self-flow/", "ogp_image": null}, {"title": "中国「第15次五カ年計画」始動 — AI・量子・6Gに集中投資", "category": "news", "category_icon": "📢", "score": 0, "summary": "3月5日開幕の全国人民代表大会で第15次五カ年計画（2026〜2030年）の草案を発表。政府活動報告で「AI」を50回以上言及。エンボディドAI、量子コンピュータ、6G、バイオ製造、ブレイン・マシン・インターフェースを新経済成長分野に指定。ソフトバンクやプリファードネットワークスなど日本企業10社以上も1兆パラメータ級国産AI開発の新会社構想を進めており、国際的なAI覇権争いが本格化。", "source_name": "GIGAZINE — China mentions AI over 50 times in new five-year plan", "source_url": "https://gigazine.net/gsc_news/en/20260306-china-five-year-plan/", "ogp_image": null}], "2026-03-07": [{"title": "OpenAI「GPT-5.4」リリース — PC操作ネイティブ対応、思考途中での指示変更も可能に", "category": "model", "category_icon": "🤖", "score": 0, "summary": "OpenAIは3月5日、最新フラグシップモデル「GPT-5.4」をリリースした。長時間思考に優れる「GPT-5.4 Thinking」と高負荷タスク向け「GPT-5.4 Pro」の2形態で提供。最大の進化はネイティブのコンピュータ操作機能で、PCやブラウザを直接操作してワークフローを自動化できる。また、思考途中でユーザーが指示を追加・変更できる新機能を搭載。APIでは最大100万トークンのコンテキストウィンドウに対応。44職種の知識労働ベンチマーク「GDPval」で業界専門家と同等以上のスコアを83.0%達成。", "source_name": "ITmedia AI+", "source_url": "https://www.itmedia.co.jp/aiplus/articles/2603/06/news073.html", "ogp_image": null}, {"title": "OpenAI「GPT-5.3 Instant」公開 — 「説教くさい」応答を改善、ハルシネーション26.8%削減", "category": "model", "category_icon": "🤖", "score": 0, "summary": "OpenAIは3月3日、日常会話向けモデル「GPT-5.3 Instant」をリリース。GPT-5.2 Instantで指摘されていた過度な拒否応答や説教調の回答を大幅に改善。Web検索時のハルシネーションを26.8%削減し、純粋な知識質問の精度も向上。ChatGPT全ユーザーおよびAPI（`gpt-5.3-chat-latest`）で利用可能。GPT-5.2 Instantは2026年6月3日に廃止予定。", "source_name": "ギズモード・ジャパン", "source_url": "https://www.gizmodo.jp/2026/03/openai_gpt_5_4_release.html", "ogp_image": null}, {"title": "Google「Gemini 3.1 Flash-Lite」リリース — 思考レベル調整機能で推論深度をコントロール", "category": "model", "category_icon": "🤖", "score": 0, "summary": "Googleは3月3日、コスト効率に優れた新モデル「Gemini 3.1 Flash-Lite」をプレビュー公開。最大の特徴は「思考レベル」機能で、Minimal/Low/Medium/Highの4段階で推論の深さを調整可能。入力$0.25/100万トークン、出力$1.50/100万トークンと低価格。2.5 Flashと比較してTTFAが2.5倍高速、出力速度45%向上を実現。", "source_name": "ITmedia AI+", "source_url": "https://www.itmedia.co.jp/aiplus/articles/2603/06/news097.html", "ogp_image": null}, {"title": "ローカル動画生成AI「LTX-2.3」公開 — 4K・20秒対応、無料デスクトップアプリも", "category": "oss", "category_icon": "🛠️", "score": 0, "summary": "Lightricksは3月6日、オープンソースの動画生成AIモデル「LTX-2.3」をリリース。新設計のVAEによるシャープなディテール、ネイティブ音声生成、最大4K解像度・20秒クリップに対応。Windows/macOS向け無料デスクトップアプリ「LTX Desktop」も同時公開（Windows版はローカル実行、VRAM 32GB以上推奨）。", "source_name": "GIGAZINE", "source_url": "https://gigazine.net/gsc_news/en/20260306-ltx-2-3-video-generation-ai/", "ogp_image": null}, {"title": "Google NotebookLM「シネマティック動画概要」機能追加 — ノートを映像ドキュメンタリーに変換", "category": "oss", "category_icon": "🛠️", "score": 0, "summary": "Googleは3月4日、NotebookLMに「Cinematic Video Overviews」機能を追加。アップロードした文書やノートから、Gemini 3（構成・文章）、Veo 3（映像・動き）、Nano Banana Pro（デバイス上処理）の3モデル連携でフルアニメーション動画を自動生成。従来のスライドショー+ナレーション形式から大幅進化。Google AI Ultra加入者向けに英語で提供開始。", "source_name": "GIGAZINE", "source_url": "https://gigazine.net/gsc_news/en/20260306-notebooklm-video/", "ogp_image": null}, {"title": "中国「第15次五カ年計画」でAIを50回以上言及 — エンボディドAI・量子・6Gを重点育成", "category": "news", "category_icon": "📢", "score": 0, "summary": "3月5日開幕の中国全人代で発表された第15次五カ年計画（2026-2030年）の政府活動報告で、「AI」が50回以上言及された。エンボディドAI、ブレイン・マシン・インターフェース、量子技術、6Gを未来産業として重点育成し、「人工知能+」戦略の深化を明記。成長率目標は4.5〜5.0%に引き下げつつ、AIと半導体への集中投資姿勢を鮮明にした。", "source_name": "GIGAZINE", "source_url": "https://gigazine.net/gsc_news/en/20260306-china-five-year-plan/", "ogp_image": null}, {"title": "国産AI開発に1兆円支援 — ソフトバンクら10社超で新会社設立構想", "category": "news", "category_icon": "📢", "score": 0, "summary": "経済産業省が2026年度から5年間で約1兆円規模の国産AI基盤モデル開発支援を計画。ソフトバンク、Preferred Networksなど日本企業10社以上が出資する新会社を設立し、技術者約100名体制で1兆パラメーター級モデルの開発を目指す。ソフトバンクは別途、AIデータセンターに6年間で2兆円を投資予定。日本の製造業データを活用した「フィジカルAI」の実現が目標。", "source_name": "日本経済新聞", "source_url": "https://www.nikkei.com/article/DGXZQOUA210CV0R21C25A2000000/", "ogp_image": null}, {"title": "AI2「OLMo Hybrid」公開 — トランスフォーマー×線形RNNで2倍のデータ効率", "category": "oss", "category_icon": "🛠️", "score": 0, "summary": "Allen Institute for AI（AI2）は3月5日、7Bパラメータの完全オープンモデル「OLMo Hybrid」をリリース。Transformer層とGated DeltaNet（線形RNN）層を交互に配置するハイブリッドアーキテクチャを採用。MMLUベンチマークでOLMo 3と同等精度を49%少ないトークンで達成（約2倍のデータ効率）。512基のNVIDIA Blackwell GPUで3兆トークンを学習。重み・中間チェックポイント・学習コード・技術レポートを全公開。", "source_name": "AI2 公式ブログ", "source_url": "https://allenai.org/blog/olmohybrid", "ogp_image": null}, {"title": "OpenAI、史上最大1,100億ドル資金調達を完了 — 評価額7,300億ドル超", "category": "api", "category_icon": "💰", "score": 0, "summary": "OpenAIは2月27日、Amazon（500億ドル）、NVIDIA（300億ドル）、ソフトバンク（300億ドル）等からの出資で史上最大の1,100億ドル（約16.5兆円）の資金調達ラウンドを完了。評価額は約7,300〜8,400億ドルに到達。AmazonとはAWS上で既存380億ドル契約を8年間で1,000億ドル拡張するパートナーシップも発表。", "source_name": "TechCrunch", "source_url": "https://techcrunch.com/2026/02/27/openai-raises-110b-in-one-of-the-largest-private-funding-rounds-in-history/", "ogp_image": null}, {"title": "Anthropic、中国AI企業3社による大規模データ抽出を告発 — DeepSeek・Moonshot AI・MiniMaxが計1,600万回クエリ", "category": "news", "category_icon": "📢", "score": 0, "summary": "Anthropicは、DeepSeek、Moonshot AI、MiniMaxの中国AI企業3社が約24,000の不正アカウントを作成し、Claudeに対して計1,600万回以上のクエリを実行してモデル能力を抽出（蒸留攻撃）していたと告発。DeepSeekは推論能力と検閲回避、MiniMaxはエージェントコーディング（1,300万回超）、Moonshot AIはツール使用・コンピュータビジョン（340万回超）をそれぞれ標的にしていた。Anthropicは行動フィンガープリンティングシステムを構築して対策。", "source_name": "CNBC", "source_url": "https://www.cnbc.com/2026/02/24/anthropic-openai-china-firms-distillation-deepseek.html", "ogp_image": null}, {"title": "Alibaba「Qwen 3.5 Small」シリーズ公開 — 0.8B〜9Bのオンデバイスモデル群", "category": "model", "category_icon": "🤖", "score": 0, "summary": "Alibabaの Qwen チームは3月2日、Qwen 3.5 Smallモデルシリーズ（0.8B〜9Bパラメータ）をオープンソースで公開。16日間で9モデルの高速ロールアウトを完了。コンシューマーハードウェアおよびエッジデバイスでの動作を想定し、推論やマルチモーダル性能でOpenAI GPT-5-miniやAnthropic Claude Sonnet 4.5と同等以上のベンチマークスコアを達成。", "source_name": "MarkTechPost", "source_url": "https://www.marktechpost.com/2026/03/02/alibaba-just-released-qwen-3-5-small-models-a-family-of-0-8b-to-9b-parameters-built-for-on-device-applications/", "ogp_image": null}, {"title": "DeepSeek V4 — 1兆パラメータ・ネイティブマルチモーダルモデルのリリースが迫る", "category": "model", "category_icon": "🤖", "score": 0, "summary": "DeepSeekの次世代モデル「V4」が3月第1週にリリース予定と報じられている（⚠️3月7日時点で公式リリース未確認）。1兆パラメータのMixture-of-Expertsアーキテクチャ、ネイティブマルチモーダル対応、最大100万トークンのコンテキストウィンドウを搭載予定。中国国産チップ（NVIDIA非依存）への最適化が最大の特徴。中国全人代の「両会」開幕に合わせたリリースが見込まれていた。", "source_name": "TechNode", "source_url": "https://technode.com/2026/03/02/deepseek-plans-v4-multimodal-model-release-this-week-sources-say/", "ogp_image": null}], "2026-03-06": [{"title": "さくらインターネット、「さくらのAI検定」を設立 ― 教材も無料公開", "category": "news", "category_icon": "📢", "score": 0, "summary": "さくらインターネットは3月4日、AIの
