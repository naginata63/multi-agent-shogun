  command_text: '殿原文: ぐんしにより精査せよ そっからかえるように ちゃんとコンテキスト注入の背景もつたえておけ


    === 背景 (殿との議論経緯) ===


    本日 (2026-05-03) Udemy 初級編 v4 ch03 で「.md仲間たち」(CLAUDE.md / agents / skills / commands
    / @import) を扱うため、自プロジェクトの @import 実装状況を確認したところ:

    - CLAUDE.md に `@path/file.md` 記法は **0件** (一切未使用)

    - instructions/*.md にも 0件

    - memory/MEMORY.md は通常 Markdown リンク `[title](file.md)` で auto-import ではない


    殿御指摘: 「変えた方が良くないか」→ 一部 @import 化を検討。


    === コンテキスト注入の重要原則 (殿御指摘・絶対遵守) ===


    **Claude Code の `@path/file.md` 記法は lazy load ではない・session start 時に全展開され常時 context
    に注入される**


    影響:

    - @import したファイルの内容は **毎セッションで context window を消費** する

    - 5階層まで再帰展開・循環防止あり (公式仕様)

    - これは MEMORY.md auto-load と同じ挙動


    意味:

    - 「該当タスク時のみ参照」を期待する文書 (procedures/*.md 等) を @import すると context 圧迫の原因

    - 「常に必要」な文書 (forbidden_actions・global safety rules) は @import 化して重複削減してよい


    === 軍師 audit タスク内容 ===


    ## Step 1: 現状把握

    以下のファイル群を全て読み、内容と「全エージェントで常時必要か」「特定タスク時のみ必要か」を判定:

    - /home/murakami/multi-agent-shogun/CLAUDE.md (auto-load 対象)

    - /home/murakami/multi-agent-shogun/instructions/shogun.md

    - /home/murakami/multi-agent-shogun/instructions/karo.md

    - /home/murakami/multi-agent-shogun/instructions/ashigaru.md

    - /home/murakami/multi-agent-shogun/instructions/gunshi.md

    - /home/murakami/multi-agent-shogun/instructions/git_safety.md

    - /home/murakami/.claude/projects/-home-murakami-multi-agent-shogun/memory/MEMORY.md
    (auto-load 対象)

    - /home/murakami/multi-agent-shogun/shared_context/procedures/*.md (Read on-demand)

    - /home/murakami/multi-agent-shogun/shared_context/qc_template.md

    - /home/murakami/multi-agent-shogun/shared_context/dashboard_api_usage.md (CLAUDE.md
    から参照されるが @import なし)


    ## Step 2: ファイル毎判定


    各ファイルについて以下の3カテゴリ判定:


    A) **@import 化推奨** ── 全エージェントが常時必要・他ファイルからも参照されている共通ルール

    B) **現状維持 (Read on-demand)** ── 特定タスク時のみ必要 (動画 ffmpeg・countdown 等)

    C) **重複削除/統合候補** ── 同じ内容が複数 instructions に散在しており共通化価値あり


    ## Step 3: 改修計画書


    判定結果を以下フォーマットで /tmp/cmd_1584_audit_report.md に出力:


    ```markdown

    # cmd_1584 軍師 audit レポート


    ## 1. ファイル毎判定一覧

    | ファイル | 判定 | 理由 | コンテキスト消費影響 |

    |---|---|---|---|

    | ... | A/B/C | ... | 増/減/中立 |


    ## 2. @import 化推奨セット

    ### CLAUDE.md に追加すべき @import 行

    - @shared_context/safety/destructive_ops.md (元: CLAUDE.md 内 Tier1-3 セクション切り出し)

    - @shared_context/safety/git_safety.md (元: CLAUDE.md 内 Git Safety Protocol)

    - ...


    ### 各 instructions/*.md に共通追加すべき @import

    - @instructions/shared/forbidden_common.md (元: 全エージェントの forbidden_actions 共通部)


    ## 3. 重複削減見積

    - CLAUDE.md 行数: X → Y (Z%削減)

    - instructions 合計行数: X → Y (Z%削減)


    ## 4. コンテキスト総消費見積

    - 現状 (auto-load 合計): X tokens

    - 改修後: Y tokens (差分 ±Z)

    - procedures/*.md は **@import 化しない** ことを明示


    ## 5. リスクと注意

    - @import 化で auto-load 範囲が増える可能性

    - 対策: ...


    ## 6. 推奨実装フェーズ

    Phase 1: ...(最小リスク・最大効果)

    Phase 2: ...

    ```


    ## Step 4: 軍師→家老→殿 報告


    - 軍師は audit_report.md を完成 → karo inbox へ通知 (POST /api/inbox_write)

    - 家老は内容確認 → MCP dashboard 🚨要対応に「cmd_1584 audit 完了・殿レビュー要」を記載

    - 殿レビュー後、別 cmd で実装 (家老→足軽)


    === 完了条件 ===


    - 軍師 audit が上記フォーマットで /tmp/cmd_1584_audit_report.md に出力済

    - ファイル毎判定が全候補ファイルを網羅

    - @import 化推奨セットが具体的なファイル名 + 切り出し範囲で明示されている

    - procedures/*.md が @import 化対象外であることを明記 (殿御指摘の context 注入原則)

    - karo inbox 通知済 + dashboard 🚨要対応 記載済

    - 殿レビュー前に実装に着手しない (本 cmd は audit のみ)'
