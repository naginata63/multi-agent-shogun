    ## 名前

    `lecture-speaker-notes-grep-check`


    ## 配置

    `/home/murakami/multi-agent-shogun/skills/lecture-speaker-notes-grep-check/`


    ## 機能

    Marp lecture .md ファイル群に対し、以下を grep ベースで自動検証:

    1. **speaker notes 存在**: 各スライドに HTML コメント形式の speaker note (<!-- ... -->) が含まれているか

