  command: "## 殿原文\n\n「'/home/murakami/multi-agent-shogun/projects/dozle_kirinuki/work/20260426_86万トンの超巨大なダムを掘るまで終われません！【マイクラ】/tono_edit.mkv'\n\
    縦長にクロップして非公開アップ」\n\n## 素材メタ (確認済)\n\n- パス: /home/murakami/multi-agent-shogun/projects/dozle_kirinuki/work/20260426_86万トンの超巨大なダムを掘るまで終われません！【マイクラ】/tono_edit.mkv\n\
    - サイズ: 802MB / ffv1 (lossless) / flac\n- 解像度: 3412x1918 (≒16:9・編集中間ファイル)\n- 尺:\
    \ 26.592秒\n- fps: 30000/1001 (29.97)\n\n## やること\n\n### Step 1: クロップ仕様確定 (殿確認推奨)\n\
    \n3412x1918 → 9:16 (1080x1920) への変換は3案:\n\n| 案 | 内容 | 残映像領域 |\n|----|------|-----------|\n\
    | A: 中央縦切出し | crop=1078x1918:x=(3412-1078)/2:y=0 → scale=1080x1920 | 中央縦帯のみ |\n\
    | B: 全体収納+黒帯 | scale=fit 1080x1920 (上下黒帯) | 全画面表示 |\n| C: 全体+背景blur | 全体scaleの背景に元映像をblur拡大して埋め\
    \ | 縦長映え |\n\n**家老は殿に A/B/C いずれか確認してから進めよ**。デフォルト案は **C (背景blur+前面fit)** が殿好みのShortsスタイル\
    \ (過去のショート参照)。\n\n### Step 2: ショート向けエンコード\n\n```bash\nF=/usr/share/fonts/opentype/noto/NotoSansCJK-Bold.ttc\n\
    IN='.../tono_edit.mkv'\nOUT='.../tono_short_vertical.mp4'\n\n# 案C (背景blur+前面fit)\
    \ 例:\nffmpeg -y -i \"$IN\" \\\n  -filter_complex \"[0:v]split=2[bg][fg]; \\\n\
    \     [bg]scale=1080:1920:force_original_aspect_ratio=increase,crop=1080:1920,gblur=sigma=30[bgblur];\
    \ \\\n     [fg]scale=1080:-2[fgs]; \\\n     [bgblur][fgs]overlay=(W-w)/2:(H-h)/2\"\
    \ \\\n  -c:v h264_nvenc -preset p4 -rc constqp -qp 18 -profile:v high -pix_fmt\
    \ yuv420p \\\n  -c:a aac -b:a 192k -ar 48000 \\\n  \"$OUT\"\n```\n\n- NVENC必須\
    \ (libx264禁止・shared_context/procedures/ffmpeg_nvenc.md)\n- 音声 flac→aac 192kbps\
    \ 48kHz\n- 出力 mp4 (Shorts要件)\n- Pixel format yuv420p (互換性)\n\n### Step 3: タイトル・説明欄ドラフト\
    \ (家老作成・殿確認)\n\n- タイトル候補: 殿編集中間の内容を見て家老/足軽が3案提示\n  - ただし shorts_knowledge.md 参照\
