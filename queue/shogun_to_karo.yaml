    ```yaml

    ---

    name: lecture-speaker-notes-grep-check

    description: Marp lecture .md の speaker notes 完備・講師名・禁止用語を自動検証する Skill。Udemy 講座制作の
    QC で利用。

    tools: [Bash, Read, Grep]

    ---

    ```


    ### SKILL.md 本文

