  project: multi-agent-shogun
  north_star: エラー垂れ流しは殿の戦況把握を阻害し誤検知化する。根因切り分けと対処方針 (修正cmd起票 / 黙殺ルール / 監視除外) を確定させ、ntfy
    信号品質を取り戻す。
  lord_original: ntfyにエラーいっぱいきてるの軍師にかいせきさせろ
  command: "## 殿原文\n\n「ntfyにエラーいっぱいきてるの軍師にかいせきさせろ」\n\n## 担当\n\n**軍師 (gunshi)** が解析担当。家老は軍師にinbox通知してアサイン。足軽は使わない。軍師単独タスク。\n\
    \n## やること\n\n### Step 1: 入力収集\n\n```bash\n# 直近24時間のntfy通知ログ\ntail -500 queue/ntfy_sent.log\
    \ > /tmp/ntfy_recent.log\n# 直近24時間の各エラーログ実体\ntail -200 logs/litestream.log logs/advisor_proxy.log\
    \ logs/semantic_index_hook.log logs/semantic_update.log logs/cron_health_check.log\
    \ 2>/dev/null > /tmp/error_logs.txt\nls -la /tmp/ntfy_recent.log /tmp/error_logs.txt\n\
    ```\n\n### Step 2: エラーカテゴリ分け\n\n直近観測されている silent_fail 系を以下軸で分類:\n\n| カテゴリ | 想定\
    \ | 例 |\n|---------|------|-----|\n| C01 | Embedding API失敗 | dedup WARN: 404 NOT_FOUND\
    \ |\n| C02 | Python Traceback | 詳細不明 |\n| C04 | Python Traceback | 詳細不明 |\n| C05\
    \ | dashboard_lifecycle failed | continuing |\n| C09 | YAML parse error | gunshi_report_qc_1488a.yaml\
    \ block collect |\n| C10 | rsync error code 23 | files/attrs not transferred |\n\
    | C14 | markdown generation empty | semantic_index 関連? |\n| LIT | litestream sync/compaction\
    \ failed | rename ltx file 衝突 |\n| ADV | advisor_proxy timeout | claude -p timed\
    \ out after 120s |\n| FAI | faiss read_xb_vector error | semantic_index_hook 破損\
    \ |\n\n### Step 3: 根因仮説 (各カテゴリ)\n\n軍師は logs/ + scripts/ + .claude/settings.json\
    \ を読み根因仮説を出す。例:\n- LIT: litestream replica 先 (/home/murakami/litestream-replica/cmds/ltx/)\
    \ のディスク容量・権限・rename 競合 (dual-path SQLite書込との競合) — cmd_1488/1494 dual-path 関連?\n\
    - ADV: claude -p 120s timeout. Sonnet応答遅延 / proxy queue 詰まり / advisor呼出の同時多発\n\
    - FAI: semantic_index の faiss index 破損 (途中切断 or バージョン不一致)\n- C09: gunshi_report_qc_1488a.yaml\
    \ の block collect error は cron_health_check が壊れた YAML を拾い続けている (古いゴミファイル)\n- C10:\
    \ rsync error 23 = source 側ファイル消失 / 権限変化\n- C14: markdown generation empty は genai_daily\
    \ 関連?\n\n### Step 4: 優先順位 + 対処方針\n\n| Pri | カテゴリ | 対処 |\n|-----|---------|------|\n\
    | HIGH (殿の戦況把握阻害) | LIT (連続失敗) | 修正cmd起票 — replica disk確認・dual-path 競合解消 |\n|\
    \ HIGH | ADV (claude -p timeout) | 修正cmd起票 — timeout延長 or 並列制限 or モデル変更 |\n| MED\
    \ | FAI | 修正cmd起票 — index 再構築 |\n| LOW | C09 (古いゴミYAML) | 単純削除で消える — 軍師がその場で削除可\
    \ |\n| LOW | C10 | 監視除外 or rsync source再確認 |\n\n### Step 5: 報告\n\n軍師は `queue/reports/gunshi_ntfy_analysis_1498.yaml`\
    \ に以下を保存:\n\n```yaml\nreport_id: gunshi_ntfy_analysis_1498\ncmd_id: cmd_1498\n\
    findings:\n  - category: LIT\n    root_cause: ...\n    severity: HIGH\n    fix_proposal:\
    \ ...\n  - category: ADV\n    ...\nrecommended_cmds:\n  - id: cmd_NEW1\n    purpose:\
    \ litestream replica 修正\n  - id: cmd_NEW2\n    purpose: advisor_proxy timeout\
    \ 対策\nfalse_positives_to_silence:\n  - C09 (gunshi_report_qc_1488a.yaml は古いゴミ・削除すれば消える)\n\
    summary_for_lord: 殿向け1段落要約\n```\n\nそして家老に inbox_write 報告 → 家老が殿に dashboard 反映。\n\
    \n## 完了条件\n\n1. queue/reports/gunshi_ntfy_analysis_1498.yaml が存在し全カテゴリ解析済\n2.\
    \ 修正cmd起票推奨が具体的 (どのファイル/設定 を どう変更するか)\n3. 単純削除で済むゴミ (C09 等) は軍師がその場で削除済\n4. 殿向け要約が\
    \ dashboard.md or inbox_write to:karo→shogun で殿に届く\n5. ntfy通知: 軍師完了通知\n\n## 共通ルール\n\
    \n- 軍師単独・足軽は使わない\n- 修正cmd は本cmdでは実行しない (推奨のみ)。殿確認後に別cmdで実行\n- 軍師は git commit しない\
    \ (報告YAMLのみ作成)\n- pretool_check 順守"
