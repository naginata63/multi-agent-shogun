    \ QC** に絞り、実装前に設計を完成度高く仕上げる。\n\n軍師は cmd_1644 で『A 案の YAML 脱却度 = 5/5・Anthropic 純正度\
    \ = 5/5』と評価済。本 cmd では A 案を**実装前提**として、技術的な抜け穴を洗い出す。\n\n## 担当 + bloom_level\n\n\
    - **gunshi 単独** (設計 QC)\n- bloom_level: **L6** (実装前設計レビュー・抜け穴検出)\n- gunshi_qc:\
    \ **false** (軍師自身の QC)\n\n## 入力資料\n\n1. A 案詳細設計 (取消版): `queue/cmd_payloads/cmd_1643.json`\
    \ (将軍が起票したが取消・設計内容は有効)\n2. cmd_1644 軍師 QC 報告書: `queue/reports/2026-05-06_cmd_1644_inbox_design_qc.md`\
    \ (A 案の 5 軸評価)\n3. cmd_1639 Anthropic API 調査: `queue/reports/2026-05-05_cmd_1639_anthropic_agent_api_research.md`\n\
    4. server.py 現状: `scripts/dashboard/server.py` (3389 行・SSE 関連実装は 0 件)\n5. cmd_1642\
    \ Phase 2 QC: `queue/reports/2026-05-06_cmd_1642_monitor_phase2_qc.md`\n\n## A\
    \ 案 設計 (本 cmd の QC 対象・cmd_1643.json 参照)\n\n### Step 1-7 の流れ\n```\n殿/将軍が curl POST\
    \ /api/cmd_create\n   ↓\nserver.py:\n   ① SQLite INSERT (cmds + inbox)\n   ② in-memory\
    \ queue.put() (Python threading.Queue)\n   ↓\nserver.py /api/inbox_stream?agent=<id>:\n\
    \   SSE generator が queue.get() → yield 'data: {json}\\n\\n'\n   ↓\nagent の Monitor:\
    \ curl -N --no-buffer ... (常時接続)\n   stdout 1 行 = 1 通知\n   ↓\nClaude Code が native\
    \ 通知受信 → /api/inbox_messages で詳細取得\n```\n\n### 主要要素\n- server.py に `/api/inbox_stream`\
    \ 新設 (~100 行)\n- in-memory queue (defaultdict + threading.Queue)\n- 全 10 agent\
    \ が常時 curl -N SSE 接続\n- 既存 inbox_watcher.sh は並走 (rollback 確保)\n\n## QC 観点 (8 軸)\n\
    \n軍師が以下の 8 軸で **A 案の抜け穴 + 改善提案** を出せ:\n\n### 1. SSE 実装の技術的妥当性\n- BaseHTTPRequestHandler\
    \ で SSE が正しく実装可能か (Flask への移行必要か)\n- text/event-stream + 'data: ...\\n\\n' フォーマット\n\
    - Connection: keep-alive の挙動\n- generator の thread-safe 性\n\n### 2. in-memory\
    \ queue の設計\n- defaultdict + threading.Queue の thread-safe 性\n- maxsize 設定 (推奨値・未設定時のメモリ肥大化)\n\
    - queue が満杯時の挙動 (block / 例外 / drop)\n- queue の永続化要否 (server.py 再起動で消失する点の許容度)\n\
    \n### 3. 全 10 agent 同時 SSE 接続の負荷\n- BaseHTTPRequestHandler は thread-per-request\
    \ か process-per-request か\n- 10 connection 同時保持の実 CPU/メモリ負荷\n- queue.get(timeout=30)\
    \ の thread が 10 個動く・コンテキストスイッチコスト\n- keep-alive ping 30秒間隔の妥当性\n\n### 4. SSE 接続の信頼性\n\
    - ネットワーク切断時の挙動\n- agent 側の curl -N 自動再接続\n- 再接続時に取りこぼし回避 (queue は server.py 内で保持されるが\
    \ SSE 切断中の event は失われる?)\n- agent /clear → Monitor 再起動時のキューずれ\n\n### 5. server.py\
    \ 拡張の影響範囲\n- 既存 endpoint への影響\n- HTTP server core の同時 connection 上限\n- グローバル state\
    \ (defaultdict) 追加の影響\n- 既存 hook / webhook との競合\n\n### 6. rollback 戦略\n- /api/inbox_stream\
    \ を停止する手順\n- 既存 inbox_watcher.sh への完全フォールバック\n- 部分 rollback (一部 agent だけ Monitor\
    \ 継続) の可能性\n\n### 7. 段階移行ロードマップ\n- 1 agent (ash1) で先行 POC\n- 2-5 agent 拡大\n- 全\
    \ 10 agent 移行\n- 既存 watcher の段階廃止 (Phase 4 cmd 候補)\n- 各 phase の完了基準 + 工数\n\n###\
    \ 8. 殿運用シナリオ別の検証\n- 殿が cmd 連発 (1 秒に 5 件) した場合の queue 挙動\n- 殿が長時間 idle (PC スリープ)\
    \ → 再接続時の挙動\n- agent /clear → Monitor 再起動の race condition\n- server.py 再起動時の queue\
    \ 消失への対処\n\n## 軍師の作業手順\n\n0. advisor() 呼出\n1. 入力資料 5 件 Read\n2. 8 軸で A 案を QC (各軸で『抜け穴』『改善提案』を\
    \ 1-3 個出す)\n3. 最終的な実装ロードマップを Phase 別に提示 (cmd_1647+ で起票する内容)\n4. 報告書作成: `queue/reports/2026-05-06_cmd_1646_a_design_qc.md`:\n\
    \   - 8 軸別 QC 評価\n   - 抜け穴 + 改善提案 (matrix)\n   - 実装前に決定すべき設計判断 (server.py 改修方針\
    \ / Flask 移行要否 / queue maxsize 等)\n   - Phase 別実装ロードマップ\n   - リスク + 対策\n5. advisor()\
    \ 呼出 (実装前 QC の網羅性確認)\n6. inbox karo 完了報告\n\n## 必達制約\n\n- A 案単独の QC のみ・他案との比較禁止\
    \ (殿命)\n- **実装禁止** (実装は本 QC 後・別 cmd で起票)\n- 既存 inbox_watcher.sh / Monitor (cmd_1642)\
    \ は触らない\n- 軍師単独完遂・足軽起動禁止\n- 報告書は markdown 形式・章立て明確に\n\n## 共通ルール\n\n- 出力先: `queue/reports/2026-05-06_cmd_1646_a_design_qc.md`\n\
    - 新規 .py 禁止 (本 cmd は QC のみ)\n- WebFetch / WebSearch 利用可 (SSE/Python HTTP server\
    \ のベストプラクティス調査)\n- claude-code-guide subagent 活用推奨\n- git commit 必須 (push は家老責務)"
