    \n## やること\nMoMaskの骨格データにマイクラ風キャラモデルを着せてレンダリング。\n\n### 方式: マイクラスキンPNG → Blenderリグ\n\
    1. ドズル社メンバーのマイクラスキン（64×64 PNG）を取得\n   - マイクラスキンの入手方法: Namemc等からダウンロード or assets/から取得\n\
