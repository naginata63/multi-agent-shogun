    14. `python3 projects/dozle_kirinuki/scripts/audit_video_index_consistency.py`\
    \ で 57 本全て quality_status=ok 確認\n\n### Phase 5: 完了処理 (家老責務)\n\n15. CSV 更新: 57\
    \ 本の `analyzed=True / indexed=True / quality_status=ok` 反映\n16. `git add projects/dozle_kirinuki/data/dozle_video_list.csv`\
    \ (data/scene_index_v2/ は .gitignored)\n17. work/<YYYYMMDD>_<title>/ の追加 mp4 等は\
    \ git ignored か確認 (容量大ゆえ git に入れるべきでない)\n18. `git commit -m 'feat(scene_search):\
    \ 4/2 以降 57 本 index 追加 — 67→124 動画 (cmd_1636)'`\n19. `git push origin main`\n\
    20. 完了報告書 `queue/reports/2026-05-05_cmd_1636_57video_parallel_indexing.md`\n \
    \  - 各 ash 担当 video list + 識別率\n   - 並列処理時間 vs シリアル推定時間 (PC 換装効果実証)\n   - 失敗 video\
    \ 列挙 + 再処理計画\n21. 殿レビュー用 ntfy: `bash scripts/ntfy.sh '✅ cmd_1636完了: 67→124動画index拡充。並列処理\
    \ N 時間 (シリアル推定 25h)・換装効果X倍'`\n\n## 共通ルール\n\n- 出力先: 既存パス (`projects/dozle_kirinuki/work/srt_and_candidates/`・`projects/dozle_kirinuki/work/<YYYYMMDD>_<title>/`)\
    \ のみ\n- 新規 .py 禁止 (既存 video-pipeline スキル + speaker_id.py 等流用)\n- python3 -c ワンライナー使い捨て禁止\n\
    - ffmpeg は h264_nvenc (GPU)・libx264 禁止 (本 cmd では再エンコード少ないが原則)\n- Gemini API はテキスト処理に使うな\
    \ (Claude CLI Opus 4.6 を使え)\n- 中間成果物は work/<YYYYMMDD>_<title>/ 配下保存 (/tmp 禁止)\n\
    - git commit + push 済が完了条件 (CSV のみ・index は .gitignored)\n- gunshi_qc=true ゆえ gunshi\
