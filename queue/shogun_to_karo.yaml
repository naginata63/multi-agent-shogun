  timestamp: "2026-04-23T07:25:00+09:00"
  lord_original: "またhangした パネル生成させたらhangする？ / する（中期対策実施）"
  north_star: "dashboard server (8770) が claude CLI 同期実行でhangする問題を恒久解消し、panel生成等の重い処理が走っても dashboard・panel_review.html へのアクセスが止まらない状態にする"
  purpose: "scripts/dashboard/server.py のhang原因を解消する。①ThreadingHTTPServerへ変更（即時対策）②claude CLI呼出を非同期化（根本対策）"
