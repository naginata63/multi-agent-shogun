  purpose: クラウドマルチエージェントレビュー（/ultrareview）が発見したバグ5件（advisor_proxy circuit breaker / pretool_check CHK4死にコード / Advisor Proxy起動fail-open / backup scripts mountpoint未検証 / FileChanged hook不在スクリプト参照）を優先度順に修正すること
