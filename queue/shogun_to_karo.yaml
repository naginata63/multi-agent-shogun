    - --panels でpanels JSONを指定\n- --output で出力先を指定\n- 内部でGemini画像生成→ffmpeg動画組み立てを実行\n\
    \n## 実行手順\nStep 1: panels JSON確認\n```bash\ncat projects/dozle_kirinuki/work/ub2kRKlpZqg/output/cmd_957/panels_957_chirashi.json\n\
    ```\n\nStep 2: 音声クリップ準備\n- P1-P10: tono_cut.mp4から各パネルのstart_sec/duration_secで切り出し\n\
    - P11: assets/bgm/sfx/からSE選定（sfx_drumroll.mp3等）。tono_cut音声使わない\n- P12: tono_cut.mp4の44.5秒以降を使用\n\
    - tono_cut.mp4: projects/dozle_kirinuki/work/20260303_超巨大ちらし寿司から異物を100個見つけるまで終われません！！【マイクラ】/tono_cut.mp4\n\
    \nStep 3: PNG生成\n```bash\ncd /home/murakami/multi-agent-shogun\nsource ~/.bashrc\
    \ && source projects/dozle_kirinuki/venv/bin/activate\npython3 projects/dozle_kirinuki/scripts/manga_poc/generate_manga_short.py\
    \ \\\n  --panels \"projects/dozle_kirinuki/work/ub2kRKlpZqg/output/cmd_957/panels_957_chirashi.json\"\
    \ \\\n  --output \"projects/dozle_kirinuki/work/ub2kRKlpZqg/output/cmd_976/\"\n\
    ```\n\nStep 4: 動画合成（Phase 5 of manga-short-workflow）\n各パネル: PNG + 音声クリップ → ffmpeg合成\n\
    ```bash\nffmpeg -loop 1 -i panel.png -i clip.mp4 -map 0:v -map 1:a -c:v h264_nvenc\
    \ -preset p4 -pix_fmt yuv420p -shortest -y panel_video.mp4\n```\n全パネルconcat→最終MP4\n\
    \nStep 5: 殿に配信して確認\n\n## ネコおじ参照画像（必須）\nassets/dozle_jp/character/selected/nekooji*.png\
    \ のみ使用\nnekooji_refs/（cmd_949配下）は使用禁止（殿却下済み）\n\n## アンチパターン（絶対やるな）\n- 新しいスクリプトを作るな\
