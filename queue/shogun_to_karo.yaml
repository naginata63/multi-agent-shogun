  command: |
    ## 殿の指示（原文）
    「両方」（/ultrareviewバグ修正 + note記事反映の両方を指示。本cmdはバグ修正側）

    ## 背景
    2026-04-17 12:30頃、/ultrareview（クラウドマルチエージェントレビュー）が本ブランチの未commit変更に対して5件のバグを発見。全て「independently reproduced and verified」の本物のバグであり、放置すればハーネス運用に実害。詳細は会話ログの task-notification 参照。

    ## 修正対象5件（優先度順）

    ### 1. merged_bug_001: pretool_check.sh CHK4死にコード削除（即時・低リスク）
    - 対象: `scripts/pretool_check.sh` L274-303
    - 理由: `scripts/extract_cmd_fields.py` が存在しないため `_LORD_VAL`/`_CMD_VAL` が常に空 → ブロック全体が死にコード。しかし `.claude/settings.json` の PreToolUse timeout が 5s→45s にバンプされており、hook毎に9倍のレイテンシ予算だけ消費中
    - 修正: L274-303 のブロック全体を削除 + .claude/settings.json の PreToolUse timeout を 5 に戻す
    - 注意: 既存の posttool_cmd_check.sh（本日朝に修正済、opusで稼働中）は別物。混同するな

    ### 2. merged_bug_002: FileChanged hook削除（即時・低リスク）
    - 対象: `.claude/settings.json` L100-110 の FileChanged ブロック
    - 理由: `scripts/filechanged_cmd_check.sh` が存在しないため exit 127 が毎回発生
    - 修正: FileChanged ブロック全体を削除

    ### 3. bug_010: backup scripts mountpoint検証追加（即時・低リスク）
    - 対象: `scripts/backup_secrets.sh` L5-7、`scripts/backup_queue.sh` L6,12
    - 理由: `/mnt/backup` 未マウント時に root FS へ silently 書き込む→GPG暗号化secrets が root fs に溜まる危険
    - 修正: `mkdir -p` 前に `mountpoint -q /mnt/backup || { echo "ERROR: /mnt/backup is not mounted" >&2; exit 1; }` 挿入

    ### 4. merged_bug_017: Advisor Proxy readiness/fail-safe（中リスク・要検証）
    - 対象: `shutsujin_departure.sh` L636-665
    - 理由: `kill -0` で process 存在だけ確認・port bind は未検証、失敗時も警告のみで継続→GLM足軽6/7台がECONNREFUSEDで死亡
    - 修正:
      ```bash
      for i in $(seq 1 20); do
        curl -sf http://localhost:8780/health >/dev/null && break
        sleep 0.5
      done
      curl -sf http://localhost:8780/health >/dev/null || { log_info "  └─ ❌ Advisor Proxy起動失敗 (port 8780にbindせず)"; exit 1; }
      ```
    - テスト: 故意に port 8780 を塞いで起動→ exit 1 で停止することを確認

    ### 5. bug_026: advisor_proxy continuation failure記録追加（最優先・pre-existing）
    - 対象: `scripts/advisor_proxy.py` L539-548
    - 理由: continuation loop の error branch に `record_failure()` がないため circuit breaker が永遠に閉じず、実質全員500エラーでもダッシュボード緑のまま
    - 修正:
      ```python
      if resp.status != 200:
          resp_body = await resp.read()
          metrics.record_failure()
          circuit_breaker.record_failure()
          logger.warning("Continuation upstream error %d", resp.status)
          return web.Response(...)
      except Exception as e:
          metrics.record_failure()
          circuit_breaker.record_failure()
          logger.error("Continuation request failed: %s", e)
          return web.Response(status=502, text=f"Upstream error: {e}")
      ```
    - テスト: `/metrics` エンドポイントを叩いて `failures` カウンタが増えることを確認

    ## 共通ルール
    - 修正ごとに個別 commit（5本のcommit想定）
    - push は家老が取りまとめて実施
    - テスト実施できないもの（proxy readinessなど）は手順を report YAML に記載
    - 新規.py/.sh 禁止（既存ファイル修正のみ）

    ## 完了後
