  command_text: '殿原文: Aだけでまずいこう


    === 背景 ===

    cmd_1587 で実装した subtitle_speaker_qc.py の PIL モードは、字幕領域を「画面下部 18% を crop」 と静的決め打ちしており、マイクラ
    UI (ホットバー紫枠・体力ハート・経験値バー等) が映り込み bon (紫 #733C93) に誤認される。


    2026-05-03 tono_clip_base.mp4 (114 行) で実行した結果、bon 89/114 (78%) という偏った分布が出力された
    (殿確認済)。


    殿御判断: 案 A (OCR/text detection で字幕領域を動的特定) で改修。


    === 実装内容 ===


    ## 改修対象

    - `projects/dozle_kirinuki/scripts/subtitle_speaker_qc.py` (既存改修・新規 .py 禁止)


    ## PIL モード改修方針


    旧:

    ```python

    top_y = int(h * 0.82)

    subtitle_img = img.crop((0, top_y, w, h))  # 静的下部 18%

    ```


    新 (OCR/text detection で動的特定):

    ```python

    # 1. frame をグレースケール変換

    # 2. OCR or text detection で文字矩形を検出 (画面下部 30% に絞ってもよい)

    # 3. 検出された矩形領域のみで色集計

    # 4. メンバーカラー RGB 距離で投票

    ```


    ## 推奨実装手段 (家老/足軽が選定)


    ### 案 a: OpenCV EAST text detector (cv2.dnn)

    - 標準的な text detection deep model

    - 学習済モデル (`frozen_east_text_detection.pb`) を別途配置

    - 高精度・実行速度速い


    ### 案 b: 簡易矩形検出 (Canny + findContours)

    - OpenCV のみで実装可・モデル不要

    - Canny エッジ検出 → findContours → アスペクト比 (幅 > 高さ × 3) + 大きさフィルタ → 文字らしい矩形抽出

    - 軽量・依存最小


    ### 案 c: EasyOCR (Python OCR)

    - pip install easyocr (重い・GPU 必須気味)

    - 日本語認識可能・テロップ位置抽出


    **推奨は案 b** (依存最小・OpenCV のみ・実装容易)・必要なら案 a に格上げ。


    ## モード追加


    既存 `--method pil` を維持しつつ、新モード `--method pil_ocr` を追加 (互換性保持):

    - `--method pil`: 旧実装 (静的下部 18%)・後方互換

    - `--method pil_ocr`: 新実装 (動的特定)・推奨

    - `--method gemini`: 既存 (Gemini Vision API)

    - デフォルトを `pil_ocr` に変更


    ## 動作検証


    tono_clip_base.mp4 (114 行) で `--method pil_ocr --mode update` を実行し、以下を確認:

    - 話者分布が均等化 (bon 偏重 78% → 30%以下)

    - 信頼度向上 (Confidence 平均 50% → 70%+)

    - 各メンバー (dozle/bon/qnly/orafu/oo_men/nekooji) が動画内発言数に近い分布になる

    - マイクラ UI ホットバー誤認が消える


    ## QC


    動作検証結果を queue/reports/2026-05-03_cmd_1593_pil_ocr_qc.md に記録:

    - 旧 PIL モード結果 vs 新 pil_ocr モード結果の比較表

    - 精度向上数値 (誤認件数 -X 件・偏り改善)

    - 残課題 (不明残行など)


    === ルール ===

    - 既存スクリプト改修 (新規 .py 禁止)

    - Python 依存追加可: opencv-python (cv2)・既に他スクリプトで使用例があれば再利用

    - 旧 PIL モードは互換性のため残す (--method pil)

    - 推奨実装は案 b (OpenCV Canny + findContours)・案 a/c にしたい場合は事前に殿確認

    - 担当: ashigaru1 (cmd_1587 担当者継続)

    - 報告書: queue/reports/2026-05-03_cmd_1593_pil_ocr_qc.md


    === 完了条件 ===

    - subtitle_speaker_qc.py に --method pil_ocr モード実装済

    - 旧 --method pil モードは互換性維持

    - tono_clip_base.mp4 (114 行) で動作検証済

    - 話者分布が均等化 (bon 偏重解消・各メンバーが動画内発言数に近い)

    - 信頼度平均 70% 以上

    - マイクラ UI 誤認 (ホットバー紫枠等) が消えた証拠を報告書に記載

    - 軍師 QC PASS

    - git commit + push 完了

    - 報告書: queue/reports/2026-05-03_cmd_1593_pil_ocr_qc.md'
