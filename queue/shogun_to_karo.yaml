- id: cmd_1500
  status: in_progress
  priority: high
  purpose: 'cmd_1496カウントダウン重畳の式バグ修正: 4.94秒短い表示・停止後0:00→0:04.94順序逆を解消し30:00.00から始まり0:04.94で停止して10秒固定する'
  timestamp: '2026-04-27T21:39:22+09:00'
  project: dozle_kirinuki
  redo_of: cmd_1496
  north_star: 殿視聴NG (15分時点で14:54表示=6秒ズレ・停止時0:00後に0:04.94順序逆) を解消。drawtext式が END_T-t
    で1795.06秒分しか描けず1800秒との差4.94秒が表示誤差として全区間に伝播していた。
  lord_original: １５ふんじてんでおおきくなったがたいまーが14:54と６びょうずれ　でしまいにはたいまーストップじかんに0:00になってそのあと0：04．94って表示　ふざけてんの
  command: "## 殿原文\n\n「１５ふんじてんでおおきくなったがたいまーが14:54と６びょうずれ\nでしまいにはたいまーストップじかんに0:00になってそのあと0：04．94って表示\n\
    ふざけてんの」\n\n## 将軍5フレーム目視確認結果 (実測)\n\n| t (sec) | 期待残値 | 実表示 | サイズ |\n|---------|---------|--------|--------|\n\
    | 2900 (START+8秒) | 29:52.x | 29:47.27 | 40px |\n| 3793 (START+15分) | 15:00.x\
    \ | 14:54.27 | 64px |\n| 4093 (START+20分) | 10:00.x | 09:54.27 | 96px |\n| 4393\
    \ (START+25分) | 5:00.x | 04:54.27 | 128px |\n| 4690 (END+3秒) | 0:04.94 | 0:04.94\
    \ | 128px |\n\n=> サイズ・切替時刻は OK・**式だけ4.94秒短い**\n\n## 根因 (将軍の cmd_1496 drawtext\
    \ expression ミス)\n\n旧式: `X = if(lte(t,END_T), END_T-t, 0)`\n- t=START_T(2892.22):\
    \ X = 4687.28 - 2892.22 = 1795.06 = 29:55.06 (期待 30:00.00)\n- t=END_T(4687.28):\
    \ X = 0 (期待 4.94)\n- ズレ = 1800 - (END_T-START_T) = **4.94秒** (殿体感 6秒)\n\n停止後固定の旧実装:\n\
    - カウントダウンが END_T で `0:00` → 別drawtextで `0:04.94` 静的表示\n- → **殿激怒「0:00→0:04.94順序逆」**\n\
    \n## 正しい式\n\n```\nTIMER_TOTAL_SEC = 1800\nSTART_T = 2892.22\nEND_T   = 4687.28\n\
    HOLD_END = 4697.28\nRESIDUAL = 4.94\n\nX = if(lte(t,END_T), TIMER_TOTAL_SEC -\
    \ (t - START_T), RESIDUAL)\n  = if(lte(t,4687.28), 1800 - (t - 2892.22), 4.94)\n\
    \  = if(lte(t,4687.28), 4692.22 - t, 4.94)\n```\n\n- t=START_T → X=1800 → 30:00.00\
    \ ✓\n- t=START_T+900(残15:00) → X=900 → 15:00.00 ✓\n- t=END_T → X=4.94 → 0:04.94\
    \ ✓\n- t=END_T..HOLD_END → X=4.94 固定 ✓ (連続的)\n\n## stage 切替 (動画内時刻基準・既存と同じ)\n\n\
    ```\n40px : enable='between(t,2892.22,3792.22)' — 残30:00〜15:00\n64px : enable='between(t,3792.22,4092.22)'\
    \ — 残15:00〜10:00\n96px : enable='between(t,4092.22,4392.22)' — 残10:00〜5:00\n128px:\
    \ enable='between(t,4392.22,4697.28)' — 残5:00〜停止後10秒\n  (内部式 X が 4392.22≤t<4687.28\
    \ でカウント・4687.28≤t≤4697.28 で 4.94固定 → 連続表示)\n```\n\n128px の drawtext 1個で停止前後をシームレスに描く\
    \ (停止後固定drawtextは不要)。\n\n## ffmpeg コマンド (修正版)\n\n```bash\nDAY2='/home/murakami/multi-agent-shogun/projects/dozle_kirinuki/work/20260412_【#DoZ】2日目\
    \  誰も死なせないよ　だって私はヒーラーだもの【ドズル社／おおはらMEN視点】'\nSRC=\"$DAY2/day2_3sou_men_only.mp4\"\
    \nDST=\"$DAY2/day2_3sou_men_only_with_countdown_v2.mp4\"\nF=/usr/share/fonts/opentype/noto/NotoSansCJK-Bold.ttc\n\
    \nSTART_T=2892.22\nEND_T=4687.28\nHOLD_END=4697.28\nSTAGE1=3792.22\nSTAGE2=4092.22\n\
    STAGE3=4392.22\n\nX=\"if(lte(t\\,${END_T})\\,1800-(t-${START_T})\\,4.94)\"\nTXT='%{eif\\\
    :'\"$X\"'/60\\:d\\:2}\\:%{eif\\:mod('\"$X\"'\\,60)\\:d\\:2}.%{eif\\:mod('\"$X\"\
    '*100\\,100)\\:d\\:2}'\n\nffmpeg -y -i \"$SRC\" \\\n  -vf \"drawtext=fontfile=$F:text='$TXT':fontsize=40:fontcolor=white:bordercolor=0xFF69B4:borderw=3:x=w-text_w-20:y=20:enable='between(t,${START_T},${STAGE1})',\\\
    \n       drawtext=fontfile=$F:text='$TXT':fontsize=64:fontcolor=white:bordercolor=0xFF69B4:borderw=3:x=w-text_w-20:y=20:enable='between(t,${STAGE1},${STAGE2})',\\\
    \n       drawtext=fontfile=$F:text='$TXT':fontsize=96:fontcolor=white:bordercolor=0xFF69B4:borderw=3:x=w-text_w-20:y=20:enable='between(t,${STAGE2},${STAGE3})',\\\
    \n       drawtext=fontfile=$F:text='$TXT':fontsize=128:fontcolor=white:bordercolor=0xFF69B4:borderw=3:x=w-text_w-20:y=20:enable='between(t,${STAGE3},${HOLD_END})'\"\
    \ \\\n  -c:v h264_nvenc -preset p4 -rc vbr -cq 23 -b:v 6M -maxrate 8M -bufsize\
    \ 12M \\\n  -c:a aac -b:a 192k \"$DST\"\n```\n\nMM:SS.cc の MM は2桁 (`d:2` で 30:00.00\
    \ 表示)\n\n## ナレッジ更新\n\n`shared_context/procedures/countdown_overlay.md` を以下方針で更新:\n\
    - 式は `TIMER_TOTAL - (t - START_T)` を採用 (`END_T - t` は誤り・bitrate劣化と同じく後輩に伝わらぬよう注記)\n\
    - 4段階仕様 (30分版 40/64/96/128) を3段階 (15分版 64/96/128) と並記\n- 殿激怒事例 (2026-04-27 cmd_1496→1500\
    \ redo) を脚注\n\n## 検証 (軍師QC + 殿視聴)\n\n軍師は以下5フレームをffmpeg抽出して目視 + ffprobe filter_chain\
    \ 確認:\n\n| t (sec) | 期待残値 | 期待サイズ |\n|---------|---------|-----------|\n| 2900\
    \ | 29:52.22 | 40 |\n| 3793 | 14:59.22 | 64 (切替直後) |\n| 4093 | 9:59.22 | 96 |\n\
    | 4393 | 4:59.22 | 128 |\n| 4690 | 0:04.94 | 128 (固定) |\n\n殿視聴: with_countdown_v2.mp4\
    \ を mpv で全尺再生 (or 該当区間ジャンプ視聴) し OK判定後 done。\n\n## 完了条件\n\n1. day2_3sou_men_only_with_countdown_v2.mp4\
    \ 生成\n2. ffprobe で h264_nvenc 確認\n3. 5フレーム目視で全期待値一致 (軍師QC)\n4. countdown_overlay.md\
    \ ナレッジ修正 commit\n5. 殿視聴OK判定後 cmd_done\n6. 旧 with_countdown.mp4 (NG版) は削除 or _ng\
    \ リネーム\n\n## 担当\n\n足軽1人 (cmd_1496 担当者継続が望ましい・ナレッジ伝承のため)・尺40分のNVENCエンコードゆえ実時間の数倍速で完了見込み"
