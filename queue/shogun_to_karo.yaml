    - 受講者操作系語句検出 (`演習|ハンズオン|手元で|やってみよう`)

    - 結果集計 + 終了コード


    新規 .py 禁止ゆえ bash で実装 (memory ルール継承)。


    ## Step 3: lecture_design_rules.md に検証ルール追記


    context/lecture_design_rules.md に以下追加:


    ```markdown

    ## X. 自動検証 Skill


