    \  - 候補: MCprep, Blockbench export, カスタムスクリプト\n   - マイクラスキンPNG→Blenderのボクセルキャラ+リグを自動生成するもの\n\
    3. MoMaskのBVH → Blenderリグにリターゲット\n   - MoMaskの22ジョイント → マイクラリグのボーンにマッピング\n4. Blender\
    \ EEVEEヘッドレスレンダリング（1080x1920、30fps）\n5. ffmpeg h264_nvencでエンコード\n6. YouTubeに非公開アップ\n\
    \n## 既存成果物\n- work/3d_mvp/momask/ — MoMaskモーション出力（BVH+MP4）\n- work/3d_mvp/render_v3.py\
    \ — Blenderレンダリングスクリプト（参考）\n- work/3d_mvp/sample_rigged.glb — CesiumManリグ付きモデル（参考）\n\
    \n## 注意\n- Meshy AIは有料のみで使えない（殿試用済み。memory/feedback_meshy_paid_only.md参照）\n- Blender\
    \ portableは work/3d_mvp/ に配置済み\n- 軍師に設計させてから足軽に実装させよ\n- まずは1キャラ（dozle）×1モーション（running）でMVP\n"
