    \ と並走 — 1 本処理は完了させ、本 cmd で 57 本一気処理。\n\n## 入力データ (確認済み)\n\n- 未処理動画リスト: cmd_1632\
    \ audit script の出力 `queue/reports/2026-05-05_cmd_1632_video_index_audit.md` 末尾「4/2\
