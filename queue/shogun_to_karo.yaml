    \ + `merged_<video_id>.srt`\n\n## 担当 + bloom_level\n\n- ash1-4 並列稼働 (各 ash ~14\
    \ 本・57 ÷ 4 ≒ 15 本/ash・端数は ash1 が +3)\n- bloom_level: **L4** (パイプライン実行・複数ツール協調・並列処理)\n\
    - gunshi_qc: **true** (57 本まとめての話者識別精度チェック必須)\n\n## 並列度の設計\n\n### GPU 競合対策\n-\
    \ RTX 4060 Ti は 1 個共有・8GB VRAM\n- Demucs (GPU 必須・VRAM ~3GB) と STT GPU 部分を **ash\
    \ 内で順次実行**\n- ash 間は並列だが、Demucs/STT GPU 部分は OS スケジューラ任せ (4 並列でも待ち発生 → 全体時間は 1.5-2\
    \ 倍に伸びる前提)\n- **AssemblyAI/Deepgram API は network bound** ゆえ完全並列\n\n### CPU 並列\n\
    - ECAPA-TDNN 話者識別: CPU バウンド・4 並列で完全並列効く\n- merged JSON 生成: I/O 中心・並列効く\n- yt-dlp\
