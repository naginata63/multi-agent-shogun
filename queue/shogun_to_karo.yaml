  lord_original: だめなとき用とQCようにスクショとりClaudeで字幕と話者の紐付けをやるスクリプトを作成せよ — 殿2026-05-03 10:15
  north_star: Gemini が動画解析時に話者識別を『不明』にしてしまう問題の救済策 + QC 用に、動画スクショを Claude に渡して字幕色から話者キーを紐付けるスクリプトを整備し、漫画パイプラインの話者識別精度を保証する。
  command_text: "殿原文: だめなとき用とQCようにスクショとりClaudeで字幕と話者の紐付けをやるスクリプトを作成せよ\n\n=== 背景 ===\n\
    \n2026-05-03 cmd_1584 関連で panel_candidate_prompt.txt を v3 化したが、Gemini Video Understanding\
    \ は話者識別を『不明』にしがち (字幕色判別が確実ではない)。これに対する救済策 + 通常の QC として、動画スクショを Claude CLI に渡して字幕色から話者キーを紐付けるスクリプトを新規作成する。\n\
    \n=== スクリプト仕様 ===\n\n## ファイル\n- 配置: `projects/dozle_kirinuki/scripts/subtitle_speaker_qc.py`\n\
    - 新規作成可 (殿の明示指示・通常の『新規.py禁止』ルール例外)\n\n## 入力\n- `--clip <path>`: 動画ファイル (mp4/mkv)\n\
    - `--raw-json <path>`: 既存 _raw.json (話者『不明』行を更新する対象)\n- `--output <path>`: 更新済\
    \ _raw.json 出力先 (省略時は元ファイル上書き・--in-place オプション)\n- `--qc-report <path>`: QC レポート出力先\
    \ (省略時は同ディレクトリに `subtitle_qc_report.md`)\n- `--mode strict|update`: strict=不明行のみ更新\
    \ / update=全行を再判定 (デフォルト: strict)\n\n## 処理フロー\n\n1. **_raw.json 読み込み**: rows 配列の各行\
    \ (id/timestamp/speaker/text) を取得\n2. **対象行の選定**: \n   - mode=strict → speaker=='不明'\
