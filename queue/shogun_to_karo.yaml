  command: '## 殿の指示（原文）

    「つぎできなかったらMomaskあきらめるか？再調査させる？」「だせ」


    ## 背景

    MoMask歩行モーションが4回リテイクしても腕振りができない。

    将軍がBVHデータを直接分析した結果:

    - LeftArm/RightArm X回転が-47〜-55/51〜62で横に開いたまま固定

    - Z回転（前後振り）は-6〜+1でほぼ無動

    - MoMask生成モーション自体の品質問題

    - MoMaskの入力はテキストプロンプトのみ。体パーツ個別制御不可


    ## 軍師タスク


    ### Part 1: MoMask最後の1回

    プロンプトを変えて再生成。以下を試せ:

    - "a person walks forward naturally with arms swinging back and forth"

    - "a person marches forward swinging both arms"

    - "a person walks like a soldier with exaggerated arm swings"

    生成後、BVHのLeftArm/RightArm Z回転値を確認。前後振りが±15度以上あるか。

    matplotlibで可視化して腕が前後に動いているか目視確認。


    ### Part 2: MoMask代替方式の調査（Part1がNGの場合）

    以下を調査・比較:

    A. Mixamo — Adobe提供の無料モーションライブラリ。FBX→Blender。品質は高いがAdobe ID必要

    B. Blenderキーフレーム手書き — cmd_791で8動作デモリール実績あり。品質は手作業次第

    C. MDM (Motion Diffusion Model) — MoMaskの代替AI。品質比較

    D. CMU MoCap Database — 実際のモーションキャプチャデータ（BVH）。無料。歩行データあり

    E. その他 — MotionGPT、T2M-GPT等


    各方式の比較表:

    方式 / 品質 / 自動化度 / コスト / 導入難度 / マイクラリグ互換


    ### Part 3: 推奨方式の結論

    - ショート動画制作に必要なモーション品質レベルは？

    - 全自動にこだわるか、モーションライブラリで十分か

    - 実装ロードマップ（何日で使えるようになるか）


    ## 注意

    - 軍師に振ること

    - Part 1のプロンプト改善テストは足軽に実行させてもよい

    '
