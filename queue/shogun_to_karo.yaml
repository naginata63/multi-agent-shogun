  completed_at: '2026-04-29T09:32:00+09:00'
  project: infrastructure
  lord_original: 'ええとスクリプトを指定するときに検索するhookってなかったか？

    B (別 cmd で独立起票)'
  command_text: '## 殿原文


    「ええとスクリプトを指定するときに検索するhookってなかったか？」

    → 将軍報告: 検索ツール (script_semantic_index.py) はあるが cmd 起票時の自動 hook は無い

    → 殿判断: 『B (別 cmd で独立起票)』


    ## 経緯


    2026-04-29 朝、将軍が cmd_1548 起票時に vertical_convert.py を誤指定 (実際はオーバーレイ合成スクリプト・単純 crop
    ではない)。正解は shared_context/procedures/video_vertical_crop_upload.md の ffmpeg 直接コマンドだった。`script_semantic_index.py
    search` を打てば即座に procedure に辿り着けたが、将軍がツール存在を忘れて手動 grep で誤指定。同種事故は『前も間違えた』と殿明言。hook
    で強制すれば再発防止可能。


    ## 設計要件


    ### 1. 検出対象


    PreToolUse Bash で以下パターンを検出:

    - `*.py` ファイル名言及 (例: `python3 scripts/vertical_convert.py`)

    - `ffmpeg`, `ffprobe` 言及 (動画処理)

    - `crop`, `vertical`, `shorts`, `9:16`, `1080x1920` 等の動画キーワード

    - `youtube_uploader`, `whisperx`, `demucs`, `manga`, `panel` 等の固有スクリプト名/工程名


    リスト管理: `scripts/script_search_keywords.txt` 等の plain text で 1行1キーワードで持ち、誰でも追記可能とする


    ### 2. hook 動作


    検出時の挙動:

    - (a) **自動検索**: `python3 scripts/script_semantic_index.py search ''<検出キーワード>''`
    を実行

    - (b) **結果を agent に返す**: stderr or stdout に top 3 ヒット (パス + 短い summary) を表示

    - (c) **BLOCK しない**: 警告のみ (BLOCK は誤検知で運用妨害・手動上書き許可)

    - (d) exempt: 直前の同セッション内で同キーワードの検索を既に実行済の場合は省略 (簡易キャッシュ)


    ### 3. 配置


    - 既存 `scripts/pretool_check.sh` の延長として組み込む or 独立 hook 新設 (`scripts/script_search_hint.sh`)

    - `.claude/settings.json` の PreToolUse Bash hook に追加

    - cmd_1546 (ベタ打ち BLOCK) と並走可能・干渉しない設計


