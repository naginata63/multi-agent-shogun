    \   c. Demucs ボーカル分離 → vocals.wav 抽出 (GPU)\n   d. AssemblyAI 主 STT + Deepgram\
    \ fill (gap 補填)\n   e. ECAPA-TDNN 話者特定 (run_speaker_match_only.py で他 67 本の voice\
    \ embedding と照合し A-F → 実名 mapping)\n   f. SRT + merged JSON 生成\n4) 出力: srt_and_candidates/merged_<video_id>.json\
    \ + .srt (上書き禁止・新規のみ)\n5) 各 video 完了後 subtitle_speaker_qc.py --audio-merge で識別率\
