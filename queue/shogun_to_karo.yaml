    1. cmd_1632 audit 報告書から 4/2 以降 `analyzed=False` 動画 57 本の video_id list を抽出\n2.\
    \ リスト 4 等分し、ash1/2/3/4 に各 ~14 本割当 (家老選定)\n3. 各 subtask に video_id list を target_path\
    \ に明記\n4. PR 動画 (Hulu PR / 商品 PR 等) は STT 不要なので除外可 (家老判断)\n\n### Phase 2: 各 ash\
    \ の video-pipeline 実行 (並列)\n\n各 subtask の steps (ash N ごと):\n\n```\n0) advisor()\
    \ 呼出\n1) /video-pipeline スキル起動 (HL/SH 候補選定はスキップ・STT までで止める)\n2) 担当 video_id list\
