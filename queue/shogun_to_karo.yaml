    未取得10種+α を追加し、dashboard も大幅改修する。

    ## Phase 1: API取得拡張 (youtube_analytics_snapshot.py)

    以下の YouTube Analytics API クエリを追加実装:

    ### 1-A. 日次シリーズ拡張
    既存 `metrics=views,estimatedMinutesWatched,averageViewDuration,likes,subscribersGained` に追加:
    - `subscribersLost` (純増計算用)
    - `comments` (日次)
    - `shares` (日次)
    - `averageViewPercentage` (日次)
    - `cardImpressions` `cardClicks` (カード分析・取れれば)

    ### 1-B. contentType分離
    `filters=contentType==short` / `contentType==longForm` で2回クエリ→短尺vs長尺別合計取得
    - 収益化条件判定に必須: 長尺365日視聴時間 vs 4,000h、短尺90日再生 vs 1,000万

    ### 1-C. 視聴者層
    - `dimensions=ageGroup` → {age13-17, 18-24, 25-34, ...} × views/watch_time
    - `dimensions=gender` → {male, female, unknown} × views
    - `dimensions=country` Top10 (jp含む)

    ### 1-D. デバイス別
    - `dimensions=deviceType` → {mobile, tv, desktop, tablet, gameConsole}
    - `dimensions=operatingSystem` Top5

    ### 1-E. Audience Retention (Top5動画分)
    - `dimensions=elapsedVideoTimeRatio` + `filters=video==VIDEO_ID`
    - 再生数TOP5動画について取得
    - 動画内の各10%地点での視聴維持率

    ### 1-F. impressions/CTR (sharedなら)
    - `metrics=impressions,impressionsClickThroughRate`
    - 日次 + 動画別

    ## Phase 2: data.json 拡張

    既存 keys: generated_at / channel / daily_series / traffic_sources / videos / analysis_history / video_history / similar_videos / video_analysis / rankings

    追加 keys:
    - `daily_extended`: {dates, comments, shares, subs_lost, avg_view_pct, impressions, ctr}
    - `content_type`: {short: {views, watch_minutes, subs_gained}, longForm: {同}}
    - `demographics`: {age: [...], gender: {...}, country: [Top10], device: {...}}
    - `retention_top5`: {video_id: [{ratio, audienceWatchRatio}...]}
    - `monetization`: {shorts_path_views_90d, shorts_path_pct, longform_watch_hours_365d, longform_path_pct, eligible_date_estimate}
    - `predictions`: {subs_3mo, views_3mo, subs_6mo_est, monetization_est_date}
    - `content_analysis`: {by_duration: [{bucket, avg_views, avg_like_rate}], by_character: [{character, count, avg_views}]}

    ## Phase 3: dashboard/index.html 拡張

    既存の KPI / 日次推移 / トラフィック / 動画一覧 / ランキング / AI分析 は維持。以下を追加:

    ### 3-A. 収益化進捗パネル（最上部）
    ```
    ┌─ 収益化進捗 ─────────┐
    │ ショートパス: 865万/1000万 86% [進捗バー]
    │ 長尺パス: 2,450h/4,000h 61% [進捗バー]
    │ 見込み達成日: 2026-05-XX
    └──────────────────────┘
    ```

    ### 3-B. 視聴者層グラフ（新セクション）
    - 年齢層 円グラフ (Chart.js)
    - 性別 円グラフ
    - 国別 横棒グラフ Top10
    - デバイス別 円グラフ

    ### 3-C. Audience Retention グラフ
    - Top5動画の retention 折れ線グラフ (動画ID切替タブ)
    - X軸 0%〜100%・Y軸 視聴維持率

    ### 3-D. CTRトレンド
    - 日次CTR折れ線 + インプレッション折れ線 (二重軸)

    ### 3-E. 尺別・キャラ別パフォーマンス表
    - 尺別: <30s / 30-60s / 60-120s / 120s+ 各平均再生・Like率
    - キャラ別: タイトルから dozle/bon/MEN/qnly/orafu/nekooji 検出→各平均再生

    ### 3-F. 予測セクション
    - 累計登録者 3ヶ月後予測・累計再生 3ヶ月後予測
