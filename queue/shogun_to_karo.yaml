    - defaultLanguage=ja / defaultAudioLanguage=ja **必須** (オートダビング音声破壊罠回避・memory/feedback_youtube_autodubbing_pitfall.md)\n\
    \n### Step 4: YouTube非公開アップ\n\n- privacy=private (殿明示「非公開」)\n- 切り抜きチャンネル (本家ではない)\n\
    - 完了時 ntfy: `\U0001F3AC YouTube非公開アップ: <タイトル> <URL>`\n\n## 完了条件\n\n1. tono_short_vertical.mp4\
    \ 生成 (1080x1920 / h264_nvenc / aac)\n2. クロップ案 (A/B/C) について殿確認済\n3. タイトル・説明欄が殿確認済\
    \ (3案提示→殿選定)\n4. YouTube非公開アップ完了 (URL報告)\n5. defaultLanguage=ja (オートダビング罠回避)\n\
    6. ntfy 通知\n7. git commit (動画本体除く・descriptionとscript)\n\n## 注意\n\n- 漫画ショートではない\
    \ (panels JSON 不要・/manga-short スキル使うな)\n- 通常のクロップ+blur背景ショート (既存類似手順あれば流用)\n-\
    \ 元素材 ffv1 ゆえ画質劣化少ない (qp18 で十分)\n- 26秒尺ゆえ Shorts要件 (60秒以下) クリア\n\n## 担当\n\n家老が足軽1人にアサイン\
    \ (NVENC エンコード + アップロード)・尺26秒ゆえ処理は数分"
