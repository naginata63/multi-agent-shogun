  command: |
    ## 殿の指示（原文）
    「またhangした パネル生成させたらhangする？」「する」（中期対策実施を承認）

    ## 背景
    現在 dashboard server (scripts/dashboard/server.py) が pid 690888 で稼働中だが、内部で claude CLI を同期実行している。これによりLLM処理（パネル生成等で数十秒〜数分）の間、dashboard server の他リクエストが全部hangする。

    将軍の仮説検証で、pid 693754 で `claude -p ドズル社漫画ショートの構成作家...` が走り、その親プロセスが dashboard server (pid 690888) であることを確認済み。

    短期対策として 別port 8771 に `python -m http.server` を立てて静的配信を回避中。

    ## 修正方針

    ### Phase A: 並行処理化（ThreadingHTTPServer）
    `scripts/dashboard/server.py` L1675 付近:
    ```python
    server = http.server.HTTPServer(('0.0.0.0', PORT), DashboardHandler)
    ```
    を:
    ```python
    server = http.server.ThreadingHTTPServer(('0.0.0.0', PORT), DashboardHandler)
    ```
    に変更（1行）。

    ### Phase B: claude CLI 呼出箇所の特定と非同期化
    1. server.py 内で `claude` コマンドを呼び出している箇所を grep で全部特定
    2. 同期 `subprocess.run(["claude", ...])` を:
       - **方式α (推奨)**: `subprocess.Popen` でバックグラウンド実行、ジョブIDを返す。クライアントは別エンドポイントで結果ポーリング
       - **方式β**: `concurrent.futures.ThreadPoolExecutor` で別スレッド実行、Future経由で結果返却
       - **方式γ**: 別worker process（FastAPI/Celery等）に分離（大規模変更・本cmdスコープ外）
    3. 既存呼出元のクライアント（家老/軍師/足軽/dashboard UI）への互換性確認

    ### Phase C: SQLite race condition 対策
    dashboard server.py で sqlite3 を使っている場合、ThreadingHTTPServer では複数スレッドから同じconnectionを使うと SQLITE_MISUSE エラーが出る。対策:
    - **threading.local() で per-thread connection** に変更
    - もしくは `check_same_thread=False` + `threading.Lock()` で排他制御
    - SELECT-only ハンドラなら `check_same_thread=False` だけでOKだが、INSERT/UPDATEがあるとlock必須

    ### Phase D: 検証テスト
    1. dashboard 再起動
    2. テスト用 claude 呼出を発火（家老から /api/xxx を叩く等）
    3. 同時に別ターミナルから `curl http://127.0.0.1:8770/` および panel_review.html を連打
    4. **panel生成中も静的応答が < 1秒で返ること** を確認
    5. claude生成完了後の結果取得APIが正常動作すること
    6. /api/agent_health 等の既存APIが壊れていないこと

    ## 手順
    1. **advisor() 呼出**（実装前）
    2. server.py をRead 全体把握
    3. Phase A 実装（ThreadingHTTPServer 1行修正）
    4. claude CLI呼出箇所を grep で特定（"claude -p" "subprocess.run.*claude" 等）
    5. Phase B 実装（非同期化・方式α推奨）
    6. Phase C 実装（SQLite対策）
    7. テスト（Phase D）
    8. **advisor() 呼出**（完了前）
    9. git commit & push
    10. 短期対策 8771 サーバー停止（家老判断・必要なら残置可）
    11. ntfy通知

    ## 軍師QC必須
    - server.py のdiff確認
    - hang再現テスト: panel生成走らせて static アクセスが応答するか
    - sqlite3 SQLITE_MISUSE が出ないか
    - 既存API動作確認

    ## 共通ルール
    - **新規.py禁止（projects配下）**。scripts/dashboard/server.py の修正のみ
    - 短期対策の 8771 サーバー（pid 698248）は本cmd完了まで継続稼働
    - 中間成果物は work/cmd_1431/ 配下
    - git commit & push済みであること
    - **advisor()必須**: 実装前と完了前

    ## 割当
    - 家老判断（L3-L4級・python http.server / threading 経験ある足軽推奨）
    - 軍師QC必須（hang再現テスト含む）

    ## 失敗時のフォールバック
    - ThreadingHTTPServer で sqlite3 race condition が大規模 → check_same_thread=False + 全handler に Lock追加
    - claude CLI 呼出非同期化が複雑 → 暫定的に呼出箇所を別エンドポイントに分離し、メインHTTPループを保護するだけでもOK
    - 修正後別の障害発生 → 即rollback (git revert) → 殿エスカレーション
