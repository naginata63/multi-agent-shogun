  - "出力: queue/reports/gunshi_design_review_1476.yaml"
  - "meta_judgment セクションに『前回biasに引きずられていないか』の自己検証を含む"
  command: "## 殿命（原文）\n『A　クリアしてもっかいかんがえなおさせろ』\n\n## 背景（軍師は読んでよい・bias情報ではなく経緯）\n前回 cmd_1475 で将軍が『5評価項目』を軍師に提示した。\n→ これは将軍の問題認識の枠組み = bias混入。\n→ 殿『将軍設計はつたえるな』命を完全には守れていなかった。\n\n## 今回の制約\n1. **前回レポート参照禁止**: queue/reports/gunshi_design_review_1475.yaml は読むな（軍師がdone判定した内容も忘れよ）\n2. **将軍の主張・設計案・問題提起は一切渡されていない**\n3. **評価項目すら指定しない**: 何を問題と見るか自体を軍師が決める\n4. **数・観点の制約なし**: 1問題でも10問題でも軍師の発見次第\n5. **『現状で問題なし』結論も許容**: 改修ありきではない\n\n## 前提情報（客観事実のみ・観察対象を提示）\nmulti-agent-shogun は 将軍/家老/足軽1-7/軍師 の9エージェント協調system。\n\n観察対象（軍師が ps/ls/grep/wc/tail で実測すべき）:\n- scripts/dashboard/server.py (port 8770 MCPダッシュボード+API)\n- scripts/inbox_write.sh / scripts/inbox_watcher.sh\n- scripts/pretool_check.sh + .claude/settings.json (hooks)\n- scripts/advisor_proxy.py (port 8780)\n- queue/shogun_to_karo.yaml\n- queue/inbox/*.yaml (9 agents分)\n- queue/tasks/*.yaml\n- queue/reports/*.yaml\n- shared_context/procedures/\n- logs/*.log\n\n## やること\n1. context /clear 後、CLAUDE.md+instructions/gunshi.md を読み直し（Session Start）\n2. 上記観察対象のうち軍師が必要と判断したものを実測\n3. 軍師自身が『この設計には何が問題か』を発見\n4. 各問題に改修要否判定 + 優先順位\n5. 将軍に渡されていない観点（hooks層・logs層・並行性・Failure mode・観測性等）も自由に発掘してよい\n6. 結果を queue/reports/gunshi_design_review_1476.yaml に出力\n\n## 注意\n- 『前回 5項目を再現する』のは bias 残留。**忘れて** 独立に発掘せよ\n- 軍師の観察眼を最大限信頼する。『改修要らず』結論も歓迎。\n- 将軍/家老/殿への忖度は要らぬ。"
  steps: "Session Start(CLAUDE.md+instructions/gunshi.md読む)→観察対象を実測(ps/ls/grep/wc/tail)→問題を独自発見→advisor()→優先順位付け→queue/reports/gunshi_design_review_1476.yaml作成→inbox_write karo"
