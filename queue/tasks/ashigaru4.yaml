    description: "vertex_api_key.envを主要APIキー設定として全スクリプトで標準化する。\n\n## 殿指示\nvertex_api_key.envを「めいん」にしろ。GEMINI_API_KEY（~/.bashrc）は期限切れ。\n\
      config/vertex_api_key.env の VERTEX_API_KEY のみが有効なGemini系キー。\n\n## 対象ファイル（夜間監査で特定済み）\n\
      projects/dozle_kirinuki/scripts/ 以下:\n- auto_expression_selector.py\n- build_competitor_centroid.py\n\
      - detect_faces_gemini.py\n- embedding_analytics.py\n- expression_matcher.py\n\
      - make_thumbnail_auto.py\n- scene_search.py\n- generate_thumbnail.py\n- その他\
      \ GEMINI_API_KEY を参照するファイル\n\n## 修正内容\n各ファイルで:\n```python\n# Before（禁止パターン）\n\
      api_key = os.environ.get(\"GEMINI_API_KEY\")\n# or\nsource ~/.bashrc  # GEMINI_API_KEY期限切れ\n\
      \n# After（標準パターン）\napi_key = os.environ.get(\"VERTEX_API_KEY\") or os.environ.get(\"\
      GEMINI_API_KEY\")\n```\nまたは実行時に:\n```bash\nsource /home/murakami/multi-agent-shogun/config/vertex_api_key.env\n\
      ```\n\n## 手順\n1. grep -rn \"GEMINI_API_KEY\" projects/dozle_kirinuki/scripts/\
      \ で全対象を特定\n2. grep -rn \"GEMINI_API_KEY\" scripts/ でメインscripts/も確認\n3. 各ファイルで\
      \ os.environ.get(\"GEMINI_API_KEY\") → os.environ.get(\"VERTEX_API_KEY\") or\
      \ os.environ.get(\"GEMINI_API_KEY\") に置換\n   （フォールバック付きで安全に移行）\n4. source ~/.bashrc\
      \ のみに依存している箇所に source config/vertex_api_key.env も追加\n5. 各ファイルの構文チェック: python3\
      \ -c \"import ast; ast.parse(open('FILE').read())\"\n\n## git safety protocol\n\
      1. git add projects/dozle_kirinuki/scripts/ scripts/ && git commit -m \"chore:\
      \ pre-batch save\"\n2. 5ファイル修正 → git diff --name-status 確認（D=即STOP）\n3. 残り修正\n\
