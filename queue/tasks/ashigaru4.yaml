      \ -c \"import os; print(os.environ.get('VERTEX_API_KEY','')[:10])\" でキー読み込み確認\n\
      \n## 完了後\ngit add projects/dozle_kirinuki/scripts/ scripts/\ngit commit -m \"\
      feat(vertex_main): GEMINI_API_KEY→VERTEX_API_KEY標準化（10+ファイル）\"\nbash /home/murakami/multi-agent-shogun/scripts/ntfy.sh\
      \ \"✅ vertex_api_key.env標準化完了: Nファイル修正\"\nbash /home/murakami/multi-agent-shogun/scripts/inbox_write.sh\
