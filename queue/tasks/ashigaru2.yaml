    「定期取得 朝6時にしよ」「毎日LLM分析つき」

    ### スクリプト: scripts/youtube_analytics_snapshot.py

    #### 取得データ
    1. チャンネル統計（Data API）: 登録者数・総再生・動画数
    2. 動画別リアルタイム統計（Data API）: 全動画の再生・いいね・コメント・尺
    3. 日別統計（Analytics API）: 直近14日分の再生数・視聴分・平均視聴秒・いいね・登録者増減
    4. トラフィックソース（Analytics API）: 関連動画/検索/外部/ショート棚等の割合

    #### 出力
    - projects/dozle_kirinuki/analytics/YYYY-MM-DD_snapshot.md — 人間が読めるレポート
    - projects/dozle_kirinuki/analytics/YYYY-MM-DD_raw.json — 生データ

    #### 前日比差分
    - 前日のraw.jsonを読み込み、動画別再生数の増減・チャンネル登録者増減を算出
    - レポートに「前日比」列を追加

    #### LLM分析（Claude CLI Opus 4.6）
    - 数値データをプロンプトに渡して `claude -p "プロンプト"` で分析
    - 出力: 所感（好調な点・課題）＋戦略示唆（次に何をすべきか）
    - レポート末尾に「## AI分析」セクションとして追記
    - テキスト→テキスト処理なのでClaude CLI Opus 4.6を使うこと（Gemini禁止）

    #### ntfy通知
    - scripts/ntfy.sh を使用
    - 条件: 前日比で再生+500以上 or 登録者+1以上 or いいね+10以上
