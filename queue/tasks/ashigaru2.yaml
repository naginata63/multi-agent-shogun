    6. 演出ナレッジ_4色パーティー_v1-1.txt（9.35KB）
    7. 正方形四コマメーカー二種.zip（5.45MB）
    8. 統合自動漫画生成.zip（16.7KB）

    ダウンロード後、zipは全て解凍せよ（unzip コマンド使用）。
    解凍先も同ディレクトリ内。

    ### 著作権注意
    - 有料記事の中身をgit commitするな
