  bloom_level: L3
  assigned_to: ashigaru2
  description: |
    ## S1クリップSE→黒画面独立セグメント化 + #2延長

    殿指示（原文）:
    「クリップつくったときにSEとにこめのどうががかぶって　音声がきえて　おんりーのちかいちかい　がきこえない　SE分はえいぞうなしのクリップにする」
    「いれたぶん　＃３，４，５，６、７を遅らせてくれ」

    ### 問題
    現在のclip_s1_loop.mp4で、SEとPart B冒頭の音声がかぶり、おんりーの「近い近い近い」が聞こえない。

    ### 修正方針
    SEを音声かぶりなしの独立セグメント（黒画面+SE音声のみ）に変更。
    SE秒数分だけ#2のduration_secを増やし、#3〜#7は後ろにずらす。

    ```bash
    cd /home/murakami/multi-agent-shogun/projects/dozle_kirinuki
    source ~/.bashrc && source venv/bin/activate
    WORK="work/20260317_【検証】ドズル社メンバーはネザーを5000m走り切れるのか！？【マイクラ】"
    ```

    ### Step 1: SE長さ計測
    ```bash
    ffprobe -v error -show_entries format=duration -of csv=p=0 assets/bgm/sfx/sceneswitch1.mp3
    ```
    この値をSE_DURとする（例: 1.5秒なら SE_DUR=1.5）。

    ### Step 2: クリップ再構成（Part A → 黒画面SE → Part B）
    現在のPart A/Part Bの素材を再利用。

    ```bash
    # Part A切り出し（既存クリップの0〜5.3秒 = panel_01分）
    ffmpeg -i "$WORK/output/cmd_796/clip_s1_loop.mp4" -t 5.3 -c:v h264_nvenc -preset p4 -c:a aac -b:a 192k "$WORK/output/cmd_796/partA_tmp.mp4" -y

    # 黒画面SEセグメント作成（映像=黒、音声=sceneswitch1.mp3のみ）
    # Part Aの解像度を取得してそれに合わせる
    ffprobe -v error -select_streams v:0 -show_entries stream=width,height -of csv=p=0 "$WORK/output/cmd_796/clip_s1_loop.mp4"
    # 上記で取得したWxH（例: 1080x1920）を使う
    ffmpeg -f lavfi -i "color=c=black:s=1080x1920:d=${SE_DUR}:r=30" \
      -i assets/bgm/sfx/sceneswitch1.mp3 \
      -c:v h264_nvenc -preset p4 -c:a aac -b:a 192k \
      -shortest "$WORK/output/cmd_796/se_segment.mp4" -y

    # Part B切り出し（既存クリップの5.3秒〜末尾）
    ffmpeg -i "$WORK/output/cmd_796/clip_s1_loop.mp4" -ss 5.3 -c:v h264_nvenc -preset p4 -c:a aac -b:a 192k "$WORK/output/cmd_796/partB_tmp.mp4" -y

    # 3セグメント結合
    echo "file 'partA_tmp.mp4'" > "$WORK/output/cmd_796/concat3.txt"
    echo "file 'se_segment.mp4'" >> "$WORK/output/cmd_796/concat3.txt"
    echo "file 'partB_tmp.mp4'" >> "$WORK/output/cmd_796/concat3.txt"
    ffmpeg -f concat -safe 0 -i "$WORK/output/cmd_796/concat3.txt" \
      -c:v h264_nvenc -preset p4 -c:a aac -b:a 192k \
      "$WORK/output/cmd_796/clip_s1_loop_new.mp4" -y
    mv "$WORK/output/cmd_796/clip_s1_loop_new.mp4" "$WORK/output/cmd_796/clip_s1_loop.mp4"
    ```

    **重要**: SEとPart Bの音声が絶対にかぶらないこと。concat demuxerで順次結合すれば音声はかぶらない。

