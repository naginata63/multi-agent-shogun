- task_id: subtask_625b
  parent_cmd: cmd_625
  assigned_to: ashigaru2
  project: dozle_kirinuki
  bloom_level: L4
  description: |
    ## Phase2: stt_merge.py 実装

    複数STTサービス（AssemblyAI/Deepgram/Gemini）の出力を自動マージするスクリプトを新規作成せよ。
    殿の手動マージ作業を自動化する最重要スクリプトじゃ。

    ### 出力先
    `/home/murakami/multi-agent-shogun/scripts/stt_merge.py`

    ### コマンドインターフェース
    ```bash
    python3 scripts/stt_merge.py \
      --assemblyai path/to/assemblyai_words.json \
      --deepgram path/to/deepgram_words.json \
      --gemini path/to/gemini_speaker.srt \
      --output path/to/merged.json \
      --report path/to/merge_report.yaml
    ```

    ### 入力ファイル形式

    #### AssemblyAI words JSON（ベース）
    テストデータ: `/home/murakami/multi-agent-shogun/work/cloud_stt_poc/assemblyai_universal2_words.json`
    ```json
    [
      {"text": "こんにちは", "start": 1234, "end": 1567, "confidence": 0.95},
      ...
    ]
    ```
    - start/endはミリ秒

    #### Deepgram words JSON（補完用）
    テストデータ: `/home/murakami/multi-agent-shogun/work/cloud_stt_poc/deepgram_nova3_words.json`
    ```json
    [
      {"word": "こんにちは", "start": 1.234, "end": 1.567, "confidence": 0.95},
      ...
    ]
    ```
    - **注意**: Deepgramのstart/endは秒（floatの秒単位）。AssemblyAIはミリ秒。単位変換が必須

    #### Gemini SRT（話者ID付き）
    テストデータ: `/home/murakami/multi-agent-shogun/work/pipeline_iuAP6rAoGFk/final_with_speakers_iuAP6rAoGFk.srt`
    ```
    1
    00:00:01,000 --> 00:00:03,500
    [dozle] こんにちは

    2
    00:00:03,500 --> 00:00:05,200
    [bon] よろしく
    ```
    - 話者ラベルは行頭の `[speaker_key]` 形式

    ### マージロジック（5段階）

    1. **AssemblyAIをベースタイムラインに**
       - AssemblyAI wordsを時系列順にロード
       - 各wordにsource="assemblyai"を付与

    2. **ギャップ検出**（0.5秒=500ms以上）
       - 連続するword間のギャップを検出: gap = next.start - prev.end
       - gap >= 500ms → 欠落区間として記録

    3. **Deepgramで補完**
       - 欠落区間に該当するDeepgram wordsを挿入
       - Deepgramの秒→ミリ秒変換: start_ms = int(start * 1000), end_ms = int(end * 1000)
       - Deepgramのキー名は"word"（AssemblyAIは"text"）→ 統一して"text"に
       - 補完wordにsource="deepgram"を付与
       - 挿入後も時系列順を維持

    4. **残存ギャップのフラグ**
       - Deepgram補完後もまだ500ms以上のギャップ → unfilled_gapsリストに追加
       - これらは手動確認が必要な箇所

    5. **Gemini話者IDの転写**
       - Gemini SRTをパース: 各エントリの(start_ms, end_ms, speaker_key)を取得
       - マージ済みwordsの各wordについて:
         - wordの中間点 mid = (start + end) / 2
         - midがGeminiエントリの区間[start_ms, end_ms]に含まれる → そのspeaker_keyを付与
         - 複数マッチの場合、最も区間が狭い（最も具体的な）エントリを優先
         - マッチなし → speaker=null

    ### 出力JSON形式
    ```json
    {
      "words": [
        {"text": "ドズル", "start": 1234, "end": 1567, "speaker": "dozle", "source": "assemblyai", "confidence": 0.95},
        {"text": "社", "start": 1567, "end": 1789, "speaker": "dozle", "source": "deepgram", "confidence": 0.88},
        ...
      ],
      "metadata": {
        "video_id": "iuAP6rAoGFk",
        "total_duration_ms": 3555000,
        "assemblyai_words": 10657,
        "deepgram_fill_words": 123,
        "total_words": 10780,
        "coverage_pct": 95.2,
        "gap_count": 3,
        "unfilled_gaps": [
          {"start_ms": 120000, "end_ms": 125000, "duration_ms": 5000}
        ],
        "speaker_id_pct": 87.5,
        "speaker_distribution": {
          "dozle": 3200,
          "bon": 1500,
          "null": 800
        }
      }
    }
    ```

    ### 品質レポート出力（YAML）
    ```yaml
    merge_report:
      video_id: iuAP6rAoGFk
      total_duration_ms: 3555000
      coverage:
        before_merge_pct: <AssemblyAI単体のカバー率>
        after_merge_pct: <マージ後のカバー率>
        improvement_pct: <向上分>
      gaps:
        total_before: <マージ前のギャップ数>
        filled_by_deepgram: <Deepgramで埋めたギャップ数>
        remaining_unfilled: <残存ギャップ数>
        unfilled_list:
          - {start_ms: 120000, end_ms: 125000, duration_ms: 5000}
      speaker_id:
        total_words: <全word数>
        with_speaker: <話者ID付きword数>
        without_speaker: <話者IDなしword数>
        coverage_pct: <話者ID付与率>
      source_breakdown:
        assemblyai: <件数>
        deepgram: <件数>
    ```

    ### 実装上の注意
    - argparse使用
    - `--video-id` オプション（デフォルト: ファイル名から推定）
    - `--total-duration` オプション（ミリ秒、デフォルト: 最後のword.endから推定）
    - SRTパースは標準的な正規表現（pysrtなどの外部ライブラリ不要）
    - JSONの読み書きは標準ライブラリのみ
    - エラーハンドリング: ファイルが存在しない場合は明確なエラーメッセージ
    - UTF-8エンコーディング

    ### テスト実行
    スクリプト完成後、実データでテスト:
    ```bash
    cd /home/murakami/multi-agent-shogun
    python3 scripts/stt_merge.py \
      --assemblyai work/cloud_stt_poc/assemblyai_universal2_words.json \
      --deepgram work/cloud_stt_poc/deepgram_nova3_words.json \
      --gemini work/pipeline_iuAP6rAoGFk/final_with_speakers_iuAP6rAoGFk.srt \
      --output work/cloud_stt_poc/merged_iuAP6rAoGFk.json \
      --report work/cloud_stt_poc/merge_report_iuAP6rAoGFk.yaml \
      --video-id iuAP6rAoGFk \
      --total-duration 3555000
    ```

    テスト後、git commit:
    ```bash
    cd /home/murakami/multi-agent-shogun
    git add scripts/stt_merge.py
    git commit -m "feat(cmd_625): add stt_merge.py - multi-STT auto merge pipeline"
    ```

    ### 完了報告
    `bash scripts/inbox_write.sh karo "足軽2号、subtask_625b完了。stt_merge.py実装+テスト完了。マージ結果: AssemblyAI <N>words + Deepgram補完<N>words = 合計<N>words。カバー率<X>%→<Y>%。話者ID付与率<Z>%。" report_received ashigaru2`
