- task_id: subtask_827a
  parent_cmd: cmd_827
  bloom_level: L4
  description: |
    ECAPA-TDNNで直接話者分離+特定する新機能を作成せよ。
    AssemblyAIのdiarizationに依存しない、声紋プロファイルベースの独自話者分離。

    ## 背景
    AssemblyAIが話者を1名にまとめると、既存のECAPA-TDNNマッピングも1名しか割り当てできない。
    BMrwN95dlGgで実際に発生（6人を全て[A]にまとめた）。

    ## 作るもの
    vocal_stt_pipeline.pyに`run_direct_speaker_identification()`を追加。

    ### アルゴリズム
    1. vocals_full.wavをロード
    2. merged JSONの各ワード（start_ms, end_ms）に対して:
       a. 音声区間を切り出し（短すぎる場合は前後にパディング、最低300ms程度）
       b. ECAPA-TDNNでembeddingを計算
       c. 全声紋プロファイル（dozle, bon, qnly, orafu, oo_men, nekooji）とcosine類似度を計算
       d. 最も類似度が高いプロファイルを話者として割り当て
       e. 最大類似度が閾値未満なら'unknown'
    3. 結果をmerged JSONに反映（speakerフィールドを上書き）

    ### 最適化
    - ワードごとに毎回embedding計算すると遅い。連続するワードをまとめて500ms-2s程度のウィンドウで処理し、同一ウィンドウ内のワードには同じ話者を割り当てる方式が現実的
    - 既存のrun_speaker_identification()のコードを参考にする（speaker_profiles読み込み、embedding計算部分は流用可能）
    - GPU使用（RTX 4060 Ti 8GB）。VRAM注意

    ### 統合方針
    - vocal_stt_pipeline.pyに追加
    - 既存のrun_speaker_identification()は残す
    - AssemblyAIの話者検出数が1の場合、自動的にdirect方式にフォールバックする形がベスト

    ## 検証
    BMrwN95dlGg（小人ジオラマ展、42分、6人）で実行:
    - 入力: 現在の全[A]のmerged JSON + vocals_full.wav
    - パス: projects/dozle_kirinuki/work/20260318_小人達がいるジオラマ展の謎を解け/
    - 期待: 少なくとも4名以上の話者が検出される
    - 検証コマンド: python3 -c "import json; d=json.load(open('merged_BMrwN95dlGg.json')); print(set(w.get('speaker','') for w in d.get('words',d)))"

    ## 声紋プロファイル
    場所: projects/dozle_kirinuki/speaker_profiles/（全6名分あり）

    ## 注意
    - CUDA使用。RTX 4060 Ti 8GB
    - タイムアウト余裕: 42分動画で10-15分
    - git commitすること
