    - フォーマット参考: projects/dozle_kirinuki/analytics/2026-03-17_snapshot.md（この形式を踏襲）
    - ntfy通知: scripts/ntfy.sh

    #### 注意
    - Analytics APIのスコープが足りない場合、token.jsonの再認証が必要になる可能性あり。その場合は手順を報告
    - Claude CLIの呼び出しは `claude -p "プロンプト"` 形式
