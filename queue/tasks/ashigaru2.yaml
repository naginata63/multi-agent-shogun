- task_id: subtask_835a
  parent_cmd: cmd_835
  bloom_level: L4
  description: |
    ショート動画の周回率を算出する機能を追加。

    ## やること
    youtube_analytics_snapshot.pyに動画別の平均視聴時間を取得する関数を追加。

    ## Analytics APIクエリ
    metrics: views,estimatedMinutesWatched,averageViewDuration
    dimensions: video
    filters: video==VIDEO_ID1,VIDEO_ID2,...（ショート動画のみ）
    sort: -views

    ## 周回率の計算
    loop_rate = averageViewDuration / duration_sec
    - 1.0以上 = ループされている
    - 1.5 = 平均1.5回再生

    ## 出力
    既存のraw JSONに per_video_analytics セクションを追加:
    {
      'id': 'VIDEO_ID',
      'title': 'タイトル',
      'duration_sec': 30,
      'avg_view_sec': 45,
      'loop_rate': 1.5,
      'views': 10000,
      'estimated_minutes': 7500
    }

    ## 対象動画
    shorts_upload_map.mdのYouTube IDリストを使うか、duration_sec < 180の動画を自動フィルタ。

    ## 即実行
    今日のデータを取得→結果をreport YAMLに含めよ。

    ## 注意
    - youtube_analytics_snapshot.pyの場所を確認してから作業
    - OAuth認証が必要な場合あり（既存の認証情報を再利用）
    - git commitすること
