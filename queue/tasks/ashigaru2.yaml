    **words[-1].endの実値を使う。**
    whisperx.align()の戻り値には`segments[].words`配列があり、各ワードにミリ秒精度のstart/endがある。
    セグメントのendには`words[-1]["end"]`（最後のワードの終了時刻）を使えばミリ秒精度が得られる。
    同様にセグメントのstartには`words[0]["start"]`を使う。

    ### 修正箇所
