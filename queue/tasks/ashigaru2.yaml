    代替: WhisperX自身のtranscription→自動align（ms精度安定）のタイムスタンプを
    Geminiエントリに転写する方式。

    ### 実装方針（軍師指示3ステップ）

    #### Step 1: WhisperX transcription追加
    gemini_transcribe.pyの`align_with_whisperx()`関数を修正。
    現在のwhisperx.align()（外部テキストforced alignment）を以下に置き換え:
    ```python
    # WhisperX独自のtranscription + alignment
    model = whisperx.load_model("large-v2", device, language="ja", compute_type="int8_float16")
    result = model.transcribe(audio_chunk, batch_size=4)
    align_result = whisperx.align(result["segments"], align_model, metadata, audio_chunk, device)
    # → align_result["segments"]にms精度のstart/endが入る
    ```

    #### Step 2: テキスト類似度マッチング
    GeminiエントリとWhisperXセグメントをdifflib.SequenceMatcherで対応付け:
    ```python
    from difflib import SequenceMatcher
    for gemini_entry in gemini_segments:
        best_ratio = 0
        best_whisperx_segs = []
        for wx_seg in whisperx_segments:
            ratio = SequenceMatcher(None, gemini_entry["text"], wx_seg["text"]).ratio()
            if ratio > best_ratio:
                best_ratio = ratio
                best_whisperx_segs = [wx_seg]
        # 1:N対応も考慮（Gemini1エントリ=WhisperX複数セグメント）
    ```

    #### Step 3: タイムスタンプ転写
    - start = 最初にマッチしたWhisperXセグメントのstart
    - end = 最後にマッチしたWhisperXセグメントのend
    - マッチなし（ratio < 0.3）→ Gemini元値フォールバック

