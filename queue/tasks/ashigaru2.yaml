    フォールバック率9.7%は見かけの数字で、マッチした90%のうち大半が誤マッチ。
    時系列順の保証がない。修正せよ。」

    ### 根本原因
    Phase B（word-levelマッチング）のfind_longest_match()がテキスト全体から探索するため、
    同じ単語・フレーズが動画の異なる時点に出現すると、遠い位置にマッチしてタイムスタンプが飛ぶ。
    **monotonic制約（時系列順の保証）がない。**

    ### 修正方針（3点）

    #### 1. Phase B: 探索窓をmonotonic制約付きに変更
    各Geminiエントリを処理する際、前のエントリで確定したword indexより**後ろ**からのみ探索:
    ```python
    search_start = 0  # 初期値
    for gemini_entry in gemini_segments:
        # wx_concat の search_start 以降でのみマッチを探す
        # find_longest_match(alo=search_start, ...) に相当
        # マッチ成功 → search_start を更新（マッチ末尾のword index）
        # マッチ失敗 → Phase Cへフォールバック（search_startは更新しない）
    ```

    #### 2. Phase C: N:1按分もmonotonic制約
    各Geminiエントリの按分結果のstartが前のエントリのend以上であることを保証:
    ```python
    prev_end = 0.0
    for entry in matched_entries:
        entry["start"] = max(entry["start"], prev_end)
        if entry["end"] <= entry["start"]:
            entry["end"] = entry["start"] + 0.1  # 最小間隔
        prev_end = entry["end"]
    ```

    #### 3. 最終バリデーション: 時系列順の後処理
    全Phase完了後、全エントリのタイムスタンプが時系列順であることを検証:
    ```python
    prev_end = 0.0
    violations = 0
    for i, entry in enumerate(gemini_segments):
        if entry["start"] < prev_end - 1.0:  # 1秒以上の逆行は異常
            # 前のエントリのendを使用（monotonic補正）
            entry["start"] = prev_end
            entry["end"] = max(entry["end"], entry["start"] + 0.1)
            violations += 1
        prev_end = entry["end"]
    logger.info(f"Monotonic violations corrected: {violations}")
    ```

