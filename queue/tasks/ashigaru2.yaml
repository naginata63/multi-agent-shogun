  description: |
    ## embedding_analytics.py overlap機能 実装

    軍師レビュー済み。足軽1号がautotagを同時実装中。
    足軽1号がembedding_analytics.pyを新規作成するため、**足軽1号がgit commitした後に**このファイルにoverlapサブコマンドを追記せよ。
    もし足軽1号がまだcommitしていなければ、自分でembedding_analytics.pyを新規作成してよい（RACE-001回避: 足軽1号と同時に同じファイルを編集しない）。

    ### overlapとは
    selected.jsonの各シーンのSRTテキストをembed→過去の切り抜きのシーンembeddingと比較→コサイン類似度>0.9で重複警告。

    ### 実装手順

    1. 既存のselected.jsonの構造を確認:
       ```bash
       ls /home/murakami/multi-agent-shogun/projects/dozle_kirinuki/work/*/output/*/selected.json 2>/dev/null | head -5
       cat $(ls /home/murakami/multi-agent-shogun/projects/dozle_kirinuki/work/*/output/*/selected.json 2>/dev/null | head -1) | python3 -m json.tool | head -30
       ```

    2. scene_search.pyのFAISSインデックス構造を確認:
       ```bash
       cat /home/murakami/multi-agent-shogun/projects/dozle_kirinuki/scripts/scene_search.py | head -80
       ```

    3. embedding_analytics.py にoverlapサブコマンドを追加:
       - `--selected PATH`: チェック対象のselected.json（必須）
       - `--threshold FLOAT`: 重複判定閾値（デフォルト0.9）
       - `--output PATH`: 結果出力先（デフォルト: data/overlap_results.yaml）

    4. 処理フロー:
       a. 指定されたselected.jsonの各シーンからstart_time/end_timeを読む
       b. 対応するSRTファイルから該当時間帯のテキストを抽出
       c. 各シーンのテキストをGemini Embedding 2でembed
