    ## 【殿NG・やり直し】アラインメント時系列崩壊の修正

    ### 殿指摘（原文）
    「test_align_v2.srt: ミリ秒精度は出ているが時系列が崩壊。182箇所で60秒以上のタイムスタンプジャンプ。
    エントリ5で00:00:19→00:29:03、エントリ6-7で00:00:21→00:19:41等。
