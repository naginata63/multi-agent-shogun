  description: "## cmd_1244: note挿絵3枚にキャプション設定\n\n### 概要\nnote下書きの挿絵3枚に以下のキャプションを設定する。\n\
    Playwrightでnoteエディタを操作する。公開禁止。下書き保存のみ。\n\n### 対象\n- note下書きURL: https://note.com/n/ncdfbdfeeadd4\n\
    \n### 設定するキャプション\n\n| 画像 | キャプション |\n|------|-------------|\n| illust_same_name（1枚目）\
    \ | 6人が喋っているのに、全員の名前が同じだった |\n| illust_useless_test（2枚目） | AIは通るテストしか書かない |\n\
    | illust_night_audit（3枚目） | 夜間に無人で矛盾レポートが届く |\n\n### 手順\n\n#### Step 1: Chrome\
    \ CDP起動確認\n```bash\ncurl -s http://localhost:9222/json/version | python3 -m json.tool\
    \ | head -3\n```\n接続できない場合:\n```bash\ngoogle-chrome --remote-debugging-port=9222\
    \ --user-data-dir=$HOME/.chrome-cdp --no-first-run &\nsleep 3\n```\n\n#### Step\
    \ 2: Playwrightスクリプトでキャプション設定\n以下のPythonスクリプトを作成して実行（または既存のCDPスクリプトパターンに従う）:\n\
    \n```python\n# /tmp/set_captions.py\nfrom playwright.sync_api import sync_playwright\n\
    import time\n\ncaptions = [\n    \"6人が喋っているのに、全員の名前が同じだった\",\n    \"AIは通るテストしか書かない\"\
    ,\n    \"夜間に無人で矛盾レポートが届く\",\n]\n\nwith sync_playwright() as p:\n    browser =\
    \ p.chromium.connect_over_cdp(\"http://localhost:9222\")\n    context = browser.contexts[0]\n\
    \    # noteの下書き編集ページを探す\n    page = None\n    for pg in context.pages:\n     \
    \   if \"note.com/n/ncdfbdfeeadd4\" in pg.url or \"note.com\" in pg.url:\n   \
    \         page = pg\n            break\n    if page is None:\n        page = context.new_page()\n\
    \        page.goto(\"https://note.com/n/ncdfbdfeeadd4/edit\")\n        time.sleep(3)\n\
    \n    # 画像のキャプション入力欄を探して設定\n    # noteエディタでは画像の下に「キャプションを入力」テキストエリアがある\n    caption_inputs\
    \ = page.query_selector_all('[placeholder=\"キャプションを入力\"]')\n    print(f\"キャプション入力欄数:\
    \ {len(caption_inputs)}\")\n    for i, inp in enumerate(caption_inputs):\n   \
    \     if i < len(captions):\n            inp.click()\n            inp.fill(captions[i])\n\
    \            print(f\"キャプション{i+1}設定: {captions[i]}\")\n            time.sleep(0.5)\n\
    \n    # 下書き保存\n    time.sleep(1)\n    # Ctrl+S または保存ボタンをクリック\n    save_btn = page.query_selector('button[data-v-save],\
    \ button:has-text(\"下書き保存\")')\n    if save_btn:\n        save_btn.click()\n \
    \   else:\n        page.keyboard.press(\"Control+s\")\n    time.sleep(2)\n   \
    \ print(\"下書き保存完了\")\n```\n```bash\npython3 /tmp/set_captions.py\n```\n\n※ 上記はテンプレート。実際のnoteエディタのDOM構造を確認してから調整せよ。\n\
