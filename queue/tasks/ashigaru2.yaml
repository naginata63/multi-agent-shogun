- task_id: subtask_749a
  parent_cmd: cmd_749
  bloom_level: L4
  description: |
    Gemini VisionでショートQCを自動実行するスクリプト gemini_shorts_qc.py を作成せよ。

    ## 概要
    ショート動画をGemini 2.5 Flashに投げて構造化QCを自動実行するCLIツール。
    従来SH・漫画SH両方に対応。

    ## 仕様

    ### CLI
    ```bash
    source ~/.bashrc && python3 scripts/gemini_shorts_qc.py \
      --video <動画パス.mp4> \
      --expect "<期待内容テキスト or YAMLファイルパス>" \
      --type <expression|manga> \
      --output <QC結果.yaml>
    ```

    ### 処理フロー
    1. 動画をGemini Files APIでアップロード（genai.upload_file）
    2. アップロード完了待ち（state == PROCESSING → ポーリング）
    3. Gemini 2.5 Flash（gemini-2.5-flash-preview-05-20）に動画 + QCプロンプトを送信
    4. レスポンスをパースしてYAML出力

    ### QCプロンプト設計
    ```
    この動画はYouTubeショート（縦型1080x1920）です。以下の観点で品質をチェックしてください。
    各項目についてPASS/FAILと理由を日本語で回答してください。

    【共通チェック項目】
    1. フック文字: 上部に読める文字があるか
    2. ロゴ: 下部にチャンネルロゴがあるか
    3. 音声: 音声が途切れたり無音区間が長くないか
    4. 全体品質: ブロックノイズ・フリーズ・黒画面等の異常なし

    【従来SH（expression）追加チェック】
    5. キャラ配置: 左右に立ち絵が正しく配置されているか
    6. 頭切れ: キャラの頭が画面外に出ていないか
    7. 位置安定: 表情切替時にキャラが上下にブレていないか
    8. ゲーム画面: 中央にゲーム映像が映っているか

    【漫画SH（manga）追加チェック】
    5. パネル表示: 漫画パネルが正しく表示されているか
    6. キャラ描画: 指定キャラが正しく描かれているか
    7. テキスト: 吹き出しのセリフが読めるか

    【期待内容】
    {expect}

    JSON形式で回答:
    {"overall": "PASS"|"FAIL", "checks": [{"item": str, "result": "PASS"|"FAIL", "reason": str}], "cost_estimate_usd": float}
    ```

    ### 出力YAML形式
    ```yaml
    qc_task: gemini_shorts_qc
    video: <パス>
    type: expression|manga
    model: gemini-2.5-flash-preview-05-20
    overall: PASS|FAIL
    checks:
      - item: "フック文字"
        result: PASS
        reason: "上部に「金を焼く時代は終わったんじゃ！」が表示されている"
      ...
    cost_estimate_usd: 0.02
    ```

    ## テスト
    作成後、以下2本でテスト実行:
    1. 従来SH v6: work/20260315_鉱石を掘ってゴールを目指せ！掘りスピード対決！【マイクラ】/output/cmd_747/shorts_gold_era_v6.mp4
       --expect "左にoo_men（豚キャラ）、右にdozle（金髪マッチョ）。フック文字「金を焼く時代は終わったんじゃ！」。51秒。SE+トランジションあり。"
       --type expression

    2. 漫画SH: work/20260315_manga_short_proto/output/sh1/sh1_manga_proto.mp4
       --expect "ドズル社メンバーの漫画パネル。ゲームシーンの漫画化。"
       --type manga

    テスト結果をQC YAMLとともに報告せよ。

    ## コスト制約
    1本あたり$0.05以下であること。Gemini 2.5 Flash動画入力は~$0.02/本想定。

    ## git
    git add scripts/gemini_shorts_qc.py
    git commit -m "feat(cmd_749): add gemini_shorts_qc.py - automated Gemini Vision QC for shorts"
  acceptance_criteria:
