    **テキストマッチングを完全廃止。** Geminiの秒精度TSでWhisperXのword-levelプールをbisect二分探索し、ms精度TSを転写する。

    ### 修正対象: scripts/gemini_transcribe.py の align_with_whisperx()

    #### Phase A（WhisperX transcription + word収集）: 変更なし
    既存のwx_all_words収集ロジックをそのまま使う。

    #### Phase B: 完全書き換え
    以下を**全削除**:
    - SequenceMatcher / find_longest_match 関連コード
    - search_start_char / monotonic制約の複雑なロジック
    - wx_concat / char_to_idx のテキスト連結・インデックスマッピング

    以下を**新規追加**:
    ```python
    import bisect

    def _find_nearest_time(sorted_times, words, target, window, use_start):
        """targetに最も近いword時刻を二分探索で見つける"""
        pos = bisect.bisect_left(sorted_times, target)
        best = None
        best_dist = window + 1
        for candidate_idx in [pos - 1, pos]:
            if 0 <= candidate_idx < len(sorted_times):
                t = words[candidate_idx]["start" if use_start else "end"]
                dist = abs(t - target)
                if dist <= window and dist < best_dist:
                    best = t
                    best_dist = dist
        return best
    ```

    各Geminiエントリのstart/endそれぞれ独立にwordプールから最近傍検索:
    ```python
    word_starts = [w["start"] for w in wx_all_words]
    word_ends = [w["end"] for w in wx_all_words]

    for entry in srt_entries:
        g_start = parse_timestamp(entry_start)  # 秒精度
        g_end = parse_timestamp(entry_end)

        new_start = _find_nearest_time(word_starts, wx_all_words, g_start, window=2.0, use_start=True)
        new_end = _find_nearest_time(word_ends, wx_all_words, g_end, window=2.0, use_start=False)

        if new_start is not None and new_end is not None and new_end > new_start:
            # ms精度に置換
            entry_start = new_start
            entry_end = new_end
            matched += 1
        elif new_start is not None:
            # startだけms化、endはGemini duration維持
            entry_end = new_start + (g_end - g_start)
            entry_start = new_start
            matched += 1
        else:
            fallback += 1  # Gemini元値維持
    ```

    #### Phase C（N:1按分ロジック全体）: 完全削除
    N:1按分コードを全て削除。もう不要。

    #### Phase D（フォールバック）: 変更なし
    wordが見つからない場合はGemini元値を維持。

    #### monotonic後処理: 簡略化
    時間近傍方式は自然にmonotonic。念のため軽いバリデーションだけ残す。

