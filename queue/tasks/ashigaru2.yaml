    - panels.jsonにref_imagesフィールドを追加（パネルごとのリファレンス画像指定）

    ### panels.json拡張例
    ```json
    {
      "id": "panel_01",
      "title": "発見",
      "ref_images": ["ss_axe_mob.png", "orafu_ch_005.jpg", "thumbnail_2W2HZr2L-nI.jpg"],
