    殿が購入済みのnote有料記事「会話漫画プロンプト自動生成システム」（斉川ニア）の
    配布ファイルをダウンロードする。記事PDFは既に保存済み。

    ### 事前確認
    curl -s http://localhost:9222/json/version | python3 -m json.tool | head -3
    Chrome CDP port 9222 が開通していることを確認。

    ### ダウンロード手順
    Playwright（Python）でnote記事ページを開き、添付ファイルのダウンロードリンクをクリック。
    記事URL: https://note.com/vast_lily4547/n/n2bd1fee29e3f

    保存先ディレクトリ: /home/murakami/multi-agent-shogun/work/vast_lily4547_downloads/

    取得すべきファイル（7件）:
    1. 会話漫画プロンプト自動生成システム.zip（基本セット・22.6KB版）
    2. 会話漫画プロンプト自動生成システム（stationary版）.zip（14.1KB版）
    3. 演出ナレッジ集.zip（21.3KB）
    4. manual_v51_guide.html（30.3KB）
