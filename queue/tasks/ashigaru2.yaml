    ## ffmpeg切り出し・結合ルールをcontext/に追記

    context/ffmpeg_rules.md を新規作成（既存ならappend）。以下の内容:

    ```markdown
    ## ffmpeg切り出し・結合ルール

    ### 切り出し（-ss位置）
    - 精密切り出し（ショート制作等）: -ssを-iの後に置け。遅いがフレーム精密
      ffmpeg -i input.mp4 -ss 2425.49 -to 2446.83 -c:v h264_nvenc ...
    - 高速切り出し（プレビュー等）: -ssを-iの前に置いてよい。キーフレーム単位でズレる
      ffmpeg -ss 2425 -i input.mp4 -t 21 ...

    ### 結合（concat方式）
    - 同一動画からの切り出し結合: demuxer concat（-f concat）でOK
    - 異なる動画からの結合: 必ずfilter_complex concat を使え
      ffmpeg -i a.mp4 -i b.mp4 -filter_complex '[0:v][0:a][1:v][1:a]concat=n=2:v=1:a=1[v][a]' -map '[v]' -map '[a]' ...
    - demuxer concatで異なるソースを結合すると音声尺がズレる

    ### 検証（必須）
    結合後に必ず音声・映像の尺を確認:
      ffprobe -show_streams output.mp4 で video duration と audio duration が一致することを確認
    ```

    ### 保存先
    projects/dozle_kirinuki/context/ffmpeg_rules.md（submodule内）
    または /home/murakami/multi-agent-shogun/context/ffmpeg_rules.md（メインリポ）
    — context/ディレクトリが存在する方に作成。

