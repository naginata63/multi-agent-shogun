      出力: 場面の詳細描写テキスト（背景環境、キャラ配置、特徴的オブジェクト、構図）

    Step2: 画像生成（gemini-3.1-flash-image-preview）
      入力: Step1の描写テキスト + リファレンス画像 + 漫画スタイル指示
      出力: 漫画パネル画像

    ### 実装方針
    - projects/dozle_kirinuki/scripts/manga_poc/generate_manga_short.py を改修
    - 既存のvision分析機能（analyze_video_for_panel, L300付近）を拡張
