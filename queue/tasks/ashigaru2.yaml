    ### 足軽1号が特定した原因
    WhisperXがsegment-levelでstart=Gemini元値(,000) / end=次セグメント境界+20ms(,020)を返す。
    つまりwhisperx.align()のsegments[].start/endはワードレベル精度ではなく、
