- bloom_level: L4
  description: "## ショート動画カット微調整（殿レビュー指摘4箇所）— WhisperX+Demucs手順\n\n### やり直し理由\n足軽は音声を聞けない。殿のアイデア:\
    \ Demucs→WhisperXでセリフ境界を特定する。\n\n### 修正箇所\n\n| # | カット | 問題 | 修正内容 |\n|---|--------|------|----------|\n\
    | ①冒頭 | 35:15-35:20(=2115-2120s) | 「ド」の前が遅い、「ギャグシリーズ」の後ろ切れ | 「ドズル社」の「ド」開始〜「ギャグシリーズ」末尾\
    \ |\n| ②マダイ | 20:25-20:55(=1225-1255s) | 「来た」から始まっていない | 「来た」の開始から |\n| ③冷めない\
    \ | 28:35-28:48(=1715-1728s) | 「冷めないうちに食べないと」で切れている | 「食べないと」の後のリアクションまで含める |\n\
    | ④シャープ | 問題なし | そのまま | **変更不要** |\n| ⑤ジョーズ | 31:10-31:30(=1870-1890s) | 「半魚人」から始まっている\
    \ | 「あいつなんか」の開始から（「さっきの半魚人」を含めない） |\n\n### 新手順（殿指示・原文ママ）\n\n#### Step 1: 各指摘カットの前後±5秒で長めにffmpeg切り出し（音声のみ）\n\
    ```bash\ncd /home/murakami/multi-agent-shogun/projects/dozle_kirinuki\nsource\
    \ ~/.bashrc && source venv/bin/activate\n\nWORK=\"work/highlight_rDYmTp\"\nCMD_ID=\"\
    cmd_562\"\nmkdir -p \"$WORK/output/$CMD_ID/analysis\"\nSRC=$(ls \"$WORK\"/*.mp4\
    \ | head -1)\n\n# ①冒頭: 35:10-35:25 (2110-2125s)\nffmpeg -ss 2110 -to 2125 -i \"\
    $SRC\" -vn -acodec pcm_s16le \"$WORK/output/$CMD_ID/analysis/cut0_raw.wav\"\n\
    # ②マダイ: 20:20-21:00 (1220-1260s)\nffmpeg -ss 1220 -to 1260 -i \"$SRC\" -vn -acodec\
    \ pcm_s16le \"$WORK/output/$CMD_ID/analysis/cut1_raw.wav\"\n# ③冷めない: 28:30-28:55\
    \ (1710-1735s)\nffmpeg -ss 1710 -to 1735 -i \"$SRC\" -vn -acodec pcm_s16le \"\
    $WORK/output/$CMD_ID/analysis/cut2_raw.wav\"\n# ⑤ジョーズ: 31:05-31:35 (1865-1895s)\n\
    ffmpeg -ss 1865 -to 1895 -i \"$SRC\" -vn -acodec pcm_s16le \"$WORK/output/$CMD_ID/analysis/cut4_raw.wav\"\
    \n```\n\n#### Step 2: Demucsで音声とBGM分離\n```bash\n# 各wavにDemucsをかけてvocals.wavを取得\n\
    OMP_NUM_THREADS=4 MKL_NUM_THREADS=4 python3 -m demucs --two-stems=vocals -o \"\
    $WORK/output/$CMD_ID/analysis/demucs_out\" \"$WORK/output/$CMD_ID/analysis/cut0_raw.wav\"\
    \nOMP_NUM_THREADS=4 MKL_NUM_THREADS=4 python3 -m demucs --two-stems=vocals -o\
    \ \"$WORK/output/$CMD_ID/analysis/demucs_out\" \"$WORK/output/$CMD_ID/analysis/cut1_raw.wav\"\
    \nOMP_NUM_THREADS=4 MKL_NUM_THREADS=4 python3 -m demucs --two-stems=vocals -o\
    \ \"$WORK/output/$CMD_ID/analysis/demucs_out\" \"$WORK/output/$CMD_ID/analysis/cut2_raw.wav\"\
    \nOMP_NUM_THREADS=4 MKL_NUM_THREADS=4 python3 -m demucs --two-stems=vocals -o\
    \ \"$WORK/output/$CMD_ID/analysis/demucs_out\" \"$WORK/output/$CMD_ID/analysis/cut4_raw.wav\"\
    \n```\nDemucs出力は `demucs_out/htdemucs/cutN_raw/vocals.wav`\n\n#### Step 3: vocals.wavにWhisperXでセリフ境界特定\n\
    ```bash\n# 各vocals.wavにWhisperXをかける（数秒のクリップなので一瞬で終わる）\nOMP_NUM_THREADS=4 MKL_NUM_THREADS=4\
    \ whisperx --model large-v3 --language ja --output_format srt \"$WORK/output/$CMD_ID/analysis/demucs_out/htdemucs/cut0_raw/vocals.wav\"\
    \ --output_dir \"$WORK/output/$CMD_ID/analysis/whisperx_out/cut0\"\nwhisperx --model\
    \ large-v3 --language ja --output_format srt \"$WORK/output/$CMD_ID/analysis/demucs_out/htdemucs/cut1_raw/vocals.wav\"\
    \ --output_dir \"$WORK/output/$CMD_ID/analysis/whisperx_out/cut1\"\nwhisperx --model\
    \ large-v3 --language ja --output_format srt \"$WORK/output/$CMD_ID/analysis/demucs_out/htdemucs/cut2_raw/vocals.wav\"\
    \ --output_dir \"$WORK/output/$CMD_ID/analysis/whisperx_out/cut2\"\nwhisperx --model\
    \ large-v3 --language ja --output_format srt \"$WORK/output/$CMD_ID/analysis/demucs_out/htdemucs/cut4_raw/vocals.wav\"\
    \ --output_dir \"$WORK/output/$CMD_ID/analysis/whisperx_out/cut4\"\n```\n\n####\
    \ Step 4: WhisperX結果からカットポイント決定\nWhisperX SRT出力を読み、以下の基準でカットポイントを特定:\n- ①冒頭: 「ドズル社」の「ド」の開始時間\
    \ 〜 「ギャグシリーズ」の末尾時間\n  ※WhisperX結果の時間は切り出し開始(2110s)からの相対時間。実動画時間 = 2110 + WhisperX時間\n\
    - ②マダイ: 「来た」の開始時間。実動画時間 = 1220 + WhisperX時間\n- ③冷めない: 「食べないと」の後のリアクション末尾。実動画時間\
    \ = 1710 + WhisperX時間\n- ⑤ジョーズ: 「あいつなんか」の開始時間。実動画時間 = 1865 + WhisperX時間\n\n**重要:\
    \ WhisperXの時間は切り出しの相対時間。元動画の絶対時間に変換せよ。**\n\n#### Step 5: ffmpegで再切り出し→連結→縦型変換\n\
    ```bash\n# Step 4で特定した正確な秒数で再切り出し\nffmpeg -ss <①開始> -to <①終了> -i \"$SRC\" -c:v\
    \ libx264 -crf 18 -c:a aac \"$WORK/output/$CMD_ID/cut0_intro.mp4\"\nffmpeg -ss\
    \ <②開始> -to 1255 -i \"$SRC\" -c:v libx264 -crf 18 -c:a aac \"$WORK/output/$CMD_ID/cut1_madai.mp4\"\
    \nffmpeg -ss 1715 -to <③終了> -i \"$SRC\" -c:v libx264 -crf 18 -c:a aac \"$WORK/output/$CMD_ID/cut2_same.mp4\"\
    \ncp \"$WORK/output/cmd_557/cut3_sharp.mp4\" \"$WORK/output/$CMD_ID/cut3_sharp.mp4\"\
    \nffmpeg -ss <⑤開始> -to 1890 -i \"$SRC\" -c:v libx264 -crf 18 -c:a aac \"$WORK/output/$CMD_ID/cut4_jaws.mp4\"\
    \n\n# 連結\ncd \"$WORK/output/$CMD_ID\"\nprintf \"file 'cut0_intro.mp4'\\nfile 'cut1_madai.mp4'\\\
    nfile 'cut2_same.mp4'\\nfile 'cut3_sharp.mp4'\\nfile 'cut4_jaws.mp4'\\n\" > concat.txt\n\
    ffmpeg -f concat -safe 0 -i concat.txt -c copy shorts_bon_gag_h.mp4\n\n# 縦型変換\n\
    ffmpeg -i shorts_bon_gag_h.mp4 \\\n  -vf \"crop=ih*9/16:ih,scale=1080:1920\" \\\
    \n  -c:v libx264 -preset medium -crf 18 \\\n  -c:a aac -b:a 192k \\\n  shorts_bon_gag.mp4\n\
    ```\n\n### 完了条件\n- WhisperX SRT結果をもとに4箇所のカットポイントを正確に特定していること\n- 各カットの修正前後のタイムスタンプを報告に含めること\n\
    - shorts_bon_gag.mp4がwork/highlight_rDYmTp/output/cmd_562/に保存\n- 縦型1080x1920であること\n\
    \n## 報告先\nbash scripts/inbox_write.sh karo \"足軽1号、subtask_562a2完了。ショートカット微調整完了。[WhisperX結果と各カットの修正タイムスタンプ]\"\
    \ report_received ashigaru1\n"
