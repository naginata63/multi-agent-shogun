  description: claude-mem hooks.json の SessionStart に pgrep guard を追加し bun worker
    daemon の多重起動を防止。HOME=/home/murakami を統一。
  target_path: /home/murakami/.claude/plugins/cache/thedotmack/claude-mem/10.6.3/hooks/hooks.json
  steps: '1. Read /home/murakami/.claude/plugins/cache/thedotmack/claude-mem/10.6.3/hooks/hooks.json

    2. SessionStart hooks[1].command (bun worker-service.cjs start) の先頭に以下を追加: HOME=/home/murakami;
    pgrep -f ''worker-service.cjs --daemon'' >/dev/null 2>&1 && exit 0;

    3. 修正後の command 文字列: ''HOME=/home/murakami; _R=...; pgrep -f worker-service.cjs.*--daemon
    >/dev/null 2>&1 && exit 0; node ...''

    4. JSON バリデーション: python3 -m json.tool hooks.json >/dev/null

    5. 動作確認: pgrep -fa ''worker-service.cjs --daemon'' が1件のみ出ること

    6. git add /home/murakami/.claude/ は不可。代わりにファイル内容をコミット対象外として確認のみ

