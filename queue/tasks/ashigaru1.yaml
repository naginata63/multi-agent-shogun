  description: "Flash Lite + ハルシネーション対策プロンプト改善 → iuAP6rAoGFk SRT再生成\n\n## Step1: scripts/gemini_transcribe.py\
    \ のプロンプトを改善\ngenerate_subtitles関数内のプロンプト（34-63行目付近）に以下を追加:\n\n```\n【ハルシネーション防止ルール（厳守）】:\n\
    - 同一テキストを3回以上連続で出力しないこと。同じ発話が実際に繰り返されている場合でも、3回目以降は省略してよい\n- 動画の実際の尺を超えるタイムスタンプを絶対に生成しないこと\n\
