qc_report:
  task_id: subtask_917a
  date: '2026-03-24'
  inspector: ashigaru4
  character: oo_men
  cameras_used:
    - front_close
    - side
    - three_quarter
  images_dir: projects/dozle_kirinuki/work/3d_motion_qc/
  total_images_generated: 48

  # ─── サイドカメラ共通問題 ───────────────────────────────────────
  system_issue:
    id: SIDE_CAMERA_OFFSET
    severity: WARN
    description: >
      サイドカメラ（target Y=2.0）は移動モーション（walk/run/sneak）専用設計。
      静止モーション（root_speed=0）のキャラはY=0.0に留まるため、
      サイドカメラでは画面右端に少し見えるだけでQC不可能。
      対象: idle, wave, jump, dance, arms_crossed, laugh, shrug, nod,
             surprise, point, think, fist_pump（12種）
    root_cause: >
      render_mc.py の START_Y=6→END_Y=-2 パス設計。
      移動モーションはframe30でY≈2.0（カメラターゲット到達）。
      静止モーションはY=0.0固定のままでカメラターゲットと2m乖離。

  motions_qc:
    # ─── sine_wave タイプ ───────────────────────────────────────
    - name: walk
      type: sine_wave
      status: OK
      symptom: ""
      notes: "歩行ポーズ正常。腕前後振り・脚交差確認。地面接地OK。"
      images:
        front_close: projects/dozle_kirinuki/work/3d_motion_qc/walk_front_close.png
        side: projects/dozle_kirinuki/work/3d_motion_qc/walk_side.png
        three_quarter: projects/dozle_kirinuki/work/3d_motion_qc/walk_three_quarter.png

    - name: run
      type: sine_wave
      status: OK
      symptom: ""
      notes: "走りポーズ正常。腕振り大きく・脚広がり確認（side viewで顕著）。"
      images:
        front_close: projects/dozle_kirinuki/work/3d_motion_qc/run_front_close.png
        side: projects/dozle_kirinuki/work/3d_motion_qc/run_side.png
        three_quarter: projects/dozle_kirinuki/work/3d_motion_qc/run_three_quarter.png

    - name: idle
      type: sine_wave
      status: WARN
      symptom: "side_camera_miss"
      notes: >
        front_close・three_quarterはOK（直立待機、腕体側、頭ほぼ正位置）。
        side: SIDE_CAMERA_OFFSET問題により画面外。
      images:
        front_close: projects/dozle_kirinuki/work/3d_motion_qc/idle_front_close.png
        side: projects/dozle_kirinuki/work/3d_motion_qc/idle_side.png
        three_quarter: projects/dozle_kirinuki/work/3d_motion_qc/idle_three_quarter.png

    - name: wave
      type: sine_wave
      status: WARN
      symptom: "side_camera_miss"
      notes: >
        front_close: 右腕が上がり手を振るポーズ確認。左腕体側。OK。
        side: SIDE_CAMERA_OFFSET問題により画面外。
        three_quarter: 腕振りポーズ確認OK。
      images:
        front_close: projects/dozle_kirinuki/work/3d_motion_qc/wave_front_close.png
        side: projects/dozle_kirinuki/work/3d_motion_qc/wave_side.png
        three_quarter: projects/dozle_kirinuki/work/3d_motion_qc/wave_three_quarter.png

    - name: sneak
      type: sine_wave
      status: OK
      symptom: ""
      notes: >
        しゃがみ歩行正常。体位が低い（crouch_offset確認）。
        side: 移動モーションなのでframe30でY≈2.0付近、正常に映っている。
      images:
        front_close: projects/dozle_kirinuki/work/3d_motion_qc/sneak_front_close.png
        side: projects/dozle_kirinuki/work/3d_motion_qc/sneak_side.png
        three_quarter: projects/dozle_kirinuki/work/3d_motion_qc/sneak_three_quarter.png

    - name: dance
      type: sine_wave
      status: OK
      symptom: ""
      notes: >
        root_rotation_speed=3.0 deg/frameのためframe30でキャラが90°回転。
        front_closeでは横向き＋腕大振り確認。three_quarterで斜めダンス確認。
        骨崩壊なし。
      images:
        front_close: projects/dozle_kirinuki/work/3d_motion_qc/dance_front_close.png
        side: projects/dozle_kirinuki/work/3d_motion_qc/dance_side.png
        three_quarter: projects/dozle_kirinuki/work/3d_motion_qc/dance_three_quarter.png

    # ─── keyframe_sequence タイプ ───────────────────────────────
    - name: attack
      type: keyframe_sequence
      status: OK
      symptom: ""
      notes: >
        右腕振り下ろしアニメ確認。frame30=loop20fの途中、右腕振り完了後。
        骨崩壊なし。体・脚正常。
      images:
        front_close: projects/dozle_kirinuki/work/3d_motion_qc/attack_front_close.png
        side: projects/dozle_kirinuki/work/3d_motion_qc/attack_side.png
        three_quarter: projects/dozle_kirinuki/work/3d_motion_qc/attack_three_quarter.png

    - name: jump
      type: keyframe_sequence
      status: WARN
      symptom: "frame30=loop_end, side_camera_miss"
      notes: >
        loop_frames=30のためframe30はloop frame0（着地）と同位置。
        front_closeはidle相当の直立ポーズ。実動作はframe15付近が最高点。
        side: SIDE_CAMERA_OFFSET問題により画面外。
        骨崩壊なし。
      images:
        front_close: projects/dozle_kirinuki/work/3d_motion_qc/jump_front_close.png
        side: projects/dozle_kirinuki/work/3d_motion_qc/jump_side.png
        three_quarter: projects/dozle_kirinuki/work/3d_motion_qc/jump_three_quarter.png

    # ─── bone_keyframes タイプ ─────────────────────────────────
    - name: arms_crossed
      type: bone_keyframes
      status: NG
      symptom: "両腕が胸の前でクロスせず上方・外側に跳ね上がり"
      notes: >
        【既知崩壊・NG確定】
        front_close: 両腕がV字状に上方へ跳ね上がり。腕組みポーズになっていない。
        three_quarter: 同様に両腕が上外方向に展開。
        設計値 Arm:Upper x=-65, z=±40（内向き下方）に対し
        実レンダリングは腕が上方向に配置されている。
        Bone rotationの軸解釈が反転している可能性。
      images:
        front_close: projects/dozle_kirinuki/work/3d_motion_qc/arms_crossed_front_close.png
        side: projects/dozle_kirinuki/work/3d_motion_qc/arms_crossed_side.png
        three_quarter: projects/dozle_kirinuki/work/3d_motion_qc/arms_crossed_three_quarter.png

    - name: laugh
      type: bone_keyframes
      status: OK
      symptom: ""
      notes: >
        体が前後に揺れるポーズ確認。Body.x=10で前傾、腕が軽く下方向に広がり。
        front_close: 頭前傾、腕やや外広がり。laugh感あり。骨崩壊なし。
      images:
        front_close: projects/dozle_kirinuki/work/3d_motion_qc/laugh_front_close.png
        side: projects/dozle_kirinuki/work/3d_motion_qc/laugh_side.png
        three_quarter: projects/dozle_kirinuki/work/3d_motion_qc/laugh_three_quarter.png

    - name: shrug
      type: bone_keyframes
      status: OK
      symptom: ""
      notes: >
        両腕をT字状に広げ前腕を曲げるポーズ確認（肩すくめ）。
        front_close: 腕が水平方向に広がりforearm bend確認。骨崩壊なし。
        ※肩を上げる動作はマイクラリグの構造上未実装だが、腕位置は意図通り。
      images:
        front_close: projects/dozle_kirinuki/work/3d_motion_qc/shrug_front_close.png
        side: projects/dozle_kirinuki/work/3d_motion_qc/shrug_side.png
        three_quarter: projects/dozle_kirinuki/work/3d_motion_qc/shrug_three_quarter.png

    - name: nod
      type: bone_keyframes
      status: WARN
      symptom: "frame30=loop_end, side_camera_miss"
      notes: >
        loop_frames=30のためframe30はHead.x=0（初期位置）。
        front_closeはidleと見分けがつかない。実動作はframe8がうなずき最大。
        side: SIDE_CAMERA_OFFSET問題により画面外。
        骨崩壊なし。
      images:
        front_close: projects/dozle_kirinuki/work/3d_motion_qc/nod_front_close.png
        side: projects/dozle_kirinuki/work/3d_motion_qc/nod_side.png
        three_quarter: projects/dozle_kirinuki/work/3d_motion_qc/nod_three_quarter.png

    - name: surprise
      type: bone_keyframes
      status: WARN
      symptom: "arms_awkward_from_front"
      notes: >
        front_close（frame30=45frameループ中間）: 体後傾・両腕が上内方向。
        一見arms_crossedに似た腕配置だが設計はx=-50,z=±60（上外方向）。
        three_quarter確認: 体後傾・頭後ろ倒れ・腕が肩より上に展開。
        「驚き」として認識可能だが、bone_keyframesの軸問題が一部影響している可能性あり。
      images:
        front_close: projects/dozle_kirinuki/work/3d_motion_qc/surprise_front_close.png
        side: projects/dozle_kirinuki/work/3d_motion_qc/surprise_side.png
        three_quarter: projects/dozle_kirinuki/work/3d_motion_qc/surprise_three_quarter.png

    - name: point
      type: bone_keyframes
      status: OK
      symptom: ""
      notes: >
        右腕を前方に伸ばす指差しポーズ確認。体が前傾。頭も前方向き。
        three_quarter: 右腕の伸び方向・前腕のextend確認。骨崩壊なし。
      images:
        front_close: projects/dozle_kirinuki/work/3d_motion_qc/point_front_close.png
        side: projects/dozle_kirinuki/work/3d_motion_qc/point_side.png
        three_quarter: projects/dozle_kirinuki/work/3d_motion_qc/point_three_quarter.png

    - name: think
      type: bone_keyframes
      status: OK
      symptom: ""
      notes: >
        右腕が顎付近まで上がり「考え中」ポーズ確認。頭が右に傾く。
        three_quarter: 顔の前に右腕が来る形、左腕は腰付近。骨崩壊なし。
      images:
        front_close: projects/dozle_kirinuki/work/3d_motion_qc/think_front_close.png
        side: projects/dozle_kirinuki/work/3d_motion_qc/think_side.png
        three_quarter: projects/dozle_kirinuki/work/3d_motion_qc/think_three_quarter.png

    - name: fist_pump
      type: bone_keyframes
      status: OK
      symptom: ""
      notes: >
        右腕を上方に突き上げるガッツポーズ確認。頭が後方に傾く。
        front_close: 右腕が画面左上方向に突き上がり。OK。
        three_quarter: 右腕の伸び・角度確認。骨崩壊なし。
      images:
        front_close: projects/dozle_kirinuki/work/3d_motion_qc/fist_pump_front_close.png
        side: projects/dozle_kirinuki/work/3d_motion_qc/fist_pump_side.png
        three_quarter: projects/dozle_kirinuki/work/3d_motion_qc/fist_pump_three_quarter.png

  # ─── 集計 ──────────────────────────────────────────────────────
  summary:
    total_motions: 16
    ok: 9
    warn: 6
    ng: 1
    ok_list: [walk, run, sneak, dance, attack, laugh, shrug, point, think, fist_pump]
    warn_list: [idle, wave, jump, nod, surprise]
    ng_list: [arms_crossed]

  recommendations:
    - id: FIX_ARMS_CROSSED
      priority: HIGH
      motion: arms_crossed
      issue: "両腕が上方に跳ね上がり。腕組みポーズにならない。"
      suggestion: >
        bone_keyframesのrotation軸（X/Z）がMCprepリグと合っていない可能性。
        Arm:Upper の x=-65 を x=65 にするか、z軸で制御するか確認が必要。
    - id: FIX_SIDE_CAMERA_FOR_STATIC
      priority: MEDIUM
      issue: "静止モーションのサイドカメラがY=0に届かない"
      suggestion: >
        scene_templates.jsonのside cameraのtargetをY=0.0にするか、
        静止モーション用に別カメラプリセット（side_static等）を追加する。
    - id: IMPROVE_SURPRISE
      priority: LOW
      motion: surprise
      issue: "驚きポーズの腕が意図より内側に来ている可能性"
      suggestion: >
        z軸の符号が反転している可能性を確認。
        surprise: Arm:Right:Upper z=-40（内向き）→ z=40（外向き）試し。
