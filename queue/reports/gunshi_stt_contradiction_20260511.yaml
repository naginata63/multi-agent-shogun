  - id: STT_H003
    severity: HIGH
    file: projects/dozle_kirinuki/scripts/diarize.py
    line: 17-26
    detail: |
      PLDA load 失敗を try-except で握りつぶし:
      ```python
      def _patched_get_plda(plda, token=None, cache_dir=None):
          try:
              return _orig_get_plda(plda, token=token, cache_dir=cache_dir)
          except Exception as e:
              print(f"[WARN] PLDA load skipped (not needed for AgglomerativeClustering): {type(e).__name__}")
              return None
      ```
      → AgglomerativeClustering 使用時は PLDA 不要との説明あるが、`return None` 後に後段で None 参照エラーが発生する遅延 fail パスを残す。Exception 全捕捉 (silent fail) も問題
    recommendation: GatedRepoError 等の具体的例外のみ except して他は raise・後段 None ハンドリング明示
    impact: MEDIUM-HIGH (現状孤立だが将来の bug 温床)

  - id: STT_H004
    severity: HIGH
    file: projects/dozle_kirinuki/scripts/diarize.py
    line: 49-56
    detail: |
      soundfile 経由 WAV 読込のみ対応 (pyannote 4.0 torchcodec 回避策の副作用):
      ```python
      import soundfile as sf
      data, sr = sf.read(args.audio)
      ```
      → soundfile は WAV/FLAC は OK だが MP3/OGG/M4A 非対応・vocal_stt_pipeline.py が生成する `vocals_full.wav` 専用前提・他フォーマット入力で SoundFileError
    recommendation: ffmpeg 経由で WAV 変換 → soundfile 読込 (vocal_stt_pipeline.py の Step 1a と同パターン) or audioread フォールバック追加
    impact: MEDIUM (孤立 dead script・運用入力 wav 限定の現状で実害薄)

  - id: STT_M001
    severity: MEDIUM
    file: projects/dozle_kirinuki/scripts/diarize.py
    line: 8-10
    detail: |
      torchaudio 2.10.0 の `list_audio_backends` 削除パッチをモジュールロード時に適用:
      ```python
      import torchaudio as _torchaudio
      if not hasattr(_torchaudio, 'list_audio_backends'):
          _torchaudio.list_audio_backends = lambda: ['sox']
      ```
      → 将来 torchaudio API 復活で patch が不要になる時に検出機構なし・dead patch 化
    recommendation: コメントに「torchaudio>=2.10.0 で必要」明記 + 検出 + バージョン依存条件
    impact: LOW (現状動作中)

