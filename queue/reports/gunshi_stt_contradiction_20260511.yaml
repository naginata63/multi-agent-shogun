      - `build_fine_grained_srt()` (L37-110): word-level grouping ロジック (74 行) — transcribe_fine_grained() で呼ばれていたが NotImplementedError 化で到達不可
      - `format_time()` (L30-35): SRT 時刻変換 — 呼出元 build_fine_grained_srt のみ (連鎖 dead code)
      - `PUNCTUATION` (L28): 区切り文字定数 — 上記関数のみ参照
      - `if __name__ == "__main__"` block (L126-154): parser → 結局 NotImplementedError raise

      **さらに本ファイル自体を import/呼出するコードが他にゼロ**:
      `grep -rln "transcribe_with_speakers" projects/dozle_kirinuki/scripts/ scripts/ | grep -v legacy` → 自分自身のみ
      → 完全孤立 dead script。154 行中 ~90 行 (約 60%) が dead code・実質 NotImplementedError marker としてのみ機能
    recommendation: |
      (a) **完全削除** (推奨): 本ファイル削除 + cmd_1663-A 統合 docs に「migration 完了済」記載
      (b) **legacy/ 移動**: legacy/transcribe_with_speakers.py が既に存在 (185 行・前 cmd_1663-A の手動コピーゴミ) — どちらも legacy/ に統合
      (c) **stub 簡素化**: 本ファイルを 10 行程度の stub (raise NotImplementedError + migration guide) に簡素化
    impact: HIGH (dead code 90 行が他開発者の混乱原因・grep で WhisperX 残骸として常に hit)

