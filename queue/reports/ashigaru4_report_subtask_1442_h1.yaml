hotfix_notes:
  what_was_wrong: |
    初回実装で pretool_check.sh CHK5 の python ブロックが `echo "$INPUT" | python3 <<'PYEOF'` パターンだったため、stdin が空になる silent failure を起こしていた (heredoc が pipe の stdin を奪う bash 仕様)。E2E テストで初めて判明。
  workaround: |
    INPUT を env var (PRETOOL_INPUT_JSON) として python に渡す形に変更。既存 CHK1-CHK4 は `python3 -c "..."` パターンのためこの問題に遭わない。
  proper_fix: |
    将来 hook script で heredoc + stdin が必要な場合は必ず env var / 一時ファイル / python3 -c パターンで stdin pipe を維持せよ。本件は advisor 事前助言 + 完了前助言で検出 → CHK5 を fix 済み。

  what_was_wrong_2: |
    家老 task YAML 本文は「PostToolUse hook で done 阻止」と記載していたが、Claude Code の PostToolUse は exit 0 固定で BLOCK 不可 (既存 posttool_cmd_check.sh のコメント参照)。
  workaround_2: |
    実際の BLOCK は PreToolUse CHK5 で実装。PostToolUse は verify_result: run_now の sentinel を見て verify コマンド自動実行のみ担当する二重化。
  proper_fix_2: |
    次回 task YAML 発令時、Claude Code hook 仕様を踏まえて PreToolUse/PostToolUse の役割分担を明記せよ (家老 Task Assignment Checklist に追記候補)。

