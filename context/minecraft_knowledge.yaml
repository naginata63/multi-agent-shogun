      visual: "画面中央に固定表示される白い十字線（+）。照準点。小さなサイズ"
      colors: "白 (#FFFFFF)"
      note: "常時画面中央に表示。一人称視点の基準点"

    - name: ボスバー (Boss Bar)
      visual: "画面上部中央に表示される体力ゲージバー。ボス敵の名前と残体力を示す。体力バーより大きく目立つデザイン"
      colors: "紫や赤などのバー色、白テキスト"
      note: "ウィザーやエンダードラゴン戦闘中に表示"

  visual_style:
    - name: ブロックの基本質感
      description: "全てのブロックは16×16ピクセルのテクスチャで構成。立方体（1×1×1m）が基本単位。テクスチャは限られた色数でドット絵風に描かれ、斜め上からのアイソメトリック視点でレンダリング"

    - name: アイテムのテクスチャスタイル
      description: "インベントリ内アイテムは16×16ピクセルの平面テクスチャ。各マテリアルで決まった色パレットを使用（木=茶系、石=灰系、鉄=銀系、金=黄系、ダイヤ=シアン系、エメラルド=緑系、ネザーライト=暗灰系）"

    - name: エンチャント光沢 (Enchantment Glow)
      description: "エンチャントされたアイテムは紫/青の薄い光沢エフェクトが重なる。アニメーション的に色がゆらゆら変化する。漫画では紫のオーラや発光エフェクトで表現"
      colors: "紫 (#8000FF) ～ 青 (#0080FF) の半透明グロー"

    - name: 空（オーバーワールド）
      description: "昼間は明るいシアン/水色グラデーション。夜は濃い紺/黒に星と月。夕焼け・朝焼け時はオレンジ～ピンクのグラデーション。雲は白い平面的な形状"
      colors: "昼: 明るい水色 (#70C0E0)、夜: 濃い紺 (#0A0A2A)"

    - name: 水
      description: "半透明のシアン〜水色。光の屈折で波紋テクスチャがアニメーション。深いほど暗く見える"
      colors: "半透明の水色 (#3F76E4)、深部は暗い青"

    - name: 溶岩 (Lava)
      description: "不透明のオレンジ〜赤。泡立つようなゆっくりとしたテクスチャアニメーション。光源になり周囲を明るくする"
      colors: "オレンジ (#FF6600) ～ 赤 (#CC2200) の流れるパターン"

    - name: 草ブロック (Grass Block)
      description: "上面が緑色のテクスチャ、側面が茶色の土+緑の草が覗く複合テクスチャ。バイオームによって緑の色味が変化（砂漠=黄緑、ジャングル=濃緑）"
      colors: "上面: 緑 (#7CBD6B)、側面: 茶色 (#8B6914) に緑の縁"

    - name: 石ブロック / 丸石 (Stone / Cobblestone)
      description: "石: 均一なグレーのテクスチャ。丸石: 不規則な石の模様が入ったグレー。どちらも硬い岩の質感"
      colors: "石: 均一グレー (#808080)、丸石: 不規則模様のグレー (#717171)"

    - name: 全体的なビジュアルトーン (Overall Visual Tone)
      description: "「かわいい」と「冒険感」が共存するドット絵美学。色数は少ないが鮮明。影やライティングは単純化されている。3Dだがレゴブロックのような親しみやすい質感。漫画で描く場合は輪郭線を太めにしてドット絵感を残すか、ポップなデフォルメ表現が合う"
