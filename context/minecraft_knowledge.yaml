  game_ui:
    - name: ホットバー (Hotbar)
      visual: "画面最下部の横長バー。9つのアイテムスロットが横並び。各スロットは正方形の枠で、現在選択中スロットは白い枠（ハイライト）で強調表示。スロット内に数字（1〜9）が小さく表示される"
      colors: "半透明の黒 (#1A1A1A 60%) の背景バー、白いスロット枠、選択中は白で明るく"
      note: "画面下部中央に常時表示。漫画で描く場合は画面下部に必ず描く"

    - name: インベントリ (Inventory)
      visual: "ゲーム内メニュー画面。上段にクラフトグリッド（2×2）とヘルメット・上着・ズボン・ブーツのアーモリースロット、中段に27マスのメインインベントリ、下段にホットバーの9スロット"
      colors: "石板風の灰色背景 (#C6C6C6) に黒いスロット枠"
      note: "Eキーで開く。漫画では半開きの状態でアイテムが表示される描写に使われることが多い"

    - name: 体力バー (Health Bar)
      visual: "画面左下ホットバー上部に表示。赤いハートアイコンが横に10個並ぶ（最大20HP = ハート10個）。ダメージを受けるとハートが半分や空になる"
      colors: "赤 (#FF0000) のハートアイコン、ダメージ時は暗い赤/グレー"
      note: "ハートの絵柄はミニマリストなピクセルアート風"

    - name: 経験値バー (Experience Bar)
      visual: "体力バーの下に表示される横長のバー。現在の経験値レベル（数字）を中央に表示。バーが満タンでレベルアップ"
