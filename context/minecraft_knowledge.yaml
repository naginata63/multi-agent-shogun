categories:
  vanilla_items:
    # --- ツルハシ各種 ---
    - name: 木のツルハシ (Wooden Pickaxe)
      visual: "先端が茶色の板材（木材ブロック風テクスチャ）、持ち手は細い茶色の棒。16x16ピクセルのドット絵風。全体的にくすんだ茶色"
      colors: "茶色 (#8B7355)、ハンドル部分は細い棒"
      usage: "最初期の採掘ツール。石や石炭を掘れる。耐久値が低い"

    - name: 石のツルハシ (Stone Pickaxe)
      visual: "先端が灰色の丸石テクスチャ、持ち手は茶色の木の棒。先端は粗い質感の灰色"
      colors: "灰色 (#808080) の先端、茶色の持ち手"
      usage: "中序盤の採掘ツール。鉄鉱石などを掘れる"

    - name: 鉄のツルハシ (Iron Pickaxe)
      visual: "先端が銀色の金属質テクスチャ、光沢感のあるシルバーグレー。持ち手は茶色の木の棒"
      colors: "銀/メタリックグレー (#C0C0C0)、茶色のハンドル"
      usage: "中盤の主力採掘ツール。ダイヤモンド鉱石なども掘れる"

    - name: 金のツルハシ (Golden Pickaxe)
      visual: "先端が鮮やかな黄色・金色。ピカピカしたゴールド感。持ち手は茶色の棒"
      colors: "明るい黄金色 (#FFD700, #DBAF51)、茶色のハンドル"
      usage: "採掘速度が最速だが耐久値が極めて低い。実用性は低め"

    - name: ダイヤモンドのツルハシ (Diamond Pickaxe)
      visual: "先端がシアン～水色の結晶質テクスチャ。宝石のような輝き。持ち手は茶色の棒"
      colors: "シアン/水色 (#45ACA5, #B9F2FF)、茶色のハンドル"
      usage: "終盤の高耐久採掘ツール。黒曜石も掘れる"

    - name: ネザーライトのツルハシ (Netherite Pickaxe)
      visual: "先端が暗いグレー～黒の重厚な金属質テクスチャ。鈍い光沢感。ダイヤより一回り大きく見える"
      colors: "暗いグレー/黒 (#404040) にメタリック光沢"
      usage: "最強の採掘ツール。最高耐久値、溶岩で燃えない"

    # --- インゴット・素材 ---
    - name: ダイヤモンド (Diamond)
      visual: "小さな八面体の結晶。光を反射するシアン色の宝石。アイテム枠内では斜め向きの菱形シルエット"
      colors: "明るいシアン (#B9F2FF) にキラキラエフェクト"
      usage: "最高級クラフト素材。ツール・防具・取引通貨に使用"

    - name: エメラルド (Emerald)
      visual: "小さな結晶。ダイヤモンドに似た形だが鮮やかな緑色。アイテム枠内では縦長の六角形シルエット"
      colors: "鮮やかな緑 (#50C878)"
      usage: "村人との交易通貨。エメラルド鉱石から採取"

    - name: 金インゴット (Gold Ingot)
      visual: "小さな長方形の金属棒。上面が明るく下面が暗い立体感あるインゴット形状"
      colors: "黄金色 (#DBAF51) に光沢"
      usage: "クラフト素材。金のツールや防具、レール等に使用"

    - name: 銅インゴット (Copper Ingot)
      visual: "小さな長方形の金属棒。橙茶色の色合い。酸化前は暖かみのある橙色"
      colors: "橙茶色 (#B87333)。酸化すると青緑色 (#4E9975)"
      usage: "クラフト素材。望遠鏡、雷避け針等に使用"

    - name: 鉄インゴット (Iron Ingot)
      visual: "小さな長方形の金属棒。シルバーグレーで光沢あり"
      colors: "シルバーグレー (#C0C0C0)"
      usage: "最も基本的なクラフト素材。ツール・防具・レール等"

    - name: ネザーライトインゴット (Netherite Ingot)
      visual: "小さな長方形の金属棒。暗いグレー～黒。重厚感があり他のインゴットより高級感がある"
      colors: "暗いグレー/黒 (#2F2F2F) にメタリック光沢"
      usage: "最上位クラフト素材。ダイヤ装備をネザーライト装備に強化"

    - name: 石炭 (Coal)
      visual: "黒い不規則形状の鉱石片。角張った形でマットな質感"
      colors: "深い黒/チャコールグレー (#1C1C1C)"
      usage: "燃料（かまど・松明）、木炭と同用途"

    # --- ブロック ---
    - name: かまど / 溶鉱炉 (Furnace)
      visual: "1ブロックサイズの立方体。正面に黒い炉口の穴が開いており、灰色の石質テクスチャ。使用中は炉口がオレンジ色に光る"
      colors: "灰色 (#808080) の本体、炉口は黒 (#1A1A1A)。稼働中は炉口がオレンジ (#FF6000)"
      usage: "鉱石や食料を精錬・製錬する。燃料（石炭等）が必要"

    - name: 作業台 (Crafting Table)
      visual: "1ブロックサイズの木製立方体。上面に3×3のクラフトグリッド模様、側面に金槌・のこぎり・ペンチ等の工具がテクスチャとして描かれている"
      colors: "茶色の木材 (#8B6914) ベース、上面に白いグリッド線"
      usage: "3×3レシピでアイテムをクラフトするインターフェース"

    - name: TNT
      visual: "1ブロックサイズの立方体。赤と白の縞模様に黒文字で「TNT」と書かれている。点火後は明滅する"
      colors: "赤 (#CC0000) と白 (#FFFFFF) の縞、黒テキスト"
      usage: "爆発物。点火すると数秒後に爆発してブロックを吹き飛ばす"

    # --- 液体バケツ ---
    - name: 溶岩バケツ (Lava Bucket)
      visual: "鉄製バケツの形をしたアイテム。中にオレンジ色の溶岩が入っている。バケツはシルバーグレー、中身は明るいオレンジ"
      colors: "シルバーグレーのバケツ (#C0C0C0)、オレンジ～赤の溶岩 (#FF4500)"
      usage: "溶岩を運搬・設置できる。かまどの燃料にもなる（1バケツで100精錬）"

    - name: 水バケツ (Water Bucket)
      visual: "鉄製バケツの形をしたアイテム。中に半透明な水色の水が入っている"
      colors: "シルバーグレーのバケツ、透明感のある水色 (#4FC3F7)"
      usage: "水を運搬・設置できる。農業・消火に使用"

    # --- ブーツ（バニラ） ---
    - name: ダイヤモンドのブーツ (Diamond Boots)
      visual: "ブーツ型のアイテム。シアン色の結晶質テクスチャ。くるぶし丈のブーツ形状"
      colors: "シアン/水色 (#45ACA5)"
      usage: "高耐久の防具。足への攻撃ダメージを軽減"

