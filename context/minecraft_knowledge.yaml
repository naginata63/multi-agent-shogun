      note: "討伐やクラフトで増加する"

    - name: チャット欄 (Chat)
      visual: "画面左下に表示されるテキストエリア。白い文字が半透明の黒背景上に表示。複数行表示可能でスクロールで遡れる"
      colors: "白テキスト (#FFFFFF) on 半透明黒 (#000000 50%)"
      note: "ゲームメッセージ・プレイヤー間の会話・コマンド出力が表示される"

