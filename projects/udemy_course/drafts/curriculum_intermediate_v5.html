<h2 id="3-3-%E5%B1%A4%E3%81%AE%E4%B8%96%E7%95%8C%E8%A6%B3-%E6%9C%AC%E8%AC%9B%E5%BA%A7%E3%81%AE%E5%9C%B0%E5%9B%B3">3. 3 層の世界観 (本講座の地図)</h2>
<blockquote>
<p><strong>本講座の核心</strong>: AI 開発で起きる困りごとは、必ず以下の 3 層のどこかが欠けている。</p>
</blockquote>
<h3 id="31-3-%E5%B1%A4%E3%83%A2%E3%83%87%E3%83%AB">3.1 3 層モデル</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>┌────────────────────────────────────────┐
│  プロンプト層 (Prompt)                  │
│  「AI への 1 回の指示の質」              │
│  ── /command・診断・XML タグ・関数化     │
├────────────────────────────────────────┤
│  コンテキスト層 (Context)               │
│  「AI に何を覚えさせ、何を見せるか」      │
│  ── memory・handoff・必要時取得・配置技術 │
├────────────────────────────────────────┤
│  ハーネス層 (Harness)                   │
│  「AI を動かす仕組み・自動化の枠組み」    │
│  ── 役割別ファイル・/advisor・hook・Skill │
└────────────────────────────────────────┘
</code></pre>
<h3 id="32-%E5%90%84%E5%B1%A4%E3%81%AE%E5%BD%B9%E5%89%B2%E3%81%A8%E6%9C%AC%E8%AC%9B%E5%BA%A7%E3%81%AE%E7%AB%A0%E9%85%8D%E7%BD%AE">3.2 各層の役割と本講座の章配置</h3>
<table>
<thead>
<tr>
<th>層</th>
<th>役割</th>
<th>担当章</th>
<th>持ち帰る道具</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>プロンプト層</strong></td>
<td>1 回の指示を資産化・診断する</td>
<td>ch01 / ch02</td>
<td><code>/command</code> / 診断チェックリスト 10 項目</td>
</tr>
<tr>
<td><strong>コンテキスト層</strong></td>
<td>必要なときに必要な情報を AI に届ける</td>
<td>ch03 / ch04</td>
<td>TL;DR 配置 / claude-mem / handoff / 必要時取得</td>
</tr>
<tr>
<td><strong>ハーネス層</strong></td>
<td>AI を分業・第三者レビュー・自動化させる</td>
<td>ch05-08</td>
<td>役割別ファイル / <code>/advisor</code> / 4 種の hook / Skill</td>
</tr>
</tbody>
</table>
<h3 id="33-%E7%AB%A0%E6%A7%8B%E6%88%90%E5%9B%B3-3-%E5%B1%A4%E5%AF%BE%E5%BF%9C">3.3 章構成図 (3 層対応)</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>ch00 [導入]            3 層の世界観 + 11 困りごと → 3 層欠如マッピング (15 min)

ch01 [プロンプト層]    プロンプトを資産にする — /command + Skill 布石 (30 min)
ch02 [プロンプト層]    よくある失敗 3 パターンの診断 (30 min)

ch03 [コンテキスト層]  context window の 3 つの制約 (30 min)
ch04 [コンテキスト層]  必要時取得の実装 — claude-mem + handoff + 必要時読込 (35 min)  ★ 検索 [手動]

ch05 [ハーネス層]      役割別ファイルで AI を分業させる (30 min)
ch06 [ハーネス層]      第三者 AI に見直してもらう — /advisor (25 min)
ch07 [ハーネス層]      自動で動かす — 4 種類の hook + Skill 連携 (35 min) ★ 検索 [自動]
ch08 [ハーネス層]      失敗を見逃さない仕組み (30 min)

ch09 [応用]            3 層を統合して業務に組み込む — 営業/PM/データ分析 (25 min)
ch10 [逆引き]          3 層インデックス + 症状→現象→対策→該当章 (20 min)
ch11 [演習]            自分専用の Skill を作る — 3 層統合の到達点 (30 min)
</code></pre>
<p><strong>所要合計</strong>: 335 min ≒ <strong>5 時間 35 分</strong></p>

<h3 id="63-ch04-%E7%AB%A0%E6%9C%AB%E3%81%AE%E6%A9%8B%E6%B8%A1%E3%81%97%E3%82%B9%E3%83%A9%E3%82%A4%E3%83%89-%E5%BF%85%E9%A0%88%E3%83%BB%E6%A9%8B%E6%B8%A1%E3%81%97%E3%82%B9%E3%83%A9%E3%82%A4%E3%83%89%E2%91%A0">6.3 ch04 章末の橋渡しスライド (必須・橋渡しスライド①)</h3>
<blockquote>

<h3 id="64-ch07-%E7%AB%A0%E5%86%92%E9%A0%AD%E3%81%AE%E5%89%8D%E7%AB%A0%E5%9B%9E%E5%8F%8E%E3%82%B9%E3%83%A9%E3%82%A4%E3%83%89-%E5%BF%85%E9%A0%88%E3%83%BB%E6%A9%8B%E6%B8%A1%E3%81%97%E3%82%B9%E3%83%A9%E3%82%A4%E3%83%89%E2%91%A1">6.4 ch07 章冒頭の前章回収スライド (必須・橋渡しスライド②)</h3>

<h4 id="emotional-hook-%E7%8F%BE%E8%B1%A1-%E2%86%92-%E5%AF%BE%E7%AD%96">Emotional Hook (現象 → 対策)</h4>

<li><strong>対策</strong>: これらの現象は <strong>3 層</strong> (プロンプト/コンテキスト/ハーネス) のどこかが欠けているから起こる。本講座でこの 3 層を順に強化していく</li>

<h4 id="%E5%AD%A6%E7%BF%92%E7%9B%AE%E6%A8%99">学習目標</h4>

<p><strong>所要</strong>: 30 min / 担当する困りごと: <strong>③ 既にあるものを確認せず新規作成 / ⑩ 同じ作業を毎回手動で繰り返している</strong></p>

<li><strong>対策</strong>: プロンプトを <strong><code>/command</code> で資産化</strong> する。さらに上位互換の <strong>Skill</strong> で「AI が自律判断で呼ぶ」段階まで進む (詳細は ch11)</li>
</ul>
<h4 id="%E5%AD%A6%E7%BF%92%E7%9B%AE%E6%A8%99-1">学習目標</h4>

<p><strong>所要</strong>: 30 min / 担当する困りごと: <strong>① AI が推測で動く・確認せず突進する</strong></p>
<h4 id="emotional-hook-%E7%8F%BE%E8%B1%A1-%E2%86%92-%E5%AF%BE%E7%AD%96-2">Emotional Hook (現象 → 対策)</h4>
<ul>
<li><strong>現象</strong>: 「AI が確認なしに勝手に進めて壊した」「曖昧な指示なのに『理解しました』と言われた」「症状はわかるが原因がわからない」</li>
<li><strong>対策</strong>: プロンプトを <strong>10 項目で診断</strong> して、推測で動く原因を切り分ける。医者が問診で病気を絞るように、症状を体系的に診る</li>
</ul>
<h4 id="%E5%AD%A6%E7%BF%92%E7%9B%AE%E6%A8%99-2">学習目標</h4>
<ul>
<li>失敗 3 パターン (推測突進 / 確認不足 / 範囲過大) を診断できる</li>
<li>自分のプロンプトを 10 項目で自己診断できる</li>
<li>「症状 → 原因 → 修正」の 3 セクション構成で自分のプロンプトを直せる</li>
</ul>
<h4 id="%E8%A7%A3%E8%AA%AC%E3%82%A2%E3%82%A6%E3%83%88%E3%83%A9%E3%82%A4%E3%83%B3-2">解説アウトライン</h4>

<li>失敗プロンプト 3 本の解剖 — 症状/原因/修正/結果の Before-After</li>
<li>「推測 (esper) で動く」を防ぐ確認問いかけテンプレ 3 種</li>
<li>再発防止のためのプロンプト設計原則 3 点</li>
<li>章末ミニ演習: 自分のプロンプト 1 本を 10 項目で診断</li>
</ol>
<h4 id="%E6%8C%81%E3%81%A1%E5%B8%B0%E3%82%8A-2">持ち帰り</h4>

</ul>

<h3 id="ch03-context-window-%E3%81%AE-3-%E3%81%A4%E3%81%AE%E5%88%B6%E7%B4%84-%E3%82%B3%E3%83%B3%E3%83%86%E3%82%AD%E3%82%B9%E3%83%88%E5%B1%A4">ch03. context window の 3 つの制約 [コンテキスト層]</h3>
<p><strong>所要</strong>: 30 min / 担当する困りごと: <strong>⑪ 長文の中央の参照情報が読み飛ばされる</strong></p>
<h4 id="emotional-hook-%E7%8F%BE%E8%B1%A1-%E2%86%92-%E5%AF%BE%E7%AD%96-3">Emotional Hook (現象 → 対策)</h4>
<ul>
<li><strong>現象</strong>: 「ちゃんと書いたのに AI が読み飛ばす」「会話が長くなると応答品質が落ちる」「2 万トークンの仕様書を渡しても核心を捉えてくれない」</li>
<li><strong>対策</strong>: AI の context window には <strong>3 つの制約</strong> がある。それらを理解し、配置技術 (TL;DR / 末尾サマリ / 必要時読込) で対処する</li>
</ul>
<h4 id="%E5%AD%A6%E7%BF%92%E7%9B%AE%E6%A8%99-3">学習目標</h4>
<ul>
<li>制約① 容量上限 (context window のサイズ限界) を説明できる</li>
<li>制約② Lost in the Middle の発生条件 (中央の参照情報が読み飛ばされる現象) を説明できる</li>
<li>制約③ Context Rot (会話が長く続くと AI の応答品質が劣化する現象) を説明できる</li>
<li>重要情報を冒頭/末尾に配置する書き換え技術を使える</li>
</ul>
<h4 id="%E8%A7%A3%E8%AA%AC%E3%82%A2%E3%82%A6%E3%83%88%E3%83%A9%E3%82%A4%E3%83%B3-3">解説アウトライン</h4>
<ol>
<li><strong>3 制約スライド①: 容量上限</strong> — context window のサイズと、超えると何が起きるか</li>
<li><strong>3 制約スライド②: Lost in the Middle</strong> — 「コンテキスト/参照情報の <strong>中央</strong>」が読み飛ばされる (Liu et al. 2023 を引用)。<strong>「指示が中央にある」ではなく「参照情報が長く、その中央にある」のが正確な定義</strong></li>
<li><strong>3 制約スライド③: Context Rot</strong> — 会話履歴が長く積み上がると応答の質が劣化する。古い対話を圧縮・破棄する判断が必要</li>
<li>配置技術① 冒頭 TL;DR — 重要結論を最初の 3 行に</li>
<li>配置技術② 末尾サマリ — 章末・指示末尾の再要約</li>
<li>章末ミニ演習: 自分の長文プロンプトに TL;DR を追加して比較</li>
</ol>
<h4 id="lost-in-the-middle-%E3%81%AE%E6%AD%A3%E7%A2%BA%E3%81%AA%E8%A7%A3%E9%87%88-%E6%AE%BF%E6%8C%87%E6%91%98%E3%81%AE%E5%8F%8D%E6%98%A0">Lost in the Middle の正確な解釈 (殿指摘の反映)</h4>
<blockquote>
<p><img class="emoji" draggable="false" alt="❌" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/274c.svg" data-marp-twemoji=""/> 誤: 「指示が長すぎると、指示の中央が読み飛ばされる」<br />
<img class="emoji" draggable="false" alt="✅" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/2705.svg" data-marp-twemoji=""/> 正: 「<strong>参照情報</strong> (添付ドキュメント・過去のログ等) が長く、その<strong>中央に重要な事実</strong>があると AI が読み飛ばしやすい現象」</p>
<p>→ 対策: 重要な参照情報は <strong>冒頭または末尾</strong> に置く・添付の長さ自体を<strong>必要時取得</strong>で削る (ch04 へ繋がる)</p>
</blockquote>
<h4 id="%E6%8C%81%E3%81%A1%E5%B8%B0%E3%82%8A-3">持ち帰り</h4>
<ul>
<li>3 つの制約を区別して説明できる</li>
<li>長文プロンプトを TL;DR + 末尾サマリで再構成できる</li>
</ul>
<h4 id="%E5%BC%B7%E5%8C%96%E3%81%97%E3%81%9F%E5%B1%A4-3">強化した層</h4>
<blockquote>
<p><strong>コンテキスト層</strong> を強化 — context window の制約を理解し、配置で対処できる。</p>
</blockquote>
</section>

<h3 id="ch04-%E5%BF%85%E8%A6%81%E6%99%82%E5%8F%96%E5%BE%97%E3%81%AE%E5%AE%9F%E8%A3%85--claude-mem--handoff--%E5%BF%85%E8%A6%81%E6%99%82%E8%AA%AD%E8%BE%BC-%E3%82%B3%E3%83%B3%E3%83%86%E3%82%AD%E3%82%B9%E3%83%88%E5%B1%A4-%E2%98%85-%E6%A4%9C%E7%B4%A2-%E6%89%8B%E5%8B%95">ch04. 必要時取得の実装 — claude-mem + handoff + 必要時読込 [コンテキスト層] ★ 検索 [手動]</h3>
<p><strong>所要</strong>: 35 min / 担当する困りごと: <strong>⑦ 完了したことを次に伝え忘れる / ⑪ 補足 / ⑨ 補足</strong></p>
<h4 id="emotional-hook-%E7%8F%BE%E8%B1%A1-%E2%86%92-%E5%AF%BE%E7%AD%96-4">Emotional Hook (現象 → 対策)</h4>
<ul>
<li><strong>現象</strong>: 「先週の自分が解決した問題を、今週の AI が知らない」「context window が満杯で重要な情報が押し出された」「全部の memory を毎回読み込ませると遅い」</li>
<li><strong>対策</strong>: <strong>必要時取得</strong> (Selective Retrieval = 必要なときに必要な情報だけを引き出す) で context を節約する。<strong>4 つの道具</strong> (<code>claude-mem</code> / <code>handoff</code> / 必要時読込 / <code>PreCompact</code>) を組み合わせる</li>
</ul>
<h4 id="%E5%AD%A6%E7%BF%92%E7%9B%AE%E6%A8%99-4">学習目標</h4>
<ul>
<li>必要時取得 (Selective Retrieval) の概念を説明できる</li>
<li><code>claude-mem mem-search</code> / <code>smart_search</code> / <code>timeline</code> を使い分けられる</li>
<li><code>/handoff</code> <code>/rehydrate</code> でセッションを引き継げる</li>
<li><strong>必要時読込</strong> (必要時のみ読込) と <strong><code>PreCompact</code> hook</strong> (圧縮直前保存) の役割を理解する</li>
</ul>
<h4 id="%E8%A7%A3%E8%AA%AC%E3%82%A2%E3%82%A6%E3%83%88%E3%83%A9%E3%82%A4%E3%83%B3-4">解説アウトライン</h4>
<ol>
<li><strong>必要時取得 概念スライド</strong> — 「全部覚えさせる」から「必要なときに呼び戻す」への転換 (ch03 の制約への直接対策・RAG 系の発想)</li>
<li><strong>道具①: <code>claude-mem</code></strong> — <code>mem-search</code> / <code>smart_search</code> / <code>timeline</code> で過去を意味検索</li>
<li><strong>道具②: <code>/handoff</code> <code>/rehydrate</code></strong> — セッション切替時の引き継ぎ</li>
<li><strong>道具③: 必要時読込</strong> — メモリファイルを「タスク該当時のみ」読み込む設計 (常時注入禁止)</li>
<li><strong>道具④: <code>PreCompact</code> hook</strong> — 圧縮 (Compaction) 直前に重要情報を YAML 等に保存</li>
<li><strong>橋渡しスライド①</strong> (必須): 「毎回手で叩くのは現実的ではない → ch07 で hook 自動化 + Skill 連携へ繋がる」</li>
</ol>
<h4 id="%E6%8C%81%E3%81%A1%E5%B8%B0%E3%82%8A-4">持ち帰り</h4>
<ul>
<li>claude-mem の 3 種コマンド (mem-search / smart_search / timeline) を使い分けられる</li>
<li>セッションを跨いで過去の発見を呼び出せる</li>
<li>4 つの 必要時取得 道具を組み合わせて context を節約できる</li>
<li>「毎回手で叩くのは現実的ではない」と感じる(=ch07 への動機づけ完成)</li>
</ul>
<h4 id="%E5%BC%B7%E5%8C%96%E3%81%97%E3%81%9F%E5%B1%A4-4">強化した層</h4>
<blockquote>
<p><strong>コンテキスト層</strong> を強化 — 必要時取得で情報を呼び戻せる。</p>
</blockquote>
</section>

<h3 id="ch05-%E5%BD%B9%E5%89%B2%E5%88%A5%E3%83%95%E3%82%A1%E3%82%A4%E3%83%AB%E3%81%A7-ai-%E3%82%92%E5%88%86%E6%A5%AD%E3%81%95%E3%81%9B%E3%82%8B-%E3%83%8F%E3%83%BC%E3%83%8D%E3%82%B9%E5%B1%A4">ch05. 役割別ファイルで AI を分業させる [ハーネス層]</h3>
<p><strong>所要</strong>: 30 min / 担当する困りごと: <strong>⑥「言ったのにやってくれない」が頻発する</strong></p>
<h4 id="emotional-hook-%E7%8F%BE%E8%B1%A1-%E2%86%92-%E5%AF%BE%E7%AD%96-5">Emotional Hook (現象 → 対策)</h4>
<ul>
<li><strong>現象</strong>: 「同じ AI に何でも頼んでいる」「指示が膨らみすぎて AI が抜けを出す」「役割が曖昧で、責任も曖昧」</li>
<li><strong>対策</strong>: AI を <strong>役割別ファイルで分業</strong> させる。<code>CLAUDE.md</code> (常駐ルール) / <code>instructions/*.md</code> (役割別) / task (個別指示) の 3 段重ねで責任を分ける</li>
</ul>
<h4 id="%E5%AD%A6%E7%BF%92%E7%9B%AE%E6%A8%99-5">学習目標</h4>
<ul>
<li><code>CLAUDE.md</code> / <code>instructions/*.md</code> / task の 3 段重ねの役割分担を説明できる</li>
<li>役割別ファイルが機能する原理 (読み込みタイミング) を説明できる</li>
<li>自分の業務に役割分業を適用する構想ができる</li>
</ul>
<h4 id="%E8%A7%A3%E8%AA%AC%E3%82%A2%E3%82%A6%E3%83%88%E3%83%A9%E3%82%A4%E3%83%B3-5">解説アウトライン</h4>
<ol>
<li>「全部入り <code>CLAUDE.md</code>」の罠 — 100 行の指示は読まれない (ch03 制約の応用)</li>
<li>3 段重ねの分類基準 — 変更頻度 × 適用範囲のマトリクス</li>
<li><code>CLAUDE.md</code> (常駐ルール) / <code>instructions/*.md</code> (役割別) / task (個別指示) の使い分け</li>
<li><code>subagent</code> / <code>Task tool</code> — 専門エージェントを呼び出す技術</li>
<li>スリム化の Before/After 実例 (100 行 → 30 行 + 役割別 2 ファイル)</li>
<li>章末ミニ演習: 自分の業務に役割分業を当てはめる</li>
</ol>
<h4 id="%E6%8C%81%E3%81%A1%E5%B8%B0%E3%82%8A-5">持ち帰り</h4>
<ul>
<li>3 段重ねの役割分担を自分の業務に適用する構想ができる</li>
<li>「全部入り」を避ける癖を身につける</li>
</ul>
<h4 id="%E5%BC%B7%E5%8C%96%E3%81%97%E3%81%9F%E5%B1%A4-5">強化した層</h4>
<blockquote>
<p><strong>ハーネス層</strong> を強化 — 役割別ファイルで AI を分業させる仕組みを作れる。</p>

<h3 id="ch06-%E7%AC%AC%E4%B8%89%E8%80%85-ai-%E3%81%AB%E8%A6%8B%E7%9B%B4%E3%81%97%E3%81%A6%E3%82%82%E3%82%89%E3%81%86--advisor-%E3%83%8F%E3%83%BC%E3%83%8D%E3%82%B9%E5%B1%A4">ch06. 第三者 AI に見直してもらう — <code>/advisor</code> [ハーネス層]</h3>
<p><strong>所要</strong>: 25 min / 担当する困りごと: <strong>② AI 出力を盲信して失敗 / ① 補足</strong></p>
<h4 id="emotional-hook-%E7%8F%BE%E8%B1%A1-%E2%86%92-%E5%AF%BE%E7%AD%96-6">Emotional Hook (現象 → 対策)</h4>
<ul>
<li><strong>現象</strong>: 「AI が『完璧です』と自信満々で出した答えに従ったら間違っていた」「自分の AI に自分の AI を確認させても意味がない」</li>
<li><strong>対策</strong>: <strong>別の AI</strong> (<code>/advisor</code>) に見直してもらう。第三者レビューを呼び出す習慣で盲信を防ぐ</li>
</ul>
<h4 id="%E5%AD%A6%E7%BF%92%E7%9B%AE%E6%A8%99-6">学習目標</h4>
<ul>
<li><code>/advisor</code> の役割と呼び出し方を説明できる</li>
<li><code>acceptance_criteria</code> で完了条件を構造化して書ける</li>
<li>第三者レビューが効くタイミングを 3 つ挙げられる</li>
</ul>
<h4 id="%E8%A7%A3%E8%AA%AC%E3%82%A2%E3%82%A6%E3%83%88%E3%83%A9%E3%82%A4%E3%83%B3-6">解説アウトライン</h4>
<ol>
<li>「AI 出力を盲信した失敗」事例 3 本 (受講者の共感を引く)</li>
<li><code>/advisor</code> の概念 — 別 AI による第三者レビュー</li>
<li><code>/advisor</code> の呼び出しタイミング — 着手前 / 着手後 / 詰まったとき</li>
<li><code>acceptance_criteria</code> — 完了条件を箇条書きにする技術</li>
<li>章末ミニ演習: 自分の AI 出力 1 本を <code>/advisor</code> に通す</li>
</ol>
<h4 id="%E6%8C%81%E3%81%A1%E5%B8%B0%E3%82%8A-6">持ち帰り</h4>

<h4 id="%E5%BC%B7%E5%8C%96%E3%81%97%E3%81%9F%E5%B1%A4-6">強化した層</h4>

<h3 id="ch07-%E8%87%AA%E5%8B%95%E3%81%A7%E5%8B%95%E3%81%8B%E3%81%99--4-%E7%A8%AE%E9%A1%9E%E3%81%AE-hook--skill-%E9%80%A3%E6%90%BA-%E3%83%8F%E3%83%BC%E3%83%8D%E3%82%B9%E5%B1%A4-%E2%98%85-%E6%A4%9C%E7%B4%A2-%E8%87%AA%E5%8B%95">ch07. 自動で動かす — 4 種類の hook + Skill 連携 [ハーネス層] ★ 検索 [自動]</h3>
<p><strong>所要</strong>: 35 min / 担当する困りごと: <strong>⑧ API 変更後にテストせず壊れる / ⑨ 大事なドキュメントを確認しない</strong></p>
<h4 id="emotional-hook-%E7%8F%BE%E8%B1%A1-%E2%86%92-%E5%AF%BE%E7%AD%96-7">Emotional Hook (現象 → 対策)</h4>
<ul>
<li><strong>現象</strong>: 「ch04 で覚えた <code>mem-search</code>、毎回叩くの面倒」「ファイル編集後にテストを忘れる」「prompt 送信時に関連 doc を毎回貼り直している」</li>
<li><strong>対策</strong>: <strong>hook</strong> で AI の動作の前後に処理を自動挿入する。さらに <strong>Skill と hook を連携</strong> させると、AI が自律的に必要な道具を呼び出すようになる</li>
</ul>
<h4 id="%E5%AD%A6%E7%BF%92%E7%9B%AE%E6%A8%99-7">学習目標</h4>
<ul>
<li>4 種類の hook (<code>SessionStart</code> / <code>PreToolUse</code> / <code>PostToolUse</code> / <code>PreCompact</code>) を区別できる</li>
<li><code>UserPromptSubmit</code> hook + 自動 grep の組み合わせを説明できる</li>
<li>hook を 1 つ作って動かせる</li>
<li><strong>hook と Skill の連携設計</strong> を説明できる</li>
<li>ch04 の検索が hook で自動化される過程を追える</li>
</ul>
<h4 id="%E8%A7%A3%E8%AA%AC%E3%82%A2%E3%82%A6%E3%83%88%E3%83%A9%E3%82%A4%E3%83%B3-7">解説アウトライン</h4>
<ol>
<li><strong>橋渡しスライド②</strong> (必須): ch04 の検索を「人が叩かなくても勝手に動く」に昇華させる</li>
<li>hook の概念 — 防犯カメラの動体検知センサー</li>
<li>4 種類の hook の発火タイミング (Session 開始 / ツール実行前 / 実行後 / 圧縮直前)</li>
<li><code>UserPromptSubmit</code> hook + 関連ドキュメント自動 grep — ch04 の自動化版</li>
<li><code>PreToolUse</code> で「実行前に止める」/ <code>PostToolUse</code> で「実行後に検証する」</li>
<li><strong>章末必須スライド: Skill が hook と連携する仕組み</strong> (下記)</li>
</ol>
<h4 id="skill-%E3%81%8C-hook-%E3%81%A8%E9%80%A3%E6%90%BA%E3%81%99%E3%82%8B%E4%BB%95%E7%B5%84%E3%81%BF-%E7%AB%A0%E6%9C%AB%E5%BF%85%E9%A0%88%E3%82%B9%E3%83%A9%E3%82%A4%E3%83%89">Skill が hook と連携する仕組み (章末必須スライド)</h4>
<blockquote>
<p><strong>hook = 「いつ動くか」の引き金 / Skill = 「何を呼ぶか」の業務知識セット</strong></p>
</blockquote>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>┌────────────────────┐         ┌────────────────────┐
│  PreToolUse hook   │ ──→ 発火 │  Skill の判定      │
│  (引き金)          │         │  「この場面では     │
│                    │         │   どの Skill が    │
│                    │         │   呼ばれるべきか」 │
└────────────────────┘         └─────────┬──────────┘
                                         │
                                         ▼
                               ┌────────────────────┐
                               │  Skill 起動        │
                               │  (業務知識を実行)  │
                               │  → 「動画 QC」     │
                               │  → 「note 投稿」   │
                               │  → 「議事録要約」  │
                               └────────────────────┘
</code></pre>
<ul>
<li><strong>hook 単体</strong>: 「いつでも同じ処理」を発動させる (例: ファイル編集後にテスト実行)</li>
<li><strong>Skill 単体</strong>: AI がプロンプトの文脈で「呼ぶべき業務知識」を自律判断する (例: 「動画 QC してくれ」と言われたら動画 QC Skill を呼ぶ)</li>
<li><strong>hook + Skill 連携</strong>: 「特定タイミングで AI に Skill 選択を促す」 (例: prompt 送信時に hook で「関連 Skill を検索してから実行」を強制)</li>
</ul>
<p>→ ch11 で <strong>「自分専用の Skill を作る」</strong> 演習に直結</p>
<h4 id="%E6%8C%81%E3%81%A1%E5%B8%B0%E3%82%8A-7">持ち帰り</h4>
<ul>
<li>hook を 1 つ作って動かせる</li>
<li>コンテキスト層 (ch04) と ハーネス層 (ch07) が同じ技術の手動/自動版だと理解できる</li>
<li>Skill と hook の連携イメージを掴み、ch11 へ進める</li>
</ul>
<h4 id="%E5%BC%B7%E5%8C%96%E3%81%97%E3%81%9F%E5%B1%A4-7">強化した層</h4>
<blockquote>
<p><strong>ハーネス層</strong> を強化 — hook で自動化し、Skill 連携の入口に立つ。</p>
</blockquote>
</section>

<h3 id="ch08-%E5%A4%B1%E6%95%97%E3%82%92%E8%A6%8B%E9%80%83%E3%81%95%E3%81%AA%E3%81%84%E4%BB%95%E7%B5%84%E3%81%BF-%E3%83%8F%E3%83%BC%E3%83%8D%E3%82%B9%E5%B1%A4">ch08. 失敗を見逃さない仕組み [ハーネス層]</h3>
<p><strong>所要</strong>: 30 min / 担当する困りごと: <strong>④ 失敗を fallback で隠す / ⑤ 「止めろ」が AI に伝わらない</strong></p>
<h4 id="emotional-hook-%E7%8F%BE%E8%B1%A1-%E2%86%92-%E5%AF%BE%E7%AD%96-8">Emotional Hook (現象 → 対策)</h4>
<ul>
<li><strong>現象</strong>: 「<code>try/except</code> で握り潰した結果、後日大事故」「fallback で何が起きたか痕跡が残らない」「『そのコマンド使うな』が AI に守られない」</li>
<li><strong>対策</strong>: <strong>黙って失敗</strong> を能動的に検知する仕組みと、<strong>禁止操作リスト</strong> で止めるべき動作を宣言する</li>
</ul>
<h4 id="%E5%AD%A6%E7%BF%92%E7%9B%AE%E6%A8%99-8">学習目標</h4>
<ul>
<li>「黙って失敗 (見逃される失敗)」の発生原理を説明できる</li>
<li>段階確認 (チェックポイント) の置き方を設計できる</li>
<li><code>--dry-run</code> <code>--no-confirm</code> フラグの使い分けを判断できる</li>
<li>禁止操作リストの設計思想を説明できる</li>
</ul>
<h4 id="%E8%A7%A3%E8%AA%AC%E3%82%A2%E3%82%A6%E3%83%88%E3%83%A9%E3%82%A4%E3%83%B3-8">解説アウトライン</h4>
<ol>
<li>「黙って失敗」が起きる典型 3 パターン (try/except 握り潰し 等)</li>
<li>段階確認 — 各工程の終わりにチェックポイントを置く設計</li>
<li>検知の仕組み — cron で異常検知する watcher の概念</li>
<li><code>--dry-run</code> / <code>--no-confirm</code> flag — 安全に試す技術</li>
<li>禁止操作リスト (D001 〜 D008 等) の設計思想</li>
<li>章末ミニ演習: 自分の業務に段階確認を 1 つ仕込む</li>
</ol>
<h4 id="%E6%8C%81%E3%81%A1%E5%B8%B0%E3%82%8A-8">持ち帰り</h4>
<ul>
<li>「黙って失敗」を検知する仕組みの最小実装を 1 つ書ける</li>
<li>fallback で誤魔化さない設計の癖を身につける</li>
</ul>
<h4 id="%E5%BC%B7%E5%8C%96%E3%81%97%E3%81%9F%E5%B1%A4-8">強化した層</h4>
<blockquote>
<p><strong>ハーネス層</strong> を強化 — 失敗を見逃さない・止めるべき動作を止められる。</p>
</blockquote>
</section>

<h3 id="ch09-3-%E5%B1%A4%E3%82%92%E7%B5%B1%E5%90%88%E3%81%97%E3%81%A6%E6%A5%AD%E5%8B%99%E3%81%AB%E7%B5%84%E3%81%BF%E8%BE%BC%E3%82%80--%E5%96%B6%E6%A5%ADpm%E3%83%87%E3%83%BC%E3%82%BF%E5%88%86%E6%9E%90-%E5%BF%9C%E7%94%A8">ch09. 3 層を統合して業務に組み込む — 営業/PM/データ分析 [応用]</h3>
<p><strong>所要</strong>: 25 min / 担当する困りごと: (3 層統合の応用)</p>
<h4 id="emotional-hook-%E7%8F%BE%E8%B1%A1-%E2%86%92-%E5%AF%BE%E7%AD%96-9">Emotional Hook (現象 → 対策)</h4>
<ul>
<li><strong>現象</strong>: 「武器①②③ (3 層) は理解したが、自分の業務にどう組み合わせるか見えない」「営業/PM/データ分析で何から始めるべきか分からない」</li>
<li><strong>対策</strong>: <strong>3 層を組み合わせる型</strong> を 3 ケースで具体化。自分の現場が当てはまる型を持ち帰る</li>
</ul>
<h4 id="%E5%AD%A6%E7%BF%92%E7%9B%AE%E6%A8%99-9">学習目標</h4>
<ul>
<li>営業/PM/データ分析の 3 ケースで 3 層の組み合わせ方を説明できる</li>
<li>自分の業務に置換可能な組み合わせを 1 つ考案できる</li>
<li>「どの層から始めるか」の優先順位判断ができる</li>
</ul>
<h4 id="%E8%A7%A3%E8%AA%AC%E3%82%A2%E3%82%A6%E3%83%88%E3%83%A9%E3%82%A4%E3%83%B3-9">解説アウトライン</h4>
<ol>
<li>ケース① 営業 — <code>/command</code> (プロンプト層) + 議事録要約 + 顧客メモ semantic 検索 (コンテキスト層)</li>
<li>ケース② PM サポート — task 分解 + <code>/advisor</code> レビュー (ハーネス層) + 進捗 hook (ハーネス層)</li>
<li>ケース③ データ分析 — 役割別分業 (ハーネス層) + 段階確認 (ハーネス層) + memory (コンテキスト層)</li>
<li>3 層の <strong>着手順序</strong> — プロンプト層から始めるべき場合 / コンテキスト層を先に固めるべき場合</li>
<li>章末ミニ演習: 自分の業務 1 件で 3 層組み合わせ案を書き出す</li>
</ol>
<h4 id="%E6%8C%81%E3%81%A1%E5%B8%B0%E3%82%8A-9">持ち帰り</h4>
<ul>
<li>自分の業務に当てはめた構想図 (3 層の組合せ) を持ち帰る</li>
</ul>
<h4 id="%E5%BC%B7%E5%8C%96%E3%81%97%E3%81%9F%E5%B1%A4-9">強化した層</h4>
<blockquote>
<p><strong>3 層を統合</strong> — 業務に組み込む型を持てる。</p>
</blockquote>

<h3 id="ch10-%E5%9B%B0%E3%81%A3%E3%81%9F%E6%99%82%E3%81%AE%E9%80%86%E5%BC%95%E3%81%8D%E8%BE%9E%E5%85%B8--%E7%97%87%E7%8A%B6-%E2%86%92-%E7%8F%BE%E8%B1%A1-%E2%86%92-%E5%AF%BE%E7%AD%96-%E2%86%92-%E8%A9%B2%E5%BD%93%E7%AB%A0-%E9%80%86%E5%BC%95%E3%81%8D">ch10. 困った時の逆引き辞典 — 症状 → 現象 → 対策 → 該当章 [逆引き]</h3>
<p><strong>所要</strong>: 20 min / 担当する困りごと: (11 件全件の <strong>再回収</strong> + 3 層分類)</p>
<h4 id="emotional-hook-%E7%8F%BE%E8%B1%A1-%E2%86%92-%E5%AF%BE%E7%AD%96-10">Emotional Hook (現象 → 対策)</h4>
<ul>
<li><strong>現象</strong>: 「実務で詰まった瞬間、講座のどこを見ればいいか分からない」「症状から原因にたどり着けない」</li>
<li><strong>対策</strong>: <strong>症状 → 現象 → 対策 → 該当章</strong> の <strong>3 段</strong> で逆引きできる辞典を持ち帰る。さらに <strong>3 層インデックス</strong> で「どの層が欠けているか」から引ける</li>
</ul>
<h4 id="%E5%AD%A6%E7%BF%92%E7%9B%AE%E6%A8%99-10">学習目標</h4>
<ul>
<li>症状から該当章を即引き出せる</li>

<p><strong>所要</strong>: 30 min / 担当する困りごと: (3 層統合 + Skill 創作)</p>
<h4 id="emotional-hook-%E7%8F%BE%E8%B1%A1-%E2%86%92-%E5%AF%BE%E7%AD%96-11">Emotional Hook (現象 → 対策)</h4>
<ul>
<li><strong>現象</strong>: 「ここまでの 3 層を理解したが、自分の業務に常駐する <strong>AI 道具</strong> がまだ作れていない」「<code>/command</code> だけでは足りず、AI が自律判断して呼ぶ仕組みが欲しい」</li>

<h4 id="%E5%AD%A6%E7%BF%92%E7%9B%AE%E6%A8%99-11">学習目標</h4>

<li>Skill が <code>/command</code> の上位互換である理由を説明できる</li>
<li>Skill と hook を連携させて自律発動させる構想ができる</li>
</ul>

<h3 id="91-%E4%B8%AD%E7%B4%9A%E7%B7%A8%E3%81%AE%E5%93%B2%E5%AD%A6%E7%9A%84%E6%A0%B8%E5%BF%83">9.1 中級編の哲学的核心</h3>
<blockquote>
<p><strong>「同じ技術を、人間が呼ぶか機械が呼ぶかで、生産性が桁違いに変わる」</strong></p>
</blockquote>
<h3 id="92-%E6%A9%8B%E6%B8%A1%E3%81%97%E3%82%B9%E3%83%A9%E3%82%A4%E3%83%89-%E2%91%A0-ch04-%E7%AB%A0%E6%9C%AB">9.2 橋渡しスライド ① (ch04 章末)</h3>
<p><strong>スライドタイトル</strong>: 「次章への布石 — 毎回手で叩くのは現実的じゃない」</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>■ ここまでで覚えた 必要時取得 道具
  - claude-mem mem-search &quot;○○について&quot;
  - claude-mem timeline
  - /handoff / /rehydrate
  - 必要時読込 (必要時のみ読み込む memory)
  - PreCompact hook (圧縮直前保存)

■ でも、毎回手で叩くの現実的?
  - 1 日 30 回プロンプトを書いて、その都度 mem-search?
  - → AI が prompt 送信時に勝手に呼んでくれたほうが楽

■ 次章の予告
  ch07 で「hook」を学ぶと、AI が prompt を受け取った瞬間に
  自動で関連ドキュメントを引いてくれるようになります
  さらに ch11 の Skill と連携させれば、業務文脈に応じて
  自律的に道具を呼び出せます
</code></pre>
<h3 id="93-%E6%A9%8B%E6%B8%A1%E3%81%97%E3%82%B9%E3%83%A9%E3%82%A4%E3%83%89-%E2%91%A1-ch07-%E7%AB%A0%E5%86%92%E9%A0%AD">9.3 橋渡しスライド ② (ch07 章冒頭)</h3>
<p><strong>スライドタイトル</strong>: 「ch04 の検索を、人間が叩かなくても勝手に動かす」</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>■ ch04 で覚えた手動コマンドを覚えていますか?
  - claude-mem mem-search → 「過去の解決履歴を意味で検索」

■ それを「prompt 送信時に AI が自動で叩く」ようにする
  - hook = 特定のタイミングで自動発動するプログラム
  - UserPromptSubmit hook が今回の主役

■ ch04 → ch07 で何が変わるか
  ch04: 「気づいたときに人間が叩く」 = 検索を覚えている人だけが得する
  ch07: 「prompt 送信のたびに自動で叩く」 = 全員が常に得する
       ↑
       同じ技術が、人間呼出から機械呼出に昇華
       コンテキスト層 → ハーネス層 への昇華でもある
</code></pre>
<blockquote>
<p>この 2 枚のスライドを必ず両章に配置すること</p>
