<h2 id="0-%E3%83%9E%E3%83%BC%E3%82%B1%E3%83%86%E3%82%A3%E3%83%B3%E3%82%B0%E5%9F%BA%E7%9B%A4">0. マーケティング基盤</h2>
<h3 id="01-%E3%83%9A%E3%83%AB%E3%82%BD%E3%83%8A%E5%AE%9A%E7%BE%A9-5%E3%82%BF%E3%82%A4%E3%83%97">0.1 ペルソナ定義 (5タイプ)</h3>
<p>本講座の主ターゲット層を5つのペルソナで定義する。</p>
<h4 id="p1-%E4%B8%AD%E5%A0%85%E3%83%90%E3%83%83%E3%82%AF%E3%82%A8%E3%83%B3%E3%83%89%E3%82%A8%E3%83%B3%E3%82%B8%E3%83%8B%E3%82%A2%E7%94%B0%E4%B8%AD">P1: 中堅バックエンドエンジニア「田中」</h4>
<ul>
<li><strong>年代</strong>: 32歳</li>
<li><strong>職種</strong>: Web系バックエンドエンジニア (Ruby/Python)</li>
<li><strong>業界</strong>: SaaSスタートアップ (従業員30名)</li>
<li><strong>年収</strong>: 650万円</li>
<li><strong>具体困りごと</strong>: 自社プロダクトにClaude Codeを導入したが、プロンプトが長すぎてコンテキスト爆発を起こす。何度も同じ失敗をAIが繰り返す。社内の他エンジニアとAI利用ナレッジを共有する仕組みがない。</li>
<li><strong>購買動機</strong>: 「AI開発の生産性を上げたい」ではなく「AIの暴走を制御する仕組みを作りたい」。プロンプトの書き方ではなく、システムとしてAIを組み込みたい。</li>
</ul>
<h4 id="p2-%E3%83%95%E3%83%AA%E3%83%BC%E3%83%A9%E3%83%B3%E3%82%B9ai%E6%B4%BB%E7%94%A8%E3%82%B3%E3%83%B3%E3%82%B5%E3%83%AB%E3%82%BF%E3%83%B3%E3%83%88%E4%BD%90%E8%97%A4">P2: フリーランスAI活用コンサルタント「佐藤」</h4>
<ul>
<li><strong>年代</strong>: 28歳</li>
<li><strong>職種</strong>: フリーランス / AI導入支援</li>
<li><strong>業界</strong>: 中小企業DX支援</li>
<li><strong>年収</strong>: 480万円 (不安定)</li>
<li><strong>具体困りごと</strong>: クライアント先でClaude Codeを導入する案件が増えているが、導入後の「運用設計」ができず、1ヶ月で使われなくなる。差別化できるスキルセットが欲しい。</li>
<li><strong>購買動機</strong>: 「ハーネスエンジニアリング」という固有スキルで競合コンサルと差別化。クライアントに「導入後も自分で改善できる仕組み」を納品したい。</li>
</ul>
<h4 id="p3-%E6%83%85%E5%A0%B1%E7%99%BA%E4%BF%A1%E8%80%85%E3%83%BB%E3%83%86%E3%83%83%E3%82%AF%E3%83%96%E3%83%AD%E3%82%AC%E3%83%BC%E6%9E%97">P3: 情報発信者・テックブロガー「林」</h4>
<ul>
<li><strong>年代</strong>: 35歳</li>
<li><strong>職種</strong>: テック系YouTuber / Zenn Qiita同人</li>
<li><strong>業界</strong>: 個人メディア運営</li>
<li><strong>年収</strong>: 420万円 (広告+note+YouTube)</li>
<li><strong>具体困りごと</strong>: Claude Codeで動画パイプラインを自動化しているが、セッションを跨ぐたびに設定をやり直している。毎回同じようなプロンプトを書いている時間が無駄。</li>
<li><strong>購買動機</strong>: コンテキストの永続化で「設定ゼロの作業再開」を実現したい。自身の情報発信ネタとしても「3階層統合」は独自性が高い。</li>
</ul>
<h4 id="p4-sier%E3%81%AE%E3%83%97%E3%83%AD%E3%82%B8%E3%82%A7%E3%82%AF%E3%83%88%E3%83%9E%E3%83%8D%E3%83%BC%E3%82%B8%E3%83%A3%E3%83%BC%E6%9C%A8%E6%9D%91">P4: SIerのプロジェクトマネージャー「木村」</h4>
<ul>
<li><strong>年代</strong>: 40歳</li>
<li><strong>職種</strong>: プロジェクトマネージャー (元SE)</li>
<li><strong>業界</strong>: 中堅SIer (従業員500名)</li>
<li><strong>年収</strong>: 800万円</li>
<li><strong>具体困りごと</strong>: 顧客からのAI開発案件が急増しているが、社内の若手エンジニアが「プロンプトを頑張る」止まりで、本番運用で事故る。AI開発の品質管理フレームワークが欲しい。</li>
<li><strong>購買動機</strong>: AI開発品質を「個人のプロンプトスキル」から「組織のシステム」に引き上げたい。done_gate や silent_fail_watcher のような品質ハーネスを社内標準にしたい。</li>
</ul>
<h4 id="p5-ai%E3%82%B9%E3%82%BF%E3%83%BC%E3%83%88%E3%82%A2%E3%83%83%E3%83%97cto%E9%99%B3">P5: AIスタートアップCTO「陳」</h4>
<ul>
<li><strong>年代</strong>: 30歳</li>
<li><strong>職種</strong>: CTO兼フルスタックエンジニア</li>
<li><strong>業界</strong>: AIエージェント開発スタートアップ (従業員8名・シリーズA)</li>
<li><strong>年収</strong>: 600万円 (+ストックオプション)</li>
<li><strong>具体困りごと</strong>: 自社プロダクトでマルチエージェント構成を採用したが、エージェント間のコンテキスト同期が壊れやすい。デバッグに毎日2-3時間取られている。</li>
<li><strong>購買動機</strong>: エージェント間通信の設計パターンとハーネスによる自動検知で、デバッグ時間を半分以下に削減したい。本講座の9体運用事例は自社の参考になる。</li>
</ul>
</section>

<h3 id="03-lp%E3%83%A9%E3%83%B3%E3%83%87%E3%82%A3%E3%83%B3%E3%82%B0%E3%83%9A%E3%83%BC%E3%82%B8%E3%82%B3%E3%83%94%E3%83%BC%E3%83%A9%E3%82%A4%E3%83%86%E3%82%A3%E3%83%B3%E3%82%B0%E6%A1%88">0.3 LP（ランディングページ）コピーライティング案</h3>
<h4 id="%E3%83%92%E3%83%BC%E3%83%AD%E3%83%BC%E3%82%BB%E3%82%AF%E3%82%B7%E3%83%A7%E3%83%B3">ヒーローセクション</h4>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>AI開発で、こんな経験ありませんか？

<img class="emoji" draggable="false" alt="☑" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/2611.svg" data-marp-twemoji=""/> 同じプロンプトを何度も書き直している
<img class="emoji" draggable="false" alt="☑" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/2611.svg" data-marp-twemoji=""/> AIが急に変な返事をして、セッションを作り直す
<img class="emoji" draggable="false" alt="☑" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/2611.svg" data-marp-twemoji=""/> 「AIで効率化した」と言ったのに、結局手直しの時間が増えた
<img class="emoji" draggable="false" alt="☑" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/2611.svg" data-marp-twemoji=""/> 複数のAIエージェントを使いたいが、連携の仕方が分からない

その原因は「プロンプト」ではありません。
3つの階層（プロンプト / コンテキスト / ハーネス）を
統合設計することで、AI開発は予測可能で再現性のあるものになります。

本講座は、9体のAIエージェントを並列実運用する著者が、
18本の実コードと共に教える「AI開発のシステム化」実践ガイドです。
</code></pre>
<h4 id="%E5%B7%AE%E5%88%A5%E6%80%A7%E3%83%96%E3%83%AD%E3%83%83%E3%82%AF">差別性ブロック</h4>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>本講座だけにある5つの要素:

1. 「3階層統合」は市場唯一（2026年4月・Udemy日本語圏60コース調査で確認）
2. 9体マルチエージェントの実運用知見（既存講座は1-2体の概念止まり）
3. 18本のhook/watcherスクリプトを実コードで解説（概論のみの講座とは一線を画す）
4. 実運用での失敗事例20件以上を教材化（成功例だけの講座では学べない）
5. 受講完了時、自分のプロジェクトに3層システムが動く状態で導入完了
</code></pre>

<h3 id="12-%E5%8F%97%E8%AC%9B%E7%94%9F%E3%81%AE%E6%9C%80%E7%B5%82%E6%88%90%E6%9E%9C%E7%89%A9-l6-create">1.2 受講生の最終成果物 (L6 Create)</h3>
<p>受講完了時、受講生は以下 5 点を自分のリポジトリに保有:</p>

<li><code>queue/inbox/*.yaml</code> + <code>inbox_watcher.sh</code> 相当のメールボックス (マルチエージェント化の土台)</li>
<li>自分のドメインに合わせた <code>cmd_intake_hook.sh</code> (起票時 mem-search + 4系統自動 add_observations)</li>
</ol>

<h3 id="%E5%BA%8F%E7%AB%A0-ai%E9%96%8B%E7%99%BA-3%E9%9A%8E%E5%B1%A4%E3%83%A2%E3%83%87%E3%83%AB%E3%81%A8%E3%81%AF-l0-remember--understand">序章: AI開発 3階層モデルとは (L0: Remember + Understand)</h3>
<p><strong>所要</strong>: 30 min / <strong>無料プレビュー</strong></p>
<h4 id="%E3%82%B9%E3%83%88%E3%83%BC%E3%83%AA%E3%83%BC-emotional-hook">ストーリー (Emotional Hook)</h4>
<blockquote>
<p>「あなたが今やっているAI開発は、『壁に絵を描いては消す』を繰り返している状態かもしれません。本講座は、その壁に『窓』を開け、さらに『配管』まで通す方法を教えます。」</p>
</blockquote>
<ul>
<li>受講者の「これだ！」ポイント: 序章の3分タイムラプスで「before: 無秩序なプロンプト → after: 3層システム稼働」を見せる。このギャップが購買決断のトリガー。</li>
</ul>
<h4 id="%E5%AD%A6%E7%BF%92%E7%9B%AE%E6%A8%99">学習目標</h4>
<ul>
<li>3階層の定義を自分の言葉で説明できる</li>
<li>単独層では解決しない理由を切り分けられる</li>
<li>本講座の終着点 (L6 Create) を把握する</li>
</ul>
<h4 id="%E3%82%A2%E3%82%A6%E3%83%88%E3%83%A9%E3%82%A4%E3%83%B3">アウトライン</h4>
<ol>
<li>3階層モデル図 (1枚スライド・全講座通貫)</li>
<li>各層の failure mode 実例 3本ずつ</li>
<li>既存ベストセラー講座マップと本講座の位置づけ</li>
<li>最終成果物ツアー (受講後のリポジトリを3分で見せる)</li>
</ol>
</section>

<p><strong>所要</strong>: 45 min / Bloom: L3 Apply / <strong>無料プレビュー</strong></p>
<h4 id="%E3%82%B9%E3%83%88%E3%83%BC%E3%83%AA%E3%83%BC-emotional-hook-1">ストーリー (Emotional Hook)</h4>
<blockquote>
<p>「『AIに伝わればいい』と思っていませんか？ 伝わるプロンプトと、<strong>再利用できる</strong>プロンプトは別物です。この章では、1回書いて終わる指示を、何度でも使える『関数』に変えます。」</p>
</blockquote>
<ul>
<li>受講者の「これだ！」ポイント: 自分の日常業務タスクが「口頭指示 → 関数プロンプト」に変わる瞬間。before/after をその場で体験。</li>
</ul>
<h4 id="%E3%83%8F%E3%83%B3%E3%82%BA%E3%82%AA%E3%83%B3%E5%85%B7%E4%BD%93%E5%8C%96">ハンズオン具体化</h4>
<ul>
<li><strong>何を作る</strong>: <code>prompts/task_XX_v1.md</code> (業務タスク1件の関数プロンプト)</li>
<li><strong>どう作る</strong>: (1) 日常の口頭指示を1つ選ぶ → (2) 入力/処理/出力の3パートに分解 → (3) XMLテンプレートに当てはめる → (4) Claude Codeで実行して結果を確認</li>
<li><strong>完成品見た目</strong>: 30-50行の構造化マークダウン。<code>&lt;input&gt;</code>/<code>&lt;task&gt;</code>/<code>&lt;output_format&gt;</code>タグ付き。</li>
<li><strong>所要時間</strong>: 演習15min + 解説30min</li>
</ul>
<h4 id="%E6%88%90%E6%9E%9C%E7%89%A9">成果物</h4>
<ul>
<li><code>prompts/task_XX_v1.md</code></li>
</ul>

<p><strong>所要</strong>: 45 min / Bloom: L4 Analyze</p>
<h4 id="%E3%82%B9%E3%83%88%E3%83%BC%E3%83%AA%E3%83%BC-emotional-hook-2">ストーリー (Emotional Hook)</h4>
<blockquote>
<p>「プロンプトは『上手く書く』だけでは足りません。<strong>どこが壊れているかを診断する力</strong> が必要です。医者が病気を見分けるように、あなたはプロンプトの病気を見分けられるようになります。」</p>
</blockquote>
<ul>
<li>受講者の「これだ！」ポイント: 自分が書いたプロンプトを診断チェックリストに当てはめ、「あ、ここが原因だった」と発見する瞬間。</li>
</ul>
<h4 id="%E3%83%8F%E3%83%B3%E3%82%BA%E3%82%AA%E3%83%B3%E5%85%B7%E4%BD%93%E5%8C%96-1">ハンズオン具体化</h4>

<li><strong>所要時間</strong>: 演習15min + 解説30min</li>
</ul>

<p><strong>所要</strong>: 45 min / Bloom: L4 Analyze + L5 Evaluate</p>
<h4 id="%E3%82%B9%E3%83%88%E3%83%BC%E3%83%AA%E3%83%BC-emotional-hook-3">ストーリー (Emotional Hook)</h4>
<blockquote>
<p>「CLAUDE.md に全部書いていませんか？ それは『引っ越し荷物を全部リビングに放り込む』状態です。この章では、引っ越し先の『部屋』を3つ設計します。」</p>
</blockquote>
<ul>
<li>受講者の「これだ！」ポイント: 自分のCLAUDE.mdが100行→30行にスリム化され、instructions/*.mdに整理されるリファクタリング体験。</li>
</ul>
<h4 id="%E3%83%8F%E3%83%B3%E3%82%BA%E3%82%AA%E3%83%B3%E5%85%B7%E4%BD%93%E5%8C%96-2">ハンズオン具体化</h4>
<ul>
<li><strong>何を作る</strong>: スリム化後 <code>CLAUDE.md</code> + <code>instructions/*.md</code> 複数ファイル</li>
<li><strong>どう作る</strong>: (1) 既存CLAUDE.mdを読む → (2) 「変更頻度×適用範囲」マトリクスで分類 → (3) 3層に分解してcommit → (4) Claude Code新セッションで正しく動作確認</li>
<li><strong>完成品見た目</strong>: CLAUDE.md 30行以内 + instructions/role.md + instructions/project.md の構成</li>
<li><strong>所要時間</strong>: 演習20min + 解説25min</li>
</ul>
<h4 id="%E6%88%90%E6%9E%9C%E7%89%A9-2">成果物</h4>
<ul>
<li><code>CLAUDE.md</code> (スリム化後) + <code>instructions/*.md</code></li>
</ul>

<p><strong>所要</strong>: 45 min / Bloom: L5 Evaluate</p>
<h4 id="%E3%82%B9%E3%83%88%E3%83%BC%E3%83%AA%E3%83%BC-emotional-hook-4">ストーリー (Emotional Hook)</h4>
<blockquote>
<p>「『上手くいったと思う』は品質保証ではありません。この章では、あなたのプロンプトを<strong>別のAI</strong> に審査させる仕組みを作ります。裁判官がいる裁判所のように。」</p>
</blockquote>
<ul>
<li>受講者の「これだ！」ポイント: advisorが自分のプロンプトの盲点を指摘する瞬間。「自分では気づかなかった」という体験が、品質Gateの価値を実感させる。</li>
</ul>
<h4 id="%E3%83%8F%E3%83%B3%E3%82%BA%E3%82%AA%E3%83%B3%E5%85%B7%E4%BD%93%E5%8C%96-3">ハンズオン具体化</h4>

<li><strong>どう作る</strong>: (1) advisor呼出3方式を比較 → (2) 最適方式をshellで実装 → (3) QC templateを自プロジェクト用に作成 → (4) 第1章成果物をadvisor+QCで評価</li>
<li><strong>完成品見た目</strong>: 30行程度のbashスクリプト + PASS/FAIL判定基準15項目のQC template</li>
<li><strong>所要時間</strong>: 演習15min + 解説30min</li>
</ul>
<h4 id="%E6%88%90%E6%9E%9C%E7%89%A9-3">成果物</h4>
<ul>
<li><code>scripts/advisor_wrap.sh</code> + <code>shared_context/qc_template.md</code></li>
</ul>

<p><strong>所要</strong>: 60 min / Bloom: L4 Analyze</p>
<h4 id="%E3%82%B9%E3%83%88%E3%83%BC%E3%83%AA%E3%83%BC-emotional-hook-5">ストーリー (Emotional Hook)</h4>
<blockquote>
<p>「コンテキストウィンドウは『財布』です。無限にあると思うと、いつの間にか空っぽになります。この章では、あなたのAIの『家計簿』をつけます。」</p>
</blockquote>
<ul>

<h4 id="%E3%83%8F%E3%83%B3%E3%82%BA%E3%82%AA%E3%83%B3%E5%85%B7%E4%BD%93%E5%8C%96-4">ハンズオン具体化</h4>

<p><strong>所要</strong>: 60 min / Bloom: L4 Analyze + L5 Evaluate</p>
<h4 id="%E3%82%B9%E3%83%88%E3%83%BC%E3%83%AA%E3%83%BC-emotional-hook-6">ストーリー (Emotional Hook)</h4>
<blockquote>
<p>「AIに『前回のことを覚えている？』と聞いて、覚えていないことにイラッとしたことはありませんか？ この章では、AIに<strong>忘れない記憶</strong>を与えます。」</p>
</blockquote>
<ul>
<li>受講者の「これだ！」ポイント: 自分の過去1ヶ月の教訓10件をmemory/*.mdに落とし込み、新セッションで自動読込されることを確認する体験。</li>
</ul>
<h4 id="%E3%83%8F%E3%83%B3%E3%82%BA%E3%82%AA%E3%83%B3%E5%85%B7%E4%BD%93%E5%8C%96-5">ハンズオン具体化</h4>
<ul>
<li><strong>何を作る</strong>: <code>memory/*.md</code> + <code>memory/MEMORY.md</code> (永続コンテキスト基盤)</li>
<li><strong>どう作る</strong>: (1) 3バックエンド比較表から自プロジェクトに適したものを選定 → (2) 過去教訓10件を4カテゴリ(user/feedback/project/reference)に分類 → (3) 各カテゴリmdファイルを作成 → (4) MEMORY.md索引を作成 → (5) 新セッションでmemoryが読まれることを確認</li>
<li><strong>完成品見た目</strong>: memory/ ディレクトリに4-6個のmdファイル + MEMORY.md索引(50-100行)</li>
<li><strong>所要時間</strong>: 演習25min + 解説35min</li>
</ul>
<h4 id="%E6%88%90%E6%9E%9C%E7%89%A9-5">成果物</h4>
<ul>
<li><code>memory/*.md</code> + <code>memory/MEMORY.md</code></li>
</ul>

<p><strong>所要</strong>: 60 min / Bloom: L5 Evaluate + L6 Create</p>
<h4 id="%E3%82%B9%E3%83%88%E3%83%BC%E3%83%AA%E3%83%BC-emotional-hook-7">ストーリー (Emotional Hook)</h4>
<blockquote>
<p>「昨日の作業を今日再開したら、AIが『初めまして』と言ってきた――この絶望感、ありませんか？ この章では、AIに『おかえりなさい』と言わせる仕組みを作ります。」</p>
</blockquote>
<ul>
<li>受講者の「これだ！」ポイント: 意図的に /clear → SessionStart hookが発動 → 完全復旧する「魔法のような」体験。ここがL2の山場。</li>
</ul>
<h4 id="%E3%83%8F%E3%83%B3%E3%82%BA%E3%82%AA%E3%83%B3%E5%85%B7%E4%BD%93%E5%8C%96-6">ハンズオン具体化</h4>
<ul>
<li><strong>何を作る</strong>: <code>scripts/sessionstart_hook.sh</code> + <code>scripts/precompact_hook.sh</code> + <code>.claude/commands/rehydrate.md</code></li>
<li><strong>どう作る</strong>: (1) SessionStart hookテンプレを自分のプロジェクトに適用 → (2) 「自己識別 → memory読込 → instructions読込 → YAML復元」の4段階を実装 → (3) PreCompact hookで圧縮前情報保存 → (4) 意図的 /clear → 完全復旧テスト</li>
<li><strong>完成品見た目</strong>: 3ファイル + settings.json hook登録。/clear後3秒で完全復旧。</li>
<li><strong>所要時間</strong>: 演習25min + 解説35min</li>
</ul>
<h4 id="%E6%88%90%E6%9E%9C%E7%89%A9-6">成果物</h4>
<ul>
<li><code>scripts/sessionstart_hook.sh</code> + <code>scripts/precompact_hook.sh</code> + <code>.claude/commands/rehydrate.md</code></li>
</ul>

<p><strong>所要</strong>: 60 min / Bloom: L6 Create</p>
<h4 id="%E3%82%B9%E3%83%88%E3%83%BC%E3%83%AA%E3%83%BC-emotional-hook-8">ストーリー (Emotional Hook)</h4>
<blockquote>
<p>「1人のAIに全部やらせるのは、1人の部下に企画も開発もテストも任せるようなものです。この章では、AIに<strong>役割分担</strong>させ、<strong>報告書</strong>を提出させます。」</p>
</blockquote>
<ul>
<li>受講者の「これだ！」ポイント: 2体エージェント(親/子)が実際にタスクを委譲し、子が報告書を提出する最小ループが動く瞬間。</li>
</ul>
<h4 id="%E3%83%8F%E3%83%B3%E3%82%BA%E3%82%AA%E3%83%B3%E5%85%B7%E4%BD%93%E5%8C%96-7">ハンズオン具体化</h4>
<ul>
<li><strong>何を作る</strong>: <code>queue/inbox/*.yaml</code> + <code>scripts/inbox_watcher.sh</code> + <code>scripts/inbox_write.sh</code> + <code>instructions/{親}.md</code> + <code>instructions/{子}.md</code></li>
<li><strong>どう作る</strong>: (1) 2体エージェントの役割YAMLを作成 → (2) メールボックス(inbox/*.yaml + flock + inotifywait)を実装 → (3) 親から子にタスク委譲 → (4) 子から親に報告 → (5) chain of commandのbypass禁止をhookで検出</li>
<li><strong>完成品見た目</strong>: 2つのpaneでエージェントが動き、inboxメッセージが非同期でやり取りされる。tmux画面キャプチャで確認可能。</li>
<li><strong>所要時間</strong>: 演習30min + 解説30min</li>
</ul>
<h4 id="%E6%88%90%E6%9E%9C%E7%89%A9-7">成果物</h4>
<ul>
<li>inbox基盤 + 2役割 instructions + inbox_watcher.sh</li>
</ul>

<p><strong>所要</strong>: 60 min / Bloom: L5 Evaluate + L6 Create</p>
<h4 id="%E3%82%B9%E3%83%88%E3%83%BC%E3%83%AA%E3%83%BC-emotional-hook-9">ストーリー (Emotional Hook)</h4>
<blockquote>
<p>「メモリは書いた時点の真実であって、今の真実とは限りません。この章では、メモリに『賞味期限』を設定します。」</p>
</blockquote>
<ul>
<li>受講者の「これだ！」ポイント: 自分のmemoryファイルから「ファイルパスが既に存在しない」「3ヶ月前の前提が古い」を自動検出するスクリプトが動く体験。</li>
</ul>
<h4 id="%E3%83%8F%E3%83%B3%E3%82%BA%E3%82%AA%E3%83%B3%E5%85%B7%E4%BD%93%E5%8C%96-8">ハンズオン具体化</h4>
<ul>
<li><strong>何を作る</strong>: <code>scripts/memory_review.sh</code> (cron実行可能)</li>
<li><strong>どう作る</strong>: (1) staleness判定3ルールを実装(ファイル存在確認/日付チェック/手動検証フラグ) → (2) memory/*.mdをスキャンするbashスクリプト作成 → (3) 週次cronに登録 → (4) テスト用に古いmemoryを1件仕込んで検出確認</li>
<li><strong>完成品見た目</strong>: 週次レポートが出力される。「3件のstaleness検出: feedback_xxx.md のパスが存在しません」等。</li>
<li><strong>所要時間</strong>: 演習20min + 解説40min</li>
</ul>
<h4 id="%E6%88%90%E6%9E%9C%E7%89%A9-8">成果物</h4>
<ul>
<li><code>scripts/memory_review.sh</code> (cron実行可能)</li>
</ul>

<h3 id="%E7%AC%AC10%E7%AB%A0-%E3%83%8F%E3%83%BC%E3%83%8D%E3%82%B9%E3%81%A8%E3%81%AF-claude-code-lifecycle-7%E3%82%A4%E3%83%99%E3%83%B3%E3%83%88">第10章 ハーネスとは: Claude Code lifecycle 7イベント</h3>
<p><strong>所要</strong>: 60 min / Bloom: L2 Understand + L3 Apply</p>
<h4 id="%E3%82%B9%E3%83%88%E3%83%BC%E3%83%AA%E3%83%BC-emotional-hook-10">ストーリー (Emotional Hook)</h4>
<blockquote>
<p>「今までの章は『AIに何を覚えさせるか』でした。この章からは『AIが何をしたかを<strong>監視する</strong>』に変わります。あなたのAIに、監視カメラを付けます。」</p>
</blockquote>
<ul>
<li>受講者の「これだ！」ポイント: 最初のhookが実際に発火して「hello from hook!」が表示される瞬間。L3の入口。</li>
</ul>
<h4 id="%E3%83%8F%E3%83%B3%E3%82%BA%E3%82%AA%E3%83%B3%E5%85%B7%E4%BD%93%E5%8C%96-9">ハンズオン具体化</h4>
<ul>
<li><strong>何を作る</strong>: <code>.claude/settings.json</code> hook登録 + <code>scripts/hook_hello.sh</code></li>
<li><strong>どう作る</strong>: (1) 7イベントのflow図を理解 → (2) 最小のPreToolUse hook(echoするだけ)を作成 → (3) settings.jsonに登録 → (4) Claude Codeでコマンド実行→hook発火確認</li>
<li><strong>完成品見た目</strong>: settings.jsonにhookエントリが追加され、コマンド実行時にメッセージが表示される</li>
<li><strong>所要時間</strong>: 演習15min + 解説45min</li>
</ul>
<h4 id="%E6%88%90%E6%9E%9C%E7%89%A9-9">成果物</h4>
<ul>
<li><code>.claude/settings.json</code> (hook登録) + <code>scripts/hook_hello.sh</code></li>
</ul>
</section>

<h3 id="%E7%AC%AC11%E7%AB%A0-%E5%AE%8C%E4%BA%86-gate-%E3%83%8F%E3%83%BC%E3%83%8D%E3%82%B9-h1--h10-%E7%B5%B1%E5%90%88%E5%9E%8B">第11章 完了 Gate ハーネス (H1 + H10 統合型)</h3>
<p><strong>所要</strong>: 60 min / Bloom: L6 Create</p>
<h4 id="%E3%82%B9%E3%83%88%E3%83%BC%E3%83%AA%E3%83%BC-emotional-hook-11">ストーリー (Emotional Hook)</h4>
<blockquote>
<p>「AIが『完了しました』と報告して、実際には完了していなかった――これ、毎日起きています。この章では、<strong>機械的に完了を検証する門番</strong>を立てます。」</p>
</blockquote>
<ul>
<li>受講者の「これだ！」ポイント: 「完了」報告に対してdone_gateがERRORを返す場面を見て、「やっぱり完了していなかった」を肌で感じる体験。</li>
</ul>
<h4 id="%E3%83%8F%E3%83%B3%E3%82%BA%E3%82%AA%E3%83%B3%E5%85%B7%E4%BD%93%E5%8C%96-10">ハンズオン具体化</h4>
<ul>
<li><strong>何を作る</strong>: <code>scripts/done_gate.sh</code> (PostToolUse hook)</li>
<li><strong>どう作る</strong>: (1) 完了条件5項目をリスト化 → (2) done_gate.shに条件判定ロジックを実装 → (3) PostToolUse hookとして登録 → (4) 意図的に「未完了の完了報告」を再現 → done_gateがBLOCKすることを確認</li>
<li><strong>完成品見た目</strong>: 40-60行のbashスクリプト。YAML status → done の時に5条件を自動チェック。</li>
<li><strong>所要時間</strong>: 演習20min + 解説40min</li>
</ul>
<h4 id="%E6%88%90%E6%9E%9C%E7%89%A9-10">成果物</h4>
<ul>
<li><code>scripts/done_gate.sh</code></li>
</ul>
</section>

<h3 id="%E7%AC%AC12%E7%AB%A0-silent-fail-%E6%A4%9C%E5%87%BA%E3%83%8F%E3%83%BC%E3%83%8D%E3%82%B9-h4">第12章 silent fail 検出ハーネス (H4)</h3>
<p><strong>所要</strong>: 60 min / Bloom: L6 Create</p>
<h4 id="%E3%82%B9%E3%83%88%E3%83%BC%E3%83%AA%E3%83%BC-emotional-hook-12">ストーリー (Emotional Hook)</h4>
<blockquote>
<p>「エラーログに何も出ていないのに、結果がおかしい。これが**静かな失敗(silent fail)**です。一番危険なタイプの失敗です。この章では、沈黙を破る監視員を配置します。」</p>
</blockquote>
<ul>
<li>受講者の「これだ！」ポイント: 成功ログの中に紛れた「実は失敗」パターンをwatcherが検出し、WARNを出す瞬間。</li>
</ul>
<h4 id="%E3%83%8F%E3%83%B3%E3%82%BA%E3%82%AA%E3%83%B3%E5%85%B7%E4%BD%93%E5%8C%96-11">ハンズオン具体化</h4>
<ul>
<li><strong>何を作る</strong>: <code>scripts/silent_fail_watcher.sh</code> + systemd user service unit file</li>
<li><strong>どう作る</strong>: (1) logからsilent fail候補パターン3個を抽出 → (2) inotifywait監視daemonを実装 → (3) exclusion filter(self-feedback防止)を追加 → (4) systemd user service化 → (5) テスト用logで検出確認</li>
<li><strong>完成品見た目</strong>: 常駐daemonがlogを監視し、silent fail検出時にWARNを通知。systemd status で active 確認。</li>
<li><strong>所要時間</strong>: 演習25min + 解説35min</li>
</ul>
<h4 id="%E6%88%90%E6%9E%9C%E7%89%A9-11">成果物</h4>
<ul>
<li><code>scripts/silent_fail_watcher.sh</code> + systemd user service unit file</li>
</ul>
</section>

<p><strong>所要</strong>: 60 min / Bloom: L6 Create</p>
<h4 id="%E3%82%B9%E3%83%88%E3%83%BC%E3%83%AA%E3%83%BC-emotional-hook-13">ストーリー (Emotional Hook)</h4>
<blockquote>
<p>「過去に解決した問題を、また最初からやり直していませんか？ この章では、新しいタスクを始める前に<strong>自動で過去を検索する</strong>仕組みを作ります。」</p>
</blockquote>
<ul>
<li>受講者の「これだ！」ポイント: タスク起票時に自動で過去類似事例が表示され、「1ヶ月前に同じ問題を解決していた」を発見する体験。</li>
</ul>
<h4 id="%E3%83%8F%E3%83%B3%E3%82%BA%E3%82%AA%E3%83%B3%E5%85%B7%E4%BD%93%E5%8C%96-12">ハンズオン具体化</h4>

<li><strong>何を作る</strong>: <code>scripts/cmd_intake_hook.sh</code> + cmd YAML schema拡張</li>
<li><strong>どう作る</strong>: (1) mem-search pre-hookを実装(キーワード抽出→検索→結果注入) → (2) hit=0の場合の警告注入 → (3) PreToolUse hookとして登録 → (4) サンプルcmdで動作確認</li>
<li><strong>完成品見た目</strong>: cmd起票時にターミナルに「過去3件の類似事例を発見」と表示される</li>
<li><strong>所要時間</strong>: 演習20min + 解説40min</li>
</ul>
<h4 id="%E6%88%90%E6%9E%9C%E7%89%A9-12">成果物</h4>
<ul>
<li><code>scripts/cmd_intake_hook.sh</code> + cmd YAML schema拡張</li>
</ul>
